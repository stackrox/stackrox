syntax = "proto3";

package storage;

import "google/protobuf/timestamp.proto";

option cc_enable_arenas = true;
option go_package = "./storage;storage";
option java_package = "io.stackrox.proto.storage";

// ProcessIndicatorNoSerialized is a copy of ProcessIndicator used to test
// the --no-serialized store option. All data is stored in columns only,
// without a serialized bytea blob.
// Next available tag: 13
message ProcessIndicatorNoSerialized {
  // A unique UUID for the Indicator message
  string id = 1; // @gotags: search:"Process No Serialized ID,hidden"  sql:"pk,type(uuid)"

  string deployment_id = 2; // @gotags: search:"Deployment No Serialized ID,hidden" sql:"index,type(uuid)"
  reserved 10;

  string container_name = 3; // @gotags: search:"Container No Serialized Name,hidden"
  // Pod name
  string pod_id = 4; // @gotags: search:"Pod No Serialized ID,hidden"
  string pod_uid = 11; // @gotags: search:"Pod No Serialized UID,hidden" sql:"index,type(uuid)"

  reserved 5;

  // A process signal message passed from Collector to Sensor
  ProcessSignalNoSerialized signal = 6;

  string cluster_id = 7; // @gotags: search:"Cluster No Serialized ID,hidden" sql:"type(uuid)"
  string namespace = 8; // @gotags: search:"Namespace No Serialized,hidden"

  google.protobuf.Timestamp container_start_time = 9; // @gotags: search:"Process Container No Serialized Start Time"

  string image_id = 12;
}

message ProcessSignalNoSerialized {
  // A unique UUID for identifying the message
  string id = 1;

  // ID of container associated with this process
  string container_id = 2; // @gotags: search:"Container No Serialized Signal ID,hidden"

  // Process creation time
  google.protobuf.Timestamp time = 3; // @gotags: search:"Process No Serialized Creation Time,hidden" sql:"index=btree"

  // Process name
  string name = 4; // @gotags: search:"Process No Serialized Name"

  // Process arguments
  string args = 5; // @gotags: search:"Process No Serialized Arguments"

  // Process executable file path
  string exec_file_path = 6; // @gotags: search:"Process No Serialized Path"

  // Host process ID
  uint32 pid = 7;

  // Real user ID
  uint32 uid = 8; // @gotags: search:"Process No Serialized UID"

  // Real group ID
  uint32 gid = 9;

  // Process Lineage
  repeated string lineage = 10 [deprecated = true];

  // Signal origin
  bool scraped = 11;

  // Process LineageInfo
  repeated LineageInfoNoSerialized lineage_info = 12;

  message LineageInfoNoSerialized {
    uint32 parent_uid = 1;
    string parent_exec_file_path = 2;
  }
}
