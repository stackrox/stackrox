syntax = "proto3";

package storage;

import "storage/image.proto";
import "storage/image_component.proto";

option go_package = "./storage;storage";
option java_package = "io.stackrox.proto.storage";

message ScanComponent {
  string id = 1; // @gotags: search:"Component ID,hidden" sql:"pk,id"
  string scan_id = 2; // @gotags: search:"Scan ID,hidden" sql:"fk(ImageScanV2:id),index=btree"
  string image_id = 3; // @gotags: search:"Image ID,hidden" sql:"index=btree"
  string name = 4; // @gotags: search:"Component"
  string version = 5; // @gotags: search:"Component Version"
  SourceType source = 6; // @gotags: search:"Component Source"
  string location = 7; // @gotags: search:"Component Location,hidden"
  oneof has_layer_index {
    int32 layer_index = 8; // @gotags: search:"Layer Index,hidden"
  }
  LayerType layer_type = 9; // @gotags: search:"Layer Type,hidden"
  string fixed_by = 10; // @gotags: search:"Fixed By,hidden"
  string operating_system = 11; // @gotags: search:"Operating System"
  string arch = 12; // @gotags: search:"Architecture"
  string module = 13; // @gotags: search:"Module,hidden"
  string source_package_name = 14; // @gotags: search:"Source Package"
  string source_package_version = 15; // @gotags: search:"Source Package Version,hidden"
  string cpe = 16; // @gotags: search:"CPE,hidden"
  string kind = 17; // @gotags: search:"Package Kind,hidden"
  string repository_hint = 18; // @gotags: search:"Repository Hint,hidden"
}
