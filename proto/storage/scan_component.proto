syntax = "proto3";

package storage;

import "storage/image.proto";
import "storage/image_component.proto";

option go_package = "./storage;storage";
option java_package = "io.stackrox.proto.storage";

message ScanComponent {
  string id = 1; // @gotags: sql:"pk,id"
  string scan_id = 2; // @gotags: sql:"fk(ImageScanV2:id),index=btree"
  string image_id = 3; // @gotags: sql:"fk(ImageV2:id),index=btree"
  string name = 4;
  string version = 5;
  SourceType source = 6;
  string location = 7;
  oneof has_layer_index {
    int32 layer_index = 8;
  }
  LayerType layer_type = 9;
  string fixed_by = 10;
  string operating_system = 11;
}
