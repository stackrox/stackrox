syntax = "proto3";

package storage;

import "google/protobuf/timestamp.proto";

option go_package = "./storage;storage";
option java_package = "io.stackrox.proto.storage";

// VulnerabilityState indicates if vulnerability is being observed or deferred(/suppressed). By default, it vulnerabilities are observed.
enum VulnerabilityState {
  OBSERVED = 0; // [Default state]
  DEFERRED = 1;
  FALSE_POSITIVE = 2;
}

enum VulnerabilitySeverity {
  UNKNOWN_VULNERABILITY_SEVERITY = 0;
  LOW_VULNERABILITY_SEVERITY = 1;
  MODERATE_VULNERABILITY_SEVERITY = 2;
  IMPORTANT_VULNERABILITY_SEVERITY = 3;
  CRITICAL_VULNERABILITY_SEVERITY = 4;
}

enum Source {
  SOURCE_UNKNOWN = 0;
  SOURCE_RED_HAT = 1;
  SOURCE_OSV = 2;
  SOURCE_NVD = 3;
}

//Added this score version for nvd cvss score. moving out and re using score version from cveinfo will cause backward compatibility issue
enum CvssScoreVersion {
  UNKNOWN_VERSION = 0;
  V2 = 1; // No unset for automatic backwards compatibility
  V3 = 2;
}

// EPSS Score stores two epss metrics returned by scanner - epss probability and epss percentile
message EPSS {
  float epss_probability = 1; // @gotags: search:"EPSS Probability"
  float epss_percentile = 2;
}

// ******************************
// This proto is deprecated.
// ******************************
// Next Tag: 23
message CVE {
  enum CVEType {
    UNKNOWN_CVE = 0;
    IMAGE_CVE = 1;
    K8S_CVE = 2;
    ISTIO_CVE = 3;
    NODE_CVE = 4;
    OPENSHIFT_CVE = 5;
  }
  message DistroSpecific {
    VulnerabilitySeverity severity = 1;
    float cvss = 2;
    ScoreVersion score_version = 3;
    CVSSV2 cvss_v2 = 4;
    CVSSV3 cvss_v3 = 5;
  }
  enum ScoreVersion {
    V2 = 0; // No unset for automatic backwards compatibility
    V3 = 1;
    UNKNOWN = 2;
  }
  message Reference {
    string URI = 1;
    repeated string tags = 2;
  }

  string id = 1; // @gotags: search:"CVE"
  // This was CVE which was added as a part of postgres migration.
  reserved 22;
  // This was operating system which was added as a part of postgres migration.
  reserved 21;
  float cvss = 2; // @gotags: search:"CVSS"
  float impact_score = 14; // @gotags: search:"Impact Score"

  // For internal purposes only. This will only be populated prior to upsert into datastore.
  // Cluster cves are split between k8s and istio. The type info is a relationship attribute and not a property of cve itself.
  // TODO: Move type to relationship objects.

  CVEType type = 3; // @gotags: sql:"-"
  repeated CVEType types = 18; // @gotags: search:"CVE Type"

  string summary = 4;
  string link = 5;
  // This indicates the timestamp when the cve was first published in the cve feeds.
  google.protobuf.Timestamp published_on = 6; // @gotags: search:"CVE Published On"
  // Time when the CVE was first seen in the system.
  google.protobuf.Timestamp created_at = 15; // @gotags: search:"CVE Created Time"
  google.protobuf.Timestamp last_modified = 7;
  repeated Reference references = 8;

  ScoreVersion score_version = 9;
  CVSSV2 cvss_v2 = 10;
  CVSSV3 cvss_v3 = 11;

  // TODO: Move suppression field out of CVE object. Maybe create equivalent dummy vulnerability requests.
  // Unfortunately, although there exists image SAC check on legacy suppress APIs,
  // one can snooze node and cluster type vulns, so we will have to carry over the support for node and cluster cves.

  bool suppressed = 12; // @gotags: search:"CVE Snoozed"
  google.protobuf.Timestamp suppress_activation = 16;
  google.protobuf.Timestamp suppress_expiry = 17; // @gotags: search:"CVE Snooze Expiry,hidden"

  map<string, DistroSpecific> distro_specifics = 19;
  VulnerabilitySeverity severity = 20; // @gotags: search:"Severity"
}

message CVEInfo {
  message Reference {
    string URI = 1;
    repeated string tags = 2;
  }
  // ScoreVersion can be deprecated ROX-26066
  enum ScoreVersion {
    V2 = 0; // No unset for automatic backwards compatibility
    V3 = 1;
    UNKNOWN = 2;
  }
  string cve = 1; // @gotags: search:"CVE" sql:"index=btree"
  string summary = 2;
  string link = 3;
  // This indicates the timestamp when the cve was first published in the cve feeds.
  google.protobuf.Timestamp published_on = 4; // @gotags: search:"CVE Published On"
  // Time when the CVE was first seen in the system.
  google.protobuf.Timestamp created_at = 5; // @gotags: search:"CVE Created Time"
  google.protobuf.Timestamp last_modified = 6;
  ScoreVersion score_version = 7;
  // CVSSV2 CVSSV3 ScoreVersion can be deprecated ROX-26066
  CVSSV2 cvss_v2 = 8;
  CVSSV3 cvss_v3 = 9;
  repeated Reference references = 10;

  // cvss_metrics stores list of cvss scores from different sources like nvd, Redhat etc
  repeated CVSSScore cvss_metrics = 11;
  EPSS epss = 12;
}

message Advisory {
  string name = 1; // @gotags: search:"Advisory Name"
  string link = 2; // @gotags: search:"Advisory Link"
}

// This proto is deprecated and replaced by ImageCVEV2.
message ImageCVE {
  option deprecated = true;
  string id = 1; // This field is composite of cve and operating system.
  CVEInfo cve_base_info = 2;
  string operating_system = 3;
  // cvss stores ACS preferred cvss score
  float cvss = 4;
  VulnerabilitySeverity severity = 5;
  float impact_score = 6;

  bool snoozed = 7 [deprecated = true];
  google.protobuf.Timestamp snooze_start = 8 [deprecated = true];
  google.protobuf.Timestamp snooze_expiry = 9 [deprecated = true];
  // nvdcvss stores cvss score for a cve from NVD
  float nvdcvss = 10;
  // cvss_metrics stores list of cvss metrics from different sources like Redhat, NVD etc
  repeated CVSSScore cvss_metrics = 11;
  CvssScoreVersion nvd_score_version = 12;
}

message ImageCVEV2 {
  // keeping id similar construction for now during investigation.  It will include component and index
  // within the component
  string id = 1; // @gotags: search:"CVE ID,hidden" sql:"pk,id"
  // was hash index, making it btree
  string image_id = 2 [deprecated = true]; // @gotags: sql:"fk(Image:id),index=btree"
  CVEInfo cve_base_info = 3;
  // cvss stores ACS preferred cvss score
  float cvss = 4; // @gotags: search:"CVSS"
  VulnerabilitySeverity severity = 5; // @gotags: search:"Severity" sql:"index=btree"
  float impact_score = 6; // @gotags: search:"Impact Score"

  // nvdcvss stores cvss score for a cve from NVD
  float nvdcvss = 7; // @gotags: search:"NVD CVSS"
  CvssScoreVersion nvd_score_version = 8;
  google.protobuf.Timestamp first_image_occurrence = 9; // @gotags: search:"First Image Occurrence Timestamp,hidden"
  VulnerabilityState state = 10; // @gotags: search:"Vulnerability State" sql:"index=btree"

  bool is_fixable = 11; // @gotags: search:"Fixable"
  // Whether there is a version the CVE is fixed in the component.
  oneof has_fixed_by {
    string fixed_by = 12; // @gotags: search:"Fixed By,hidden"
  }

  string component_id = 13; // @gotags: sql:"fk(ImageComponentV2:id),index=btree"
  storage.Advisory advisory = 14;

  string image_id_v2 = 15; // @gotags: sql:"fk(ImageV2:id),index=btree,allow-null"

  // Timestamp when the fix for this CVE was made available according to the sources.
  google.protobuf.Timestamp fix_available_timestamp = 16; // @gotags: search:"CVE Fix Available Timestamp,hidden"
  string datasource = 17;
}

message NodeCVE {
  string id = 1; // This field is composite of cve and operating system. // @gotags: search:"CVE ID,hidden" sql:"pk,id"
  CVEInfo cve_base_info = 2;
  string operating_system = 3; // @gotags: search:"Operating System"

  float cvss = 4; // @gotags: search:"CVSS"
  VulnerabilitySeverity severity = 5; // @gotags: search:"Severity"
  float impact_score = 6; // @gotags: search:"Impact Score"

  bool snoozed = 7; // @gotags: search:"CVE Snoozed"
  google.protobuf.Timestamp snooze_start = 8;
  google.protobuf.Timestamp snooze_expiry = 9; // @gotags: search:"CVE Snooze Expiry,hidden"

  bool orphaned = 10; // @gotags: search:"CVE Orphaned,hidden"
  google.protobuf.Timestamp orphaned_time = 11; // @gotags: search:"CVE Orphaned Time,hidden"
}

message ClusterCVE {
  string id = 1; // This field is composite of cve and type. // @gotags: search:"CVE ID,hidden" sql:"pk,id"
  CVEInfo cve_base_info = 2;

  float cvss = 3; // @gotags: search:"CVSS"
  VulnerabilitySeverity severity = 4; // @gotags: search:"Severity"
  float impact_score = 5; // @gotags: search:"Impact Score"

  bool snoozed = 6; // @gotags: search:"CVE Snoozed"
  google.protobuf.Timestamp snooze_start = 7;
  google.protobuf.Timestamp snooze_expiry = 8; // @gotags: search:"CVE Snooze Expiry,hidden"
  CVE.CVEType type = 9; // @gotags: search:"CVE Type"
}

message CVSSScore {
  Source source = 1;
  string url = 2;
  oneof cvss_score {
    CVSSV2 cvssv2 = 3;
    CVSSV3 cvssv3 = 4;
  }
}

message CVSSV2 {
  enum Impact {
    IMPACT_NONE = 0;
    IMPACT_PARTIAL = 1;
    IMPACT_COMPLETE = 2;
  }
  enum AttackVector {
    ATTACK_LOCAL = 0;
    ATTACK_ADJACENT = 1;
    ATTACK_NETWORK = 2;
  }
  enum AccessComplexity {
    ACCESS_HIGH = 0;
    ACCESS_MEDIUM = 1;
    ACCESS_LOW = 2;
  }
  enum Authentication {
    AUTH_MULTIPLE = 0;
    AUTH_SINGLE = 1;
    AUTH_NONE = 2;
  }
  enum Severity {
    UNKNOWN = 0;
    LOW = 1;
    MEDIUM = 2;
    HIGH = 3;
  }

  string vector = 1;
  AttackVector attack_vector = 2;
  AccessComplexity access_complexity = 3;
  Authentication authentication = 4;
  Impact confidentiality = 5;
  Impact integrity = 6;
  Impact availability = 7;
  float exploitability_score = 8;
  float impact_score = 9;
  float score = 10;
  Severity severity = 11;
}

message CVSSV3 {
  enum Impact {
    IMPACT_NONE = 0;
    IMPACT_LOW = 1;
    IMPACT_HIGH = 2;
  }
  enum AttackVector {
    ATTACK_LOCAL = 0;
    ATTACK_ADJACENT = 1;
    ATTACK_NETWORK = 2;
    ATTACK_PHYSICAL = 3;
  }
  enum Complexity {
    COMPLEXITY_LOW = 0;
    COMPLEXITY_HIGH = 1;
  }
  enum Privileges {
    PRIVILEGE_NONE = 0;
    PRIVILEGE_LOW = 1;
    PRIVILEGE_HIGH = 2;
  }
  enum UserInteraction {
    UI_NONE = 0;
    UI_REQUIRED = 1;
  }
  enum Scope {
    UNCHANGED = 0;
    CHANGED = 1;
  }
  enum Severity {
    UNKNOWN = 0;
    NONE = 1;
    LOW = 2;
    MEDIUM = 3;
    HIGH = 4;
    CRITICAL = 5;
  }

  string vector = 1;
  float exploitability_score = 2;
  float impact_score = 3;
  AttackVector attack_vector = 4;
  Complexity attack_complexity = 5;
  Privileges privileges_required = 6;
  UserInteraction user_interaction = 7;
  Scope scope = 8;
  Impact confidentiality = 9;
  Impact integrity = 10;
  Impact availability = 11;
  float score = 12;
  Severity severity = 13;
}

message ImageCVEInfo {
  // ID is comprised of cve#package#datasource where package is the component that is afflicted, and datasource
  // is the concatenation of the updater + OS ex: debian-bookworm-updater::debian:12
  string id = 1; // @gotags: search:"CVE Info" sql:"pk"
  google.protobuf.Timestamp fix_available_timestamp = 2; // @gotags: search:"CVE Fix Available Timestamp,hidden"
  google.protobuf.Timestamp first_system_occurrence = 3; // @gotags: search:"First System Occurrence Timestamp,hidden"
  string cve = 4; // @gotags: search:"CVE" sql:"index"
}

// NormalizedCVE stores a unique CVE record keyed by (cve_name, source, content_hash).
// This table is append-only; rows are never updated, only inserted via ON CONFLICT DO NOTHING.
// The content_hash is SHA256 of (cve_name \x00 source \x00 severity \x00 cvss_v3_formatted \x00 summary).
message NormalizedCVE {
  // id is a UUID primary key stable for foreign key references. // @gotags: search:"CVE ID,hidden" sql:"pk,id"
  string id = 1;
  // cve_name is the CVE identifier, e.g. CVE-2021-44228. // @gotags: search:"CVE" sql:"index=btree"
  string cve_name = 2;
  // source is the advisory organization: OSV, NVD, RED_HAT, or UNKNOWN. // @gotags: search:"CVE Source" sql:"index=btree"
  string source = 3;
  // severity is one of CRITICAL, HIGH, MEDIUM, LOW, UNKNOWN. // @gotags: search:"Severity" sql:"index=btree"
  string severity = 4;
  // cvss_v2 is the CVSS v2 score. // @gotags: search:"CVSS V2"
  float cvss_v2 = 5;
  // cvss_v3 is the CVSS v3 score. // @gotags: search:"CVSS"
  float cvss_v3 = 6;
  // nvd_cvss_v3 is the NVD CVSS v3 score when source != NVD. // @gotags: search:"NVD CVSS"
  float nvd_cvss_v3 = 7;
  // summary is a human-readable description of the vulnerability.
  string summary = 8;
  // link is the reference URL for the CVE.
  string link = 9;
  // published_on is when the CVE was published. // @gotags: search:"CVE Published On"
  google.protobuf.Timestamp published_on = 10;
  // advisory_name is the first advisory name encountered (informational only; not part of uniqueness key).
  string advisory_name = 11;
  // advisory_link is the URL for the advisory.
  string advisory_link = 12;
  // content_hash is SHA256(cve_name\x00source\x00severity\x00cvss_v3\x00summary). // @gotags: sql:"index=btree"
  string content_hash = 13;
  // created_at is when this CVE row was first inserted. // @gotags: search:"CVE Created Time"
  google.protobuf.Timestamp created_at = 14;
}

// NormalizedComponentCVEEdge links an image component to a NormalizedCVE record.
// The first_system_occurrence is set on initial insert and preserved on subsequent updates.
// This replaces the deprecated ComponentCVEEdge from relations.proto for the normalized CVE model.
message NormalizedComponentCVEEdge {
  // id is a UUID primary key.
  string id = 1; // @gotags: sql:"pk,id"
  // component_id is the TEXT foreign key referencing image_component_v2.id (a SHA256 hex string).
  string component_id = 2; // @gotags: search:"Component ID" sql:"fk(ImageComponentV2:id),index=hash"
  // cve_id is the UUID foreign key referencing cves.id.
  string cve_id = 3; // @gotags: search:"CVE" sql:"fk(NormalizedCVE:id),no-fk-constraint,index=hash"
  // is_fixable indicates whether a fix is available.
  bool is_fixable = 4; // @gotags: search:"Fixable"
  // fixed_by is the version that fixes this vulnerability.
  string fixed_by = 5; // @gotags: search:"Fixed By,hidden"
  // state is the vulnerability state: OBSERVED, DEFERRED, or FALSE_POSITIVE.
  string state = 6; // @gotags: search:"Vulnerability State"
  // first_system_occurrence is set on first insert; not updated on subsequent upserts.
  google.protobuf.Timestamp first_system_occurrence = 7;
  // fix_available_at records when a fix first became available.
  google.protobuf.Timestamp fix_available_at = 8;
}
