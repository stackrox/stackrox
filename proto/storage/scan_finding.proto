syntax = "proto3";

package storage;

import "google/protobuf/timestamp.proto";
import "storage/cve.proto";

option go_package = "./storage;storage";
option java_package = "io.stackrox.proto.storage";

message ScanFinding {
  string id = 1; // @gotags: sql:"pk,id"
  string advisory_id = 2;
  string cve_name = 3; // @gotags: sql:"index=btree"
  string component_id = 4; // @gotags: sql:"fk(ScanComponent:id),index=btree"
  string scan_id = 5; // @gotags: sql:"fk(ImageScanV2:id)"
  string image_id = 6; // @gotags: sql:"fk(ImageV2:id),index=btree"
  VulnerabilitySeverity severity = 7; // @gotags: sql:"index=btree"
  float cvss = 8;
  CvssScoreVersion cvss_version = 9;
  float nvd_cvss = 10;
  CvssScoreVersion nvd_cvss_version = 11;
  float epss_probability = 12;
  float epss_percentile = 13;
  bool is_fixable = 14;
  string fixed_by = 15;
  google.protobuf.Timestamp fixed_date = 16;
  string description = 17;
  google.protobuf.Timestamp published_date = 18;
  string data_source = 19;
  string source_name = 20;
  repeated string links = 21; // @gotags: sql:"type(text[])"
  VulnerabilityState state = 22;
  google.protobuf.Timestamp first_image_occurrence = 23;
  google.protobuf.Timestamp first_system_occurrence = 24;
}
