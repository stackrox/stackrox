syntax = "proto3";

package storage;

import "google/protobuf/timestamp.proto";

option go_package = "./storage;storage";
option java_package = "io.stackrox.proto.storage";

// VirtualMachineScanV2 represents a scan result for a VM.
// Each VM has at most one active scan at a time.
// Components and CVEs discovered by the scan are stored in separate tables
// (VirtualMachineComponentV2, VirtualMachineCVEV2).
message VirtualMachineScanV2 {
  // UUIDv7 primary key — time-sortable, encodes creation timestamp.
  // Finding the latest scan is ORDER BY id DESC LIMIT 1 without a separate timestamp index.
  string id = 1; // @gotags: sql:"pk,type(uuid)"

  // FK to VirtualMachineV2.id. CASCADE DELETE ensures scan cleanup when VM is removed.
  string vm_v2_id = 2; // @gotags: sql:"fk(VirtualMachineV2:id),type(uuid),index=btree"

  // OS detected by the scanner during this scan.
  string scan_os = 3;

  // When the scan was performed.
  google.protobuf.Timestamp scan_time = 4; // @gotags: search:"Virtual Machine Scan Time" sql:"type(timestamptz),index=btree"

  // Cached highest CVSS score across all CVEs in this scan.
  float top_cvss = 5; // @gotags: search:"Virtual Machine Top CVSS"

  enum Note {
    UNSET = 0;
    OS_UNKNOWN = 1;
    OS_UNSUPPORTED = 2;
  }
  repeated Note notes = 6;

  // Hash of the scan components and CVEs for change detection.
  uint64 hash = 7;
}
