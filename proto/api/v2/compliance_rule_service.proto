syntax = "proto3";

package v2;

import "api/v2/compliance_common.proto";
import weak "google/api/annotations.proto";

option go_package = "v2";
option java_package = "io.stackrox.proto.api.v2";

message RuleRequest {
  string rule_name = 1;
}

service ComplianceRuleService {
  // GetComplianceRuleByName returns rule matching given request
  rpc GetComplianceRuleByName(RuleRequest) returns (ComplianceRule) {
    option (google.api.http) = {get: "/v2/compliance/rule/summary/{rule_name}"};
  }
}
