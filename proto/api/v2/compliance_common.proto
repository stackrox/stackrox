syntax = "proto3";

package v2;

option go_package = "v2";
option java_package = "io.stackrox.proto.api.v2";

// Next Tag: 13
message ComplianceRule {
  string name = 1;
  reserved 2;
  string rule_type = 3;
  string severity = 4;
  string standard = 5;
  string control = 6;
  string title = 7;
  string description = 8;
  string rationale = 9;
  string fixes = 10;
  string id = 11;
  string rule_id = 12;
  string parent_rule = 13;
}
