syntax = "proto3";

package v1;

import "api/v1/common.proto";
import "api/v1/empty.proto";
import "api/v1/pagination.proto";
import weak "google/api/annotations.proto";
import "storage/role.proto";

option go_package = "./api/v1;v1";
option java_package = "io.stackrox.proto.api.v1";

// storage.Access values should be in escalating order. IE READ_WRITE means you have READ as well.

// Permission pairs a resource name with the access level granted to a caller.
message Permission {
  // resource is the name of the ACS resource (e.g. "Alert", "Deployment", "Access").
  string resource = 1;
  // access is the access level granted for this resource.
  storage.Access access = 2;
}

// GetRolesResponse contains all non-ephemeral roles defined in Central.
message GetRolesResponse {
  // roles is the list of roles, sorted alphabetically by name. Ephemeral (internal) roles are excluded.
  repeated storage.Role roles = 1;
}

// GetPermissionsResponse is wire-compatible with the old format of the Role
// message and represents a collection of aggregated permissions.
message GetPermissionsResponse {
  reserved 1; // for compatibility with Role.name
  reserved 2; // for compatibility with Role.global_access
  // resource_to_access maps each ACS resource name to the highest access level
  // the caller holds across all their assigned roles.
  map<string, storage.Access> resource_to_access = 3;
}

// GetResourcesResponse lists all resource names recognised by the RBAC system.
message GetResourcesResponse {
  // resources is the complete list of ACS resource names that can be referenced in permission sets.
  repeated string resources = 1;
}

// ListPermissionSetsResponse contains all non-ephemeral permission sets.
message ListPermissionSetsResponse {
  // permission_sets is the list of permission sets, sorted alphabetically by name.
  // Ephemeral (internal) permission sets are excluded.
  repeated storage.PermissionSet permission_sets = 1;
}

// ListSimpleAccessScopesResponse contains all non-ephemeral access scopes.
message ListSimpleAccessScopesResponse {
  // access_scopes is the list of simple access scopes, sorted alphabetically by name.
  // Ephemeral (internal) access scopes are excluded.
  repeated storage.SimpleAccessScope access_scopes = 1;
}

// ScopeObject represents an ID, name pair, which can apply to any
// entity that takes part in an access scope (so far Cluster and Namespace).
message ScopeObject {
  // id is the unique identifier of the cluster or namespace.
  string id = 1;
  // name is the display name of the cluster or namespace.
  string name = 2;
}

// GetClustersForPermissionsResponse contains clusters accessible to the caller.
message GetClustersForPermissionsResponse {
  // clusters is the list of (id, name) pairs for clusters the caller can read
  // for at least one of the requested permissions.
  repeated ScopeObject clusters = 1;
}

// GetNamespacesForClusterAndPermissionsResponse contains namespaces accessible to the caller.
message GetNamespacesForClusterAndPermissionsResponse {
  // namespaces is the list of (id, name) pairs for namespaces the caller can read
  // for at least one of the requested permissions within the specified cluster.
  repeated ScopeObject namespaces = 1;
}

// ComputeEffectiveAccessScopeRequest specifies access scope rules and the desired response verbosity.
message ComputeEffectiveAccessScopeRequest {
  // Detail controls the verbosity of the computed effective access scope response.
  enum Detail {
    // STANDARD lists all known clusters and namespaces with INCLUDED/PARTIAL/EXCLUDED state and their names.
    STANDARD = 0;
    // MINIMAL lists only the roots of included subtrees by ID; useful for low-latency checks.
    MINIMAL = 1;
    // HIGH augments every cluster and namespace with additional metadata.
    HIGH = 2;
  }

  // Payload holds the access scope rules to evaluate.
  message Payload {
    // Other definitions of access scope rules is science fiction for now;
    // however, prepare for that possible future.
    oneof rules_opt {
      // simple_rules defines cluster and namespace label selectors for the access scope.
      storage.SimpleAccessScope.Rules simple_rules = 1;
    }
  }

  // detail controls how much information is returned per cluster/namespace. Defaults to STANDARD.
  Detail detail = 1;
  // access_scope holds the rules to evaluate against the current cluster/namespace inventory.
  Payload access_scope = 2;
}

// CreateRoleRequest unites name we take from the URL path and role body in the same structure.
// This way we can verify that name in the path and name in the body are identical.
message CreateRoleRequest {
  // name is the role name taken from the URL path; it must match role.name if role.name is set.
  string name = 1;
  // role is the role definition to create.
  storage.Role role = 2;
}

// GetClustersForPermissionsRequest specifies which permissions to check when filtering clusters.
message GetClustersForPermissionsRequest {
  // pagination controls the page size and offset for the returned cluster list.
  Pagination pagination = 1;
  // permissions is the list of ACS resource names to check. Only permissions with cluster scope
  // or narrower are considered; global-scoped permissions are ignored.
  // If empty, all cluster-scoped permissions are considered.
  repeated string permissions = 2;
}

// GetNamespaceForClusterAndPermissionsRequest specifies the cluster and permissions to check.
message GetNamespaceForClusterAndPermissionsRequest {
  reserved 1; // For pagination, should namespace search allow for it.
  // cluster_id is the ID of the cluster whose namespaces to filter.
  string cluster_id = 2;
  // permissions is the list of ACS resource names to check. Only permissions with namespace scope
  // or narrower are considered; global and cluster-scoped permissions are ignored.
  // If empty, all namespace-scoped permissions are considered.
  repeated string permissions = 3;
}

// RoleService manages the ACS role-based access control (RBAC) model, including roles,
// permission sets, and access scopes.
//
// A role combines a permission set (what resources can be accessed and at what level)
// with a simple access scope (which clusters and namespaces are in scope).
// Permission sets and access scopes can be shared across multiple roles.
//
// Ephemeral roles/permission sets/access scopes created internally by the system are
// excluded from list responses and cannot be created or modified via this API.
//
// Authentication requirements:
// - GetMyPermissions, GetResources, GetClustersForPermissions, GetNamespacesForClusterAndPermissions: any authenticated caller.
// - GetRoles, GetRole, ListPermissionSets, GetPermissionSet, ListSimpleAccessScopes, GetSimpleAccessScope: read access to the Access resource.
// - ComputeEffectiveAccessScope: read access to the Access, Cluster, and Namespace resources.
// - CreateRole, UpdateRole, DeleteRole, PostPermissionSet, PutPermissionSet, DeletePermissionSet,
//   PostSimpleAccessScope, PutSimpleAccessScope, DeleteSimpleAccessScope: write access to the Access resource.
service RoleService {
  // GetRoles returns all non-ephemeral roles, sorted alphabetically by name.
  //
  // Requires read access to the Access resource.
  rpc GetRoles(Empty) returns (GetRolesResponse) {
    option (google.api.http) = {get: "/v1/roles"};
  }

  // GetRole returns the role with the given ID.
  //
  // Returns NOT_FOUND if no role with the specified ID exists.
  // Requires read access to the Access resource.
  rpc GetRole(ResourceByID) returns (storage.Role) {
    option (google.api.http) = {get: "/v1/roles/{id}"};
  }

  // GetMyPermissions returns the aggregated permissions of the authenticated caller.
  //
  // Permissions are aggregated across all roles assigned to the caller. For each resource,
  // the highest access level across all roles is returned.
  // Requires any authenticated session (no specific resource permission needed).
  rpc GetMyPermissions(Empty) returns (GetPermissionsResponse) {
    option (google.api.http) = {get: "/v1/mypermissions"};
  }

  // CreateRole creates a new role with the given name.
  //
  // The name in the URL path must match role.name if role.name is provided.
  // Ephemeral roles cannot be created via this API.
  // Returns INVALID_ARGUMENT if the name is mismatched or the role already exists.
  // Requires write access to the Access resource.
  rpc CreateRole(CreateRoleRequest) returns (Empty) {
    option (google.api.http) = {
      post: "/v1/roles/{name}"
      body: "role"
    };
  }

  // UpdateRole replaces an existing role definition.
  //
  // Ephemeral roles cannot be modified via this API.
  // Returns INVALID_ARGUMENT if validation fails or the role does not exist.
  // Requires write access to the Access resource.
  rpc UpdateRole(storage.Role) returns (Empty) {
    option (google.api.http) = {
      put: "/v1/roles/{name}"
      body: "*"
    };
  }

  // DeleteRole removes the role with the given ID.
  //
  // Requires write access to the Access resource.
  rpc DeleteRole(ResourceByID) returns (Empty) {
    option (google.api.http) = {delete: "/v1/roles/{id}"};
  }

  // GetResources returns the list of all ACS resource names that can be referenced in permission sets.
  //
  // Requires any authenticated session.
  rpc GetResources(Empty) returns (GetResourcesResponse) {
    option (google.api.http) = {get: "/v1/resources"};
  }

  ////////////////////////////////////////////////////////////////////////////
  // Permission sets                                                        //
  //                                                                        //

  // GetPermissionSet returns the permission set with the given ID.
  //
  // Returns NOT_FOUND if no permission set with the specified ID exists.
  // Requires read access to the Access resource.
  rpc GetPermissionSet(ResourceByID) returns (storage.PermissionSet) {
    option (google.api.http) = {get: "/v1/permissionsets/{id}"};
  }

  // ListPermissionSets returns all non-ephemeral permission sets, sorted alphabetically by name.
  //
  // Requires read access to the Access resource.
  rpc ListPermissionSets(Empty) returns (ListPermissionSetsResponse) {
    option (google.api.http) = {get: "/v1/permissionsets"};
  }

  // PostPermissionSet creates a new permission set.
  //
  // PermissionSet.id is disallowed in request and set in response.
  // Ephemeral permission sets cannot be created via this API.
  // Returns INVALID_ARGUMENT if id is set or validation fails.
  // Requires write access to the Access resource.
  rpc PostPermissionSet(storage.PermissionSet) returns (storage.PermissionSet) {
    option (google.api.http) = {
      post: "/v1/permissionsets"
      body: "*"
    };
  }

  // PutPermissionSet replaces an existing permission set.
  //
  // Ephemeral permission sets cannot be modified via this API.
  // Returns INVALID_ARGUMENT if validation fails.
  // Requires write access to the Access resource.
  rpc PutPermissionSet(storage.PermissionSet) returns (Empty) {
    option (google.api.http) = {
      put: "/v1/permissionsets/{id}"
      body: "*"
    };
  }

  // DeletePermissionSet removes the permission set with the given ID.
  //
  // Requires write access to the Access resource.
  rpc DeletePermissionSet(ResourceByID) returns (Empty) {
    option (google.api.http) = {delete: "/v1/permissionsets/{id}"};
  }

  ////////////////////////////////////////////////////////////////////////////
  // Access scopes                                                          //
  //                                                                        //

  // GetSimpleAccessScope returns the simple access scope with the given ID.
  //
  // Returns NOT_FOUND if no access scope with the specified ID exists.
  // Requires read access to the Access resource.
  rpc GetSimpleAccessScope(ResourceByID) returns (storage.SimpleAccessScope) {
    option (google.api.http) = {get: "/v1/simpleaccessscopes/{id}"};
  }

  // ListSimpleAccessScopes returns all non-ephemeral simple access scopes, sorted alphabetically by name.
  //
  // Requires read access to the Access resource.
  rpc ListSimpleAccessScopes(Empty) returns (ListSimpleAccessScopesResponse) {
    option (google.api.http) = {get: "/v1/simpleaccessscopes"};
  }

  // PostSimpleAccessScope creates a new simple access scope.
  //
  // SimpleAccessScope.id is disallowed in request and set in response.
  // Ephemeral access scopes cannot be created via this API.
  // Returns INVALID_ARGUMENT if id is set or validation fails.
  // Requires write access to the Access resource.
  rpc PostSimpleAccessScope(storage.SimpleAccessScope) returns (storage.SimpleAccessScope) {
    option (google.api.http) = {
      post: "/v1/simpleaccessscopes"
      body: "*"
    };
  }

  // PutSimpleAccessScope replaces an existing simple access scope.
  //
  // Ephemeral access scopes cannot be modified via this API.
  // Returns INVALID_ARGUMENT if validation fails.
  // Requires write access to the Access resource.
  rpc PutSimpleAccessScope(storage.SimpleAccessScope) returns (Empty) {
    option (google.api.http) = {
      put: "/v1/simpleaccessscopes/{id}"
      body: "*"
    };
  }

  // DeleteSimpleAccessScope removes the simple access scope with the given ID.
  //
  // Requires write access to the Access resource.
  rpc DeleteSimpleAccessScope(ResourceByID) returns (Empty) {
    option (google.api.http) = {delete: "/v1/simpleaccessscopes/{id}"};
  }

  // ComputeEffectiveAccessScope evaluates access scope rules against the current cluster and
  // namespace inventory and returns the resulting effective access scope.
  //
  // Does not persist anything; not idempotent due to possible changes to clusters
  // and namespaces. POST is chosen due to potentially large payload.
  //
  // There are advantages in both keeping the response slim and detailed. If
  // only IDs of selected clusters and namespaces are included, response
  // latency and processing time are lower but the caller shall overlay the
  // response with its view of the world which is susceptible to consistency
  // issues. Listing all clusters and namespaces with related metadata is
  // convenient for the caller but bloat the message with secondary data.
  //
  // We let the caller decide what level of detail they would like to have:
  //
  //   - Minimal, when only roots of included subtrees are listed by their
  //     IDs. Clusters can be either INCLUDED (its namespaces are included but
  //     are not listed) or PARTIAL (at least one namespace is explicitly
  //     included). Namespaces can only be INCLUDED.
  //
  //   - Standard [default], when all known clusters and namespaces are listed
  //     with their IDs and names. Clusters can be INCLUDED (all its
  //     namespaces are explicitly listed as INCLUDED), PARTIAL (all its
  //     namespaces are explicitly listed, some as INCLUDED and some as
  //     EXCLUDED), and EXCLUDED (all its namespaces are explicitly listed as
  //     EXCLUDED). Namespaces can be either INCLUDED or EXCLUDED.
  //
  //   - High, when every cluster and namespace is augmented with metadata.
  //
  // Requires read access to the Access, Cluster, and Namespace resources.
  rpc ComputeEffectiveAccessScope(ComputeEffectiveAccessScopeRequest) returns (storage.EffectiveAccessScope) {
    option (google.api.http) = {
      post: "/v1/computeeffectiveaccessscope"
      body: "access_scope"
    };
  }

  // Extraction of user scope elements

  // GetClustersForPermissions returns the cluster ID/name pairs accessible to the caller
  // for the specified permissions.
  //
  // Returns the list of cluster ID and cluster name pairs that have at least read allowed
  // by the scope of the requesting user for the list of requested permissions.
  // Effective access scopes are only considered for input permissions that have
  // cluster scope or narrower (i.e. global permissions from the input are ignored).
  //
  // If the input only contains permissions at global level, the output will be an empty list.
  //
  // If no permission is given in input, all clusters allowed by the requester scope for
  // any permission with cluster scope or narrower will be part of the response.
  // Requires any authenticated session.
  rpc GetClustersForPermissions(GetClustersForPermissionsRequest) returns (GetClustersForPermissionsResponse) {
    option (google.api.http) = {get: "/v1/sac/clusters"};
  }

  // GetNamespacesForClusterAndPermissions returns the namespace ID/name pairs within a cluster
  // that are accessible to the caller for the specified permissions.
  //
  // Returns the list of namespace ID and namespace name pairs that belong to the requested
  // cluster and for which the user has at least read access granted for the list of
  // requested permissions that have namespace scope or narrower (i.e. global and cluster
  // permissions from the input are ignored).
  //
  // If the input only contains permissions at global or cluster level, the output will be
  // an empty list.
  //
  // If no permission is given in input, all namespaces allowed by the requester scope for
  // any permission with namespace scope or narrower will be part of the response.
  // Requires any authenticated session.
  rpc GetNamespacesForClusterAndPermissions(GetNamespaceForClusterAndPermissionsRequest) returns (GetNamespacesForClusterAndPermissionsResponse) {
    option (google.api.http) = {get: "/v1/sac/clusters/{cluster_id}/namespaces"};
  }
}
