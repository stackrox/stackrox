syntax = "proto3";

package v1;

import weak "google/api/annotations.proto";
import "storage/node.proto";

option go_package = "./api/v1;v1";
option java_package = "io.stackrox.proto.api.v1";

// ListNodesRequest is the request message for listing nodes in a cluster.
message ListNodesRequest {
  // cluster_id filters nodes to those belonging to the specified cluster.
  string cluster_id = 1;
}

// ListNodesResponse contains the list of nodes returned by ListNodes.
message ListNodesResponse {
  repeated storage.Node nodes = 1;
}

// GetNodeRequest identifies a specific node by cluster and node IDs.
message GetNodeRequest {
  // cluster_id is included for API compatibility. The node_id uniquely identifies a node
  // across all clusters and is sufficient to retrieve it.
  string cluster_id = 1;
  // node_id is the unique identifier of the node to retrieve.
  string node_id = 2;
}

// ExportNodeRequest is the request message for streaming a bulk node export.
message ExportNodeRequest {
  // timeout is the maximum number of seconds to wait for the export stream to complete.
  // Zero means no timeout.
  int32 timeout = 1;
  // query filters nodes using StackRox search syntax. If empty, all nodes are exported.
  string query = 2;
}

// ExportNodeResponse is a single streamed item in a bulk node export.
message ExportNodeResponse {
  storage.Node node = 1;
}

// NodeService provides access to Kubernetes nodes observed by StackRox across secured clusters.
//
// Node data includes OS, kernel version, container runtime, and vulnerability information
// gathered by the StackRox scanner. Nodes can be listed per-cluster, retrieved individually,
// or exported in bulk as a stream.
//
// Authentication: all endpoints require a valid API token with read access to the Node resource.
service NodeService {
  // ListNodes returns all nodes belonging to the specified cluster.
  //
  // Returns INVALID_ARGUMENT if cluster_id is empty or does not match a known cluster.
  rpc ListNodes(ListNodesRequest) returns (ListNodesResponse) {
    option (google.api.http) = {get: "/v1/nodes/{cluster_id}"};
  }

  // GetNode returns the node identified by node_id.
  //
  // The cluster_id field is retained for API compatibility but is not used to look up the node;
  // node IDs are unique across all clusters.
  // Returns NOT_FOUND if no node with the given node_id exists.
  rpc GetNode(GetNodeRequest) returns (storage.Node) {
    option (google.api.http) = {get: "/v1/nodes/{cluster_id}/{node_id}"};
  }

  // ExportNodes streams all nodes matching the optional query as a sequence of ExportNodeResponse messages.
  //
  // Supports StackRox search query syntax for filtering. A timeout in seconds may be specified;
  // if the stream is not completed within that time the request is cancelled.
  // Returns INVALID_ARGUMENT if the query syntax is malformed.
  rpc ExportNodes(ExportNodeRequest) returns (stream ExportNodeResponse) {
    option (google.api.http) = {get: "/v1/export/nodes"};
  }
}
