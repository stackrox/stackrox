syntax = "proto3";

package v1;

import "api/v1/empty.proto";
import weak "google/api/annotations.proto";
import "storage/service_identity.proto";

option go_package = "./api/v1;v1";
option java_package = "io.stackrox.proto.api.v1";

// ServiceIdentityResponse is the response listing all known service identities.
message ServiceIdentityResponse {
  repeated storage.ServiceIdentity identities = 1;
}

// CreateServiceIdentityRequest is the request to create a new mTLS service identity.
message CreateServiceIdentityRequest {
  // id is the unique identifier to assign to the new service identity.
  string id = 1;
  // type specifies the service type (e.g. SENSOR_SERVICE, COLLECTOR_SERVICE).
  // Must not be UNKNOWN_SERVICE.
  storage.ServiceType type = 2;
}

// CreateServiceIdentityResponse contains the generated certificate and private key.
// These credentials are never stored by Central and cannot be retrieved again after this response.
message CreateServiceIdentityResponse {
  // identity is the metadata record of the created service identity.
  storage.ServiceIdentity identity = 1;
  // certificate_pem is the PEM-encoded certificate for the new service identity.
  bytes certificate_pem = 2;
  // private_key_pem is the PEM-encoded private key for the new service identity.
  // This is the only time the private key is available; Central does not retain it.
  bytes private_key_pem = 3;
}

// Authority represents a Certificate Authority certificate.
message Authority {
  // certificate_pem is the PEM-encoded CA certificate.
  bytes certificate_pem = 1;
}

// Authorities is the list of Certificate Authority certificates currently trusted by Central.
message Authorities {
  repeated Authority authorities = 1;
}

// ServiceIdentityService manages mTLS service identities used by StackRox components.
//
// Service identities are certificate/key pairs issued by Central's CA that allow
// StackRox components (Sensor, Collector, etc.) to authenticate using mutual TLS.
// Private keys are generated on demand and never stored — callers must securely
// retain the credentials from the CreateServiceIdentity response.
//
// Authentication:
//   - GetServiceIdentities and GetAuthorities require read access to the Administration resource.
//   - CreateServiceIdentity requires write access to the Administration resource.
service ServiceIdentityService {
  // GetServiceIdentities returns metadata for all service identities registered in Central.
  //
  // Returns the list of known identities (without private keys, which are never stored).
  rpc GetServiceIdentities(Empty) returns (ServiceIdentityResponse) {
    option (google.api.http) = {get: "/v1/serviceIdentities"};
  }

  // CreateServiceIdentity issues a new mTLS certificate and private key for a service.
  //
  // The generated key pair is returned in the response and is never stored by Central.
  // If the credentials are lost, a new identity must be created; the existing one cannot be recovered.
  // Returns INVALID_ARGUMENT if id is empty or type is UNKNOWN_SERVICE.
  rpc CreateServiceIdentity(CreateServiceIdentityRequest) returns (CreateServiceIdentityResponse) {
    option (google.api.http) = {
      post: "/v1/serviceIdentities"
      body: "*"
    };
  }

  // GetAuthorities returns the CA certificates currently trusted by Central.
  //
  // These are the root certificates that can be used to verify service identity certificates
  // issued by Central.
  rpc GetAuthorities(Empty) returns (Authorities) {
    option (google.api.http) = {get: "/v1/authorities"};
  }
}
