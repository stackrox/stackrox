syntax = "proto3";

package v1;

import "api/v1/empty.proto";
import weak "google/api/annotations.proto";
import "storage/system_info.proto";

option go_package = "./api/v1;v1";
option java_package = "io.stackrox.proto.api.v1";

// Metadata contains basic build and version information about the running Central instance.
message Metadata {
  enum LicenseStatus {
    NONE = 0 [deprecated = true];
    INVALID = 1 [deprecated = true];
    EXPIRED = 2 [deprecated = true];
    RESTARTING = 3 [deprecated = true];
    VALID = 4;
  }

  // version is the Central version string (e.g. "4.5.0"). Only returned to authenticated callers.
  string version = 1;
  // build_flavor describes the build variant (e.g. "release", "development").
  string build_flavor = 2;
  // release_build is true if this is an official release build.
  bool release_build = 3;

  // Do not use this field. It will always contain "VALID"
  LicenseStatus license_status = 4 [deprecated = true];
}

// TrustInfo contains the certificate chains and challenge tokens used in the TLS challenge handshake.
message TrustInfo {
  // cert_chain holds the certificate chain presented by Central (leaf + CA), in DER format.
  repeated bytes cert_chain = 1;
  // sensor_challenge is the base64-encoded challenge token provided by the caller (Sensor).
  string sensor_challenge = 2;
  // central_challenge is a randomly generated nonce produced by Central to prevent replay attacks.
  string central_challenge = 3;
  // additional_cas contains any extra CA certificates configured in Central (e.g. load balancer CAs), in DER format.
  repeated bytes additional_cas = 4;
  // secondary_cert_chain is an optional certificate chain if Central has a secondary CA (e.g. during CA rotation).
  repeated bytes secondary_cert_chain = 5;
}

// TLSChallengeResponse is the signed response to a TLS challenge request.
message TLSChallengeResponse {
  // trust_info_serialized is the serialized TrustInfo proto, signed by Central's leaf certificate key.
  bytes trust_info_serialized = 1;
  // signature is the cryptographic signature over trust_info_serialized using Central's primary leaf certificate.
  bytes signature = 2;
  // signature_secondary_ca is an optional additional signature by the secondary CA leaf certificate,
  // present during CA rotation.
  bytes signature_secondary_ca = 3;
}

// TLSChallengeRequest is the request for the TLS certificate discovery challenge.
message TLSChallengeRequest {
  // challenge_token is a base64-encoded random token generated by the caller (Sensor).
  // Must decode to exactly the expected number of bytes to prevent replay attacks.
  string challenge_token = 1;
}

// DatabaseStatus reports Central's connectivity and configuration with its backing database.
message DatabaseStatus {
  enum DatabaseType {
    Hidden = 0;
    RocksDB = 1;
    PostgresDB = 2;
  }

  // database_available indicates whether Central can currently communicate with the database.
  bool database_available = 1;
  // database_type identifies the type of database serving Central. Only returned to authenticated callers.
  DatabaseType database_type = 2;
  // database_version is the version string of the database engine. Only returned to authenticated callers.
  string database_version = 3;
  // database_is_external indicates whether Central is using an externally managed database instance.
  bool database_is_external = 4;
}

// DatabaseBackupStatus contains information about the most recent database backup.
message DatabaseBackupStatus {
  storage.BackupInfo backup_info = 1;
}

// Provides availability of certain functionality of Central Services in the current configuration.
// The initial intended use is to disable certain functionality that does not make sense in the Cloud Service context.
message CentralServicesCapabilities {
  enum CapabilityStatus {
    // CapabilityAvailable means that UI and APIs should be available for users to use.
    // This does not automatically mean that the functionality is 100% available and any calls to APIs will result
    // in successful execution. Rather it means that users should be allowed to leverage the functionality as
    // opposed to CapabilityDisabled when functionality should be blocked.
    CapabilityAvailable = 0;

    // CapabilityDisabled means the corresponding UI should be disabled and attempts to use related APIs
    // should lead to errors.
    CapabilityDisabled = 1;
  }

  // Ability to use container IAM role for scanning images from Amazon ECR using Scanner deployed as part of Central
  // Services.
  // Note that CapabilityAvailable status does not mean that Scanner container actually has IAM role attached. Such
  // check isn't implemented at the moment and an attempt to use the corresponding setting may lead to errors when
  // the role is not actually there. It's user's responsibility to check the presence of role and integration status
  // when the corresponding setting is enabled.
  CapabilityStatus central_scanning_can_use_container_iam_role_for_ecr = 1;

  // Ability to configure and perform Central backups to Amazon S3 or Google Cloud Storage.
  CapabilityStatus central_can_use_cloud_backup_integrations = 2;

  // Ability to present health of declarative config resources (e.g. auth providers, roles, access scopes, permission
  // sets, notifiers) to the user.
  CapabilityStatus central_can_display_declarative_config_health = 3;

  // Ability to trigger generation of new certificates
  CapabilityStatus central_can_update_cert = 4;

  // Ability to use integration of type acscsEmail
  CapabilityStatus central_can_use_acscs_email_integration = 5;
}

// MetadataService provides system-level information about the Central instance.
//
// Endpoints expose version and build metadata, TLS certificate discovery for Sensor bootstrapping,
// database status, backup status, and the set of features available in the current deployment.
//
// Authentication:
//   - GetMetadata is accessible to authenticated users and Sensor (version only returned to authenticated callers).
//   - TLSChallenge does not require authentication (used during Sensor bootstrap).
//   - GetDatabaseStatus, GetDatabaseBackupStatus, and GetCentralCapabilities require authentication.
service MetadataService {
  // GetMetadata returns version and build information about Central.
  //
  // The version field is only populated for authenticated callers; anonymous requests receive
  // build_flavor and release_build only.
  rpc GetMetadata(Empty) returns (Metadata) {
    option (google.api.http) = {get: "/v1/metadata"};
  }

  // TLSChallenge returns Central's trusted CA certificates and leaf certificate, signed with
  // Central's internal key, to allow Sensor to verify Central's identity without pre-shared trust.
  //
  // This endpoint is unauthenticated to support Sensor bootstrap scenarios where Central is behind
  // a load balancer with self-signed certificates or during CA rotation. The challenge_token
  // (base64-encoded, fixed-length random bytes) prevents replay attacks.
  //
  // Returns INVALID_ARGUMENT if challenge_token is not valid base64 or has an incorrect length.
  rpc TLSChallenge(TLSChallengeRequest) returns (TLSChallengeResponse) {
    option (google.api.http) = {get: "/v1/tls-challenge"};
  }

  // GetDatabaseStatus reports whether Central can reach its database, and the database type and version.
  //
  // Database type and version are only returned to authenticated callers. The database_available
  // field is always populated and can be used as a readiness indicator.
  rpc GetDatabaseStatus(Empty) returns (DatabaseStatus) {
    option (google.api.http) = {get: "/v1/database/status"};
  }

  // GetDatabaseBackupStatus returns information about the most recent database backup recorded by Central.
  //
  // Returns NOT_FOUND if no backup has been performed or recorded yet.
  rpc GetDatabaseBackupStatus(Empty) returns (DatabaseBackupStatus) {
    option (google.api.http) = {get: "/v1/backup/status"};
  }

  // GetCentralCapabilities returns which optional Central features are available in the current deployment.
  //
  // Capabilities may be disabled for managed (cloud-hosted) Central deployments where certain
  // self-managed integrations or operations are not applicable.
  rpc GetCentralCapabilities(Empty) returns (CentralServicesCapabilities) {
    option (google.api.http) = {get: "/v1/central-capabilities"};
  }
}
