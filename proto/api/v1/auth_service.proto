syntax = "proto3";

package v1;

import "api/v1/common.proto";
import "api/v1/empty.proto";
import "api/v1/traits.proto";
import weak "google/api/annotations.proto";
import "google/protobuf/timestamp.proto";
import "storage/auth_provider.proto";
import "storage/service_identity.proto";
import "storage/user.proto";

option go_package = "./api/v1;v1";
option java_package = "io.stackrox.proto.api.v1";

// UserAttribute represents a single key/multi-value attribute attached to an authenticated user,
// sourced from the identity provider's token claims.
message UserAttribute {
  // key is the attribute name as returned by the identity provider (e.g. "groups", "email").
  string key = 1;
  // values holds one or more values for this attribute key.
  repeated string values = 2;
}

// AuthStatus describes the authentication state of the caller that made the request.
message AuthStatus {
  oneof id {
    // user_id is the unique identifier of the human user, present when authenticated via an auth provider.
    string user_id = 1;
    // service_id identifies an internal service (e.g. Sensor) authenticated via mTLS.
    storage.ServiceIdentity service_id = 2;
  }
  // expires is the UTC timestamp at which the current credential (token or certificate) expires.
  google.protobuf.Timestamp expires = 3;
  // refresh_url is the URL the client should call to refresh the token before it expires.
  // Only set when the auth provider backend supports token refresh.
  string refresh_url = 4;
  // auth_provider is the auth provider used to authenticate the caller.
  // The provider's sensitive config fields are stripped from this response.
  storage.AuthProvider auth_provider = 5;
  // user_info contains the display name, username, and aggregated permissions of the caller.
  storage.UserInfo user_info = 6;
  // user_attributes holds raw claim attributes from the identity provider token.
  repeated UserAttribute user_attributes = 7;
  // Token returned to ACS by the underlying identity provider. This field is set only in a few,
  // specific contexts. Do not rely on this field being present in the response.
  string idp_token = 8;
}

// AuthMachineToMachineConfig determines rules for exchanging an identity token from a third party with
// a Central access token. The M2M stands for machine to machine, as this is the intended use-case
// for the config.
message AuthMachineToMachineConfig {
  // UUID of the config.
  // Note that when adding a machine to machine config, this field should not be set.
  string id = 1;

  // The type of the auth machine to machine config.
  // Currently supports GitHub actions or any other generic OIDC provider to use for verifying and
  // exchanging the token.
  enum Type {
    GENERIC = 0;
    GITHUB_ACTIONS = 1;
    KUBE_SERVICE_ACCOUNT = 2;
  }
  Type type = 2;

  // Sets the expiration of the token returned from the ExchangeAuthMachineToMachineToken API call.
  // Possible valid time units are: s, m, h.
  // The maximum allowed expiration duration is 24h.
  // As an example: 2h45m.
  // For additional information on the validation of the duration, see:
  // https://pkg.go.dev/time#ParseDuration.
  string token_expiration_duration = 3;

  // Mappings map an identity token's claim values to a specific role within Central.
  message Mapping {
    // A key within the identity token's claim value to use.
    string key = 1;
    // A regular expression that will be evaluated against values of the identity token claim
    // identified by the specified key.
    // This regular expressions is in RE2 format, see more here:
    // https://github.com/google/re2/wiki/Syntax.
    string value_expression = 2;
    // The role which should be issued when the key and value match for a particular identity token.
    string role = 3;
  }
  // At least one mapping is required to resolve to a valid role for the access token to be successfully generated.
  repeated Mapping mappings = 4;

  // The issuer of the related OIDC provider issuing the ID tokens to exchange.
  //
  // Must be non-empty string containing URL when type is GENERIC.
  // In case of GitHub actions, this must be empty or set to https://token.actions.githubusercontent.com.
  //
  // Issuer is a unique key, therefore there may be at most one GITHUB_ACTIONS config, and each
  // GENERIC config must have a distinct issuer.
  string issuer = 5;

  Traits traits = 6;
}

message ListAuthMachineToMachineConfigResponse {
  repeated AuthMachineToMachineConfig configs = 1;
}

message GetAuthMachineToMachineConfigResponse {
  AuthMachineToMachineConfig config = 1;
}

message AddAuthMachineToMachineConfigRequest {
  AuthMachineToMachineConfig config = 1;
}

message AddAuthMachineToMachineConfigResponse {
  AuthMachineToMachineConfig config = 1;
}

message UpdateAuthMachineToMachineConfigRequest {
  AuthMachineToMachineConfig config = 1;
}

message ExchangeAuthMachineToMachineTokenRequest {
  // Identity token that is supposed to be exchanged.
  string id_token = 1;
}

message ExchangeAuthMachineToMachineTokenResponse {
  // The exchanged access token.
  string access_token = 1;
}

// AuthService provides authentication status and machine-to-machine (M2M) token exchange
// configuration for Central.
//
// GetAuthStatus can be called by any authenticated client (including anonymous callers, who
// will receive HTTP 401). The M2M config management endpoints require the Access resource:
// read access for list/get, write access for add/update/delete.
// ExchangeAuthMachineToMachineToken is open to anonymous callers and exchanges a third-party
// OIDC token for a Central access token based on configured M2M rules.
service AuthService {
  // GetAuthStatus returns the authentication status of the caller making the request.
  //
  // The response includes the caller's identity (user ID or service identity), token expiry,
  // associated auth provider (with sensitive config fields stripped), resolved roles and
  // permissions, and raw identity-provider attributes.
  //
  // This endpoint allows anonymous calls; unauthenticated requests receive HTTP 401.
  rpc GetAuthStatus(Empty) returns (AuthStatus) {
    option (google.api.http) = {get: "/v1/auth/status"};
  }

  // ListAuthMachineToMachineConfigs returns all configured machine-to-machine token exchange rules.
  //
  // Requires read access to the Access resource.
  rpc ListAuthMachineToMachineConfigs(Empty) returns (ListAuthMachineToMachineConfigResponse) {
    option (google.api.http) = {get: "/v1/auth/m2m"};
  }

  // GetAuthMachineToMachineConfig returns the machine-to-machine config with the given ID.
  //
  // Returns NOT_FOUND if no config with the specified ID exists.
  // Requires read access to the Access resource.
  rpc GetAuthMachineToMachineConfig(ResourceByID) returns (GetAuthMachineToMachineConfigResponse) {
    option (google.api.http) = {get: "/v1/auth/m2m/{id}"};
  }

  // AddAuthMachineToMachineConfig creates a new machine-to-machine token exchange config.
  //
  // The config.id field must be empty; a UUID is assigned by the server.
  // Validates token_expiration_duration (1 minute to 24 hours), issuer URL (must use HTTPS),
  // and that all mapping value_expression fields are valid RE2 regular expressions.
  // Returns INVALID_ARGUMENT if validation fails.
  // Requires write access to the Access resource.
  rpc AddAuthMachineToMachineConfig(AddAuthMachineToMachineConfigRequest) returns (AddAuthMachineToMachineConfigResponse) {
    option (google.api.http) = {
      post: "/v1/auth/m2m"
      body: "*"
    };
  }

  // UpdateAuthMachineToMachineConfig updates an existing machine-to-machine token exchange config.
  // In case the auth machine to machine config does not exist, a new one will be created.
  //
  // The config.id field must be set to the ID of the config to update.
  // Applies the same validation as AddAuthMachineToMachineConfig.
  // Returns INVALID_ARGUMENT if validation fails.
  // Requires write access to the Access resource.
  rpc UpdateAuthMachineToMachineConfig(UpdateAuthMachineToMachineConfigRequest) returns (Empty) {
    option (google.api.http) = {
      put: "/v1/auth/m2m/{config.id}"
      body: "*"
    };
  }

  // DeleteAuthMachineToMachineConfig removes the machine-to-machine config with the given ID.
  // In case a specified auth machine to machine config does not exist is deleted, no error will be returned.
  //
  // Requires write access to the Access resource.
  rpc DeleteAuthMachineToMachineConfig(ResourceByID) returns (Empty) {
    option (google.api.http) = {delete: "/v1/auth/m2m/{id}"};
  }

  // ExchangeAuthMachineToMachineToken exchanges a third-party OIDC identity token for a
  // Central access token, based on configured machine-to-machine rules.
  //
  // The issuer of the provided id_token is extracted and matched against configured M2M configs.
  // Token claim values are then evaluated against the configured mappings to resolve a role.
  // At least one mapping must match for a Central access token to be issued.
  //
  // Returns NO_CREDENTIALS if no M2M config is registered for the token's issuer.
  // This endpoint allows anonymous calls (no prior authentication required).
  rpc ExchangeAuthMachineToMachineToken(ExchangeAuthMachineToMachineTokenRequest) returns (ExchangeAuthMachineToMachineTokenResponse) {
    option (google.api.http) = {
      post: "/v1/auth/m2m/exchange"
      body: "*"
    };
  }
}
