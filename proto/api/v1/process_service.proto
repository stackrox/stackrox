syntax = "proto3";

package v1;

import "api/v1/search_service.proto";
import weak "google/api/annotations.proto";
import "storage/process_indicator.proto";

option go_package = "./api/v1;v1";
option java_package = "io.stackrox.proto.api.v1";

// GetProcessesByDeploymentRequest specifies the deployment whose process
// indicators to retrieve.
message GetProcessesByDeploymentRequest {
  // deployment_id is the ID of the deployment to retrieve processes for. Required.
  string deployment_id = 1;
}

message GetProcessesResponse {
  // processes is the list of raw process indicators observed in the deployment.
  repeated storage.ProcessIndicator processes = 1;
}

// ProcessGroup groups all observed process indicator signals that share the
// same command-line arguments.
message ProcessGroup {
  // args is the command-line argument string shared by all signals in this group.
  string args = 1;
  // signals is the list of individual process indicator observations for this argument set.
  repeated storage.ProcessIndicator signals = 2;
}

// ProcessNameGroup groups all process observations for a single executable
// path, further subdivided by argument string.
message ProcessNameGroup {
  // name is the full executable path (e.g. /usr/bin/python3).
  string name = 1;
  // times_executed is the number of distinct container IDs in which this
  // process was observed.
  uint32 times_executed = 2;
  // groups contains sub-groups of observations keyed by argument string.
  repeated ProcessGroup groups = 3;
}

message GetGroupedProcessesResponse {
  // groups is the list of process name groups, sorted by executable path.
  repeated ProcessNameGroup groups = 3;
}

// ProcessNameAndContainerNameGroup groups process observations for a single
// executable + container name combination.
message ProcessNameAndContainerNameGroup {
  // name is the baseline item name (typically the executable path).
  string name = 1;
  // container_name is the name of the container within the deployment pod.
  string container_name = 2;
  // times_executed is the number of distinct container IDs in which this
  // process was observed in this container.
  uint32 times_executed = 3;
  // groups contains sub-groups of observations keyed by argument string.
  repeated ProcessGroup groups = 4;
  // suspicious is true if this process is not present in the locked process
  // baseline for this container, indicating it may be unexpected.
  bool suspicious = 5;
}

message GetGroupedProcessesWithContainerResponse {
  // groups is the list of process name/container name groups, sorted by executable path.
  repeated ProcessNameAndContainerNameGroup groups = 3;
}

message CountProcessesResponse {
  // count is the total number of process indicators matching the query.
  int32 count = 1;
}

// ProcessService provides APIs for inspecting processes executed within
// deployments on secured clusters.
//
// Process indicators are signals emitted by Sensor when a new process is
// observed running inside a container. This service allows querying raw
// process counts and listing process observations grouped by name and
// argument for a given deployment.
//
// Authentication: all endpoints require View access to the DeploymentExtension
// resource.
service ProcessService {
  // CountProcesses returns the count of process indicators matching the given query.
  //
  // Accepts StackRox search query syntax (e.g. "Deployment:frontend+Namespace:prod").
  // Matches all process indicators if the query is empty.
  // Returns INVALID_ARGUMENT if the query syntax is malformed.
  rpc CountProcesses(RawQuery) returns (CountProcessesResponse) {
    option (google.api.http) = {get: "/v1/processcount"};
  }

  // GetProcessesByDeployment returns all raw process indicators observed in
  // the given deployment.
  //
  // Returns NOT_FOUND if the deployment does not exist.
  // Returns INVALID_ARGUMENT if deployment_id is empty.
  rpc GetProcessesByDeployment(GetProcessesByDeploymentRequest) returns (GetProcessesResponse) {
    option (google.api.http) = {get: "/v1/processes/deployment/{deployment_id}"};
  }

  // GetGroupedProcessByDeployment returns all processes observed in the given
  // deployment, grouped by executable path and argument string.
  //
  // Each ProcessNameGroup contains the number of distinct containers in which
  // the process was observed and the individual signal observations per argument
  // set, sorted by argument string. Results are sorted by executable path.
  //
  // Returns INVALID_ARGUMENT if deployment_id is empty.
  rpc GetGroupedProcessByDeployment(GetProcessesByDeploymentRequest) returns (GetGroupedProcessesResponse) {
    option (google.api.http) = {get: "/v1/processes/deployment/{deployment_id}/grouped"};
  }

  // GetGroupedProcessByDeploymentAndContainer returns all processes observed
  // in the given deployment grouped by both executable path and container name.
  //
  // Each group is additionally annotated with a suspicious flag that is true
  // when the process is not in the locked process baseline for that container,
  // indicating it may be unexpected behavior.
  //
  // Returns INVALID_ARGUMENT if deployment_id is empty.
  rpc GetGroupedProcessByDeploymentAndContainer(GetProcessesByDeploymentRequest) returns (GetGroupedProcessesWithContainerResponse) {
    option (google.api.http) = {get: "/v1/processes/deployment/{deployment_id}/grouped/container"};
  }
}
