syntax = "proto3";

package v1;

import "api/v1/common.proto";
import "api/v1/empty.proto";
import "api/v1/pagination.proto";
import "api/v1/search_service.proto";
import weak "google/api/annotations.proto";
import "storage/alert.proto";
import "storage/policy.proto";

option go_package = "./api/v1;v1";
option java_package = "io.stackrox.proto.api.v1";

message CountAlertsResponse {
  // Total number of alerts matching the query.
  int32 count = 1;
}

message ListAlertsRequest {
  reserved 1 to 9; // Removed individual filtered fields and moved towards querying
  // query filters alerts using StackRox search syntax.
  // Supports fields such as Severity, Cluster, Namespace, Policy, Violation State,
  // Lifecycle Stage, and Category.
  // Example: "Severity:CRITICAL+Cluster:production"
  // If empty, matches all alerts.
  string query = 10;
  // pagination controls the page size, offset, and sort order of results.
  // If omitted, ListAlerts defaults to a limit of 1000 results sorted by violation time descending.
  Pagination pagination = 11;
}

message ResolveAlertRequest {
  // id is the unique identifier of the alert to resolve.
  string id = 1;
  bool whitelist = 2 [deprecated = true];
  // add_to_baseline adds the processes that triggered this alert to the deployment's
  // process baseline, preventing future alerts for the same process activity.
  // Only applies to runtime alerts with process violations.
  bool add_to_baseline = 3;
}

message ResolveAlertsRequest {
  // query filters which alerts to resolve using StackRox search syntax.
  // Only runtime-lifecycle alerts matching the query are resolved; alerts in
  // other lifecycle stages (deploy-time, build-time) are ignored.
  // Returns INVALID_ARGUMENT if the query cannot be parsed.
  string query = 1;
}

message ListAlertsResponse {
  // alerts is the list of slim alert summaries matching the request.
  repeated storage.ListAlert alerts = 1;
}

message DeleteAlertsRequest {
  // query scopes the deletion to matching alerts.
  // The query must include "Violation State:RESOLVED"; only resolved alerts
  // can be deleted. Returns INVALID_ARGUMENT if this constraint is not satisfied.
  RawQuery query = 1;
  // confirm must be set to true to perform the deletion.
  // When false (or omitted), the response reflects a dry run showing how many
  // alerts would be deleted without actually removing them.
  bool confirm = 2;
}

message DeleteAlertsResponse {
  // num_deleted is the number of alerts deleted (or that would be deleted in a dry run).
  uint32 num_deleted = 1;
  // dry_run is true when confirm was not set; no alerts were actually deleted.
  bool dry_run = 2;
}

message GetAlertsGroupResponse {
  message PolicyGroup {
    // policy summarizes the policy that triggered the grouped alerts.
    storage.ListAlertPolicy policy = 1;
    // num_alerts is the count of active alerts for this policy.
    int64 num_alerts = 2;
  }

  // alerts_by_policies groups active alert counts by policy, sorted by policy name.
  repeated PolicyGroup alerts_by_policies = 1;
}

message GetAlertsCountsRequest {
  // request filters which alerts are included in the count using the same
  // query and pagination fields as ListAlertsRequest.
  ListAlertsRequest request = 1;
  enum RequestGroup {
    // UNSET returns all alert counts in a single ungrouped bucket.
    UNSET = 0;
    // CATEGORY groups alert counts by policy category (e.g. "Vulnerability Management").
    CATEGORY = 1;
    // CLUSTER groups alert counts by cluster name.
    CLUSTER = 2;
  }
  // group_by controls how alert counts are aggregated in the response.
  RequestGroup group_by = 2;
}

message GetAlertsCountsResponse {
  message AlertGroup {
    // group is the name of the grouping key (category name or cluster name),
    // or an empty string when group_by is UNSET.
    string group = 1;
    message AlertCounts {
      // severity is the alert severity level for this count bucket.
      storage.Severity severity = 1;
      // count is the number of alerts at this severity within the group.
      int64 count = 2;
    }
    // counts breaks down the alert count by severity within this group.
    repeated AlertCounts counts = 2;
  }
  // groups contains one entry per distinct group (category or cluster), each
  // with a per-severity breakdown of alert counts. Groups are sorted alphabetically.
  repeated AlertGroup groups = 1;
}

// Type classifies a timeseries alert event as a creation or removal.
enum Type {
  // CREATED indicates the alert became active at the recorded time.
  CREATED = 0;
  // REMOVED indicates the alert was resolved at the recorded time.
  REMOVED = 1;
}

message AlertEvent {
  // time is the Unix timestamp in milliseconds when this event occurred.
  int64 time = 1;
  // type indicates whether the alert was created or resolved at this point in time.
  Type type = 2;
  // id is the unique identifier of the alert this event belongs to.
  string id = 3;
}

message GetAlertTimeseriesResponse {
  message ClusterAlerts {
    // cluster is the name of the cluster these alert events belong to.
    string cluster = 1;
    message AlertEvents {
      // severity is the severity level shared by all events in this group.
      storage.Severity severity = 1;
      // events is the chronologically sorted list of alert lifecycle events at this severity.
      repeated AlertEvent events = 2;
    }
    // severities groups alert events by severity within this cluster, sorted by severity level.
    repeated AlertEvents severities = 2;
  }
  // clusters contains per-cluster timeseries data, sorted alphabetically by cluster name.
  repeated ClusterAlerts clusters = 1;
}

// AlertService manages security alerts triggered by policy violations in monitored clusters.
//
// Alerts are generated automatically when running workloads, images, or Kubernetes resources
// violate active security policies. They progress through lifecycle stages (build, deploy,
// runtime) and can be in ACTIVE, RESOLVED, or ATTEMPTED states.
//
// Read operations (GetAlert, ListAlerts, CountAlerts, GetAlertsGroup, GetAlertsCounts,
// GetAlertTimeseries) require the Alert resource with View permission.
// Write operations (ResolveAlert, ResolveAlerts, DeleteAlerts) require the Alert resource
// with Modify permission.
service AlertService {
  // GetAlert returns the full alert detail for a single alert by ID.
  //
  // Returns NOT_FOUND if no alert with the given ID exists.
  rpc GetAlert(ResourceByID) returns (storage.Alert) {
    option (google.api.http) = {get: "/v1/alerts/{id}"};
  }

  // CountAlerts returns the total number of alerts matching a search query.
  //
  // Uses StackRox search syntax (e.g. "Severity:CRITICAL+Cluster:production").
  // An empty query counts all alerts. Returns INVALID_ARGUMENT if the query
  // cannot be parsed.
  rpc CountAlerts(RawQuery) returns (CountAlertsResponse) {
    option (google.api.http) = {get: "/v1/alertscount"};
  }

  // ListAlerts returns a paginated list of slim alert summaries matching the query.
  //
  // Results are sorted by violation time (descending) by default. When no pagination
  // is specified, up to 1000 alerts are returned. Use the pagination field to
  // retrieve additional pages.
  //
  // Returns INVALID_ARGUMENT if the query syntax is malformed.
  rpc ListAlerts(ListAlertsRequest) returns (ListAlertsResponse) {
    option (google.api.http) = {get: "/v1/alerts"};
  }

  // GetAlertsGroup returns active alert counts grouped by policy.
  //
  // Each entry in the response lists a policy alongside the number of active
  // alerts currently triggered by that policy. Results are sorted by policy name.
  // Useful for building a policy-centric view of the alert landscape.
  //
  // Returns INVALID_ARGUMENT if the query syntax is malformed.
  rpc GetAlertsGroup(ListAlertsRequest) returns (GetAlertsGroupResponse) {
    option (google.api.http) = {get: "/v1/alerts/summary/groups"};
  }

  // GetAlertsCounts returns alert counts broken down by severity, optionally grouped by category or cluster.
  //
  // Use group_by=CATEGORY to segment counts by policy category, or group_by=CLUSTER to segment
  // by cluster name. group_by=UNSET (default) returns a single aggregated bucket.
  // Counts reflect all alerts matching the embedded query filter.
  //
  // Returns INVALID_ARGUMENT if the query syntax is malformed or group_by is unrecognized.
  rpc GetAlertsCounts(GetAlertsCountsRequest) returns (GetAlertsCountsResponse) {
    option (google.api.http) = {get: "/v1/alerts/summary/counts"};
  }

  // GetAlertTimeseries returns alert creation and resolution events as a timeseries, grouped by cluster and severity.
  //
  // Each event records a Unix millisecond timestamp and whether the alert was
  // CREATED (became active) or REMOVED (resolved) at that moment. Events within
  // each severity bucket are sorted chronologically. Useful for rendering alert
  // trend charts over time.
  //
  // Returns INVALID_ARGUMENT if the query syntax is malformed.
  rpc GetAlertTimeseries(ListAlertsRequest) returns (GetAlertTimeseriesResponse) {
    option (google.api.http) = {get: "/v1/alerts/summary/timeseries"};
  }

  // ResolveAlert marks a single alert as RESOLVED.
  //
  // Optionally, setting add_to_baseline=true adds the processes that triggered
  // the alert to the deployment's process baseline and syncs the updated baseline
  // to the cluster, suppressing future alerts for those processes.
  //
  // Only runtime and attempted alerts can be resolved; deploy-time alerts transition
  // to resolved state automatically when the violation is remediated.
  //
  // Returns NOT_FOUND if no alert with the given ID exists.
  rpc ResolveAlert(ResolveAlertRequest) returns (Empty) {
    option (google.api.http) = {
      patch: "/v1/alerts/{id}/resolve"
      body: "*"
    };
  }

  // ResolveAlerts resolves all runtime alerts matching a search query in bulk.
  //
  // Only alerts in the RUNTIME lifecycle stage are resolved; alerts from other
  // lifecycle stages that match the query are silently skipped.
  // Alerts are resolved in batches of 100 and notifiers are triggered for each.
  //
  // Returns INVALID_ARGUMENT if the query syntax is malformed.
  rpc ResolveAlerts(ResolveAlertsRequest) returns (Empty) {
    option (google.api.http) = {
      patch: "/v1/alerts/resolve"
      body: "*"
    };
  }

  // DeleteAlerts permanently removes resolved alerts matching a search query.
  //
  // The query must include "Violation State:RESOLVED"; attempting to delete
  // non-resolved alerts returns INVALID_ARGUMENT. A scoping query is required;
  // omitting query returns an error.
  //
  // Set confirm=false (or omit it) to perform a dry run that reports how many
  // alerts would be deleted without removing any. Set confirm=true to execute
  // the deletion.
  //
  // Returns INVALID_ARGUMENT if the query is missing, unparseable, or targets
  // non-resolved alerts.
  rpc DeleteAlerts(DeleteAlertsRequest) returns (DeleteAlertsResponse) {
    option (google.api.http) = {delete: "/v1/alerts"};
  }
}
