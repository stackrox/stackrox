syntax = "proto3";

package v1;

import "api/v1/common.proto";
import "api/v1/empty.proto";
import "api/v1/search_service.proto";
import weak "google/api/annotations.proto";
import "storage/compliance.proto";

option go_package = "./api/v1;v1";
option java_package = "io.stackrox.proto.api.v1";

// ComplianceAggregationRequest controls how compliance check results are
// aggregated across the fleet.
//
// `unit` sets the granularity of each result row: what entity type each
// num_passing/num_failing count refers to (e.g. CHECK means one row per
// individual check, CONTROL means one row per control).
//
// `group_by` adds additional breakdown dimensions. For example,
// group_by=[CLUSTER, STANDARD] with unit=CONTROL produces one row per
// (cluster, standard, control) combination.
//
// If `unit` is omitted or UNKNOWN, the server defaults it to CHECK.
//
// Next available tag: 4
message ComplianceAggregationRequest {
  // group_by adds breakdown dimensions to the aggregation result.
  // Each scope in this list becomes an additional key in every result row.
  // Example: [CLUSTER, STANDARD] groups results by cluster and standard.
  repeated storage.ComplianceAggregation.Scope group_by = 1;

  // unit specifies the granularity of each result row — the entity type that
  // num_passing, num_failing, and num_skipped counts refer to.
  // Defaults to CHECK when unset or UNKNOWN.
  storage.ComplianceAggregation.Scope unit = 2;

  // where filters the compliance data before aggregation using StackRox search
  // query syntax (e.g. "Cluster:production+Standard:CIS").
  RawQuery where = 3;
}

// ComplianceStandardMetadata describes a compliance standard registered in
// StackRox, such as CIS Kubernetes, NIST 800-53, NIST 800-190, PCI DSS 3.2,
// or HIPAA 164.
message ComplianceStandardMetadata {
  // Scope enumerates the Kubernetes entity types that a compliance standard
  // evaluates. A standard may target multiple scopes simultaneously.
  enum Scope {
    UNSET = 0;
    // CLUSTER indicates the standard evaluates cluster-level configuration.
    CLUSTER = 1;
    // NAMESPACE indicates the standard evaluates namespace-level resources.
    NAMESPACE = 2;
    // DEPLOYMENT indicates the standard evaluates workload deployments.
    DEPLOYMENT = 3;
    // NODE indicates the standard evaluates individual cluster nodes.
    NODE = 4;
  }

  string id = 1; // @gotags: search:"Standard ID,hidden"
  string name = 2; // @gotags: search:"Standard,hidden"
  string description = 3;

  // num_implemented_checks is the count of controls that have automated checks
  // implemented in this StackRox version.
  int32 num_implemented_checks = 4;

  // scopes lists the entity types (CLUSTER, NAMESPACE, DEPLOYMENT, NODE) that
  // this standard evaluates. Controls within this standard may target any
  // subset of these scopes.
  repeated Scope scopes = 5;

  // dynamic indicates the standard is provided by an external compliance
  // operator (e.g. OpenShift Compliance Operator) rather than built into
  // StackRox. Dynamic standards may not have full scan result support.
  bool dynamic = 6;

  // hideScanResults controls whether scan results for this standard are
  // suppressed in aggregated views. Set via UpdateComplianceStandardConfig.
  bool hideScanResults = 7;
}

// ComplianceControlGroup is a logical grouping of related controls within a
// compliance standard (e.g. a section or chapter).
message ComplianceControlGroup {
  string id = 1; // @gotags: search:"Control Group ID"
  string standard_id = 2; // @gotags: search:"Standard ID"
  string name = 3; // @gotags: search:"Control Group"
  string description = 4;

  // num_implemented_checks is the count of controls in this group that have
  // automated checks implemented in this StackRox version.
  int32 num_implemented_checks = 5;
}

// ComplianceControl represents a single requirement or check within a
// compliance standard (e.g. CIS Kubernetes 1.1.1 or NIST 800-53 AC-2).
message ComplianceControl {
  string id = 1; // @gotags: search:"Control ID,hidden"
  string standard_id = 2; // @gotags: search:"Standard ID,hidden"
  string group_id = 3; // @gotags: search:"Control Group ID,hidden"
  string name = 4; // @gotags: search:"Control"
  string description = 5;

  // implemented indicates this control has an automated check in StackRox.
  // Controls where implemented=false are informational only and will not
  // appear in scan results.
  bool implemented = 6;

  // interpretation_text explains how StackRox evaluates this control and what
  // evidence is collected. Only present when implemented=true.
  string interpretation_text = 7;
}

// ComplianceStandard is the full definition of a compliance standard,
// including its metadata, control groups, and individual controls.
message ComplianceStandard {
  ComplianceStandardMetadata metadata = 1;
  repeated ComplianceControlGroup groups = 2; // @gotags: search:"-"
  repeated ComplianceControl controls = 3; // @gotags: search:"-"
}

message GetComplianceStandardResponse {
  // standard is the full compliance standard definition including all control
  // groups and individual controls.
  ComplianceStandard standard = 1;
}

message GetComplianceStandardsResponse {
  // standards is the list of active compliance standards. Only standards that
  // are active for at least one secured cluster are included.
  repeated ComplianceStandardMetadata standards = 1;
}

// UpdateComplianceRequest configures display settings for a compliance standard.
message UpdateComplianceRequest {
  // id is the compliance standard ID to update (e.g. the standard's short name).
  string id = 1;

  // hideScanResults controls whether scan results for this standard are
  // suppressed in aggregated compliance views across the platform.
  bool hideScanResults = 2;
}

// GetComplianceRunResultsRequest identifies which compliance run results to fetch.
message GetComplianceRunResultsRequest {
  // cluster_id is the ID of the secured cluster whose results to return.
  string cluster_id = 1;

  // standard_id is the compliance standard whose results to return
  // (e.g. "CIS_Kubernetes_v1_5_0").
  string standard_id = 2;

  // Specifies the run ID for which to return results. If empty, the most recent run is returned.
  // CAVEAT: Setting this field circumvents the results cache on the server-side, which may lead to significantly
  //         increased memory pressure and decreased performance.
  string run_id = 3;
}

// GetComplianceRunResultsResponse contains the results of a compliance scan
// run for a specific cluster and standard.
message GetComplianceRunResultsResponse {
  // results contains the most recent successful run's per-entity check results,
  // broken down by cluster, node, deployment, and machine config.
  storage.ComplianceRunResults results = 1;

  // failed_runs lists metadata for any runs that failed before or after the
  // most recent successful run. Useful for diagnosing scan errors.
  repeated storage.ComplianceRunMetadata failed_runs = 2;
}

// ComplianceService provides read access to compliance scan results and
// standard definitions for secured clusters.
//
// StackRox evaluates workloads against built-in compliance standards including
// CIS Kubernetes, NIST 800-53, NIST 800-190, PCI DSS 3.2, and HIPAA 164.
// Compliance scans run automatically when sensors report cluster state changes.
// Results can be retrieved per-run or aggregated across clusters, standards,
// namespaces, nodes, deployments, and controls.
//
// To trigger an explicit compliance run, use the ComplianceManagementService
// (TriggerRuns RPC). Results become available via this service once the run
// completes.
//
// Authentication: all read endpoints require a valid API token with
// View permission on the Compliance resource. UpdateComplianceStandardConfig
// requires Modify permission on the Compliance resource.
service ComplianceService {
  // GetStandards returns the list of compliance standards active on at least
  // one secured cluster.
  //
  // Only standards that the compliance operator manager considers active are
  // returned. For each standard, the hideScanResults flag reflects the current
  // configuration set via UpdateComplianceStandardConfig.
  //
  // Requires View permission on the Compliance resource.
  rpc GetStandards(Empty) returns (GetComplianceStandardsResponse) {
    option (google.api.http) = {get: "/v1/compliance/standards"};
  }

  // GetStandard returns the full definition of a compliance standard by ID,
  // including all control groups and individual controls.
  //
  // Returns NOT_FOUND if the standard ID does not exist.
  // Requires View permission on the Compliance resource.
  rpc GetStandard(ResourceByID) returns (GetComplianceStandardResponse) {
    option (google.api.http) = {get: "/v1/compliance/standards/{id}"};
  }

  // GetRunResults returns the compliance scan results for a specific cluster
  // and standard.
  //
  // By default, returns the most recent successful run's results along with
  // metadata for any failed runs. Specify run_id to retrieve results for a
  // specific historical run; note that bypassing the cache may increase
  // memory pressure on the server.
  //
  // Requires View permission on the Compliance resource.
  rpc GetRunResults(GetComplianceRunResultsRequest) returns (GetComplianceRunResultsResponse) {
    option (google.api.http) = {get: "/v1/compliance/runresults"};
  }

  // GetAggregatedResults returns compliance check pass/fail counts aggregated
  // across the fleet according to the requested grouping and granularity.
  //
  // The `unit` field controls granularity (what each result row counts):
  // CHECK gives one row per individual check, CONTROL per control, etc.
  // The `group_by` field adds breakdown dimensions such as CLUSTER, STANDARD,
  // NAMESPACE, NODE, DEPLOYMENT, CATEGORY, or CONTROL.
  // The `where` field filters results using StackRox search query syntax
  // (e.g. "Cluster:production+Standard:CIS").
  //
  // Standards with hideScanResults=true are excluded from the response.
  // Requires View permission on the Compliance resource.
  rpc GetAggregatedResults(ComplianceAggregationRequest) returns (storage.ComplianceAggregation.Response) {
    option (google.api.http) = {get: "/v1/compliance/aggregatedresults"};
  }

  // UpdateComplianceStandardConfig updates display configuration for a
  // compliance standard, currently limited to the hideScanResults flag.
  //
  // When hideScanResults is true, the standard's results are suppressed in
  // GetAggregatedResults responses. The standard itself remains visible via
  // GetStandards and GetStandard.
  //
  // Returns NOT_FOUND if the standard ID does not exist.
  // Requires Modify permission on the Compliance resource.
  rpc UpdateComplianceStandardConfig(UpdateComplianceRequest) returns (Empty) {
    option (google.api.http) = {
      patch: "/v1/compliance/standards/{id}"
      body: "*"
    };
  }
}
