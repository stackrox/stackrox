syntax = "proto3";

package v1;

import weak "google/api/annotations.proto";

option go_package = "./api/v1;v1";
option java_package = "io.stackrox.proto.api.v1";

message ProbeUploadManifest {
  message File {
    string name = 1;
    int64 size = 2;
    uint32 crc32 = 3;
  }

  repeated File files = 1;
}

message GetExistingProbesRequest {
  repeated string files_to_check = 1;
}

message GetExistingProbesResponse {
  repeated ProbeUploadManifest.File existing_files = 1;
}

// ProbeUploadService supports uploading eBPF probes and kernel modules used
// by the Collector component for runtime monitoring. Probes are cached on
// Central and distributed to Collectors that cannot reach the internet.
//
// Authentication: requires Administration write access.
service ProbeUploadService {
  // GetExistingProbes returns which of the requested probe files are already
  // cached on Central, allowing the uploader to skip files that are unchanged.
  rpc GetExistingProbes(GetExistingProbesRequest) returns (GetExistingProbesResponse) {
    option (google.api.http) = {post: "/v1/probeupload/getexisting"};
  }
}
