values:
  imagePullSecrets:
    allowNone: true

tests:
- name: "all pod templates prevent Istio sidecar injection"
  expect: |
    .deployments[] | .spec.template.metadata.labels["sidecar.istio.io/inject"] | assertThat(. == "false")
    .daemonsets[] | .spec.template.metadata.labels["sidecar.istio.io/inject"] | assertThat(. == "false")
