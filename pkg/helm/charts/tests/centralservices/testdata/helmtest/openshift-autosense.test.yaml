values:
  imagePullSecrets:
    allowNone: true
  monitoring:
    openshift:
      enabled: false
tests:
- name: "Detect OpenShift 4 if env.openshift=true and server resources are visible"
  server:
    visibleSchemas:
      - openshift-4.12
  set:
    env.openshift: true
  capabilities:
    kubeVersion:
      version: "v1.18.0"
  expect:
    .notes | assertThat(contains("we have inferred that you are deploying into an OpenShift 4"))
