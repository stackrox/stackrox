apiVersion: v1
kind: ConfigMap
metadata:
  name: {{.JobName}}-berserker-file-activity-config
data:
  workload.ber: |
    machine {
      path("/tmp/data");
    }

    main (workers = 2, duration = 0) {
      open(random_path("/tmp/data"));
    } : exp {
      rate = 10.0;  // 10 operations per second
    }
