# This rpms.in.yaml and other rpms.* files define how to make RPM packages available for Konflux image builds.
# See our docs here: https://spaces.redhat.com/display/StackRox/How+to+prefetch+RPMs+for+ACS+Konflux+builds

packages:
# builder stage in image/rhel/konflux.Dockerfile
- jq
# final stage in image/rhel/konflux.Dockerfile, package_installer in scanner/image/scanner/konflux.Dockerfile
- findutils
- postgresql
# builder stage in operator/konflux.bundle.Dockerfile
- python3.12-pyyaml
# package_installer stages in operator/konflux.Dockerfile, image/roxctl/konflux.Dockerfile, scanner/image/scanner/konflux.Dockerfile
- ca-certificates
# package_installer stage in scanner/image/scanner/konflux.Dockerfile (bash and coreutils-single already in ubi-micro)
- util-linux
moduleEnable:
# final stage in image/rhel/konflux.Dockerfile
- postgresql:15
contentOrigin:
  repofiles: [ "rpms.rhel.repo" ]
context:
  bare: true
arches:
- aarch64
- ppc64le
- s390x
- x86_64
