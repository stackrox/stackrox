# Make kuttl ignore this file unless running against openshift.
apiVersion: kuttl.dev/v1beta1
kind: TestFile
testRunSelector:
  matchLabels:
    openshift: "true"
---
apiVersion: networking.k8s.io/v1
kind: Route
metadata:
  name: central
spec:
  host: custom-route.host
  to:
    kind: Service
    name: central
  port:
    targetPort: https
  tls:
    termination: passthrough
---
apiVersion: networking.k8s.io/v1
kind: Route
metadata:
  name: central-mtls
spec:
  host: central.stackrox
  to:
    kind: Service
    name: central
  port:
    targetPort: https
  tls:
    termination: passthrough
---
apiVersion: networking.k8s.io/v1
kind: Route
metadata:
  name: central
spec:
  host: custom-route.host
  to:
    kind: Service
    name: central
  port:
    targetPort: https
  tls:
    termination: reencrypt
