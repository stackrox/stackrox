apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: vsock-loadgen
  namespace: stackrox
  labels:
    app: vsock-loadgen
    component: load-testing
spec:
  selector:
    matchLabels:
      app: vsock-loadgen
  template:
    metadata:
      labels:
        app: vsock-loadgen
        component: load-testing
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      # Only schedule on worker nodes (not masters)
      nodeSelector:
        node-role.kubernetes.io/worker: ""

      # Use the same service account as collector for consistency
      serviceAccountName: collector

      # Required for vsock device access
      hostNetwork: true
      hostPID: false

      containers:
      - name: loadgen
        # Use dedicated vsock-loadgen image (minimal distroless-based image)
        # Override with VSOCK_LOADGEN_IMAGE and VSOCK_LOADGEN_TAG env vars if needed
        image: quay.io/gualvare/stackrox/vsock-loadgen:latest
        imagePullPolicy: Always

        # Auto-start load generation from config file
        command:
          - /usr/local/bin/vsock-loadgen
          - --config
          - /etc/loadgen/config.yaml

        env:
          # Inherit test mode from collector environment
          - name: ROX_VM_RELAY_TEST_MODE
            value: "true"
          - name: NODE_NAME
            valueFrom:
              fieldRef:
                fieldPath: spec.nodeName
          - name: POD_NAME
            valueFrom:
              fieldRef:
                fieldPath: metadata.name

        ports:
          - name: metrics
            containerPort: 9090
            protocol: TCP

        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"

        securityContext:
          # Required for vsock device access
          privileged: true
          runAsUser: 0
          capabilities:
            add:
              - NET_ADMIN
              - SYS_ADMIN

        volumeMounts:
          # Mount vsock device
          - name: vsock
            mountPath: /dev/vsock
          # Mount load generator config
          - name: loadgen-config
            mountPath: /etc/loadgen
            readOnly: true

      volumes:
        - name: vsock
          hostPath:
            path: /dev/vsock
            type: CharDevice
        - name: loadgen-config
          configMap:
            name: vsock-loadgen-config

      # Tolerations to ensure it can run on all worker nodes
      tolerations:
        - effect: NoSchedule
          operator: Exists
        - effect: NoExecute
          operator: Exists
