# To get started with Dependabot version updates, you'll need to specify which
# package ecosystems to update and where the package manifests are located.
# Please see the documentation for all configuration options:
# https://help.github.com/github/administering-a-repository/configuration-options-for-dependency-updates

version: 2
updates:
  - package-ecosystem: 'npm'
    directory: 'ui/apps/platform'
    schedule:
      interval: 'weekly'
      day: 'wednesday'
    # always update package.json files to match new version for any package in UI monorepo
    versioning-strategy: increase
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "area/ui"
      - "auto-retest"
    commit-message:
      include: scope
      prefix: chore

  - package-ecosystem: 'gradle'
    directory: 'qa-tests-backend/'
    schedule:
      interval: 'daily'
    open-pull-requests-limit: 3
    labels:
      - "ci-all-qa-tests"
      - "dependencies"
      - "auto-merge"
      - "auto-retest"
    commit-message:
      include: scope
      prefix: chore

  # NOTE: Using 'directories' (plural) to consolidate entries with identical configuration.
  # See: https://github.blog/changelog/2024-04-29-dependabot-multi-directory-configuration-public-beta-now-available/

  # Root module with special configuration (daily updates, custom ignore/groups)
  - package-ecosystem: 'gomod'
    directory: '/'
    schedule:
      interval: 'daily'
    open-pull-requests-limit: 9
    labels:
      - "ci-all-qa-tests"
      - "dependencies"
      - "auto-merge"
      - "auto-retest"
    commit-message:
      include: scope
      prefix: chore
    ignore:
      # k8s minor releases usually bumps go version to the latest one which we do not use.
      - dependency-name: "k8s.io/*"
        update-types: ["version-update:semver-minor"]
      - dependency-name: "github.com/aws/aws-sdk-go"
        update-types: ["version-update:semver-patch"]
      # The Scanner team wants full control over ClairCore updates,
      # so we ensure Scanner V4 does not have any unexpected changes.
      - dependency-name: "github.com/quay/claircore"
    groups:
      golang.org/x:
        patterns:
          - "golang.org/x/*"
      k8s.io:
        update-types:
          - "patch"
        patterns:
          - "k8s.io/*"
      aws-sdk-go-v2:
        patterns:
          - "github.com/aws/aws-sdk-go-v2"
          - "github.com/aws/aws-sdk-go-v2/*"

  # Consolidated all tool modules
  - package-ecosystem: 'gomod'
    directories:
      - '/operator/tools/controller-gen'
      - '/operator/tools/envtest/'
      - '/operator/tools/kubebuilder/'
      - '/operator/tools/kustomize/'
      - '/operator/tools/kuttl/'
      - '/operator/tools/operator-sdk/'
      - '/operator/tools/yq/'
      - '/scanner/hack/quay'
      - '/tests/performance/scale'
      - '/tools/check-workflow-run'
      - '/tools/linters/'
      - '/tools/proto/'
      - '/tools/test/'
    schedule:
      interval: 'weekly'
      day: 'wednesday'
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "auto-merge"
      - "auto-retest"
    commit-message:
      include: scope
      prefix: chore

  # Consolidated all docker images
  - package-ecosystem: 'docker'
    directories:
      - 'ci/splunk'
      - 'image/postgres'
      - 'image/rhel'
      - 'image/roxctl'
      - 'operator/'
      - 'operator/tests/controller/metrics'
      - 'scale/image'
      - 'scanner/image/db'
      - 'scanner/image/scanner'
      - 'scanner/image/scannerctl'
    schedule:
      interval: 'weekly'
      day: 'wednesday'
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
    commit-message:
      include: scope
      prefix: chore

  # Consolidated all github-actions (including workaround for local actions issue #6345)
  - package-ecosystem: github-actions
    directories:
      - /
      - /.github/actions/cache-go-dependencies
      - /.github/actions/cache-gradle-dependencies
      - /.github/actions/cache-ui-dependencies
      - /.github/actions/download-artifact-with-retry
      - /.github/actions/handle-tagged-build
      - /.github/actions/job-preamble
      - /.github/actions/junit2jira
      - /.github/actions/upload-artifact-with-retry
    schedule:
      interval: 'weekly'
      day: 'wednesday'
    open-pull-requests-limit: 3
    commit-message:
      include: scope
      prefix: chore
    groups:
      actions:
        patterns:
          - "actions/*"
