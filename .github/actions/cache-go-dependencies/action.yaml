name: Cache Go Dependencies
description: Cache Go Dependencies
inputs:
  save:
    description: Whether this job saves caches on pushes to the default branch.
    required: false
    default: 'true'
  key-suffix:
    description: Extra suffix for cache keys (use to distinguish matrix entries that share github.job).
    required: false
    default: ''
runs:
  using: composite
  steps:
    - name: Determine Go cache paths
      id: cache-paths
      run: |
        echo "GOCACHE=$(go env GOCACHE)" >> "$GITHUB_OUTPUT"
        echo "GOMODCACHE=$(go env GOMODCACHE)" >> "$GITHUB_OUTPUT"
        echo "GOARCH=$(go env GOARCH)" >> "$GITHUB_OUTPUT"
        echo "TAG=${{ github.sha }}" >> "$GITHUB_OUTPUT"
        suffix="${{ inputs.key-suffix }}"
        echo "KEY_SUFFIX=${suffix:+-$suffix}" >> "$GITHUB_OUTPUT"
      shell: bash

    - name: Cache Go Dependencies
      uses: actions/cache@v5
      with:
        path: ${{ steps.cache-paths.outputs.GOMODCACHE }}
        key: go-mod-v1-${{ hashFiles('**/go.sum') }}
        restore-keys: go-mod-v1-

    - name: Cache Go Build
      uses: actions/cache@v5
      with:
        path: ${{ steps.cache-paths.outputs.GOCACHE }}
        key: go-build-v2-${{ github.job }}${{ steps.cache-paths.outputs.KEY_SUFFIX }}-${{ steps.cache-paths.outputs.GOARCH }}-${{ steps.cache-paths.outputs.TAG }}
        restore-keys: go-build-v2-${{ github.job }}${{ steps.cache-paths.outputs.KEY_SUFFIX }}-${{ steps.cache-paths.outputs.GOARCH }}-

    - name: Mark GOCACHE entries for stale detection
      run: |
        gocache="${{ steps.cache-paths.outputs.GOCACHE }}"
        if [[ -d "$gocache" ]]; then
          # Backdate all cache entries to year 2000. During the build/test,
          # Go's markUsed() updates mtimes of accessed entries to "now"
          # (it always updates when mtime is >1 hour old). At the end of
          # the job, a trim step deletes entries still at year 2000 before
          # the cache post-step saves the directory.
          find "$gocache" -type f -exec touch -t 200001010000 {} +

          # Protect trim.txt: if backdated, Go's built-in Trim() sees
          # "last trim was in year 2000" and aggressively deletes ALL
          # backdated entries before the build starts. Setting it to now
          # prevents Trim() from running.
          echo "$(date +%s)" > "$gocache/trim.txt"
          echo "Marked GOCACHE entries for stale detection"
        fi
      shell: bash

    - name: Download Go modules
      run: make deps --always-make
      shell: bash

    - name: Stabilize file mtimes for Go test cache
      run: |
        # Go's test cache validates inputs by (path, size, mtime) — NOT content.
        # git checkout sets all mtimes to "now", which differs between CI runs,
        # causing every test to miss the cache. Setting a fixed mtime makes the
        # test cache hit across runs when file content hasn't changed.
        git ls-files -z | xargs -0 touch -t 200101010000
      shell: bash
