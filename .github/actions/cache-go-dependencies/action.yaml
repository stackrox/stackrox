name: Cache Go Dependencies
description: Cache Go Dependencies
inputs:
  save:
    description: Whether this job saves caches on pushes to the default branch.
    required: false
    default: 'true'
runs:
  using: composite
  steps:
    - name: Determine Go cache vars
      id: cache-vars
      run: |
        echo "GOCACHE=$(go env GOCACHE)" >> "$GITHUB_OUTPUT"
        echo "GOMODCACHE=$(go env GOMODCACHE)" >> "$GITHUB_OUTPUT"
        echo "GOARCH=$(go env GOARCH)" >> "$GITHUB_OUTPUT"
        echo "TAG=$(date +%Yw%U)" >> "$GITHUB_OUTPUT"
        # Compute the go.sum hash so that post steps do not re-evaluate
        # after the file permissions may be changed (blocking access).
        echo "GOSUM_HASH=${{ hashFiles('**/go.sum') }}" >> "$GITHUB_OUTPUT"
      shell: bash

    # TEMPORARY: force save with PR-specific keys to verify end-to-end
    # cache save + restore.  Revert before merging.
    - name: Cache Go Dependencies (save)
      if: inputs.save == 'true'
      uses: actions/cache@v5
      with:
        path: ${{ steps.cache-vars.outputs.GOMODCACHE }}
        key: go-mod-v1-pr19116-${{ steps.cache-vars.outputs.GOSUM_HASH }}

    - name: Cache Go Dependencies (restore)
      if: ${{ !(inputs.save == 'true') }}
      uses: actions/cache/restore@v5
      with:
        path: ${{ steps.cache-vars.outputs.GOMODCACHE }}
        key: go-mod-v1-pr19116-${{ steps.cache-vars.outputs.GOSUM_HASH }}

    - name: Cache Go Build (save)
      if: inputs.save == 'true'
      uses: actions/cache@v5
      with:
        path: ${{ steps.cache-vars.outputs.GOCACHE }}
        key: go-build-v1-pr19116-${{ github.job }}-${{ steps.cache-vars.outputs.GOARCH }}-${{ steps.cache-vars.outputs.TAG }}

    - name: Cache Go Build (restore)
      if: ${{ !(inputs.save == 'true') }}
      uses: actions/cache/restore@v5
      with:
        path: ${{ steps.cache-vars.outputs.GOCACHE }}
        key: go-build-v1-pr19116-${{ github.job }}-${{ steps.cache-vars.outputs.GOARCH }}-${{ steps.cache-vars.outputs.TAG }}

    - name: Download Go modules
      run: make deps --always-make
      shell: bash
