name: Cache Go Dependencies
description: Cache Go Dependencies
inputs:
  save:
    description: Whether this job saves caches on pushes to the default branch.
    required: false
    default: 'true'
  key-suffix:
    description: Extra suffix for cache keys (use to distinguish matrix entries that share github.job).
    required: false
    default: ''
runs:
  using: composite
  steps:
    - name: Determine Go cache paths
      id: cache-paths
      run: |
        echo "GOCACHE=$(go env GOCACHE)" >> "$GITHUB_OUTPUT"
        echo "GOARCH=$(go env GOARCH)" >> "$GITHUB_OUTPUT"
        echo "TAG=${{ github.sha }}" >> "$GITHUB_OUTPUT"
        # Hash go.mod once for use in cache keys. When dependencies change,
        # the GOCACHE must be invalidated because Go's module index caches
        # parsed imports by (filename, mtime, size) and our fixed mtimes
        # can cause stale cached imports when file content changes.
        echo "GOMOD_HASH=$(sha256sum go.mod | cut -c1-16)" >> "$GITHUB_OUTPUT"
        suffix="${{ inputs.key-suffix }}"
        echo "KEY_SUFFIX=${suffix:+-$suffix}" >> "$GITHUB_OUTPUT"  # prepends dash if set
      shell: bash

    - name: Cache Go Build (save)
      if: inputs.save == 'true' && (github.event_name == 'push' && github.ref_name == github.event.repository.default_branch)
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # ratchet:actions/cache@v5
      with:
        path: ${{ steps.cache-paths.outputs.GOCACHE }}
        key: go-build-v3-${{ github.job }}${{ steps.cache-paths.outputs.KEY_SUFFIX }}-${{ steps.cache-paths.outputs.GOARCH }}-${{ steps.cache-paths.outputs.GOMOD_HASH }}-${{ steps.cache-paths.outputs.TAG }}
        restore-keys: |
          go-build-v3-${{ github.job }}${{ steps.cache-paths.outputs.KEY_SUFFIX }}-${{ steps.cache-paths.outputs.GOARCH }}-${{ steps.cache-paths.outputs.GOMOD_HASH }}-
          go-build-v3-${{ github.job }}${{ steps.cache-paths.outputs.KEY_SUFFIX }}-${{ steps.cache-paths.outputs.GOARCH }}-

    - name: Cache Go Build (restore)
      if: ${{ !(inputs.save == 'true' && (github.event_name == 'push' && github.ref_name == github.event.repository.default_branch)) }}
      # TODO: revert to actions/cache/restore after validating this fix on CI
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # ratchet:actions/cache@v5
      with:
        path: ${{ steps.cache-paths.outputs.GOCACHE }}
        key: go-build-v3-${{ github.job }}${{ steps.cache-paths.outputs.KEY_SUFFIX }}-${{ steps.cache-paths.outputs.GOARCH }}-${{ steps.cache-paths.outputs.GOMOD_HASH }}-${{ steps.cache-paths.outputs.TAG }}
        restore-keys: |
          go-build-v3-${{ github.job }}${{ steps.cache-paths.outputs.KEY_SUFFIX }}-${{ steps.cache-paths.outputs.GOARCH }}-${{ steps.cache-paths.outputs.GOMOD_HASH }}-
          go-build-v3-${{ github.job }}${{ steps.cache-paths.outputs.KEY_SUFFIX }}-${{ steps.cache-paths.outputs.GOARCH }}-

    - name: Prepare GOCACHE for Go's built-in trim
      run: |
        gocache="${{ steps.cache-paths.outputs.GOCACHE }}"
        if [[ -d "$gocache" ]]; then
          before=$(du -sm "$gocache" 2>/dev/null | cut -f1)
          # Age entries to 4 days — UNDER Go's 5-day trimLimit so they
          # survive the initial Trim() at cache.Open(). Go's markUsed()
          # then refreshes accessed entries to "now" during compilation
          # and test execution. At cache.Close(), Trim() runs again but
          # all accessed entries are fresh; only genuinely unused entries
          # (still at 4 days) survive this run's Close() trim but will
          # be deleted on the NEXT run when they're 4+N days old.
          #
          # Why not 6 days (beyond trimLimit)? Go trims at Open() too —
          # entries >5d+1h get deleted BEFORE markUsed() can rescue them.
          # 4 days gives 1 day of headroom under the 5-day limit.
          four_days_ago=$(date -u -d '4 days ago' +%Y%m%d%H%M.00 2>/dev/null \
            || date -u -v-4d +%Y%m%d%H%M.00)
          timeout 120 find "$gocache" -type f ! -name 'trim.txt' \
            -exec touch -t "$four_days_ago" {} + || true
          # Set trim.txt to >24h ago to force Go's Trim() to run at Close().
          echo "$(date -u -d '2 days ago' +%s 2>/dev/null \
            || date -u -v-2d +%s)" > "$gocache/trim.txt"
          echo "GOCACHE: ${before:-0}MB, prepared for Go trim (entries aged to 4d)"
        fi
      shell: bash

    - name: Clear test cache on non-PR runs
      if: github.event_name != 'pull_request'
      run: |
        # Non-PR runs (master, release branches, nightlies) always run tests
        # from scratch to catch real failures. go clean -testcache removes
        # cached test results while preserving the compilation cache.
        go clean -testcache
        echo "Cleared test cache for fresh run"
      shell: bash

    - name: Stabilize file mtimes for Go test cache
      run: |
        # Go's test cache validates inputs by (path, size, mtime) — NOT content.
        # git checkout sets all mtimes to "now", which differs between CI runs,
        # causing every test to miss the cache. Setting a fixed mtime makes the
        # test cache hit across runs when file content hasn't changed.
        #
        # Go's module index also caches parsed imports by (filename, mtime, size).
        # A fixed mtime can cause stale cached imports when a file changes content
        # but keeps the same size. This is mitigated by including go.mod hash in
        # the GOCACHE key — dependency changes invalidate the entire cache.
        # See: https://github.com/golang/go/blob/go1.25.7/src/cmd/go/internal/modindex/read.go#L116

        git ls-files | xargs touch -t 200101010000
        # Also stabilize directory mtimes — tests using os.ReadDir or
        # filepath.Walk check directory mtimes too.
        git ls-files | sed 's|/[^/]*$||' | sort -u | xargs touch -t 200101010000
      shell: bash
