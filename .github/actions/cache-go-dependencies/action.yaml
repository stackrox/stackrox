name: Cache Go Dependencies
description: Cache Go Dependencies
inputs:
  save:
    description: Whether this job saves caches on pushes to the default branch.
    required: false
    default: 'true'
  key-suffix:
    description: Extra suffix for cache keys (use to distinguish matrix entries that share github.job).
    required: false
    default: ''
runs:
  using: composite
  steps:
    - name: Determine Go cache paths
      id: cache-paths
      run: |
        echo "GOCACHE=$(go env GOCACHE)" >> "$GITHUB_OUTPUT"
        echo "GOARCH=$(go env GOARCH)" >> "$GITHUB_OUTPUT"
        echo "TAG=${{ github.sha }}" >> "$GITHUB_OUTPUT"
        # Hash go.mod once for use in cache keys. When dependencies change,
        # the GOCACHE must be invalidated because Go's module index caches
        # parsed imports by (filename, mtime, size) and our fixed mtimes
        # can cause stale cached imports when file content changes.
        echo "GOMOD_HASH=$(sha256sum go.mod | cut -c1-16)" >> "$GITHUB_OUTPUT"
        suffix="${{ inputs.key-suffix }}"
        echo "KEY_SUFFIX=${suffix:+-$suffix}" >> "$GITHUB_OUTPUT"  # prepends dash if set
      shell: bash

    - name: Check local cache
      id: local-cache
      run: |
        gocache="${{ steps.cache-paths.outputs.GOCACHE }}"
        key_prefix="go-build-v3-${{ github.job }}${{ steps.cache-paths.outputs.KEY_SUFFIX }}-${{ steps.cache-paths.outputs.GOARCH }}-${{ steps.cache-paths.outputs.GOMOD_HASH }}"
        mkdir -p /tmp/warm-cache-markers
        marker="/tmp/warm-cache-markers/$(echo "$key_prefix" | md5sum | cut -c1-12)"
        if [[ -f "$marker" ]]; then
          echo "Local GOCACHE already has key prefix: $key_prefix"
          echo "skip=true" >> "$GITHUB_OUTPUT"
        else
          echo "No local marker for: $key_prefix"
          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "marker=$marker" >> "$GITHUB_OUTPUT"
        fi
      shell: bash

    - name: Cache Go Build (save)
      if: steps.local-cache.outputs.skip != 'true' && inputs.save == 'true'
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # ratchet:actions/cache@v5
      with:
        path: ${{ steps.cache-paths.outputs.GOCACHE }}
        key: go-build-v3-${{ github.job }}${{ steps.cache-paths.outputs.KEY_SUFFIX }}-${{ steps.cache-paths.outputs.GOARCH }}-${{ steps.cache-paths.outputs.GOMOD_HASH }}-${{ steps.cache-paths.outputs.TAG }}
        restore-keys: go-build-v3-${{ github.job }}${{ steps.cache-paths.outputs.KEY_SUFFIX }}-${{ steps.cache-paths.outputs.GOARCH }}-${{ steps.cache-paths.outputs.GOMOD_HASH }}-

    - name: Cache Go Build (restore)
      if: ${{ steps.local-cache.outputs.skip != 'true' && !(inputs.save == 'true' && (github.event_name == 'push' && github.ref_name == github.event.repository.default_branch)) }}
      uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # ratchet:actions/cache/restore@v5
      with:
        path: ${{ steps.cache-paths.outputs.GOCACHE }}
        key: go-build-v3-${{ github.job }}${{ steps.cache-paths.outputs.KEY_SUFFIX }}-${{ steps.cache-paths.outputs.GOARCH }}-${{ steps.cache-paths.outputs.GOMOD_HASH }}-${{ steps.cache-paths.outputs.TAG }}
        restore-keys: go-build-v3-${{ github.job }}${{ steps.cache-paths.outputs.KEY_SUFFIX }}-${{ steps.cache-paths.outputs.GOARCH }}-${{ steps.cache-paths.outputs.GOMOD_HASH }}-

    - name: Mark local cache as restored
      if: steps.local-cache.outputs.skip != 'true'
      run: |
        mkdir -p "$(dirname "${{ steps.local-cache.outputs.marker }}")"
        touch "${{ steps.local-cache.outputs.marker }}"
      shell: bash

    - name: Mark GOCACHE entries for stale detection
      if: steps.local-cache.outputs.skip != 'true' && inputs.save == 'true'
      run: |
        gocache="${{ steps.cache-paths.outputs.GOCACHE }}"
        if [[ -d "$gocache" ]]; then
          timeout 120 find "$gocache" -type f -exec touch -t 200001010000 {} + || true
          echo "$(date +%s)" > "$gocache/trim.txt"
          touch "$gocache/.do-trim"
          echo "Marked GOCACHE entries for stale detection"
        fi
      shell: bash

    # Registered AFTER cache steps so the post-step runs BEFORE cache save
    # (GHA runs post-steps in reverse registration order).
    - name: Trim stale GOCACHE entries (post-step)
      uses: gacts/run-and-post-run@598d7a875d5620e0457490555b5e18e46082aa47 # v1.4.0
      with:
        post: >
          set +e;
          gocache="$(go env GOCACHE)";
          [[ -f "$gocache/.do-trim" ]] || { echo "Skipping GOCACHE trim (not saving)"; exit 0; };
          rm -f "$gocache/.do-trim";
          before=$(du -sm "$gocache" 2>/dev/null | cut -f1);
          cutoff=$(mktemp); touch -t 200001020000 "$cutoff";
          find "$gocache" -type f ! -newer "$cutoff" -delete 2>/dev/null || true;
          rm -f "$cutoff";
          find "$gocache" -mindepth 1 -type d -empty -delete 2>/dev/null || true;
          after=$(du -sm "$gocache" 2>/dev/null | cut -f1);
          echo "GOCACHE trimmed: ${before:-0}MB -> ${after:-0}MB (removed $((${before:-0} - ${after:-0}))MB)"

    - name: Clear test cache on non-PR runs
      if: github.event_name != 'pull_request'
      run: |
        go clean -testcache
        echo "Cleared test cache for fresh run"
      shell: bash

    - name: Stabilize file mtimes for Go test cache
      run: |
        git ls-files | xargs touch -t 200101010000
        git ls-files | sed 's|/[^/]*$||' | sort -u | xargs touch -t 200101010000
      shell: bash
