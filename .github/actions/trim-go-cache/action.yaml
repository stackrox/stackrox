name: Trim stale GOCACHE entries
description: >
  Deletes GOCACHE entries not accessed during this job.
  Must be paired with cache-go-dependencies which marks entries before the build.
runs:
  using: composite
  steps:
    - name: Trim stale GOCACHE entries
      run: |
        gocache="$(go env GOCACHE)"
        if [[ ! -d "$gocache" ]]; then
          echo "No GOCACHE directory, skipping trim"
          exit 0
        fi

        # Safety check: only trim if cache-go-dependencies ran the mark step.
        # The mark step sets trim.txt to a recent timestamp after backdating
        # entries to year 2000. If trim.txt is missing or has a year-2000
        # mtime, the mark step didn't run — skip to avoid unexpected deletions.
        if [[ ! -f "$gocache/trim.txt" ]]; then
          echo "No trim.txt found, skipping trim (mark step may not have run)"
          exit 0
        fi

        before=$(du -sm "$gocache" 2>/dev/null | cut -f1)
        cutoff=$(mktemp); touch -t 200001020000 "$cutoff"
        find "$gocache" -type f ! -newer "$cutoff" -delete 2>/dev/null || true
        rm -f "$cutoff"
        find "$gocache" -mindepth 1 -type d -empty -delete 2>/dev/null || true
        after=$(du -sm "$gocache" 2>/dev/null | cut -f1)
        echo "GOCACHE trimmed: ${before:-0}MB -> ${after:-0}MB (removed $((${before:-0} - ${after:-0}))MB)"
      shell: bash
