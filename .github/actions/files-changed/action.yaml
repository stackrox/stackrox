name: Match files changed
description: >
  Compare files changed between base and head with named path filters.
  Each filter maps a label to a list of pathspec patterns using
  .gitignore-style glob semantics (* for single segment, ** for recursive).
  Output is a space-separated string of matched labels.
inputs:
  filters:
    description: >
      JSON object mapping labels to arrays of pathspec patterns.
      Example: { "ui": ["ui/**"], "go": ["**/*.go", "go.mod"] }
    required: true
  base:
    description: 'base sha to compare with'
    required: false
    default: ${{ github.event.pull_request.base.sha }}
  sha:
    description: 'sha to compare'
    required: false
    default: ${{ github.event.pull_request.head.sha }}
outputs:
  matches:
    description: "space-separated string of matched filter labels"
    value: ${{ steps.compare.outputs.matches }}
runs:
  using: composite
  steps:
    - name: Compare list of files changed with filters
      id: compare
      shell: bash
      env:
        FILTERS: ${{ inputs.filters }}
        BASE: ${{ inputs.base }}
        SHA: ${{ inputs.sha }}
      run: |
        set -eo pipefail

        matched=()
        for k in $(echo "${FILTERS}" | jq -r 'keys[]'); do
          mapfile -t pathspecs < <(echo "${FILTERS}" | jq -r --arg k "$k" '.[$k][]')
          globs=()
          for p in "${pathspecs[@]}"; do
            globs+=(":(glob)${p}")
          done
          if [[ -n "$(git diff --name-only "${BASE}...${SHA}" -- "${globs[@]}")" ]]; then
            echo "${k}: matched" >&2
            matched+=("${k}")
          else
            echo "${k}: no match" >&2
          fi
        done

        echo "matches=${matched[*]}" | tee -a "${GITHUB_OUTPUT}"
