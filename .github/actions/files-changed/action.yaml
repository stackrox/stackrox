name: Match files changed
description: >
  Compare files changed between base and head with named glob filters.
  Each filter maps a label to one or more space-separated pathspec patterns
  using .gitignore-style glob semantics (** for recursive, * for single segment).
  Output is a space-separated string of matched labels.
inputs:
  filters:
    description: >
      Bash associative array of label=pathspec(s) pairs.
      Example: ( ["ui"]="ui/**" ["go"]="**/*.go go.mod go.sum" ["gha"]=".github/**" )
      Multiple pathspecs per label are space-separated.
      Uses .gitignore-style globs: * matches within a segment, ** matches across segments.
    required: true
  base:
    description: 'base sha to compare with'
    required: false
    default: ${{ github.event.pull_request.base.sha }}
  sha:
    description: 'sha to compare'
    required: false
    default: ${{ github.event.pull_request.head.sha }}
outputs:
  matches:
    description: "space-separated string of matched filter labels"
    value: ${{ steps.compare.outputs.matches }}
runs:
  using: composite
  steps:
    - name: Compare list of files changed with filters
      id: compare
      shell: bash
      env:
        FILTERS: ${{ inputs.filters }}
        BASE: ${{ inputs.base }}
        SHA: ${{ inputs.sha }}
      run: |
        set -eo pipefail

        input="$(echo "${FILTERS}" | tr '\n' ' ' | sed 's/  */ /g; s/ *$//')"
        declare -A filters="${input}"

        if [[ -z "${filters[*]}" ]]; then
          echo "::error::No filters provided. Example: ( [\"ui\"]=\"ui/**\" [\"go\"]=\"**/*.go\" )" >&2
          exit 1
        fi

        matched=()
        for k in "${!filters[@]}"; do
          read -ra pathspecs <<< "${filters[$k]}"
          globs=()
          for p in "${pathspecs[@]}"; do
            globs+=(":(glob)${p}")
          done
          if [[ -n "$(git diff --name-only "${BASE}...${SHA}" -- "${globs[@]}")" ]]; then
            echo "${k}: matched" >&2
            matched+=("${k}")
          else
            echo "${k}: no match" >&2
          fi
        done

        echo "matches=${matched[*]}" | tee -a "${GITHUB_OUTPUT}"
