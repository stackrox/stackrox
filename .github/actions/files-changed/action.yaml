name: Match files changed
description: >
  Compare files changed between base and head with named glob filters.
  Each filter maps a label to one or more space-separated bash glob patterns.
  Output is a space-separated string of matched labels.
inputs:
  filters:
    description: >
      Bash associative array of label=glob(s) pairs.
      Example: ( ["ui"]="ui/*" ["go"]="*.go go.mod go.sum" ["gha"]=".github/*" )
      Multiple globs per label are space-separated.
    required: true
  base:
    description: 'base sha to compare with'
    required: false
    default: ${{ github.event.pull_request.base.sha }}
  sha:
    description: 'sha to compare'
    required: false
    default: ${{ github.event.pull_request.head.sha }}
outputs:
  matches:
    description: "space-separated string of matched filter labels"
    value: ${{ steps.compare.outputs.matches }}
runs:
  using: composite
  steps:
    - name: Compare list of files changed with filters
      id: compare
      shell: bash
      run: |
        set -eo pipefail
        "${{ github.action_path }}/find-changes.sh" '${{ inputs.filters }}' '${{ inputs.base }}' '${{ inputs.sha }}' \
          | tee -a "${GITHUB_OUTPUT}"
