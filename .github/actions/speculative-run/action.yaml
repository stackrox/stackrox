name: Speculative Run — Declare Win
description: >
  Called by the winner of a speculative-execution matrix race.
  Posts a synthetic required-check-name as succeeded via the GitHub
  Checks API, then exits 1 to trigger fail-fast and cancel remaining
  copies still running.

  Usage:
    strategy:
      fail-fast: true
      matrix:
        copy: [a, b]
    continue-on-error: ${{ matrix.copy == 'b' }}
    steps:
      - ... do the real work ...
      - uses: ./.github/actions/speculative-run
        if: success()
        with:
          required-check-name: "build-and-push-main (RHACS_BRANDING, amd64)"

inputs:
  required-check-name:
    description: >
      The exact required-check name to post as succeeded.
      Must match the branch-protection required status check exactly.
    required: true

runs:
  using: composite
  steps:
    - name: Post synthetic required check and cancel losers
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        check_name="${{ inputs.required-check-name }}"
        echo "Winner: posting '${check_name}' as success"

        gh api repos/${{ github.repository }}/check-runs \
          -f name="${check_name}" \
          -f head_sha="${{ github.sha }}" \
          -f status=completed \
          -f conclusion=success \
          -f "output[title]=Speculative run complete" \
          -f "output[summary]=This copy won the race. Other copies will be cancelled by fail-fast."

        echo "Exiting 1 to trigger fail-fast → cancel remaining copies"
        exit 1
