name: Speculative Run
description: >
  Run in a matrix with copy: [a, b]. Profiles the runner and fails
  on slow hardware, causing GitHub Actions to skip remaining steps.
  Copy "a" is the fallback and always runs. Use with
  continue-on-error: true on the job.
inputs:
  job-name:
    description: 'The job name (used to find sibling matrix entry in API)'
    required: true
  slow-cpu-pattern:
    description: 'CPU model substring to reject (default: 7763)'
    required: false
    default: '7763'
outputs:
  cpu-model:
    description: 'CPU model detected on this runner'
    value: ${{ steps.gate.outputs.cpu_model }}
runs:
  using: composite
  steps:
    - name: Runner gate
      id: gate
      shell: bash
      run: |
        cpu_model=$(grep -m1 'model name' /proc/cpuinfo 2>/dev/null | cut -d: -f2 | xargs)
        echo "cpu_model=${cpu_model}" >> "$GITHUB_OUTPUT"
        echo "cpu_model=${cpu_model}"
        slow_pattern="${{ inputs.slow-cpu-pattern }}"

        run_id="${{ github.run_id }}"
        job_name="${{ inputs.job-name }}"

        if [[ "${{ matrix.copy }}" == "a" ]]; then
          # Copy A: quit if slow, run if fast. Does not check B.
          if [[ "$cpu_model" == *"$slow_pattern"* ]]; then
            echo "::warning::Slow runner (${cpu_model}). Primary copy skipping — backup will cover."
            exit 1
          fi
          echo "Fast runner (${cpu_model}). Primary copy running."
          exit 0
        fi

        # Copy B: check A's gate result, then decide.
        echo "Checking primary copy's runner gate..."
        for i in $(seq 1 6); do
          a_gate=$(gh api "repos/${{ github.repository }}/actions/runs/${run_id}/jobs?per_page=100" \
            --jq ".jobs[] | select(.name == \"${job_name} (a)\") | .steps[] | select(.name == \"Runner gate\") | .conclusion" 2>/dev/null || echo "")
          if [[ -n "$a_gate" && "$a_gate" != "null" ]]; then break; fi
          sleep 5
        done

        if [[ "$a_gate" == "success" ]]; then
          # A is fast — A has it covered, B quits regardless of own speed
          echo "Primary copy is on a fast runner. Backup not needed."
          exit 1
        fi

        # A failed gate (slow) or unknown — B is the rescue.
        # B runs regardless of its own runner speed.
        if [[ "$cpu_model" == *"$slow_pattern"* ]]; then
          echo "::notice::Both copies on slow runners. Backup running as fallback."
        else
          echo "Primary copy is slow. Backup copy running as rescue (${cpu_model})."
        fi
        exit 0
