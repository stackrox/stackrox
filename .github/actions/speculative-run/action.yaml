name: Speculative Run
description: >
  Speculative execution for CI jobs on heterogeneous runners.
  Use with a matrix that includes copy: [a, b] and continue-on-error: true.
  Works with any existing matrix dimensions — the copy letter is always
  the last comma-separated element in the job name.
inputs:
  job-name:
    description: 'The base job name before matrix expansion (e.g. pre-build-go-binaries)'
    required: true
  slow-cpu-pattern:
    description: 'CPU model substring to reject (default: 7763)'
    required: false
    default: '7763'
outputs:
  cpu-model:
    description: 'CPU model detected on this runner'
    value: ${{ steps.gate.outputs.cpu_model }}
runs:
  using: composite
  steps:
    - name: Runner gate
      id: gate
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        cpu_model=$(grep -m1 'model name' /proc/cpuinfo 2>/dev/null | cut -d: -f2 | xargs)
        echo "cpu_model=${cpu_model}" >> "$GITHUB_OUTPUT"
        echo "cpu_model=${cpu_model}"

        slow_pattern="${{ inputs.slow-cpu-pattern }}"
        my_copy="${{ matrix.copy }}"
        job_name="${{ inputs.job-name }}"
        run_id="${{ github.run_id }}"
        is_slow=$([[ "$cpu_model" == *"$slow_pattern"* ]] && echo true || echo false)

        # Build the sibling name pattern: same job + same matrix dims, but copy=a
        # For "pre-build-go-binaries (default, amd64, b)" the sibling is
        # "pre-build-go-binaries (default, amd64, a)"
        my_full_name="${{ github.job }}"
        # Replace the last matrix element (copy letter) with 'a' to find sibling
        sibling_a=$(echo "$my_full_name" | sed "s/, ${my_copy})/, a)/")
        if [[ "$sibling_a" == "$my_full_name" ]]; then
          # Single-dimension matrix: "go-bench (b)" -> "go-bench (a)"
          sibling_a=$(echo "$my_full_name" | sed "s/(${my_copy})/(a)/")
        fi
        echo "my_name=${my_full_name}"
        echo "sibling_a=${sibling_a}"

        # Copy a: run if fast, skip if slow.
        if [[ "$my_copy" == "a" ]]; then
          if [[ "$is_slow" == "true" ]]; then
            echo "::warning::Slow runner (${cpu_model}). Skipping copy a."
            exit 1
          fi
          echo "Fast runner (${cpu_model}). Copy a running."
          exit 0
        fi

        # Copy b: wait for copy a's gate result, then decide.
        echo "Waiting for sibling (${sibling_a}) gate result..."
        a_gate=""
        for i in $(seq 1 12); do
          a_gate=$(gh api "repos/${{ github.repository }}/actions/runs/${run_id}/jobs?per_page=100" \
            --jq ".jobs[] | select(.name == \"${sibling_a}\") | .steps[] | select(.name == \"Runner gate\") | .conclusion" 2>/dev/null || echo "")
          if [[ -n "$a_gate" && "$a_gate" != "null" ]]; then break; fi
          sleep 5
        done

        if [[ "$a_gate" == "success" ]]; then
          # Copy a is fast — it will handle the work
          echo "Copy a passed gate (fast runner). Not needed."
          exit 1
        fi

        # Copy a failed gate (slow) or hasn't reported yet.
        # B runs regardless of own speed — it's the rescue/fallback.
        if [[ "$is_slow" == "true" ]]; then
          echo "::notice::Both copies on slow runners. Running as fallback."
        else
          echo "Copy a is slow. Running as rescue (${cpu_model})."
        fi
        exit 0
