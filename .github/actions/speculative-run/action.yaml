name: Speculative Run Gate
description: >
  Gate step for speculative-execution matrix jobs.

  Behaviour per copy:
  - Instant CPU check: slow runner and not last-copy → exit 1 (gate failure,
    next copy's monitor sees this and proceeds).
  - Fast runner (or last-copy): start nohup background monitor then proceed.
    Monitor waits 30s × position, then checks all earlier copies' JOB status
    for THIS exact job (matched by check-name + copy letter):
    - any sibling is in_progress or succeeded → kill -TERM MY_PARENT
      → this job shows as cancelled, no further steps run. ✅
    - all siblings failed (slow runners) or absent → this copy runs. ✅

  Pair with speculative-declare-win at the end of the job (if: success()).
  Both actions take the same check-name value.

inputs:
  copy:
    description: 'This copy letter (a, b, or c)'
    required: true
  check-name:
    description: >
      Required check name WITHOUT the copy letter suffix (same value passed to
      speculative-declare-win). Used to identify sibling copies in the GHA API.
      Example: "pre-build-go-binaries (default, amd64)"
    required: true
  last-copy:
    description: 'Unconditional fallback copy that always runs regardless of CPU (b for 2-copy, c for 3-copy)'
    required: false
    default: 'b'
  slow-cpu-pattern:
    description: 'Substring of CPU model name that marks a slow runner'
    required: false
    default: '7763'
  enabled:
    description: 'Set to false to disable speculative execution — all copies run normally (useful for debugging)'
    required: false
    default: 'true'

runs:
  using: composite
  steps:
    - name: Gate
      id: gate
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        set +e
        if [[ "${{ inputs.enabled }}" != 'true' ]]; then
          echo "Speculative execution disabled — skipping gate, this copy always runs."
          exit 0
        fi
        MY_COPY="${{ inputs.copy }}"
        CHECK_NAME="${{ inputs.check-name }}"
        LAST_COPY="${{ inputs.last-copy }}"
        SLOW_PATTERN="${{ inputs.slow-cpu-pattern }}"
        RUN_ID="${{ github.run_id }}"
        REPO="${{ github.repository }}"
        MY_PARENT=$PPID

        cpu=$(grep -m1 'model name' /proc/cpuinfo 2>/dev/null | cut -d: -f2 | xargs)
        [[ -z "$cpu" ]] && cpu=$(lscpu 2>/dev/null | awk -F: '/Model name/{gsub(/^ +/,"",$2); print $2}')
        echo "cpu=${cpu:-unknown}"

        # ── 1. Own CPU check ────────────────────────────────────────────────
        if [[ "$MY_COPY" != "$LAST_COPY" && "$cpu" == *"${SLOW_PATTERN}"* ]]; then
          echo "::warning::Slow runner (${cpu}) — delegating to next copy."
          exit 1
        fi

        # ── 2. Build list of all earlier copies ──────────────────────────────
        # b→"a", c→"a b", d→"a b c"
        case "$MY_COPY" in
          b) prev_copies="a";     wait_secs=30 ;;
          c) prev_copies="a b";   wait_secs=60 ;;
          d) prev_copies="a b c"; wait_secs=90 ;;
          *)  prev_copies="";     wait_secs=0  ;;
        esac

        if [[ -n "$prev_copies" ]]; then
          # Snapshot current children so we can identify the work step PID later.
          pgrep -P "$MY_PARENT" | sort > /tmp/speculative-baseline

          # Pre-compute the sibling name prefix in the OUTER shell to avoid
          # quoting hell inside the nohup string.
          # Sibling job name depends on whether check-name already has dims:
          #   multi-dim "Job (d1, d2)" → name_base="Job (d1, d2", sep=", " → "Job (d1, d2, a)"
          #   single-dim "job-name"    → name_base="job-name (", sep=""    → "job-name (a)"
          # grep -F (fixed string) handles dots/slashes in registry names.
          if [[ "${CHECK_NAME}" == *")" ]]; then
            SIBLING_BASE="${CHECK_NAME%\)}"
            SIBLING_SEP=", "
          else
            SIBLING_BASE="${CHECK_NAME} ("
            SIBLING_SEP=""
          fi

          nohup bash -c "
            sleep ${wait_secs}
            all_jobs=\$(gh api 'repos/${REPO}/actions/runs/${RUN_ID}/jobs?per_page=100' \
              --jq '.jobs[] | \"\(.name)|\(.status)|\(.conclusion)\"' 2>/dev/null)
            winner_found=0
            for check_copy in ${prev_copies}; do
              sibling_name='${SIBLING_BASE}${SIBLING_SEP}'\${check_copy}')'
              matching=\$(echo \"\$all_jobs\" | grep -F \"\${sibling_name}|\" | head -1)
              status=\$(echo \"\$matching\" | cut -d'|' -f2)
              conclusion=\$(echo \"\$matching\" | cut -d'|' -f3)
              echo \"[\$(date -u +%H:%M:%S)] Sibling \${check_copy} ('\${sibling_name}'): status=\${status} conclusion=\${conclusion}\"
              if [[ \"\${status}\" == 'in_progress' || \"\${conclusion}\" == 'success' ]]; then
                winner_found=1
                echo \"Sibling \${check_copy} is winning — cancelling this copy.\"
                break
              fi
            done

            if [[ \$winner_found -eq 1 ]]; then
              # SIGTERM parent first: runner marks job as cancelled (not failure).
              kill -TERM ${MY_PARENT} 2>/dev/null
              sleep 0.1
              # SIGKILL new children (the work step bash) so they stop immediately.
              new=\$(comm -13 /tmp/speculative-baseline <(pgrep -P ${MY_PARENT} | sort) 2>/dev/null)
              for pid in \$new; do kill -9 \$pid 2>/dev/null; done
            else
              echo 'No sibling is winning — this copy proceeds normally.'
            fi
          " >> /tmp/speculative-monitor.log 2>&1 &
          disown
          echo "Monitor started — checking [${prev_copies}] after ${wait_secs}s."
        else
          echo "Copy ${MY_COPY} is first — no monitor needed."
        fi

        echo "Gate passed."
        exit 0
