name: Speculative Run Gate
description: >
  Gate step for speculative-execution matrix jobs.

  Fast runner: posts an in_progress check-run (the coordination signal),
  then starts a background monitor that polls for sibling check-runs.
  When a winning sibling's check appears → cancel self.

  Slow runner: exits 1 immediately (no check-run posted). Siblings treat
  "absent after 3 polls" (t≥12s) as eliminated.

  Pair with speculative-declare-win at the end of the job (if: success()).
  That action PATCHes the check-run posted here to completed/success.
  Both actions share the same check-name value.

inputs:
  copy:
    description: 'This copy letter (a, b, or c)'
    required: true
  check-name:
    description: >
      Required check name WITHOUT the copy letter suffix. Must exactly match
      the branch-protection required check name. Used as the check-run name
      and sibling coordination key.
      Example: "pre-build-go-binaries (default, amd64)"
    required: true
  last-copy:
    description: 'Unconditional fallback copy that always runs regardless of CPU (b for 2-copy, c for 3-copy)'
    required: false
    default: 'b'
  slow-cpu-pattern:
    description: 'Substring of CPU model name that marks a slow runner'
    required: false
    default: '7763'
  enabled:
    description: 'Set to false to disable speculative execution — all copies run normally'
    required: false
    default: 'true'

runs:
  using: composite
  steps:
    - name: Gate
      id: gate
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        set +e
        if [[ "${{ inputs.enabled }}" != 'true' ]]; then
          echo "Speculative execution disabled — this copy always runs."
          exit 0
        fi
        MY_COPY="${{ inputs.copy }}"
        CHECK_NAME="${{ inputs.check-name }}"
        LAST_COPY="${{ inputs.last-copy }}"
        SLOW_PATTERN="${{ inputs.slow-cpu-pattern }}"
        MY_PARENT=$PPID

        cpu=$(grep -m1 'model name' /proc/cpuinfo 2>/dev/null | cut -d: -f2 | xargs)
        [[ -z "$cpu" ]] && cpu=$(lscpu 2>/dev/null | awk -F: '/Model name/{gsub(/^ +/,"",$2); print $2}')
        echo "cpu=${cpu:-unknown}"

        # ── 1. CPU check ────────────────────────────────────────────────────────
        if [[ "$MY_COPY" != "$LAST_COPY" && "$cpu" == *"${SLOW_PATTERN}"* ]]; then
          echo "::warning::Slow runner (${cpu}) — delegating to next copy."
          # SIGTERM the runner parent so the job shows as 'cancelled' (not 'failure').
          # This avoids red X marks in the PR summary for expected speculative exits.
          # Monitor treats absent-after-3-polls as eliminated — same as before.
          kill -TERM "$MY_PARENT" 2>/dev/null
          sleep 600  # stay alive until the runner's cancellation cleanup kills us
        fi

        # ── 2. Post in_progress check-run ───────────────────────────────────────
        # external_id includes run_id so monitors from different workflow runs
        # on the same commit SHA (e.g. /retest) do not cross-contaminate.
        EXT_ID="spec-${MY_COPY}-${RUN_ID}"
        check_id=$(gh api repos/"${{ github.repository }}"/check-runs \
          -f name="${CHECK_NAME}" \
          -f head_sha="${{ github.sha }}" \
          -f status=in_progress \
          -f external_id="${EXT_ID}" \
          --jq '.id' 2>/dev/null)
        printf '%s\n' "${check_id:-}" > /tmp/speculative-check-id
        echo "Posted in_progress check-run ${check_id} (${EXT_ID})"

        # ── 3. Background monitor for non-first copies ──────────────────────────
        case "$MY_COPY" in
          b) prev_copies="a" ;;
          c) prev_copies="a b" ;;
          d) prev_copies="a b c" ;;
          *)  prev_copies="" ;;
        esac

        if [[ -n "$prev_copies" ]]; then
          # No baseline capture needed — Gate step stays alive (sleeping), so
          # there are no "work" child processes to kill when the monitor fires.

          sibling_ids=""
          for c in ${prev_copies}; do
            sibling_ids="${sibling_ids:+${sibling_ids},}spec-${c}-${RUN_ID}"
          done

          cp "${GITHUB_ACTION_PATH}/monitor.sh" /tmp/speculative-monitor.sh
          chmod +x /tmp/speculative-monitor.sh
          export SPEC_REPO="${{ github.repository }}"
          export SPEC_SHA="${{ github.sha }}"
          export SPEC_CHECK_NAME="${CHECK_NAME}"
          export SPEC_SIBLING_IDS="${sibling_ids}"
          export SPEC_PARENT="${MY_PARENT}"

          nohup bash /tmp/speculative-monitor.sh >> /tmp/speculative-monitor.log 2>&1 &
          disown
          echo "Monitor started — Gate step staying alive until decision."

          # KEY: Keep this Gate composite action step alive so $MY_PARENT (the
          # composite action coordinator) remains valid. When the monitor finds a
          # winning sibling, it SIGTERMs $SPEC_PARENT (= $MY_PARENT = coordinator).
          # Since the coordinator is still running, GHA marks the step as 'cancelled'
          # — not 'failure'. This is the crucial difference from a background process
          # firing during a later regular step (which produces 'failure').
          #
          # The monitor writes /tmp/speculative-monitor-result when all siblings are
          # gone (slow runners) — we detect that and exit 0 to let work proceed.
          rm -f /tmp/speculative-monitor-result
          gate_deadline=$(( $(date +%s) + 300 ))
          while [[ ! -f /tmp/speculative-monitor-result && $(date +%s) -lt $gate_deadline ]]; do
            sleep 1
          done

          if [[ -f /tmp/speculative-monitor-result ]]; then
            echo "Monitor decision: $(cat /tmp/speculative-monitor-result) — proceeding to work."
          else
            echo "Gate timeout — proceeding as fallback."
          fi
        else
          echo "Copy ${MY_COPY} is first — no monitor needed."
        fi

        # Copy the cleanup script so the post-job hook can call it.
        cp "${GITHUB_ACTION_PATH}/cleanup.sh" /tmp/speculative-cleanup.sh
        chmod +x /tmp/speculative-cleanup.sh

        echo "Gate passed."
        exit 0

    - name: Register post-job cleanup
      # Uses gacts/run-and-post-run (JS action) to register a post callback.
      # The post: script is ONE LINE — YAML '>' fold preserves newlines for
      # more-indented content, which breaks multi-line bash in this context.
      # Cleanup logic lives in cleanup.sh, copied by the Gate step above.
      #
      # Logic:
      #   success  → declare-win already patched to completed/success; skip.
      #   cancelled → in_progress is harmless (filter=latest ignores it); skip.
      #   failure  → cleanup.sh resolves check-run so branch protection unblocks.
      uses: gacts/run-and-post-run@598d7a875d5620e0457490555b5e18e46082aa47 # v1.4.0
      if: inputs.enabled == 'true'
      env:
        GH_TOKEN: ${{ github.token }}
        SPEC_REPO: ${{ github.repository }}
      with:
        shell: bash
        run: 'true'
        post: if [[ "${{ job.status }}" == "failure" ]]; then SPEC_REPO=${{ github.repository }} GH_TOKEN=${{ github.token }} bash /tmp/speculative-cleanup.sh; fi
