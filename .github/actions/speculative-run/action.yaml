name: Speculative Run
description: >
  Speculative execution for CI jobs on heterogeneous runners.
  Use with a matrix (copy: [a, b, c, ...]) and continue-on-error: true.
  All copies profile the runner, then make one API call to decide who runs.
inputs:
  job-name:
    description: 'The job name (used to find sibling matrix entries in API)'
    required: true
  slow-cpu-pattern:
    description: 'CPU model substring to reject (default: 7763)'
    required: false
    default: '7763'
outputs:
  cpu-model:
    description: 'CPU model detected on this runner'
    value: ${{ steps.gate.outputs.cpu_model }}
runs:
  using: composite
  steps:
    - name: Runner gate
      id: gate
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        cpu_model=$(grep -m1 'model name' /proc/cpuinfo 2>/dev/null | cut -d: -f2 | xargs)
        echo "cpu_model=${cpu_model}" >> "$GITHUB_OUTPUT"
        echo "cpu_model=${cpu_model}"

        slow_pattern="${{ inputs.slow-cpu-pattern }}"
        my_copy="${{ matrix.copy }}"
        job_name="${{ inputs.job-name }}"
        run_id="${{ github.run_id }}"
        is_slow=$([[ "$cpu_model" == *"$slow_pattern"* ]] && echo true || echo false)

        # Copy a: simple — run if fast, skip if slow.
        if [[ "$my_copy" == "a" ]]; then
          if [[ "$is_slow" == "true" ]]; then
            echo "::warning::Slow runner (${cpu_model}). Skipping copy a."
            exit 1
          fi
          echo "Fast runner (${cpu_model}). Copy a running."
          exit 0
        fi

        # Copies b-f: wait for copy a's gate, then one API call decides.
        echo "Waiting for copy a's gate result..."
        for i in $(seq 1 12); do
          a_gate=$(gh api "repos/${{ github.repository }}/actions/runs/${run_id}/jobs?per_page=100" \
            --jq ".jobs[] | select(.name == \"${job_name} (a)\") | .steps[] | select(.name == \"Runner gate\") | .conclusion" 2>/dev/null || echo "")
          if [[ -n "$a_gate" && "$a_gate" != "null" ]]; then break; fi
          sleep 5
        done

        if [[ "$a_gate" == "success" ]]; then
          echo "Copy a is fast. Not needed."
          exit 1
        fi

        # Copy a is slow. I should run if I'm fast.
        if [[ "$is_slow" == "true" ]]; then
          # I'm also slow. Only run if I'm the last copy (fallback).
          # Check: are there any later copies that might be fast?
          # Rather than polling, use a simple rule: last copy alphabetically
          # in the matrix is the fallback. All others quit.
          all_copies=$(gh api "repos/${{ github.repository }}/actions/runs/${run_id}/jobs?per_page=100" \
            --jq "[.jobs[] | select(.name | startswith(\"${job_name} (\")) | .name | capture(\"\\\\((?<c>.)\\\\)\").c] | sort | last" 2>/dev/null || echo "f")
          if [[ "$my_copy" == "$all_copies" ]]; then
            echo "::notice::All predecessors slow, I'm slow too, but I'm the last copy — running as fallback."
            exit 0
          fi
          echo "::warning::Slow runner. Not last copy. Skipping."
          exit 1
        fi

        # I'm fast and copy a is slow. But am I the first fast copy?
        # Wait briefly for other copies to report, then check.
        sleep 3
        first_fast=$(gh api "repos/${{ github.repository }}/actions/runs/${run_id}/jobs?per_page=100" \
          --jq "[.jobs[] | select(.name | startswith(\"${job_name} (\")) | select(.name != \"${job_name} (a)\") | select(.steps[] | select(.name == \"Runner gate\") | .conclusion == \"success\") | .name | capture(\"\\\\((?<c>.)\\\\)\").c] | sort | first" 2>/dev/null || echo "")

        if [[ "$first_fast" == "$my_copy" || -z "$first_fast" ]]; then
          echo "Copy a is slow. I'm the first fast copy — running as rescue."
          exit 0
        fi

        echo "Copy a is slow, but copy ${first_fast} is fast and earlier. Not needed."
        exit 1
