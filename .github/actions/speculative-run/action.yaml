name: Speculative Run Gate
description: >
  Gate step for speculative-execution matrix jobs.

  Behaviour per copy:
  - Instant CPU check: slow runner and not last-copy → exit 1 (gate failure,
    next copy's monitor sees this and proceeds).
  - Fast runner (or last-copy): start nohup background monitor then proceed.
    Monitor polls every 5s starting after 5s. On each poll it checks the
    sibling's gate step conclusion via the GHA API:
    - sibling gate=success AND (in_progress OR succeeded) → cancel self ✅
    - sibling gate=failure (slow runner) → that sibling is eliminated
    - sibling gate not yet visible → keep waiting (job still in checkout)
    - all siblings eliminated → stop polling, this copy runs ✅

  Pair with speculative-declare-win at the end of the job (if: success()).
  Both actions take the same check-name value.

inputs:
  copy:
    description: 'This copy letter (a, b, or c)'
    required: true
  check-name:
    description: >
      Required check name WITHOUT the copy letter suffix (same value passed to
      speculative-declare-win). Used to identify sibling copies in the GHA API.
      Example: "pre-build-go-binaries (default, amd64)"
    required: true
  last-copy:
    description: 'Unconditional fallback copy that always runs regardless of CPU (b for 2-copy, c for 3-copy)'
    required: false
    default: 'b'
  slow-cpu-pattern:
    description: 'Substring of CPU model name that marks a slow runner'
    required: false
    default: '7763'
  enabled:
    description: 'Set to false to disable speculative execution — all copies run normally (useful for debugging)'
    required: false
    default: 'true'

runs:
  using: composite
  steps:
    - name: Gate
      id: gate
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        set +e
        if [[ "${{ inputs.enabled }}" != 'true' ]]; then
          echo "Speculative execution disabled — skipping gate, this copy always runs."
          exit 0
        fi
        MY_COPY="${{ inputs.copy }}"
        CHECK_NAME="${{ inputs.check-name }}"
        LAST_COPY="${{ inputs.last-copy }}"
        SLOW_PATTERN="${{ inputs.slow-cpu-pattern }}"
        RUN_ID="${{ github.run_id }}"
        REPO="${{ github.repository }}"
        MY_PARENT=$PPID

        cpu=$(grep -m1 'model name' /proc/cpuinfo 2>/dev/null | cut -d: -f2 | xargs)
        [[ -z "$cpu" ]] && cpu=$(lscpu 2>/dev/null | awk -F: '/Model name/{gsub(/^ +/,"",$2); print $2}')
        echo "cpu=${cpu:-unknown}"

        # ── 1. Own CPU check ────────────────────────────────────────────────
        if [[ "$MY_COPY" != "$LAST_COPY" && "$cpu" == *"${SLOW_PATTERN}"* ]]; then
          echo "::warning::Slow runner (${cpu}) — delegating to next copy."
          exit 1
        fi

        # ── 2. Build list of all earlier copies ──────────────────────────────
        # b→"a", c→"a b", d→"a b c"
        case "$MY_COPY" in
          b) prev_copies="a" ;;
          c) prev_copies="a b" ;;
          d) prev_copies="a b c" ;;
          *)  prev_copies="" ;;
        esac

        if [[ -n "$prev_copies" ]]; then
          # Snapshot current children so we can identify the work step PID later.
          pgrep -P "$MY_PARENT" | sort > /tmp/speculative-baseline

          # Pre-compute sibling name prefix in the outer shell.
          # multi-dim "Job (d1, d2)" → base="Job (d1, d2", sep=", " → "Job (d1, d2, a)"
          # single-dim "job-name"    → base="job-name (",  sep=""    → "job-name (a)"
          if [[ "${CHECK_NAME}" == *")" ]]; then
            SIBLING_BASE="${CHECK_NAME%\)}"
            SIBLING_SEP=", "
          else
            SIBLING_BASE="${CHECK_NAME} ("
            SIBLING_SEP=""
          fi

          # Monitor polls every 5s. Checks the sibling's gate step conclusion
          # (not just job-level in_progress — that includes the checkout phase
          # before the gate runs). The outer composite action step is visible
          # in the GHA API as "Run ./.github/actions/speculative-run".
          #
          # Cancel only when sibling gate=success AND (in_progress OR succeeded).
          # Wait if gate not yet visible (job in checkout). Stop if all siblings
          # gate=failure (all slow runners → this copy runs as winner).
          nohup bash -c "
            sleep 5
            deadline=\$(( \$(date +%s) + 300 ))
            while [[ \$(date +%s) -lt \$deadline ]]; do
              all_jobs_json=\$(gh api 'repos/${REPO}/actions/runs/${RUN_ID}/jobs?per_page=100' 2>/dev/null)
              winner_found=0
              all_eliminated=1
              for check_copy in ${prev_copies}; do
                sibling_name='${SIBLING_BASE}${SIBLING_SEP}'\${check_copy}')'
                sibling_info=\$(echo \"\$all_jobs_json\" | jq -r --arg n \"\${sibling_name}\" '
                  (.jobs[] | select(.name == \$n)) as \$j |
                  (\$j.steps | map(select(.name == \"Run ./.github/actions/speculative-run\")) | first | .conclusion // \"\") as \$g |
                  [\$g, (\$j.status // \"\"), (\$j.conclusion // \"\")] | join(\"|\")
                ' 2>/dev/null | head -1)
                gate_con=\$(echo \"\$sibling_info\" | cut -d'|' -f1)
                job_status=\$(echo \"\$sibling_info\" | cut -d'|' -f2)
                job_con=\$(echo \"\$sibling_info\" | cut -d'|' -f3)
                echo \"[\$(date -u +%H:%M:%S)] \${check_copy}: gate=\${gate_con} job=\${job_status}/\${job_con}\"
                if [[ \"\${gate_con}\" == 'success' && ( \"\${job_status}\" == 'in_progress' || \"\${job_con}\" == 'success' ) ]]; then
                  winner_found=1
                  echo \"Sibling \${check_copy} gate passed and winning — cancelling copy ${MY_COPY}.\"
                  break
                fi
                [[ \"\${gate_con}\" != 'failure' ]] && all_eliminated=0
              done
              if [[ \$winner_found -eq 1 ]]; then
                kill -TERM ${MY_PARENT} 2>/dev/null; sleep 0.1
                new=\$(comm -13 /tmp/speculative-baseline <(pgrep -P ${MY_PARENT} | sort) 2>/dev/null)
                for pid in \$new; do kill -9 \$pid 2>/dev/null; done
                break
              fi
              if [[ \$all_eliminated -eq 1 ]]; then
                echo 'All siblings gate-failed (slow runners) — copy ${MY_COPY} proceeds.'
                break
              fi
              sleep 5
            done
          " >> /tmp/speculative-monitor.log 2>&1 &
          disown
          echo "Monitor started — polling [${prev_copies}] every 5s (gate-aware)."
        else
          echo "Copy ${MY_COPY} is first — no monitor needed."
        fi

        echo "Gate passed."
        exit 0
