name: Speculative Run
description: >
  Checks if the sibling copy of this job already succeeded.
  If so, exits early with success — the sibling's result stands.
  Use at a natural checkpoint (e.g. before the push step) with
  matrix: copy: [a, b] and continue-on-error: true on copy b.

inputs:
  sibling-job-name:
    description: >
      The exact display name of the sibling copy's job.
      e.g. "build-and-push-main (RHACS_BRANDING, amd64, backup)"
      for copy a, or "build-and-push-main (RHACS_BRANDING, amd64)"
      for copy b.
    required: true

outputs:
  sibling-succeeded:
    description: '"true" if sibling already succeeded, "" otherwise'
    value: ${{ steps.check.outputs.sibling_succeeded }}

runs:
  using: composite
  steps:
    - name: Check sibling
      id: check
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        sibling="${{ inputs.sibling-job-name }}"
        run_id="${{ github.run_id }}"
        repo="${{ github.repository }}"

        echo "Checking sibling: ${sibling}"

        # Poll up to 60s for sibling job to appear in the API
        result=""
        for i in $(seq 1 6); do
          result=$(gh api "repos/${repo}/actions/runs/${run_id}/jobs?per_page=100" \
            --jq ".jobs[] | select(.name == \"${sibling}\") | .conclusion" 2>/dev/null || echo "")
          [[ -n "$result" ]] && break
          sleep 10
        done

        echo "Sibling conclusion: '${result}'"

        if [[ "$result" == "success" ]]; then
          echo "Sibling succeeded — exiting early with success."
          echo "sibling_succeeded=true" >> "$GITHUB_OUTPUT"
        else
          echo "Sibling not yet done or did not succeed — continuing."
          echo "sibling_succeeded=" >> "$GITHUB_OUTPUT"
        fi
