name: Speculative Run Gate
description: >
  Gate step for speculative-execution matrix jobs.

  Behaviour per copy:
  - Instant CPU check: slow runner and not last-copy → exit 1 (gate failure,
    next copy sees this and proceeds).
  - Fast runner (or last-copy): start nohup background monitor then proceed.
    Monitor waits 30s (copy b) or 60s (copy c), checks previous sibling's gate:
    - gate=success (sibling is fast, running) → kill -TERM MY_PARENT
      → this job is cancelled, no further steps run. ✅ correct semantics.
    - gate=failure/empty (sibling slow/absent) → do nothing, this copy runs. ✅

inputs:
  copy:
    description: 'This copy letter (a, b, or c)'
    required: true
  last-copy:
    description: 'Unconditional fallback (b for 2-copy, c for 3-copy)'
    required: false
    default: 'b'
  slow-cpu-pattern:
    description: 'CPU substring marking a slow runner'
    required: false
    default: '7763'

runs:
  using: composite
  steps:
    - name: Gate
      id: gate
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        set +e
        MY_COPY="${{ inputs.copy }}"
        LAST_COPY="${{ inputs.last-copy }}"
        SLOW_PATTERN="${{ inputs.slow-cpu-pattern }}"
        RUN_ID="${{ github.run_id }}"
        REPO="${{ github.repository }}"
        MY_PARENT=$PPID

        cpu=$(grep -m1 'model name' /proc/cpuinfo 2>/dev/null | cut -d: -f2 | xargs)
        [[ -z "$cpu" ]] && cpu=$(lscpu 2>/dev/null | awk -F: '/Model name/{gsub(/^ +/,"",$2); print $2}')
        echo "cpu=${cpu:-unknown}"

        # ── 1. Own CPU check ────────────────────────────────────────────────
        if [[ "$MY_COPY" != "$LAST_COPY" && "$cpu" == *"${SLOW_PATTERN}"* ]]; then
          echo "::warning::Slow runner (${cpu}) — delegating to next copy."
          exit 1
        fi

        # ── 2. Background monitor (watches previous sibling's gate) ─────────
        case "$MY_COPY" in
          b) prev_copy="a"; wait_secs=30 ;;
          c) prev_copy="b"; wait_secs=60 ;;
          d) prev_copy="c"; wait_secs=90 ;;
          *)  prev_copy="";  wait_secs=0  ;;
        esac

        if [[ -n "$prev_copy" ]]; then
          # Snapshot current children so we can identify the work step PID later.
          pgrep -P "$MY_PARENT" | sort > /tmp/speculative-baseline

          nohup bash -c "
            sleep ${wait_secs}
            prev_gate=\$(gh api 'repos/${REPO}/actions/runs/${RUN_ID}/jobs?per_page=100' \
              --jq '.jobs[] | select(.name | test(\"[( ,]${prev_copy}[)]\$\")) | .steps[] | select(.name == \"Gate\") | .conclusion' \
              2>/dev/null | grep -v '^\$' | head -1)
            echo \"[\$(date -u +%H:%M:%S)] Sibling ${prev_copy} gate: '\${prev_gate}'\"
            if [[ \"\${prev_gate}\" == 'success' ]]; then
              echo 'Sibling is fast — cancelling this copy.'
              # SIGTERM parent first: runner marks job as cancelled (not failure).
              kill -TERM ${MY_PARENT} 2>/dev/null
              sleep 0.1
              # SIGKILL new children (the work step bash) so they stop immediately.
              new=\$(comm -13 /tmp/speculative-baseline <(pgrep -P ${MY_PARENT} | sort) 2>/dev/null)
              for pid in \$new; do kill -9 \$pid 2>/dev/null; done
            else
              echo 'Sibling was slow or absent — this copy proceeds normally.'
            fi
          " >> /tmp/speculative-monitor.log 2>&1 &
          disown
          echo "Monitor started — watching sibling ${prev_copy} with ${wait_secs}s delay."
        else
          echo "Copy ${MY_COPY} is first — no monitor needed."
        fi

        echo "Gate passed."
        exit 0
