name: Deploy StackRox
description: >
  Deploys StackRox (Central + Sensor) on a Kubernetes cluster.
  Uses roxie (github.com/stackrox/roxie) by default — a single command
  that handles the full deploy lifecycle. Cluster-agnostic: works with
  KinD, GKE, or any cluster kubectl can reach.

  Runs in the background — returns immediately.
  File-based outputs (poll for these):
    /tmp/rox-auth-token     — API auth token (Central API ready)
    /tmp/rox-admin-password — admin password
    /tmp/rox-api-endpoint   — Central API endpoint (host:port)
    /tmp/rox-data-ready     — touched when Sensor reports >5 deployments
    /tmp/deploy.log         — deploy timeline with timestamps

inputs:
  tag:
    description: Image tag to deploy
    required: true
  namespace:
    description: >
      Kubernetes namespace for StackRox deployment. Use unique namespaces
      when sharing a cluster across multiple shards.
    default: stackrox
  cluster-name:
    description: Cluster name as seen by Sensor (test framework expects "remote")
    default: remote
  resources:
    description: Resource sizing preset (ci, small, medium, acs-defaults)
    default: ci
  roxie-version:
    description: roxie release version to install
    default: v0.2.1

runs:
  using: composite
  steps:
    - name: Install roxie
      shell: bash
      run: |
        if command -v roxie >/dev/null 2>&1; then
          echo "roxie already installed: $(roxie version)"
        else
          echo "Installing roxie ${{ inputs.roxie-version }}..."
          ARCH=$(uname -m | sed 's/x86_64/amd64/; s/aarch64/arm64/')
          OS=$(uname -s | tr '[:upper:]' '[:lower:]')
          gh release download "${{ inputs.roxie-version }}" \
            --repo stackrox/roxie \
            --pattern "roxie-${OS}-${ARCH}" \
            --dir /tmp --clobber
          chmod +x "/tmp/roxie-${OS}-${ARCH}"
          sudo mv "/tmp/roxie-${OS}-${ARCH}" /usr/local/bin/roxie
          echo "Installed: $(roxie version)"
        fi

    - name: Deploy StackRox (background)
      shell: bash
      run: |
        ROX_ADMIN_PASSWORD="$(openssl rand -base64 20)"
        echo "::add-mask::${ROX_ADMIN_PASSWORD}"
        echo "${ROX_ADMIN_PASSWORD}" > /tmp/rox-admin-password

        (
          set +e
          T0=$(date +%s)
          ts() { echo "+$(( $(date +%s) - T0 ))s $*"; }

          # Wait for cluster to be reachable
          ts "waiting for cluster..."
          for _ in $(seq 1 120); do
            kubectl cluster-info >/dev/null 2>&1 && break
            sleep 2
          done
          ts "cluster reachable"

          # Write roxie override for cluster name + namespace
          cat > /tmp/roxie-override.yaml << EOF
        securedCluster:
          spec:
            clusterName: ${{ inputs.cluster-name }}
        EOF

          # Deploy with roxie
          ts "roxie deploy starting..."
          export MAIN_IMAGE_TAG="${{ inputs.tag }}"
          export ROX_ADMIN_PASSWORD

          roxie deploy both \
            --resources=${{ inputs.resources }} \
            --single-namespace \
            --exposure=none \
            --deploy-operator=false \
            --central-wait=10m \
            --secured-cluster-wait=10m \
            --override /tmp/roxie-override.yaml \
            --envrc /tmp/roxie-envrc \
            --tag "${{ inputs.tag }}" 2>&1 || {
            # Fallback: roxie might fail with --envrc + --exposure=none
            # In that case, try without --envrc and set up port-forward ourselves
            ts "roxie --envrc failed, retrying with port-forward..."
            roxie deploy both \
              --resources=${{ inputs.resources }} \
              --single-namespace \
              --exposure=none \
              --deploy-operator=false \
              --central-wait=10m \
              --secured-cluster-wait=10m \
              --override /tmp/roxie-override.yaml \
              --tag "${{ inputs.tag }}" \
              --port-forwarding 2>&1 || true
          }
          ts "roxie deploy complete"

          # Set up port-forward if not already done by roxie
          if ! curl -sk --connect-timeout 1 https://localhost:8000/v1/ping >/dev/null 2>&1; then
            NS="${{ inputs.namespace }}"
            while true; do
              kubectl -n "$NS" port-forward svc/central 8000:443 2>/dev/null || sleep 2
            done &
          fi
          API_ENDPOINT="localhost:8000"

          # If roxie wrote an envrc with a remote endpoint, use that instead
          if [ -f /tmp/roxie-envrc ]; then
            source /tmp/roxie-envrc
            API_ENDPOINT="${API_ENDPOINT:-localhost:8000}"
          fi

          # Wait for Central API
          ts "waiting for Central API..."
          for _ in $(seq 1 120); do
            curl -sk --connect-timeout 1 "https://${API_ENDPOINT}/v1/ping" >/dev/null 2>&1 && break
            sleep 1
          done
          ts "Central API ready"

          # Generate auth token
          set +x
          curl -sk -u "admin:${ROX_ADMIN_PASSWORD}" \
            "https://${API_ENDPOINT}/v1/apitokens/generate" \
            -X POST -d '{"name":"ci-test","role":"Admin"}' \
            | jq -r '.token' > /tmp/rox-auth-token
          echo "${API_ENDPOINT}" > /tmp/rox-api-endpoint
          set -x
          ts "auth token written (endpoint: ${API_ENDPOINT})"

          # Wait for sensor data
          for _ in $(seq 1 60); do
            dep_count=$(curl -sk -u "admin:${ROX_ADMIN_PASSWORD}" \
              "https://${API_ENDPOINT}/v1/deploymentscount" 2>/dev/null | jq -r '.count // 0')
            [ "${dep_count:-0}" -gt 5 ] && break
            sleep 3
          done
          touch /tmp/rox-data-ready
          ts "data ready (${dep_count} deployments)"
        ) > /tmp/deploy.log 2>&1 &

        echo "StackRox deploy started in background"
