name: Deploy StackRox
description: >
  Deploys StackRox using roxie. Foreground (default): blocks until
  ready, exports env vars. Background: returns immediately. Wait
  with: wait $(cat /tmp/deploy-stackrox.pid) && source /tmp/roxie-env.sh
  Log: /tmp/deploy-stackrox.log.

inputs:
  tag:
    description: Image tag to deploy
    required: true
  cluster-name:
    description: Cluster name as seen by Sensor
    default: remote
  resources:
    description: Resource sizing preset
    default: small
  roxie-version:
    description: roxie release version
    default: v0.4.0
  github-token:
    description: GitHub token with access to stackrox/roxie
    required: true
  scanner:
    description: "Scanner config: v4 (default), v2, or both"
    default: v4
  registry-username:
    description: Registry username — sets REGISTRY_USERNAME for roxie
    default: ""
  registry-password:
    description: Registry password — sets REGISTRY_PASSWORD for roxie
    default: ""
  exposure:
    description: "Service exposure: auto (default), none, loadbalancer, route"
    default: ""
  central-env:
    description: "Extra env vars for Central (KEY=VALUE,KEY2=VALUE2)"
    default: ""
  scanner-v4-env:
    description: "Extra env vars for scanner-v4-matcher (KEY=VALUE,KEY2=VALUE2)"
    default: ""
  background:
    description: Run deploy in background
    default: "false"

runs:
  using: composite
  steps:
    - name: Install roxctl + roxie
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
      run: |
        set -x
        if ! command -v roxctl >/dev/null 2>&1; then
          docker pull -q --platform linux/amd64 "quay.io/stackrox-io/roxctl:${{ inputs.tag }}"
          cid=$(docker create --platform linux/amd64 "quay.io/stackrox-io/roxctl:${{ inputs.tag }}" true)
          docker cp "$cid:/usr/bin/roxctl" /usr/local/bin/roxctl
          docker rm "$cid" >/dev/null
        fi

        arch=$(uname -m | sed 's/x86_64/amd64/; s/aarch64/arm64/')
        os=$(uname -s | tr '[:upper:]' '[:lower:]')
        gh release download "${{ inputs.roxie-version }}" \
          --repo stackrox/roxie --pattern "roxie-${os}-${arch}" --dir /tmp --clobber
        sudo install "/tmp/roxie-${os}-${arch}" /usr/local/bin/roxie
        roxie version || echo "roxie install failed"

    - name: Deploy StackRox
      shell: bash
      env:
        INPUT_REGISTRY_USERNAME: ${{ inputs.registry-username }}
        INPUT_REGISTRY_PASSWORD: ${{ inputs.registry-password }}
      run: |
        set +x
        if [ -n "$INPUT_REGISTRY_USERNAME" ]; then
          export REGISTRY_USERNAME="$INPUT_REGISTRY_USERNAME"
          export REGISTRY_PASSWORD="$INPUT_REGISTRY_PASSWORD"
        fi
        export ROX_ADMIN_PASSWORD="$(openssl rand -base64 20)"
        echo "::add-mask::${ROX_ADMIN_PASSWORD}"
        echo "${ROX_ADMIN_PASSWORD}" > /tmp/rox-admin-password
        export MAIN_IMAGE_TAG="${{ inputs.tag }}"

        deploy() {
          for _ in $(seq 1 120); do
            kubectl cluster-info && break
            sleep 2
          done

          # Ensure kubeconfig is at the default path for tools that don't honor KUBECONFIG
          if [ -n "${KUBECONFIG:-}" ] && [ ! -f "$HOME/.kube/config" ]; then
            mkdir -p "$HOME/.kube"
            cp "$KUBECONFIG" "$HOME/.kube/config"
          fi

          yq -n ".securedCluster.spec.clusterName = \"${{ inputs.cluster-name }}\"" > /tmp/roxie-override.yaml
          case "${{ inputs.scanner }}" in
            v2)   yq -i '.central.spec.scanner.scannerComponent = "Enabled" | .central.spec.scannerV4.scannerComponent = "Disabled"' /tmp/roxie-override.yaml ;;
            both) yq -i '.central.spec.scanner.scannerComponent = "Enabled"' /tmp/roxie-override.yaml ;;
          esac

          # Apply central env vars to override
          if [ -n "${{ inputs.central-env }}" ]; then
            IFS=',' read -ra PAIRS <<< "${{ inputs.central-env }}"
            for pair in "${PAIRS[@]}"; do
              key="${pair%%=*}"
              val="${pair#*=}"
              echo "Setting Central env: ${key}=${val}"
              yq -i ".central.customize.envVars.${key} = \"${val}\"" /tmp/roxie-override.yaml
            done
          fi

          exposure_flag=""
          if [ -n "${{ inputs.exposure }}" ]; then
            exposure_flag="--exposure=${{ inputs.exposure }}"
          fi

          roxie deploy both \
            --resources=${{ inputs.resources }} \
            --single-namespace \
            --envrc /tmp/roxie-env.sh \
            --override /tmp/roxie-override.yaml \
            --tag ${{ inputs.tag }} \
            $exposure_flag

          sed "s/^export //; s/['\"]//g" /tmp/roxie-env.sh >> "$GITHUB_ENV"
          source /tmp/roxie-env.sh
          echo "$API_ENDPOINT" > /tmp/rox-api-endpoint

          curl -sk -u "admin:${ROX_ADMIN_PASSWORD}" \
            "https://${API_ENDPOINT}/v1/apitokens/generate" \
            -X POST -d '{"name":"ui_tests","role":"Admin"}' \
            | jq -r '.token' > /tmp/rox-auth-token

        }

        if [ "${{ inputs.background }}" = "true" ]; then
          deploy > /tmp/deploy-stackrox.log 2>&1 &
          echo $! > /tmp/deploy-stackrox.pid
        else
          deploy 2>&1 | tee /tmp/deploy-stackrox.log
        fi

    - name: Configure scanner-v4-matcher
      if: inputs.scanner-v4-env
      shell: bash
      run: |
        if ! kubectl -n stackrox get deploy scanner-v4-matcher &>/dev/null; then
          echo "scanner-v4-matcher not found, skipping"
          exit 0
        fi
        IFS=',' read -ra PAIRS <<< "${{ inputs.scanner-v4-env }}"
        env_args=()
        for pair in "${PAIRS[@]}"; do
          echo "Setting scanner-v4-matcher env: ${pair%%=*}"
          env_args+=("$pair")
        done
        kubectl -n stackrox set env deploy/scanner-v4-matcher "${env_args[@]}"
        echo "Waiting for scanner-v4-matcher rollout..."
        kubectl -n stackrox rollout status deploy/scanner-v4-matcher --timeout=5m

    - name: Enable OpenShift console plugin
      shell: bash
      run: |
        # Only run on OpenShift clusters
        if ! kubectl get clusterversion 2>/dev/null | grep -q VERSION; then
          echo "Not an OpenShift cluster, skipping console plugin enablement"
          exit 0
        fi

        # Check if ConsolePlugin resource exists
        if ! kubectl get consoleplugin advanced-cluster-security 2>/dev/null; then
          echo "ConsolePlugin resource not found, skipping"
          exit 0
        fi

        echo "Enabling advanced-cluster-security console plugin"

        # Wait for ConsolePlugin CRD
        kubectl wait --for=condition=Established --timeout=120s \
          crd/consoleplugins.console.openshift.io

        # Enable the plugin in console config (idempotent)
        # Use kubectl instead of oc — GHA runners don't have oc installed
        current_plugins=$(kubectl get console.operator.openshift.io cluster -o jsonpath='{.spec.plugins[*]}' 2>/dev/null || echo "")
        if [[ "$current_plugins" =~ (^|[[:space:]])advanced-cluster-security([[:space:]]|$) ]]; then
          echo "Plugin already enabled"
        else
          echo "Enabling plugin in console config"
          if [[ -z "$current_plugins" || "$current_plugins" == "null" ]]; then
            kubectl patch console.operator.openshift.io cluster --type=merge \
              -p '{"spec":{"plugins":["advanced-cluster-security"]}}'
          else
            kubectl patch console.operator.openshift.io cluster --type=json \
              -p '[{"op": "add", "path": "/spec/plugins/-", "value": "advanced-cluster-security"}]'
          fi

          echo "Waiting for console deployment rollout..."
          kubectl rollout status deployment/console -n openshift-console --timeout=3m || {
            echo "::warning::Console rollout did not complete within 3m"
          }
        fi
