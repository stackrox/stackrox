name: Deploy StackRox
description: >
  Deploys StackRox using roxie. Foreground (default): blocks until
  ready, exports env vars. Background: returns immediately, poll
  /tmp/rox-auth-token then source /tmp/roxie-env.sh.

inputs:
  tag:
    description: Image tag to deploy
    required: true
  cluster-name:
    description: Cluster name as seen by Sensor
    default: remote
  resources:
    description: Resource sizing preset
    default: small
  roxie-version:
    description: roxie release version
    default: v0.2.2-test2
  github-token:
    description: GitHub token with access to stackrox/roxie
    required: true
  quay-user:
    description: Quay.io username
    default: ""
  quay-pass:
    description: Quay.io password
    default: ""
  background:
    description: Run deploy in background
    default: "false"

runs:
  using: composite
  steps:
    - name: Install roxctl
      shell: bash
      env:
        QUAY_USER: ${{ inputs.quay-user }}
        QUAY_PASS: ${{ inputs.quay-pass }}
      run: |
        # roxie needs roxctl for CRS generation (any recent version works)
        command -v roxctl >/dev/null && exit 0
        arch=$(uname -m | sed 's/x86_64/amd64/; s/aarch64/arm64/')
        [ -n "$QUAY_PASS" ] && echo "$QUAY_PASS" | docker login -u "$QUAY_USER" --password-stdin quay.io 2>/dev/null || true
        img="quay.io/rhacs-eng/main:${{ inputs.tag }}"
        docker pull -q --platform "linux/${arch}" "$img" 2>/dev/null || true
        cid=$(docker create --platform "linux/${arch}" "$img" true 2>/dev/null) && \
          docker cp "$cid:/assets/downloads/cli/roxctl-linux-${arch}" /usr/local/bin/roxctl && \
          docker rm "$cid" >/dev/null
        chmod +x /usr/local/bin/roxctl 2>/dev/null || true

    - name: Install roxie
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
      run: |
        arch=$(uname -m | sed 's/x86_64/amd64/; s/aarch64/arm64/')
        os=$(uname -s | tr '[:upper:]' '[:lower:]')
        gh release download "${{ inputs.roxie-version }}" \
          --repo stackrox/roxie --pattern "roxie-${os}-${arch}" --dir /tmp --clobber
        sudo install "/tmp/roxie-${os}-${arch}" /usr/local/bin/roxie

    - name: Deploy StackRox
      shell: bash
      run: |
        set +x
        export ROX_ADMIN_PASSWORD="$(openssl rand -base64 20)"
        echo "::add-mask::${ROX_ADMIN_PASSWORD}"
        export MAIN_IMAGE_TAG="${{ inputs.tag }}"

        deploy() {
          roxie deploy both \
            --resources=${{ inputs.resources }} \
            --single-namespace \
            --envrc /tmp/roxie-env.sh \
            --override <(echo "securedCluster: {spec: {clusterName: ${{ inputs.cluster-name }}}}") \
            --tag ${{ inputs.tag }}

          sed "s/^export //; s/['\"]//g" /tmp/roxie-env.sh >> "$GITHUB_ENV"
          source /tmp/roxie-env.sh

          curl -sk -u "admin:${ROX_ADMIN_PASSWORD}" \
            "https://${API_ENDPOINT}/v1/apitokens/generate" \
            -X POST -d '{"name":"ci-test","role":"Admin"}' \
            | jq -r '.token' > /tmp/rox-auth-token
        }

        if [ "${{ inputs.background }}" = "true" ]; then
          deploy > /tmp/deploy.log 2>&1 &
        else
          deploy
        fi
