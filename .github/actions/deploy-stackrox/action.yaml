name: Deploy StackRox
description: >
  Deploys StackRox using roxie.

  Foreground (default): blocks until ready. Exports API_ENDPOINT,
  ROX_ADMIN_PASSWORD, etc. to GITHUB_ENV for downstream steps.

  Background: returns immediately. Poll for /tmp/rox-auth-token,
  then source /tmp/roxie-env.sh to get the env vars.

inputs:
  tag:
    description: Image tag to deploy
    required: true
  cluster-name:
    description: Cluster name as seen by Sensor
    default: remote
  resources:
    description: Resource sizing preset (acs-defaults, auto, medium, small, ci)
    default: small
  roxie-version:
    description: roxie release version (empty = use whatever is installed)
    default: v0.2.2-test2
  github-token:
    description: GitHub token with access to stackrox/roxie
    required: true
  quay-user:
    description: Quay.io username (for roxctl extraction)
    default: ""
  quay-pass:
    description: Quay.io password
    default: ""
  background:
    description: Return immediately; deploy runs in background
    default: "false"

runs:
  using: composite
  steps:
    - name: Install roxie + roxctl
      shell: bash
      run: |
        if ! command -v roxctl >/dev/null 2>&1; then
          img="quay.io/rhacs-eng/main:${{ inputs.tag }}"
          arch=$(uname -m | sed 's/x86_64/amd64/; s/aarch64/arm64/')
          set +x
          if [ -n "${{ inputs.quay-pass }}" ]; then
            echo "${{ inputs.quay-pass }}" | docker login -u "${{ inputs.quay-user }}" --password-stdin quay.io 2>/dev/null || true
          fi
          docker pull -q --platform "linux/${arch}" "$img" 2>/dev/null || true
          cid=$(docker create --platform "linux/${arch}" "$img" true 2>/dev/null)
          if [ -n "$cid" ]; then
            docker cp "$cid:/assets/downloads/cli/roxctl-linux-${arch}" /usr/local/bin/roxctl
            docker rm "$cid" >/dev/null
          fi
          chmod +x /usr/local/bin/roxctl 2>/dev/null || true
        fi

        arch=$(uname -m | sed 's/x86_64/amd64/; s/aarch64/arm64/')
        os=$(uname -s | tr '[:upper:]' '[:lower:]')
        set +x
        GH_TOKEN="${{ inputs.github-token }}" gh release download "${{ inputs.roxie-version }}" \
          --repo stackrox/roxie \
          --pattern "roxie-${os}-${arch}" \
          --dir /tmp --clobber
        chmod +x "/tmp/roxie-${os}-${arch}"
        sudo mv "/tmp/roxie-${os}-${arch}" /usr/local/bin/roxie
        echo "roxie: $(roxie version)"

    - name: Deploy StackRox
      shell: bash
      run: |
        set +x
        export ROX_ADMIN_PASSWORD="$(openssl rand -base64 20)"
        echo "::add-mask::${ROX_ADMIN_PASSWORD}"
        export MAIN_IMAGE_TAG="${{ inputs.tag }}"

        deploy() {
          roxie deploy both \
            --resources=${{ inputs.resources }} \
            --single-namespace \
            --envrc /tmp/roxie-env.sh \
            --override <(echo "securedCluster: {spec: {clusterName: ${{ inputs.cluster-name }}}}") \
            --tag ${{ inputs.tag }}

          sed "s/^export //; s/['\"]//g" /tmp/roxie-env.sh >> "$GITHUB_ENV"
          source /tmp/roxie-env.sh

          curl -sk -u "admin:${ROX_ADMIN_PASSWORD}" \
            "https://${API_ENDPOINT}/v1/apitokens/generate" \
            -X POST -d '{"name":"ci-test","role":"Admin"}' \
            | jq -r '.token' > /tmp/rox-auth-token
        }

        if [ "${{ inputs.background }}" = "true" ]; then
          deploy > /tmp/deploy.log 2>&1 &
        else
          deploy
        fi
