name: Create KinD cluster with images
description: >
  Creates a KinD cluster, pulls images via ctr, and renders helm charts.
  Runs in the background — returns immediately. The cluster and images
  become available asynchronously. Callers can start dependent actions
  immediately; they should retry kubectl commands until the cluster is ready.

  File-based outputs:
    /tmp/central-chart  — rendered central helm chart (available in ~1s)
    /tmp/sensor-chart   — rendered sensor helm chart (available in ~1s)
    /tmp/kind-ready     — touched when KinD cluster + central-db image ready

inputs:
  cluster-name:
    description: Unique cluster name
    required: true
  tag:
    description: Image tag
    required: true
  registry:
    description: Image registry
    default: quay.io/rhacs-eng
  memory-limit:
    description: Docker container memory cap
    default: 6g
  quay-user:
    description: Quay.io username
    required: true
  quay-pass:
    description: Quay.io password
    required: true

runs:
  using: composite
  steps:
    - name: Create KinD cluster (background)
      shell: bash
      run: |
        set +x
        echo "${{ inputs.quay-pass }}" | docker login -u "${{ inputs.quay-user }}" --password-stdin quay.io
        set -x

        SCANNER_TAG=$(cat SCANNER_VERSION)

        # Render charts immediately (instant, <1s) — available before KinD is ready
        .github/workflows/scripts/render-chart.sh central /tmp/central-chart \
          "${{ inputs.tag }}" "$SCANNER_TAG" "${{ inputs.registry }}"
        .github/workflows/scripts/render-chart.sh sensor /tmp/sensor-chart \
          "${{ inputs.tag }}" "$SCANNER_TAG" "${{ inputs.registry }}"

        (
          NODE="${{ inputs.cluster-name }}-control-plane"
          # Store credentials once — never trace them
          CTR_AUTH="${{ inputs.quay-user }}:${{ inputs.quay-pass }}"

          kind create cluster --name "${{ inputs.cluster-name }}"

          docker update --memory "${{ inputs.memory-limit }}" \
            --memory-swap "${{ inputs.memory-limit }}" "$NODE"

          # Pull central-db first (wait) — eliminates kubelet backoff.
          # Other images pull in background.
          # set +x around ctr pull to prevent --user credentials in trace
          set +x
          docker exec "$NODE" ctr -n k8s.io images pull \
            --user "$CTR_AUTH" --platform linux/amd64 \
            "${{ inputs.registry }}/central-db:${{ inputs.tag }}" &
          PID_CDB=$!
          docker exec "$NODE" ctr -n k8s.io images pull \
            --user "$CTR_AUTH" --platform linux/amd64 \
            "${{ inputs.registry }}/main:${{ inputs.tag }}" &
          docker exec "$NODE" ctr -n k8s.io images pull \
            --user "$CTR_AUTH" --platform linux/amd64 \
            "${{ inputs.registry }}/scanner:${SCANNER_TAG}" &
          docker exec "$NODE" ctr -n k8s.io images pull \
            --user "$CTR_AUTH" --platform linux/amd64 \
            "${{ inputs.registry }}/scanner-db:${SCANNER_TAG}" &
          set -x

          wait $PID_CDB
          touch /tmp/kind-ready
        ) > /tmp/kind-create.log 2>&1 &

        echo "KinD cluster creation started in background"
