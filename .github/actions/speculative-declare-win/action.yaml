name: Speculative Run — Declare Win
description: >
  Marks the winner of a speculative-execution race. Updates the in_progress
  check-run posted by the gate action to completed/success. Call with
  'if: success()' at the end of the job.

  The winning copy calls this; slow/cancelled copies never reach it
  (gate exits 1, or runner is killed by the monitor).

inputs:
  check-name:
    description: >
      Required check name without the copy letter suffix — same value passed
      to the gate action. Used as fallback if no stored check-run ID.
      Example: "pre-build-go-binaries (default, amd64)"
    required: true
  copy:
    description: 'Which copy won (a, b, or c) — used in the summary message only'
    default: 'winner'

runs:
  using: composite
  steps:
    - name: Mark check-run complete
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        echo "Copy '${{ inputs.copy }}' won — completing check '${{ inputs.check-name }}'"
        check_id=$(cat /tmp/speculative-check-id 2>/dev/null | head -1 | tr -d '[:space:]')
        if [[ "$check_id" =~ ^[0-9]+$ ]]; then
          # PATCH the in_progress check-run the gate already posted.
          # This is cleaner than creating a duplicate entry.
          gh api repos/${{ github.repository }}/check-runs/"${check_id}" \
            -X PATCH \
            -f status=completed \
            -f conclusion=success \
            -f "output[title]=Speculative run complete" \
            -f "output[summary]=Copy ${{ inputs.copy }} won." \
            2>&1 || echo "::warning::Failed to update check-run (non-fatal)"
        else
          # Fallback: gate didn't store an ID (disabled, or API hiccup).
          gh api repos/${{ github.repository }}/check-runs \
            -f name="${{ inputs.check-name }}" \
            -f head_sha="${{ github.sha }}" \
            -f status=completed \
            -f conclusion=success \
            -f "output[title]=Speculative run complete" \
            -f "output[summary]=Copy ${{ inputs.copy }} won." \
            2>&1 || echo "::warning::Failed to post check-run (non-fatal)"
        fi
