name: Cache UI Dependencies
description: Cache UI Dependencies
inputs:
  lockFile:
    description: Where the package lock is written
    required: true
    default: "ui/apps/platform/package-lock.json"
runs:
  using: composite
  steps:
    - name: Cache UI Dependencies
      if: github.event_name == 'push' && github.ref_name == github.event.repository.default_branch
      uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # ratchet:actions/cache@v5
      with:
        path: |
          ~/.npm
          ~/.cache/Cypress
          /usr/local/share/.cache
        key: npm-v3-${{ hashFiles(inputs.lockFile) }}

    - name: Restore UI Dependencies
      if: ${{ !(github.event_name == 'push' && github.ref_name == github.event.repository.default_branch) }}
      uses: actions/cache/restore@668228422ae6a00e4ad889ee87cd7109ec5666a7 # ratchet:actions/cache/restore@v5
      with:
        path: |
          ~/.npm
          ~/.cache/Cypress
          /usr/local/share/.cache
        key: npm-v3-${{ hashFiles(inputs.lockFile) }}
        restore-keys: npm-v3-
