name: Cache UI Dependencies
description: Cache node_modules and Cypress binary for UI jobs
inputs:
  lockFile:
    description: Where the package lock is written
    required: false
    default: "ui/apps/platform/package-lock.json"
  working-directory:
    description: Directory containing the UI app
    required: false
    default: "ui/apps/platform"
outputs:
  cache-hit:
    description: Whether the cache was restored (exact match)
    value: ${{ steps.cache.outputs.cache-hit }}
runs:
  using: composite
  steps:
    - name: Cache UI Dependencies
      id: cache
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # ratchet:actions/cache@v5
      with:
        path: |
          ${{ inputs.working-directory }}/node_modules
          ~/.cache/Cypress
        key: ui-deps-v1-${{ github.job }}-${{ hashFiles(inputs.lockFile) }}
        restore-keys: ui-deps-v1-${{ github.job }}-
