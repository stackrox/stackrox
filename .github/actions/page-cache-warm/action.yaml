name: Page Cache Warm
description: |
  Warm and optionally lock the workspace files into the Linux page cache
  to accelerate Go builds and tests. Supports multiple strategies for
  experimentation. Reports cache residency before and after.

inputs:
  mode:
    description: |
      Page cache strategy to use:
        vmtouch-lock  - touch + mlock via vmtouch (needs CAP_IPC_LOCK)
        vmtouch-touch - touch via vmtouch, no lock (works everywhere)
        fadvise       - sequential read of source files into page cache
        copy-tmpfs    - copy workspace to a tmpfs mount, symlink back
        none          - no-op baseline (only reports cache stats)
    required: false
    default: 'vmtouch-touch'
  paths:
    description: |
      Space-separated list of paths to warm (relative to GITHUB_WORKSPACE).
      Default is the entire workspace.
    required: false
    default: '.'

outputs:
  mode-used:
    description: 'The cache strategy that was actually applied'
    value: ${{ steps.warm.outputs.mode_used }}
  pages-resident-before:
    description: 'Pages resident in cache before warming'
    value: ${{ steps.warm.outputs.pages_before }}
  pages-resident-after:
    description: 'Pages resident in cache after warming'
    value: ${{ steps.warm.outputs.pages_after }}

runs:
  using: composite
  steps:
    - name: Install vmtouch
      if: inputs.mode != 'none' && inputs.mode != 'copy-tmpfs' && inputs.mode != 'fadvise'
      shell: bash
      run: |
        if command -v vmtouch &>/dev/null; then
          echo "vmtouch already available"
          exit 0
        fi
        # Build from source — single C file, <1s compile
        tmp="$(mktemp -d)"
        curl -sSfL https://raw.githubusercontent.com/hoytech/vmtouch/master/vmtouch.c -o "$tmp/vmtouch.c"
        gcc -O2 -o "$tmp/vmtouch" "$tmp/vmtouch.c"
        if [ -w /usr/local/bin ]; then
          cp "$tmp/vmtouch" /usr/local/bin/
        else
          sudo cp "$tmp/vmtouch" /usr/local/bin/
        fi
        rm -rf "$tmp"
        echo "vmtouch installed"

    - name: Warm page cache
      id: warm
      shell: bash
      run: |
        set -eo pipefail

        MODE="${{ inputs.mode }}"
        WS="$GITHUB_WORKSPACE"

        # Resolve target paths
        TARGET_DIRS=()
        for p in ${{ inputs.paths }}; do
          [[ "$p" = /* ]] && TARGET_DIRS+=("$p") || TARGET_DIRS+=("$WS/$p")
        done

        in_container=false
        [ -f /.dockerenv ] && in_container=true

        echo "::group::Page cache experiment"
        echo "Mode:         $MODE"
        echo "Workspace:    $WS"
        echo "In container: $in_container"

        # --- Measure "before" ---
        pages_before="unknown"
        if command -v vmtouch &>/dev/null; then
          before_out=$(vmtouch "${TARGET_DIRS[@]}" 2>/dev/null || true)
          pages_before=$(echo "$before_out" | grep -o '[0-9]*/[0-9]*' | head -1 || echo "unknown")
          echo ""
          echo "$before_out" | tail -5
          echo "Pages resident before: $pages_before"
        fi
        echo ""

        # --- Apply strategy ---
        mode_used="$MODE"
        start_ns=$(date +%s%N)

        case "$MODE" in
          vmtouch-lock)
            echo "Strategy: vmtouch touch + mlock (daemon mode)"
            # -t touches all pages into cache, -l locks them, -d daemonizes
            if vmtouch -tld "${TARGET_DIRS[@]}" 2>/dev/null; then
              echo "vmtouch touch+lock succeeded (daemon running)"
            else
              echo "::warning::vmtouch -tl failed (likely missing CAP_IPC_LOCK), falling back to touch-only"
              vmtouch -t "${TARGET_DIRS[@]}" 2>/dev/null || true
              mode_used="vmtouch-touch (fallback from lock)"
            fi
            ;;

          vmtouch-touch)
            echo "Strategy: vmtouch touch (no lock)"
            vmtouch -t "${TARGET_DIRS[@]}" 2>/dev/null || {
              echo "::warning::vmtouch -t failed, falling back to fadvise"
              find "${TARGET_DIRS[@]}" -type f -exec cat {} + > /dev/null 2>&1 || true
              mode_used="fadvise (fallback)"
            }
            ;;

          fadvise)
            echo "Strategy: read all source files to populate page cache"
            find "${TARGET_DIRS[@]}" -type f \( \
              -name '*.go' -o -name '*.sum' -o -name '*.mod' -o \
              -name '*.s' -o -name '*.c' -o -name '*.h' \
            \) -exec cat {} + > /dev/null 2>&1 || true
            ;;

          copy-tmpfs)
            echo "Strategy: copy workspace to tmpfs mount + symlink back"
            # Use a dedicated tmpfs mount (not /dev/shm which may have noexec)
            TMPFS_DIR="/tmp/tmpfs-workspace"
            if [ "$in_container" = true ]; then
              # In containers, may not have mount privileges — fall back to /dev/shm
              # but remount with exec if possible
              TMPFS_DIR="/dev/shm/stackrox"
              mount -o remount,exec /dev/shm 2>/dev/null || true
            else
              sudo mkdir -p "$TMPFS_DIR"
              sudo mount -t tmpfs -o size=4G,exec tmpfs "$TMPFS_DIR"
              sudo chown "$(id -u):$(id -g)" "$TMPFS_DIR"
            fi

            src_mb=$(du -sm "$WS" 2>/dev/null | cut -f1 || echo 0)
            avail_mb=$(df -BM --output=avail "$TMPFS_DIR" 2>/dev/null | tail -1 | tr -d ' M')
            echo "Workspace: ${src_mb}MB, tmpfs available: ${avail_mb}MB"

            if [ "${avail_mb:-0}" -gt "$((src_mb + 200))" ]; then
              cp -a "$WS/." "$TMPFS_DIR/"
              if [ "$in_container" = true ]; then
                # Container: keep .github/ real (host needs it for action resolution)
                find "$WS" -maxdepth 1 -mindepth 1 ! -name .github -exec rm -rf {} +
              else
                find "$WS" -maxdepth 1 -mindepth 1 -exec rm -rf {} +
              fi
              for item in "$TMPFS_DIR"/* "$TMPFS_DIR"/.*; do
                name="$(basename "$item")"
                case "$name" in .|..) continue ;; esac
                [ "$in_container" = true ] && [ "$name" = ".github" ] && continue
                ln -s "$item" "$WS/$name"
              done
              git config --global --add safe.directory "$TMPFS_DIR"
              echo "Workspace moved to tmpfs (${src_mb}MB)"
            else
              echo "::warning::tmpfs too small (${avail_mb}MB avail, need $((src_mb + 200))MB)"
              mode_used="copy-tmpfs (skipped - insufficient space)"
            fi
            ;;

          none)
            echo "Strategy: none (baseline)"
            ;;

          *)
            echo "::error::Unknown page-cache mode: $MODE"
            exit 1
            ;;
        esac

        end_ns=$(date +%s%N)
        elapsed_ms=$(( (end_ns - start_ns) / 1000000 ))
        echo ""
        echo "Cache warming took ${elapsed_ms}ms"

        # --- Measure "after" ---
        pages_after="unknown"
        if command -v vmtouch &>/dev/null; then
          after_out=$(vmtouch "${TARGET_DIRS[@]}" 2>/dev/null || true)
          pages_after=$(echo "$after_out" | grep -o '[0-9]*/[0-9]*' | head -1 || echo "unknown")
          echo "$after_out" | tail -5
          echo "Pages resident after: $pages_after"
        fi

        echo "::endgroup::"

        # --- Step Summary ---
        {
          echo "### Page Cache Warm Results"
          echo "| Key | Value |"
          echo "|-----|-------|"
          echo "| Mode | \`${mode_used}\` |"
          echo "| Container | \`${in_container}\` |"
          echo "| Pages before | \`${pages_before}\` |"
          echo "| Pages after | \`${pages_after}\` |"
          echo "| Warm time | \`${elapsed_ms}ms\` |"
        } >> "$GITHUB_STEP_SUMMARY"

        # --- Outputs ---
        {
          echo "mode_used=${mode_used}"
          echo "pages_before=${pages_before}"
          echo "pages_after=${pages_after}"
        } >> "$GITHUB_OUTPUT"
