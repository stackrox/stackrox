name: 'junit2jira'
description: 'Convert test failures into Jira tickets'
branding:
  icon: 'archive'
  color: 'blue'
inputs:
  create-jiras:
    description: 'Whether to report failures to Jira'
    required: false
    default: 'true'
  gcp-account:
    description: 'Account to be used to upload tests data'
    required: true
  jira-token:
    description: 'Token used to authenticate with Jira.'
    required: true
  directory:
    description: 'Directory with Junit XML files.'
    required: true
  threshold:
    description: 'Minimal number of failed issues that will result in reporting a single cumulative Jira issue.'
    required: false
    default: '5'
outputs:
  new-jiras:
    description: 'Bool indicating if new issues were found'
    value: ${{ steps.run.outputs.NEW_JIRAS }}
runs:
  using: "composite"
  steps:
  - name: Download junit2jira
    shell: bash
    env:
      VERSION: "v0.0.25"
    run: |
      set -u
      LOCATION="https://github.com/stackrox/junit2jira/releases/download/$VERSION/junit2jira"
      # Skip downloading release if downloaded already, e.g. when the action is used multiple times.
      if [[ ! -x junit2jira ]]; then
        curl --retry 5 --retry-connrefused --silent --show-error --fail --location --output junit2jira "$LOCATION"
        chmod +x junit2jira
      fi
  - name: Capture job failure as JUnit if no test failures exist
    shell: bash
    if: always()
    run: |
      set -u

      source scripts/ci/lib.sh
      export ARTIFACT_DIR="${{ inputs.directory }}"

      if [[ "${{ job.status }}" != "failure" ]]; then
        echo "Job status: ${{ job.status }} - no failure record needed"
        exit 0
      fi

      if junit_contains_failure "${{ inputs.directory }}"; then
        echo "JUnit test failures already exist - skipping failure record"
        exit 0
      fi

      echo "Job failed but no JUnit test failures found - looking for failed step"

      # Steps context only includes steps with explicit id attribute
      failed_step=$(echo '${{ toJSON(steps) }}' | jq -r 'to_entries[] | select(.value.outcome == "failure") | .key' | head -1)

      if [[ -n "$failed_step" ]]; then
        step_outcome=$(echo '${{ toJSON(steps) }}' | jq -r ".[\"$failed_step\"].outcome")
        step_conclusion=$(echo '${{ toJSON(steps) }}' | jq -r ".[\"$failed_step\"].conclusion")

        failure_details="Step failed during workflow execution.
Outcome: ${step_outcome}
Conclusion: ${step_conclusion}

Check workflow logs for details: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

        save_junit_failure "${{ github.job }}" "$failed_step" "$failure_details"
        echo "Created JUnit failure record for step: $failed_step"
        exit 0
      fi

      # Fallback for steps without id (e.g., docker login, built-in setup steps)
      save_junit_failure \
        "${{ github.job }}" \
        "error" \
        "Job failed without producing JUnit test failures. This typically indicates an infrastructure failure in a step without an id (e.g., docker login, setup step, artifact download). Check workflow logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

      echo "Created generic JUnit failure record for job: ${{ github.job }}"
  - name: Check files
    id: run
    shell: bash
    env:
      GCP_SERVICE_ACCOUNT_STACKROX_CI: ${{ inputs.gcp-account }}
      JIRA_TOKEN: ${{ inputs.jira-token }}
    if: "${{ env.GCP_SERVICE_ACCOUNT_STACKROX_CI != '' || env.JIRA_TOKEN != '' }}"
    run: |
      extra_args=()
      if [[ "${{ inputs.create-jiras }}" == "false" ]]; then
        extra_args=(--dry-run)
      else
        echo "Will create JIRA issues for JUnit failures found in ${{ inputs.directory }}"
      fi
      csv_output="$(mktemp --suffix=.csv)"
      summary_file="$(mktemp --suffix=.json)"
      ./junit2jira \
          -base-link "${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}" \
          -build-id "${{ github.run_id }}"  \
          -build-link "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
          -build-tag "${{ github.ref_name }}@${{ github.sha }}" \
          -csv-output "${csv_output}" \
          -job-name "${{ github.job }}" \
          -junit-reports-dir "${{ inputs.directory }}" \
          -orchestrator "${{ runner.name }} ${{ runner.os }}-${{ runner.arch }}" \
          -threshold "${{ inputs.threshold }}" \
          -summary-output "${summary_file}" \
          "${extra_args[@]}"

      echo "NEW_JIRAS=$(jq -r '.newJIRAs > 0' "${summary_file}")" >> "$GITHUB_OUTPUT"

      source scripts/ci/lib.sh
      setup_gcp
      save_test_metrics "${csv_output}"
