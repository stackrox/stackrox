name: Create GKE cluster
description: >
  Creates a GKE cluster via scripts/ci/gke.sh with image pull secrets.
  Supports spot VMs for cost savings. Use with deploy-stackrox action
  for a complete StackRox deployment.

inputs:
  cluster-name:
    description: Unique cluster identifier (used as GKE cluster name suffix)
    required: true
  tag:
    description: Main image tag
    required: true
  registry:
    description: Image registry
    default: quay.io/stackrox-io
  num-nodes:
    description: Number of GKE nodes
    default: "3"
  machine-type:
    description: GKE machine type
    default: e2-standard-8
  gcp-account:
    description: GCP service account JSON
    required: true
  quay-user:
    description: Quay.io username (for image pull secrets)
    required: true
  quay-pass:
    description: Quay.io password
    required: true
  spot:
    description: Use spot (preemptible) VMs for cost savings
    default: "true"

outputs:
  cluster-name:
    description: Actual GKE cluster name (may be truncated from input)
    value: ${{ steps.create.outputs.cluster-name }}
  zone:
    description: GKE zone where cluster was created
    value: ${{ steps.create.outputs.zone }}

runs:
  using: composite
  steps:
    - name: Auth gcloud
      uses: 'google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093' # ratchet:google-github-actions/auth@v3
      with:
        credentials_json: ${{ inputs.gcp-account }}
        export_environment_variables: true
        create_credentials_file: true

    - name: Setup gcloud CLI
      uses: 'google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db' # ratchet:google-github-actions/setup-gcloud@v3
      with:
        install_components: "gke-gcloud-auth-plugin,beta"

    - name: Create GKE cluster
      id: create
      shell: bash
      env:
        USE_GKE_GCLOUD_AUTH_PLUGIN: "True"
        MACHINE_TYPE: ${{ inputs.machine-type }}
        NUM_NODES: ${{ inputs.num-nodes }}
        GKE_SPOT: ${{ inputs.spot }}
      run: |
        source scripts/ci/gke.sh
        provision_gke_cluster "${{ inputs.cluster-name }}"
        echo "CLUSTER_NAME=${CLUSTER_NAME}" >> "$GITHUB_ENV"
        echo "ZONE=${ZONE}" >> "$GITHUB_ENV"
        echo "cluster-name=${CLUSTER_NAME}" >> "$GITHUB_OUTPUT"
        echo "zone=${ZONE}" >> "$GITHUB_OUTPUT"

    - name: Wait for cluster
      shell: bash
      run: |
        source scripts/ci/gke.sh
        wait_for_cluster

    - name: Create image pull secret
      shell: bash
      run: |
        set +x
        kubectl create namespace stackrox 2>/dev/null || true
        kubectl -n stackrox create secret docker-registry quay-pull-secret \
          --docker-server=quay.io \
          --docker-username="${{ inputs.quay-user }}" \
          --docker-password="${{ inputs.quay-pass }}" 2>/dev/null || true
        set -x

    - name: Register GKE cluster cleanup
      uses: gacts/run-and-post-run@598d7a875d5620e0457490555b5e18e46082aa47 # v1.4.0
      with:
        shell: bash
        run: echo "GKE cluster cleanup registered"
        post: >
          gcloud container clusters delete
          "${{ steps.create.outputs.cluster-name }}"
          --zone "${{ steps.create.outputs.zone }}"
          --project acs-san-stackroxci
          --quiet --async || true;
