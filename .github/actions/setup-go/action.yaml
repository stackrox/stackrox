name: Setup Go and Cache
description: >
  Wraps actions/setup-go with our GOCACHE management: per-job cache
  keys, stale-entry trimming, and mtime stabilization for test caching.
inputs:
  save:
    description: Whether this job saves caches on pushes to the default branch.
    required: false
    default: 'true'
  key-suffix:
    description: Extra suffix for cache keys (use to distinguish matrix entries that share github.job).
    required: false
    default: ''
runs:
  using: composite
  steps:
    # Use actions/setup-go for Go installation. We override two defaults:
    #
    # Problems with actions/setup-go defaults:
    #   - Sets GOTOOLCHAIN=local, which prevents sub-module tools from
    #     auto-downloading their required Go versions.
    #   - Caches GOCACHE with a single key shared across all jobs.
    #     Different jobs (unit tests, postgres tests, style) write
    #     incompatible entries into the same cache, and it grows
    #     unbounded because setup-go never trims stale entries.
    #   - Reads the `go` directive instead of `toolchain`, so it
    #     installs the minimum language version (e.g. 1.25.0) even
    #     when go.mod specifies a newer build version via `toolchain`.
    #
    # What this action does instead:
    #   - Overrides GOTOOLCHAIN to auto so sub-modules can resolve
    #     their own toolchain requirements.
    #   - Manages GOCACHE with per-job keys (via key-suffix input)
    #     and trims stale entries in a post-step before cache save.
    #   - Delegates version selection to actions/setup-go (reads
    #     go.mod via go-version-file). Note: setup-go reads the `go`
    #     directive, not `toolchain` — see actions/setup-go#480.
    - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # ratchet:actions/setup-go@v5
      with:
        go-version-file: go.mod
        cache: false

    - name: Override GOTOOLCHAIN
      run: echo "GOTOOLCHAIN=auto" >> "$GITHUB_ENV"
      shell: bash

    - name: Register Go problem matchers
      run: echo "::add-matcher::${GITHUB_ACTION_PATH}/matchers.json"
      shell: bash

    - name: Determine Go cache paths
      id: cache-paths
      run: |
        echo "GOCACHE=$(go env GOCACHE)" >> "$GITHUB_OUTPUT"
        echo "GOARCH=$(go env GOARCH)" >> "$GITHUB_OUTPUT"
        echo "TAG=${{ github.sha }}" >> "$GITHUB_OUTPUT"
        echo "GOMOD_HASH=$(sha256sum go.mod | cut -c1-16)" >> "$GITHUB_OUTPUT"
        suffix="${{ inputs.key-suffix }}"
        echo "KEY_SUFFIX=${suffix:+-$suffix}" >> "$GITHUB_OUTPUT"
      shell: bash

    - name: Cache Go Build (save)
      if: inputs.save == 'true' && (github.event_name == 'push' && github.ref_name == github.event.repository.default_branch)
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # ratchet:actions/cache@v5
      with:
        path: ${{ steps.cache-paths.outputs.GOCACHE }}
        key: go-build-v2-${{ github.job }}${{ steps.cache-paths.outputs.KEY_SUFFIX }}-${{ steps.cache-paths.outputs.GOARCH }}-${{ steps.cache-paths.outputs.GOMOD_HASH }}-${{ steps.cache-paths.outputs.TAG }}
        restore-keys: go-build-v2-${{ github.job }}${{ steps.cache-paths.outputs.KEY_SUFFIX }}-${{ steps.cache-paths.outputs.GOARCH }}-${{ steps.cache-paths.outputs.GOMOD_HASH }}-

    - name: Cache Go Build (restore)
      if: ${{ !(inputs.save == 'true' && (github.event_name == 'push' && github.ref_name == github.event.repository.default_branch)) }}
      uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # ratchet:actions/cache/restore@v5
      with:
        path: ${{ steps.cache-paths.outputs.GOCACHE }}
        key: go-build-v2-${{ github.job }}${{ steps.cache-paths.outputs.KEY_SUFFIX }}-${{ steps.cache-paths.outputs.GOARCH }}-${{ steps.cache-paths.outputs.GOMOD_HASH }}-${{ steps.cache-paths.outputs.TAG }}
        restore-keys: go-build-v2-${{ github.job }}${{ steps.cache-paths.outputs.KEY_SUFFIX }}-${{ steps.cache-paths.outputs.GOARCH }}-${{ steps.cache-paths.outputs.GOMOD_HASH }}-

    - name: Mark GOCACHE entries for stale detection
      run: |
        gocache="${{ steps.cache-paths.outputs.GOCACHE }}"
        if [[ -d "$gocache" ]]; then
          timeout 120 find "$gocache" -type f -exec touch -t 200001010000 {} + || true
          echo "$(date +%s)" > "$gocache/trim.txt"
          echo "Marked GOCACHE entries for stale detection"
        fi
      shell: bash

    # Registered AFTER cache steps so the post-step runs BEFORE cache save
    # (GHA runs post-steps in reverse registration order).
    - name: Trim stale GOCACHE entries (post-step)
      uses: gacts/run-and-post-run@598d7a875d5620e0457490555b5e18e46082aa47 # v1.4.0
      with:
        post: >
          set +e;
          gocache="$(go env GOCACHE)";
          [[ -d "$gocache" ]] && [[ -f "$gocache/trim.txt" ]] || { echo "Skipping GOCACHE trim"; exit 0; };
          before=$(du -sm "$gocache" 2>/dev/null | cut -f1);
          cutoff=$(mktemp); touch -t 200001020000 "$cutoff";
          find "$gocache" -type f ! -newer "$cutoff" -delete 2>/dev/null || true;
          rm -f "$cutoff";
          find "$gocache" -mindepth 1 -type d -empty -delete 2>/dev/null || true;
          after=$(du -sm "$gocache" 2>/dev/null | cut -f1);
          echo "GOCACHE trimmed: ${before:-0}MB -> ${after:-0}MB (removed $((${before:-0} - ${after:-0}))MB)"

    - name: Clear test cache on non-PR runs
      if: github.event_name != 'pull_request'
      run: |
        go clean -testcache
        echo "Cleared test cache for fresh run"
      shell: bash

    - name: Stabilize file mtimes for Go test cache
      run: |
        git ls-files | xargs touch -t 200101010000
        git ls-files | sed 's|/[^/]*$||' | sort -u | xargs touch -t 200101010000
      shell: bash
