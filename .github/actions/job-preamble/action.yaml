name: Job Preamble
description: Common steps for most jobs
inputs:
  free-disk-space:
    description: 'Free disk space desired in GB (2025-06 ubuntu-24.04 runner starts with 20GB free and we can delete and reach 40GB)'
    required: false
    default: 25
  gcp-account:
    description: 'Account to be used to upload tests data'
    required: true
runs:
  using: composite
  steps:
    # auth prepares the gcp environment to authenticate.
    - name: Auth gcloud
      # Skip for external contributions.
      if: |
        ( github.event_name == 'push' || !github.event.pull_request.head.repo.fork ) && inputs.gcp-account != ''
      uses: 'google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093' # ratchet:google-github-actions/auth@v3
      with:
        credentials_json: '${{ inputs.gcp-account }}'
        export_environment_variables: true
        create_credentials_file: true
        cleanup_credentials: true

    - name: Check gcloud CLI
      id: gcloud-check
      continue-on-error: true
      shell: bash
      run: |
        which gcloud

    # setup-gcloud authenticates gcloud
    - name: Install gcloud CLI
      uses: 'google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db' # ratchet:google-github-actions/setup-gcloud@v3.0.1
      with:
        skip_install: ${{ steps.gcloud-check.outcome != 'failure' }}

    - name: Shim gsutil as gcloud storage
      continue-on-error: true
      shell: bash
      run: |
        tee -a ~/.boto <<EOF
        [GSUtil]
        use_gcloud_storage=True
        EOF

    - name: Check disk space
      id: disk-check
      continue-on-error: true
      shell: bash
      run: |
        free=$(df -BGB --output=avail / | tail -1)
        echo "free=${free}" | tee -a "$GITHUB_OUTPUT"
        if [[ ${free%GB} -ge "${{ inputs.free-disk-space }}" ]]; then
          echo "Reached requested free disk space ${{ inputs.free-disk-space }} [${free} free]."
          exit 0
        else
          df --si
          exit 1
        fi

    - name: Free disk space (delete unused tools)
      id: delete-unused-tools
      if: steps.disk-check.outcome == 'failure'
      continue-on-error: true
      shell: bash
      run: |
        # delete preinstalled unused tools
        cleanup=(
          # non-container jobs are first priority (every second may be a high % of the total)
          /usr/share/dotnet
          /usr/share/miniconda
          /usr/share/swift
          /usr/share/kotlinc
          /opt/ghc
          /opt/hostedtoolcache/CodeQL
          /opt/hostedtoolcache/Ruby
          /opt/az
          /usr/local/lib/android
          # container jobs are lower priority: they are already slowed by container image pulls
          /__t/CodeQL
          /__t/Ruby
          /__t/PyPy
          /__t/Python
          /__t/go
          /__t/node
          /__t/gcloud
        )
        for d in "${cleanup[@]}"; do
          if [[ -d "$d" ]]; then
            rm -rf -- "$d" && echo "deleted $d"
          elif [[ -d "/mnt${d}" ]]; then
            rm -rf -- "/mnt${d}" && echo "deleted /mnt${d}"
          else
            echo "$d not found"
            continue
          fi
          free=$(df -BGB --output=avail / | tail -1)
          if [[ ${free%GB} -ge "${{ inputs.free-disk-space }}" ]]; then
            echo "Reached requested free disk space ${{ inputs.free-disk-space }} [${free} free]."
            exit 0
          fi
        done
        echo "Failed to free requested disk space, ${{ inputs.free-disk-space }} [${free} free]."
        exit 1

    - name: Free more disk space (docker system prune)
      id: delete-docker-cache
      if: steps.delete-unused-tools.outcome == 'failure'
      continue-on-error: true
      shell: bash
      run: |
        printf 'Docker prune: '
        docker system prune --force --all

    - name: Verify free disk space
      id: disk-check-cleaned
      if: steps.disk-check.outcome == 'failure'
      continue-on-error: true
      shell: bash
      run: |
        free=$(df -BGB --output=avail / | tail -1)
        echo "free=${free}" | tee -a "$GITHUB_OUTPUT"
        if [[ ${free%GB} -lt "${{ inputs.free-disk-space }}" ]]; then
          echo "Failed to free requested disk space, ${{ inputs.free-disk-space }} [${free} free]." \
            | tee -a "$GITHUB_STEP_SUMMARY"
          if [[ ! -d /opt/hostedtoolcache && ! -d /mnt/opt/hostedtoolcache && ! -d /mnt/usr/local ]]; then
            printf 'For container workflows, you can mount the host /usr and /opt to allow deleting more unused tools:\n```\nvolumes:\n\t- /usr:/mnt/usr\n\t- /opt:/mnt/opt\n```' \
              | tee -a "$GITHUB_STEP_SUMMARY"
          fi
          df --si /
          exit 1
        fi

    - name: Runner performance snapshot
      continue-on-error: true
      shell: bash
      run: |
        echo "::group::Runner performance snapshot"
        echo "runner_name=${RUNNER_NAME:-unknown}"
        echo "runner_os=${RUNNER_OS:-unknown}"
        echo "runner_image=${ImageOS:-unknown}-${ImageVersion:-unknown}"
        echo "kernel=$(uname -r 2>/dev/null)"
        echo "cpu_model=$(grep -m1 'model name' /proc/cpuinfo 2>/dev/null | cut -d: -f2 | xargs)"
        echo "cpu_cores=$(nproc 2>/dev/null)"
        echo "cpu_l3_cache=$(lscpu 2>/dev/null | awk -F: '/L3 cache/{gsub(/^ +/,"",$2); print $2}')"
        echo "numa_nodes=$(lscpu 2>/dev/null | awk -F: '/NUMA node\(s\)/{gsub(/^ +/,"",$2); print $2}')"
        echo "mem_total_mb=$(awk '/MemTotal/{printf "%d", $2/1024}' /proc/meminfo 2>/dev/null)"
        echo "mem_avail_mb=$(awk '/MemAvailable/{printf "%d", $2/1024}' /proc/meminfo 2>/dev/null)"

        # Disk topology and per-disk IOPS
        echo "--- disk_topology ---"
        df -hT | grep -v tmpfs | grep -v devtmpfs | grep -v squashfs
        echo "--- disk_devices ---"
        lsblk -o NAME,SIZE,TYPE,MOUNTPOINT,ROTA,MODEL 2>/dev/null || true

        sudo apt-get -qq install -y fio >/dev/null 2>&1 || true
        for test_dir in /tmp /mnt; do
          if [[ ! -d "$test_dir" ]] || ! touch "$test_dir/.bench_test" 2>/dev/null; then continue; fi
          rm -f "$test_dir/.bench_test"
          fs_type=$(df -T "$test_dir" 2>/dev/null | awk 'NR==2{print $2}')
          if [[ "$fs_type" == tmpfs || "$fs_type" == devtmpfs ]]; then continue; fi
          dev=$(df "$test_dir" 2>/dev/null | awk 'NR==2{print $1}')
          label="${test_dir##*/}"
          if [[ -z "$label" ]]; then label="root"; fi

          # Sequential write (drop oflag=direct — not supported on all fs)
          dw=$(dd if=/dev/zero of="$test_dir/.bench_dd" bs=1M count=256 conv=fdatasync 2>&1 | tail -1) || true
          rm -f "$test_dir/.bench_dd"
          echo "disk_${label}_seq_write=${dw}"

          # Disk IOPS: random write with fsync, random read, sequential read (2s each)
          if command -v fio >/dev/null 2>&1; then
            # Random 4K write with fsync (models Postgres commits)
            fio_out=$(fio --name=randwr --rw=randwrite --bs=4k --size=32M --runtime=2 --time_based \
              --fsync=1 --filename="$test_dir/.bench_fio" --output-format=json 2>/dev/null) || true
            iops=$(echo "$fio_out" | python3 -c "import json,sys; print(int(json.load(sys.stdin)['jobs'][0]['write']['iops']))" 2>/dev/null || echo "?")
            lat=$(echo "$fio_out" | python3 -c "import json,sys; j=json.load(sys.stdin)['jobs'][0]['sync']; print(f'avg={j[\"lat_ns\"][\"mean\"]/1e6:.1f}ms p99={j[\"lat_ns\"][\"percentile\"][\"99.000000\"]/1e6:.1f}ms')" 2>/dev/null || echo "?")
            echo "disk_${label}_fsync_write_iops=${iops}"
            echo "disk_${label}_fsync_write_latency=${lat}"

            # Random 4K read (models Go compiler reading .a files, source files)
            fio_out=$(fio --name=randrd --rw=randread --bs=4k --size=32M --runtime=2 --time_based \
              --filename="$test_dir/.bench_fio" --output-format=json 2>/dev/null) || true
            iops=$(echo "$fio_out" | python3 -c "import json,sys; print(int(json.load(sys.stdin)['jobs'][0]['read']['iops']))" 2>/dev/null || echo "?")
            echo "disk_${label}_rand_read_iops=${iops}"

            # Sequential read (models cache restore, large file reads)
            fio_out=$(fio --name=seqrd --rw=read --bs=1M --size=256M --runtime=2 --time_based \
              --filename="$test_dir/.bench_fio" --output-format=json 2>/dev/null) || true
            bw=$(echo "$fio_out" | python3 -c "import json,sys; print(int(json.load(sys.stdin)['jobs'][0]['read']['bw_bytes']/1048576))" 2>/dev/null || echo "?")
            echo "disk_${label}_seq_read_mbs=${bw}"

            rm -f "$test_dir/.bench_fio"
          fi
        done

        # Memory bandwidth (sysbench gives precise MB/s, falls back to dd)
        if command -v sysbench >/dev/null 2>&1 || sudo apt-get -qq install -y sysbench >/dev/null 2>&1; then
          mem_rd=$(sysbench memory --memory-block-size=1M --memory-total-size=2G --memory-oper=read run 2>/dev/null | awk '/transferred/{print $4}')
          mem_wr=$(sysbench memory --memory-block-size=1M --memory-total-size=2G --memory-oper=write run 2>/dev/null | awk '/transferred/{print $4}')
          echo "mem_read_mbs=${mem_rd}"
          echo "mem_write_mbs=${mem_wr}"
        else
          mem_bw=$(dd if=/dev/zero of=/dev/shm/.bench bs=1M count=512 2>&1 | tail -1)
          rm -f /dev/shm/.bench
          echo "mem_bandwidth=${mem_bw}"
        fi

        # CPU: single-thread and all-core (sysbench prime check — ~1s each)
        if command -v sysbench >/dev/null 2>&1; then
          cpu_1t=$(sysbench cpu --cpu-max-prime=10000 --threads=1 run 2>/dev/null | awk '/events per second/{print $NF}')
          cpu_mt=$(sysbench cpu --cpu-max-prime=10000 --threads=$(nproc) run 2>/dev/null | awk '/events per second/{print $NF}')
          echo "cpu_single_thread_score=${cpu_1t}"
          echo "cpu_multi_thread_score=${cpu_mt}"
        fi

        # Network latency
        gh_lat=$(curl -so /dev/null -w '%{time_total}' https://api.github.com 2>/dev/null)
        az_lat=$(curl -so /dev/null -w '%{time_total}' https://pipelines.actions.githubusercontent.com 2>/dev/null)
        echo "net_github_api_secs=${gh_lat}"
        echo "net_actions_svc_secs=${az_lat}"

        # Network bandwidth: GHA-internal (Azure blob — same infra as cache service)
        # and public internet, measured via 10MB download
        gha_bw=$(curl -so /dev/null -w '%{speed_download}' \
          "https://github.com/actions/runner/releases/download/v2.334.0/actions-runner-linux-x64-2.334.0.tar.gz" 2>/dev/null)
        gha_bw_mbs=$(python3 -c "print(f'{${gha_bw:-0}/1048576:.1f}')" 2>/dev/null || echo "?")
        echo "net_gha_download_mbs=${gha_bw_mbs}"

        inet_bw=$(curl -so /dev/null -w '%{speed_download}' \
          "https://speed.cloudflare.com/__down?bytes=10000000" 2>/dev/null)
        inet_bw_mbs=$(python3 -c "print(f'{${inet_bw:-0}/1048576:.1f}')" 2>/dev/null || echo "?")
        echo "net_internet_download_mbs=${inet_bw_mbs}"

        echo "::endgroup::"

    - name: Ignore dubious repository ownership
      run: |
        # Prevent fatal error "detected dubious ownership in repository" from recent git.
        git config --global --add safe.directory "$(pwd)"
      shell: bash

    - name: Monitor runner resources
      shell: bash
      run: |
        (
          prev_iow=0
          while true; do
            ts=$(date -u +%H:%M:%S)
            cpu=$(top -bn1 2>/dev/null | awk '/^%Cpu/{printf "%.0f", 100-$8}' || echo 0)
            mem=$(free -m 2>/dev/null | awk '/^Mem:/{printf "%d/%dMB(%.0f%%)", $3, $2, $3/$2*100}' || echo "?")
            disk=$(df -BGB --output=avail / 2>/dev/null | tail -1 | tr -d ' ' || echo "?")
            cur_iow=$(awk '{print $5}' /proc/stat 2>/dev/null | head -1)
            iow_delta=$((cur_iow - prev_iow))
            prev_iow=$cur_iow
            echo "${ts} cpu=${cpu}% mem=${mem} disk=${disk} iowait_delta=${iow_delta}"
            sleep 30
          done
        ) >> /dev/shm/runner-monitor.log 2>&1 &
        echo $! > /dev/shm/runner-monitor.pid

    - name: Record job info
      uses: gacts/run-and-post-run@598d7a875d5620e0457490555b5e18e46082aa47 # v1.4.0
      id: record_job_info
      env:
        GCP_SERVICE_ACCOUNT_STACKROX_CI: ${{ inputs.gcp-account }}
      # Skip for external contributions.
      if: |
        github.event_name == 'push' || !github.event.pull_request.head.repo.fork
      with:
        shell: bash
        run: >
          echo "started_at=${EPOCHSECONDS:-$(date -u +%s)}" >> "$GITHUB_OUTPUT"
        post: >
          kill "$(cat /dev/shm/runner-monitor.pid 2>/dev/null)" 2>/dev/null || true;
          [ -f /dev/shm/runner-monitor.log ] && echo "::group::Runner resource monitor" && cat /dev/shm/runner-monitor.log && echo "::endgroup::" || true;
          source scripts/ci/lib.sh || true;
          save_job_record "${{ github.job }}" "gha" \
            outcome "${{ job.status }}" \
            started_at "${{ steps.record_job_info.outputs.started_at }}" || true;
          free=$(df -BGB --output=avail / | tail -1);
          echo "Free disk space before: ${{ steps.disk-check-cleaned.outputs.free }} [${{ steps.disk-check.outputs.free }} before cleanup], and after: ${free}.";
          if [[ ${free%GB} -lt 5 ]]; then\
            set -ex;\
            df --si;\
            du -ks /* 2>/dev/null | sort -V || true;\
            du -k / 2>/dev/null | sort -V | tail -100 || true; \
            printf "Low free disk space post-job: ${free}" | tee -a "$GITHUB_STEP_SUMMARY";\
          fi;
