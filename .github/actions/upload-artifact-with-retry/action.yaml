name: Upload artifact and retry
description: Retry wrapper of upload-artifact
inputs:
  name:
    description: 'Artifact name'
    default: 'artifact'
  path:
    description: 'A file, directory or wildcard pattern that describes what to upload'
    required: true
  if-no-files-found:
    description: >
      The desired behavior if no files are found using the provided path.

      Available Options:
        warn: Output a warning but do not fail the action
        error: Fail the action with an error message
        ignore: Do not output any warnings or errors, the action does not fail
    default: 'warn'
runs:
  using: composite
  steps:
    - name: Normalize file timestamps for reproducible builds
      shell: bash
      run: |
        if [ -n "${SOURCE_DATE_EPOCH:-}" ]; then
          echo "Normalizing mtimes to SOURCE_DATE_EPOCH=$SOURCE_DATE_EPOCH"
          while IFS= read -r path; do
            [ -z "$path" ] && continue
            echo "  Processing: $path"
            find "$path" -exec touch -d "@$SOURCE_DATE_EPOCH" {} + 2>/dev/null || true

            echo "Computing SHA256 of files before upload for reproducibility verification:"
            find "$path" -type f -exec sha256sum {} \; 2>/dev/null | sort -k2 | head -20
          done <<< "${{ inputs.path }}"
        else
          echo "SOURCE_DATE_EPOCH not set, skipping mtime normalization"
        fi
    - id: upload-artifact-try1
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # ratchet:actions/upload-artifact@v7
      with:
        name: ${{ inputs.name }}
        path: ${{ inputs.path }}
        if-no-files-found: ${{ inputs.if-no-files-found }}
      continue-on-error: true
    - id: upload-artifact-try2
      if: steps.upload-artifact-try1.outcome == 'failure'
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # ratchet:actions/upload-artifact@v7
      with:
        name: ${{ inputs.name }}
        path: ${{ inputs.path }}
        if-no-files-found: ${{ inputs.if-no-files-found }}
      continue-on-error: true
    - if: steps.upload-artifact-try2.outcome == 'failure'
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # ratchet:actions/upload-artifact@v7
      with:
        name: ${{ inputs.name }}
        path: ${{ inputs.path }}
        if-no-files-found: ${{ inputs.if-no-files-found }}
