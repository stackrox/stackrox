name: Speedracer Finish
description: >
  Marks the winning speedracer copy's check-run as completed/success.
  Call as the last step of the job — GHA's default step behavior means it
  only runs when all previous steps succeeded (no if: condition needed).

  Failure cleanup (resolving a stuck in_progress check-run when the job
  fails) is handled automatically by the gate's post-step hook.

runs:
  using: composite
  steps:
    - name: Mark check-run complete
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        check_id=$(cat /tmp/speedracer-check-id | head -1 | tr -d '[:space:]')
        check_name=$(cat /tmp/speedracer-check-name | head -1 | tr -d '\n')
        my_copy=$(cat /tmp/speedracer-copy | head -1 | tr -d '\n')
        echo "Speedracer: copy '${my_copy}' won — marking check-run complete."
        if [[ "$check_id" =~ ^[0-9]+$ ]]; then
          gh api "repos/${{ github.repository }}/check-runs/${check_id}" \
            -X PATCH \
            -f status=completed \
            -f conclusion=success \
            -f "output[title]=Speedracer complete" \
            -f "output[summary]=Copy ${my_copy} won." \
            || echo "::warning::Failed to update check-run (non-fatal)"
        else
          gh api "repos/${{ github.repository }}/check-runs" \
            -f name="${check_name}" \
            -f head_sha="${{ github.sha }}" \
            -f status=completed \
            -f conclusion=success \
            -f "output[title]=Speedracer complete" \
            -f "output[summary]=Copy ${my_copy} won." \
            || echo "::warning::Failed to post check-run (non-fatal)"
        fi
