name: Speedracer Finish
description: >
  Marks the winner of a speedracer race. Call as the last step of the job —
  no 'if:' condition needed; GHA's default step behavior only runs this on
  success (cancelled/failed jobs don't reach this step).

  Updates the in_progress check-run posted by speedracer-gate to
  completed/success. The check-name is auto-derived from the job matrix
  (excluding the speedracer key) — no inputs required in the common case.

  Failure cleanup (resolving a stuck in_progress check-run) is handled
  automatically by a post-job hook registered inside speedracer-gate.

inputs:
  check-name:
    description: >
      Override the auto-derived required check name. Auto-derived as:
        github.job + " (" + matrix-values-excluding-speedracer + ")"
      Only set this if the auto-derived name does not match what the gate used.
    required: false
    default: ''

runs:
  using: composite
  steps:
    - name: Mark check-run complete
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        MY_COPY="${{ matrix.speedracer }}"

        CHECK_NAME="${{ inputs.check-name }}"
        if [[ -z "$CHECK_NAME" ]]; then
          MATRIX_JSON='${{ toJSON(matrix) }}'
          OTHER_VALS=$(echo "$MATRIX_JSON" | \
            jq -r 'del(.speedracer) | to_entries | map(.value | tostring) | join(", ")' 2>/dev/null)
          if [[ -n "$OTHER_VALS" ]]; then
            CHECK_NAME="${{ github.job }} ($OTHER_VALS)"
          else
            CHECK_NAME="${{ github.job }}"
          fi
        fi

        echo "Copy '${MY_COPY}' won — completing check '${CHECK_NAME}'"
        check_id=$(cat /tmp/speedracer-check-id 2>/dev/null | head -1 | tr -d '[:space:]')
        echo "check_id from gate: '${check_id}'"
        if [[ "$check_id" =~ ^[0-9]+$ ]]; then
          gh api repos/${{ github.repository }}/check-runs/"${check_id}" \
            -X PATCH \
            -f status=completed \
            -f conclusion=success \
            -f "output[title]=Speedracer complete" \
            -f "output[summary]=Copy ${MY_COPY} won." \
            2>&1 || echo "::warning::Failed to update check-run (non-fatal)"
        else
          # Fallback: gate didn't store an ID (enabled=false, or API hiccup).
          gh api repos/${{ github.repository }}/check-runs \
            -f name="${CHECK_NAME}" \
            -f head_sha="${{ github.sha }}" \
            -f status=completed \
            -f conclusion=success \
            -f "output[title]=Speedracer complete" \
            -f "output[summary]=Copy ${MY_COPY} won." \
            2>&1 || echo "::warning::Failed to post check-run (non-fatal)"
        fi
