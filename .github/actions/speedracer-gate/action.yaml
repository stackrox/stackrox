name: Speedracer Gate
description: >
  Gate step for speculative-execution (speedracer) matrix jobs.

  Add 'speedracer: [a, b]' (or [a, b, c]) as the LAST dimension of your job
  matrix and call this action as the first step after checkout. No inputs are
  needed — the action reads matrix.speedracer for the current copy, auto-derives
  check-name from the remaining matrix dimensions, and queries the GHA jobs API
  to determine which copy is the last-resort fallback (no explicit last-copy
  input required, even for arm64 with matrix excludes).

  Slow runner: exits as 'cancelled' immediately (no work wasted).
  Fast runner: posts an in_progress check-run, starts a background monitor.
  Monitor fires when a sibling check-run appears and cancels this copy.

  Pair with speedracer-finish as the last step (no if: condition needed).

inputs:
  check-name:
    description: >
      Override the auto-derived required check name. Auto-derived as:
        github.job + " (" + matrix-values-excluding-speedracer + ")"
      Only set this if the auto-derived name does not match branch protection.
    required: false
    default: ''
  slow-cpu-pattern:
    description: 'Substring of CPU model name that marks a slow runner'
    required: false
    default: '7763'
  enabled:
    description: 'Set to false to disable speedracer — all copies run normally'
    required: false
    default: 'true'

runs:
  using: composite
  steps:
    - name: Gate
      id: gate
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        set +e
        if [[ "${{ inputs.enabled }}" != 'true' ]]; then
          echo "Speedracer disabled — this copy always runs."
          exit 0
        fi

        MY_COPY="${{ matrix.speedracer }}"
        RUN_ID="${{ github.run_id }}"
        REPO="${{ github.repository }}"
        MY_PARENT=$PPID

        # Auto-derive check-name from matrix (excluding speedracer key)
        CHECK_NAME="${{ inputs.check-name }}"
        if [[ -z "$CHECK_NAME" ]]; then
          MATRIX_JSON='${{ toJSON(matrix) }}'
          OTHER_VALS=$(echo "$MATRIX_JSON" | \
            jq -r 'del(.speedracer) | to_entries | map(.value | tostring) | join(", ")' 2>/dev/null)
          if [[ -n "$OTHER_VALS" ]]; then
            CHECK_NAME="${{ github.job }} ($OTHER_VALS)"
          else
            CHECK_NAME="${{ github.job }}"
          fi
          echo "Auto-derived check-name: $CHECK_NAME"
        fi

        # Auto-detect last speedracer copy via jobs API.
        # Speedracer must be the last matrix dimension so the GHA job name ends
        # with ", <letter>)" — we extract the last lowercase letter before ")".
        # arm64 jobs that exclude b/c copies auto-resolve to last=a with no
        # special input needed.
        if [[ "$CHECK_NAME" == *"("* ]]; then
          check_stem="${CHECK_NAME%\)}"   # "job (foo, bar" — strip trailing ")"
        else
          check_stem="$CHECK_NAME"       # "job" — no parens
        fi
        all_copies=$(gh api "repos/${REPO}/actions/runs/${RUN_ID}/jobs?per_page=100" 2>/dev/null | \
          jq -r --arg s "$check_stem" '.jobs[] | select(.name | startswith($s)) | .name' | \
          grep -oE '[a-z]\)$' | tr -d ')' | sort -u)
        LAST_COPY=$(echo "$all_copies" | tail -1)
        [[ -z "$LAST_COPY" ]] && LAST_COPY="b"   # safe fallback
        echo "Detected copies: $(echo "$all_copies" | tr '\n' ' ')→ last=${LAST_COPY}"

        cpu=$(grep -m1 'model name' /proc/cpuinfo 2>/dev/null | cut -d: -f2 | xargs)
        [[ -z "$cpu" ]] && cpu=$(lscpu 2>/dev/null | awk -F: '/Model name/{gsub(/^ +/,"",$2); print $2}')
        echo "cpu=${cpu:-unknown} copy=${MY_COPY} last=${LAST_COPY}"

        # ── 1. CPU check ────────────────────────────────────────────────────
        if [[ "$MY_COPY" != "$LAST_COPY" && "$cpu" == *"${{ inputs.slow-cpu-pattern }}"* ]]; then
          echo "::warning::Slow runner (${cpu}) — delegating to next copy."
          kill -TERM "$MY_PARENT" 2>/dev/null
          sleep 600
        fi

        # ── 2. Post in_progress check-run ───────────────────────────────────
        # external_id includes run_id so monitors from concurrent runs on the
        # same SHA (e.g. /retest) do not cross-contaminate.
        EXT_ID="spec-${MY_COPY}-${RUN_ID}"
        check_id=$(gh api repos/"${REPO}"/check-runs \
          -f name="${CHECK_NAME}" \
          -f head_sha="${{ github.sha }}" \
          -f status=in_progress \
          -f external_id="${EXT_ID}" \
          --jq '.id' 2>/dev/null)
        printf '%s\n' "${check_id:-}" > /tmp/speedracer-check-id
        echo "Posted in_progress check-run ${check_id} (${EXT_ID})"

        # ── 3. Background monitor for non-first copies ──────────────────────
        case "$MY_COPY" in
          b) prev_copies="a" ;;
          c) prev_copies="a b" ;;
          d) prev_copies="a b c" ;;
          *)  prev_copies="" ;;
        esac

        if [[ -n "$prev_copies" ]]; then
          sibling_ids=""
          for c in ${prev_copies}; do
            sibling_ids="${sibling_ids:+${sibling_ids},}spec-${c}-${RUN_ID}"
          done

          cp "${GITHUB_ACTION_PATH}/monitor.sh" /tmp/speedracer-monitor.sh
          chmod +x /tmp/speedracer-monitor.sh
          export SPEC_REPO="${REPO}"
          export SPEC_SHA="${{ github.sha }}"
          export SPEC_CHECK_NAME="${CHECK_NAME}"
          export SPEC_SIBLING_IDS="${sibling_ids}"
          export SPEC_PARENT="${MY_PARENT}"

          nohup bash /tmp/speedracer-monitor.sh >> /tmp/speedracer-monitor.log 2>&1 &
          disown
          GATE_BLOCK_START=$(date +%s%3N)
          echo "Monitor started — Gate blocking until decision."

          # KEY: Keep this Gate step alive so $MY_PARENT (composite action coordinator)
          # remains valid. SIGTERM to an active composite coordinator → 'cancelled'.
          # SIGTERM to the coordinator during a regular step → 'failure'.
          # Monitor writes /tmp/speedracer-monitor-result when all siblings gone.
          rm -f /tmp/speedracer-monitor-result
          gate_deadline=$(( $(date +%s) + 300 ))
          while [[ ! -f /tmp/speedracer-monitor-result && $(date +%s) -lt $gate_deadline ]]; do
            sleep 1
          done

          GATE_BLOCK_END=$(date +%s%3N)
          GATE_BLOCK_MS=$(( GATE_BLOCK_END - GATE_BLOCK_START ))
          if [[ -f /tmp/speedracer-monitor-result ]]; then
            echo "Monitor: $(cat /tmp/speedracer-monitor-result) after ${GATE_BLOCK_MS}ms — proceeding."
          else
            echo "Gate timeout after ${GATE_BLOCK_MS}ms — proceeding as fallback."
          fi
        else
          echo "Copy ${MY_COPY} is first — no monitor needed."
        fi

        cp "${GITHUB_ACTION_PATH}/cleanup.sh" /tmp/speedracer-cleanup.sh
        chmod +x /tmp/speedracer-cleanup.sh
        echo "Gate passed."
        exit 0

    - name: Register post-job cleanup
      uses: gacts/run-and-post-run@598d7a875d5620e0457490555b5e18e46082aa47 # v1.4.0
      if: inputs.enabled == 'true'
      env:
        GH_TOKEN: ${{ github.token }}
        SPEC_REPO: ${{ github.repository }}
      with:
        shell: bash
        run: 'true'
        post: if [[ "${{ job.status }}" == "failure" ]]; then SPEC_REPO=${{ github.repository }} GH_TOKEN=${{ github.token }} bash /tmp/speedracer-cleanup.sh; fi
