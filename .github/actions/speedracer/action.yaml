name: Speedracer
description: >
  Speculative execution for matrix jobs. Add 'speedracer: [a, b]' (or
  [a, b, c, d]) as the LAST matrix dimension and call this as the first
  step — nothing else needed.

  Higher-lettered copies have priority (d > c > b > a). Each copy checks
  its CPU — slow runners abort (except copy 'a', the fallback). Fast
  copies post an in_progress check-run, then poll for higher-lettered
  siblings. If a higher sibling already posted, this copy cancels itself.

  Copy 'a' is always the fallback — it never aborts due to slow CPU.
  If a fast sibling exists, 'a' defers to it. If all siblings are slow,
  'a' proceeds on slow hardware (the only option).


  The post-step reads this marker to resolve the check-run:
    marker present → POST completed/success
    marker absent  → PATCH to completed/failure (real job failure)
    no check-id    → nothing (copy was cancelled or disabled)
  All cancellations happen within the composite action step, producing
  'cancelled' status (not 'failure').

inputs:
  check-name:
    description: >
      Override the auto-derived required check name. Auto-derived as:
        github.job + " (" + matrix-values-excluding-speedracer + ")"
      Only set this if the auto-derived name does not match branch protection.
    required: false
    default: ''
  slow-cpu-pattern:
    description: >
      Substring of CPU model name that marks a slow runner. Default is
      auto-read from runner-pool.tsv (updated weekly by the profiler).
    required: false
    default: ''
  enabled:
    description: 'Set to false to disable speedracer — all copies run normally'
    required: false
    default: 'true'

runs:
  using: composite
  steps:
    - name: Speedracer
      id: speedracer
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        # Load slow CPU pattern: caller override > profiler data > hardcoded fallback
        SLOW_PATTERN="${{ inputs.slow-cpu-pattern }}"
        if [[ -z "$SLOW_PATTERN" && -f "${GITHUB_ACTION_PATH}/runner-pool.tsv" ]]; then
          SLOW_PATTERN=$(grep -v '^#' "${GITHUB_ACTION_PATH}/runner-pool.tsv" | head -1 | cut -f1 || true)
          echo "Using profiler slow-cpu-pattern: ${SLOW_PATTERN}"
        fi
        [[ -z "$SLOW_PATTERN" ]] && SLOW_PATTERN="7763" && echo "Using hardcoded fallback: ${SLOW_PATTERN}"

        if [[ "${{ inputs.enabled }}" != 'true' ]]; then
          echo "Speedracer disabled — this copy always runs."
          exit 0
        fi

        MY_COPY="${{ matrix.speedracer }}"
        RUN_ID="${{ github.run_id }}"
        REPO="${{ github.repository }}"

        CHECK_NAME="${{ inputs.check-name }}"
        if [[ -z "$CHECK_NAME" ]]; then
          MATRIX_JSON='${{ toJSON(matrix) }}'
          OTHER_VALS=$(echo "$MATRIX_JSON" | \
            jq -r 'del(.speedracer) | to_entries | map(.value | tostring) | join(", ")')
          if [[ -n "$OTHER_VALS" ]]; then
            CHECK_NAME="${{ github.job }} ($OTHER_VALS)"
          else
            CHECK_NAME="${{ github.job }}"
          fi
          echo "Auto-derived check-name: $CHECK_NAME"
        fi

        cpu=$(grep -m1 'model name' /proc/cpuinfo | cut -d: -f2 | xargs || true)
        [[ -z "$cpu" ]] && cpu=$(lscpu | awk -F: '/Model name/{gsub(/^ +/,"",$2); print $2}' || true)
        IS_SLOW=$([[ "$cpu" == *"${SLOW_PATTERN}"* ]] && echo true || echo false)
        echo "cpu=${cpu:-unknown} copy=${MY_COPY} is_slow=${IS_SLOW}"

        EXT_ID="spec-${MY_COPY}-${RUN_ID}-${CHECK_NAME}"

        # ── 1. CPU check ────────────────────────────────────────────────────
        # Copy 'a' is the fallback — never aborts. All others abort on slow CPU.
        if [[ "$MY_COPY" != "a" && "$IS_SLOW" == "true" ]]; then
          echo "::warning::Slow runner (${cpu}) — aborting."
          kill -TERM "$PPID"
          sleep 600
        fi

        # ── 2. Post in_progress check-run ───────────────────────────────────
        # Copy 'a' on slow: don't post (would cause fast siblings to defer)
        if [[ "$MY_COPY" == "a" && "$IS_SLOW" == "true" ]]; then
          printf '' > /tmp/speedracer-check-id
        else
          check_id=$(gh api repos/"${REPO}"/check-runs \
            -f name="${CHECK_NAME}" \
            -f head_sha="${{ github.sha }}" \
            -f status=in_progress \
            -f external_id="${EXT_ID}" \
            --jq '.id')
          printf '%s\n' "${check_id:-}" > /tmp/speedracer-check-id
          echo "Posted in_progress check-run ${check_id} (${EXT_ID})"
        fi
        printf '%s\n' "${CHECK_NAME}" > /tmp/speedracer-check-name
        printf '%s\n' "${MY_COPY}" > /tmp/speedracer-copy

        # ── 3. Poll for higher-lettered siblings ────────────────────────────
        # Higher letters have priority: d > c > b > a.
        # Each copy watches for siblings with HIGHER letters that posted.
        # If found → this copy is lower priority → cancel.
        case "$MY_COPY" in
          a) WATCH_IDS="spec-b-${RUN_ID}-${CHECK_NAME}|spec-c-${RUN_ID}-${CHECK_NAME}|spec-d-${RUN_ID}-${CHECK_NAME}" ;;
          b) WATCH_IDS="spec-c-${RUN_ID}-${CHECK_NAME}|spec-d-${RUN_ID}-${CHECK_NAME}" ;;
          c) WATCH_IDS="spec-d-${RUN_ID}-${CHECK_NAME}" ;;
          *) WATCH_IDS="" ;;
        esac

        if [[ -n "$WATCH_IDS" ]]; then
          IFS='|' read -ra _sids <<< "$WATCH_IDS"
          echo "Polling for higher-priority siblings..."
          sleep $(( RANDOM % 2 + 5 ))

          deadline=$(( $(date +%s) + 5 ))
          while [[ $(date +%s) -lt $deadline ]]; do
            response=$(gh api \
              "repos/${REPO}/commits/${{ github.sha }}/check-runs?per_page=100&filter=all")

            for sid in "${_sids[@]}"; do
              found=$(echo "$response" | jq -r --arg sid "$sid" \
                '[.check_runs[] | select(.external_id == $sid) | select(.status == "in_progress" or .conclusion == "success")] | length')
              if [[ "$found" -gt 0 ]]; then
                echo "Higher-priority sibling ${sid} is running — cancelling this copy."
                kill -TERM "$PPID"
                sleep 600
              fi
            done

            sleep 2
          done
          echo "No higher-priority siblings found — proceeding."
        fi

        echo "Speedracer ready — proceeding to work."

    # ${{ job.status }} is evaluated at post-step execution time by GHA.
    - name: Register post-hook
      uses: gacts/run-and-post-run@598d7a875d5620e0457490555b5e18e46082aa47 # v1.4.0
      if: inputs.enabled == 'true'
      with:
        shell: bash
        run: 'true'
        post: >-
          export GH_TOKEN=${{ github.token }};
          JOB_STATUS="${{ job.status }}";
          check_name=$(head -1 < /tmp/speedracer-check-name | tr -d '\n' || true);
          my_copy=$(head -1 < /tmp/speedracer-copy | tr -d '\n' || true);
          check_id=$(head -1 < /tmp/speedracer-check-id | tr -d '[:space:]' || true);
          ext_id="spec-${my_copy}-${{ github.run_id }}-${check_name}";
          echo "Speedracer post: job.status=${JOB_STATUS} copy=${my_copy} check_id=${check_id}";
          if [[ "$JOB_STATUS" == "success" ]]; then echo "Job succeeded"; gh api "repos/${{ github.repository }}/check-runs" -f name="${check_name}" -f head_sha="${{ github.sha }}" -f external_id="${ext_id}" -f status=completed -f conclusion=success -f "output[title]=Speedracer complete" -f "output[summary]=Copy ${my_copy} won." && echo "posted completed/success" || echo "::warning::POST success failed";
          elif [[ "$JOB_STATUS" == "failure" ]]; then echo "Job failed"; [[ "$check_id" =~ ^[0-9]+$ ]] || { echo "no valid check-id, skipping"; exit 0; }; gh api "repos/${{ github.repository }}/check-runs/${check_id}" -X PATCH -f status=completed -f conclusion=failure -f 'output[title]=Speedracer cleanup' -f 'output[summary]=Job failed; check-run resolved.' && echo "check-run → failure" || echo "::warning::PATCH failure failed";
          else echo "job.status=${JOB_STATUS} — no action taken (cancelled or other)";
          fi
