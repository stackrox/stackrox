name: Speedracer
description: >
  Speculative execution for matrix jobs. Add 'speedracer: [a, b]' (or [a, b, c])
  as the LAST matrix dimension and call this as the first step — nothing else needed.

  Slow runner: exits as 'cancelled' immediately (no work wasted).
  Fast runner: posts an in_progress check-run and polls for sibling check-runs.
  Post-step marks the check-run complete on job exit — success patches to
  completed/success, failure patches to completed/failure.

inputs:
  check-name:
    description: >
      Override the auto-derived required check name. Auto-derived as:
        github.job + " (" + matrix-values-excluding-speedracer + ")"
      Only set this if the auto-derived name does not match branch protection.
    required: false
    default: ''
  slow-cpu-pattern:
    description: 'Substring of CPU model name that marks a slow runner'
    required: false
    default: '7763'
  enabled:
    description: 'Set to false to disable speedracer — all copies run normally'
    required: false
    default: 'true'

runs:
  using: composite
  steps:
    - name: Gate
      id: gate
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        set +e
        if [[ "${{ inputs.enabled }}" != 'true' ]]; then
          echo "Speedracer disabled — this copy always runs."
          exit 0
        fi

        MY_COPY="${{ matrix.speedracer }}"
        RUN_ID="${{ github.run_id }}"
        REPO="${{ github.repository }}"
        MY_PARENT=$PPID

        # Auto-derive check-name from matrix (excluding speedracer key)
        CHECK_NAME="${{ inputs.check-name }}"
        if [[ -z "$CHECK_NAME" ]]; then
          MATRIX_JSON='${{ toJSON(matrix) }}'
          OTHER_VALS=$(echo "$MATRIX_JSON" | \
            jq -r 'del(.speedracer) | to_entries | map(.value | tostring) | join(", ")')
          if [[ -n "$OTHER_VALS" ]]; then
            CHECK_NAME="${{ github.job }} ($OTHER_VALS)"
          else
            CHECK_NAME="${{ github.job }}"
          fi
          echo "Auto-derived check-name: $CHECK_NAME"
        fi

        # Auto-detect last speedracer copy via jobs API.
        # Speedracer must be the last matrix dimension so the GHA job name ends
        # with ", <letter>)" — we extract the last lowercase letter before ")".
        # arm64 jobs that exclude b/c copies auto-resolve to last=a.
        if [[ "$CHECK_NAME" == *"("* ]]; then
          check_stem="${CHECK_NAME%\)}"
        else
          check_stem="$CHECK_NAME"
        fi
        all_copies=$(gh api "repos/${REPO}/actions/runs/${RUN_ID}/jobs?per_page=100" | \
          jq -r --arg s "$check_stem" '.jobs[] | select(.name | startswith($s)) | .name' | \
          grep -oE '[a-z]\)$' | tr -d ')' | sort -u)
        LAST_COPY=$(echo "$all_copies" | tail -1)
        [[ -z "$LAST_COPY" ]] && LAST_COPY="b"
        echo "Detected copies: $(echo "$all_copies" | tr '\n' ' ')→ last=${LAST_COPY}"

        cpu=$(grep -m1 'model name' /proc/cpuinfo | cut -d: -f2 | xargs)
        [[ -z "$cpu" ]] && cpu=$(lscpu | awk -F: '/Model name/{gsub(/^ +/,"",$2); print $2}')
        echo "cpu=${cpu:-unknown} copy=${MY_COPY} last=${LAST_COPY}"

        # ── 1. CPU check ────────────────────────────────────────────────────
        if [[ "$MY_COPY" != "$LAST_COPY" && "$cpu" == *"${{ inputs.slow-cpu-pattern }}"* ]]; then
          echo "::warning::Slow runner (${cpu}) — delegating to next copy."
          kill -TERM "$MY_PARENT"
          sleep 600
        fi

        # ── 2. Post in_progress check-run ───────────────────────────────────
        JOB_KEY="${{ github.job }}"
        EXT_ID="spec-${MY_COPY}-${RUN_ID}-${JOB_KEY}"
        check_id=$(gh api repos/"${REPO}"/check-runs \
          -f name="${CHECK_NAME}" \
          -f head_sha="${{ github.sha }}" \
          -f status=in_progress \
          -f external_id="${EXT_ID}" \
          --jq '.id')
        printf '%s\n' "${check_id:-}" > /tmp/speedracer-check-id
        printf '%s\n' "${CHECK_NAME}"  > /tmp/speedracer-check-name
        printf '%s\n' "${MY_COPY}"     > /tmp/speedracer-copy
        echo "Posted in_progress check-run ${check_id} (${EXT_ID})"

        # ── 3. Poll for sibling check-runs (non-first copies only) ──────────
        case "$MY_COPY" in
          b) sibling_ids="spec-a-${RUN_ID}-${JOB_KEY}" ;;
          c) sibling_ids="spec-a-${RUN_ID}-${JOB_KEY},spec-b-${RUN_ID}-${JOB_KEY}" ;;
          d) sibling_ids="spec-a-${RUN_ID}-${JOB_KEY},spec-b-${RUN_ID}-${JOB_KEY},spec-c-${RUN_ID}-${JOB_KEY}" ;;
          *) sibling_ids="" ;;
        esac

        if [[ -n "$sibling_ids" ]]; then
          IFS=',' read -ra sibling_arr <<< "$sibling_ids"
          GATE_START=$(date +%s%3N)
          echo "Polling for siblings (${sibling_ids})..."
          sleep $(( RANDOM % 2 + 5 ))

          poll=0
          deadline=$(( $(date +%s) + 300 ))
          while [[ $(date +%s) -lt $deadline ]]; do
            poll=$(( poll + 1 ))
            response=$(gh api \
              "repos/${REPO}/commits/${{ github.sha }}/check-runs?per_page=100&filter=all")

            winner=""
            all_gone=1
            for sid in "${sibling_arr[@]}"; do
              result=$(echo "$response" | jq -r --arg sid "$sid" \
                '[.check_runs[] | select(.external_id == $sid)] as $checks |
                if   ($checks | any(.[]; .status == "in_progress" or .conclusion == "success")) then "winner"
                elif ($checks | length == 0)                                                    then "absent"
                elif ($checks | any(.[]; .conclusion == null))                                  then "pending"
                else "failed" end')
              echo "[$(date -u +%H:%M:%S)] poll=${poll} ${sid}: ${result}"
              if [[ "$result" == "winner" ]]; then winner="$sid"; break; fi
              if [[ "$result" == "pending" || ( "$result" == "absent" && $poll -lt 2 ) ]]; then
                all_gone=0
              fi
            done

            if [[ -n "$winner" ]]; then
              echo "Sibling ${winner} is winning — cancelling this copy."
              kill -TERM "$MY_PARENT"
              sleep 600
            fi

            if [[ $all_gone -eq 1 ]]; then
              echo "All siblings eliminated after $(( $(date +%s%3N) - GATE_START ))ms — proceeding."
              break
            fi

            sleep 2
          done

          [[ $(date +%s) -ge $deadline ]] && echo "Gate timeout — proceeding as fallback."
        else
          echo "Copy ${MY_COPY} is first — no sibling polling needed."
        fi

        echo "Gate passed."

    - name: Register post-hook
      uses: gacts/run-and-post-run@598d7a875d5620e0457490555b5e18e46082aa47 # v1.4.0
      if: inputs.enabled == 'true'
      with:
        shell: bash
        run: 'true'
        post: >-
          export GH_TOKEN=${{ github.token }};
          JOB_STATUS="${{ job.status }}";
          echo "Speedracer post: job.status=${JOB_STATUS}";
          check_name=$(head -1 < /tmp/speedracer-check-name | tr -d '\n');
          my_copy=$(head -1 < /tmp/speedracer-copy | tr -d '\n');
          check_id=$(head -1 < /tmp/speedracer-check-id | tr -d '[:space:]');
          ext_id="spec-${my_copy}-${{ github.run_id }}-${{ github.job }}";
          echo "copy=${my_copy} check_name=${check_name} check_id=${check_id} ext_id=${ext_id}";
          if [[ "$JOB_STATUS" == "success" ]]; then gh api "repos/${{ github.repository }}/check-runs" -f name="${check_name}" -f head_sha="${{ github.sha }}" -f external_id="${ext_id}" -f status=completed -f conclusion=success -f "output[title]=Speedracer complete" -f "output[summary]=Copy ${my_copy} won." && echo "posted completed/success" || echo "::warning::POST success failed";
          elif [[ "$JOB_STATUS" == "failure" ]]; then [[ "$check_id" =~ ^[0-9]+$ ]] || { echo "no valid check-id, skipping"; exit 0; }; gh api "repos/${{ github.repository }}/check-runs/${check_id}" -X PATCH -f status=completed -f conclusion=failure -f 'output[title]=Speedracer cleanup' -f 'output[summary]=Job failed; check-run resolved.' && echo "check-run → failure" || echo "::warning::PATCH failure failed";
          else echo "job.status=${JOB_STATUS} — no action taken";
          fi
