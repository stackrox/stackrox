name: Speedracer
description: >
  Speculative execution for matrix jobs. Add 'speedracer: [a, b]' (or
  [a, b, c, d]) as the LAST matrix dimension and call this as the first
  step — nothing else needed.

  All copies start work immediately (no gate delay). A background monitor
  polls for siblings that posted a completed/success check-run. When a
  winner is found, the monitor kills this copy's runner.

  Slow runners are detected via CPU model and killed before work starts.

  Post-step resolves the check-run:
    success → POST completed/success (this copy won)
    failure → check if a sibling already won; if so, do nothing (speedracer
              loss, not a real failure); otherwise PATCH to completed/failure

inputs:
  check-name:
    description: >
      Override the auto-derived required check name. Auto-derived as:
        github.job + " (" + matrix-values-excluding-speedracer + ")"
      Only set this if the auto-derived name does not match branch protection.
    required: false
    default: ''
  slow-cpu-pattern:
    description: 'Substring of CPU model name that marks a slow runner'
    required: false
    default: '7763'
  enabled:
    description: 'Set to false to disable speedracer — all copies run normally'
    required: false
    default: 'true'

runs:
  using: composite
  steps:
    - name: Speedracer
      id: speedracer
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        if [[ "${{ inputs.enabled }}" != 'true' ]]; then
          echo "Speedracer disabled — this copy always runs."
          exit 0
        fi

        MY_COPY="${{ matrix.speedracer }}"
        RUN_ID="${{ github.run_id }}"
        REPO="${{ github.repository }}"

        CHECK_NAME="${{ inputs.check-name }}"
        if [[ -z "$CHECK_NAME" ]]; then
          MATRIX_JSON='${{ toJSON(matrix) }}'
          OTHER_VALS=$(echo "$MATRIX_JSON" | \
            jq -r 'del(.speedracer) | to_entries | map(.value | tostring) | join(", ")')
          if [[ -n "$OTHER_VALS" ]]; then
            CHECK_NAME="${{ github.job }} ($OTHER_VALS)"
          else
            CHECK_NAME="${{ github.job }}"
          fi
          echo "Auto-derived check-name: $CHECK_NAME"
        fi

        # Detect last copy (fallback that always runs regardless of CPU).
        if [[ "$CHECK_NAME" == *"("* ]]; then
          check_stem="${CHECK_NAME%\)}"
        else
          check_stem="$CHECK_NAME"
        fi
        all_copies=$(gh api "repos/${REPO}/actions/runs/${RUN_ID}/jobs?per_page=100" | \
          jq -r --arg s "$check_stem" '.jobs[] | select(.name | startswith($s)) | .name' | \
          grep -oE '[a-z]\)$' | tr -d ')' | sort -u) || true
        LAST_COPY=$(echo "$all_copies" | tail -1)
        [[ -z "$LAST_COPY" ]] && LAST_COPY="b"
        echo "Detected copies: $(echo "$all_copies" | tr '\n' ' ')→ last=${LAST_COPY}"

        cpu=$(grep -m1 'model name' /proc/cpuinfo | cut -d: -f2 | xargs || true)
        [[ -z "$cpu" ]] && cpu=$(lscpu | awk -F: '/Model name/{gsub(/^ +/,"",$2); print $2}' || true)
        echo "cpu=${cpu:-unknown} copy=${MY_COPY} last=${LAST_COPY}"

        # ── 1. CPU check ────────────────────────────────────────────────────
        if [[ "$MY_COPY" != "$LAST_COPY" && "$cpu" == *"${{ inputs.slow-cpu-pattern }}"* ]]; then
          echo "::warning::Slow runner (${cpu}) — delegating to next copy."
          # Do NOT post the in_progress check-run — siblings would see it and
          # defer to this copy, but this copy is about to die.
          kill -TERM "$PPID"
          # Keep bash alive in the composite action step until the runner kills us.
          # Without this, bash exits and the runner leaves composite-action mode —
          # a late-arriving SIGTERM would produce 'failure' instead of 'cancelled'.
          sleep 600
        fi

        # ── 2. Post in_progress check-run (only reached by fast runners) ────
        JOB_KEY="${{ github.job }}"
        EXT_ID="spec-${MY_COPY}-${RUN_ID}-${JOB_KEY}"
        check_id=$(gh api repos/"${REPO}"/check-runs \
          -f name="${CHECK_NAME}" \
          -f head_sha="${{ github.sha }}" \
          -f status=in_progress \
          -f external_id="${EXT_ID}" \
          --jq '.id')
        printf '%s\n' "${check_id:-}" > /tmp/speedracer-check-id
        printf '%s\n' "${CHECK_NAME}"  > /tmp/speedracer-check-name
        printf '%s\n' "${MY_COPY}"     > /tmp/speedracer-copy
        echo "Posted in_progress check-run ${check_id} (${EXT_ID})"

        # ── 3. Background monitor — kills this copy if a sibling wins ───────
        # Runs during work steps (no gate delay). Polls for a sibling's
        # completed/success check-run. When found, writes a marker file and
        # SIGTERMs the runner. The job shows as 'failure' but the post-step
        # detects the marker and PATCHes this copy's check-run to 'cancelled'.
        # Build list of lower-lettered siblings to watch (deterministic tiebreak).
        # Copy b watches a. Copy c watches a,b. Copy d watches a,b,c.
        # Copy a never monitors — it always wins if it passes the CPU gate.
        case "$MY_COPY" in
          b) WATCH_IDS="spec-a-${RUN_ID}-${JOB_KEY}" ;;
          c) WATCH_IDS="spec-a-${RUN_ID}-${JOB_KEY} spec-b-${RUN_ID}-${JOB_KEY}" ;;
          d) WATCH_IDS="spec-a-${RUN_ID}-${JOB_KEY} spec-b-${RUN_ID}-${JOB_KEY} spec-c-${RUN_ID}-${JOB_KEY}" ;;
          *) WATCH_IDS="" ;;
        esac

        if [[ -n "$WATCH_IDS" ]]; then
          # Monitor checks if a lower-lettered sibling also passed the CPU gate
          # (posted an in_progress check-run). If so, this copy is a duplicate.
          # Fires within seconds of the sibling posting, before real work begins,
          # avoiding duplicate artifact uploads or image pushes.
          nohup bash -c '
            sleep $(( RANDOM % 2 + 5 ))
            REPO="'"${REPO}"'"
            SHA="${{ github.sha }}"
            WATCH_IDS="'"${WATCH_IDS}"'"
            MY_COPY="'"${MY_COPY}"'"
            deadline=$(( $(date +%s) + 600 ))
            while [[ $(date +%s) -lt $deadline ]]; do
              response=$(gh api \
                "repos/${REPO}/commits/${SHA}/check-runs?per_page=100&filter=all")
              for sid in ${WATCH_IDS}; do
                found=$(echo "$response" | jq -r --arg sid "$sid" \
                  "[.check_runs[] | select(.external_id == \$sid) | select(.status == \"in_progress\" or .conclusion == \"success\")] | length")
                if [[ "$found" -gt 0 ]]; then
                  echo "[$(date -u +%H:%M:%S)] sibling ${sid} is running — copy ${MY_COPY} is a duplicate."
                  touch /tmp/speedracer-killed
                  kill -TERM $PPID
                  exit 0
                fi
              done
              echo "[$(date -u +%H:%M:%S)] no lower-lettered siblings running yet"
              sleep 3
            done
          ' >> /tmp/speedracer-monitor.log 2>&1 &
          disown
          echo "Background monitor started for copy ${MY_COPY} — watching: ${WATCH_IDS}"
        else
          echo "Copy a — no monitor needed (always wins if fast)."
        fi
        disown
        echo "Background monitor started for copy ${MY_COPY}."
        echo "Speedracer ready — proceeding to work."

    # Post-step resolves the check-run based on job outcome.
    # ${{ job.status }} is evaluated at post-step execution time.
    # On failure: checks whether a sibling already posted completed/success.
    # If yes → this was a speedracer kill, not a real failure → do nothing.
    # If no  → real failure → PATCH to completed/failure.
    - name: Register post-hook
      uses: gacts/run-and-post-run@598d7a875d5620e0457490555b5e18e46082aa47 # v1.4.0
      if: inputs.enabled == 'true'
      with:
        shell: bash
        run: 'true'
        post: >-
          export GH_TOKEN=${{ github.token }};
          JOB_STATUS="${{ job.status }}";
          check_name=$(head -1 < /tmp/speedracer-check-name | tr -d '\n');
          my_copy=$(head -1 < /tmp/speedracer-copy | tr -d '\n');
          check_id=$(head -1 < /tmp/speedracer-check-id | tr -d '[:space:]');
          ext_id="spec-${my_copy}-${{ github.run_id }}-${{ github.job }}";
          echo "Speedracer post: job.status=${JOB_STATUS} copy=${my_copy} check_id=${check_id}";
          if [[ "$JOB_STATUS" == "success" ]]; then gh api "repos/${{ github.repository }}/check-runs" -f name="${check_name}" -f head_sha="${{ github.sha }}" -f external_id="${ext_id}" -f status=completed -f conclusion=success -f "output[title]=Speedracer complete" -f "output[summary]=Copy ${my_copy} won." && echo "posted completed/success" || echo "::warning::POST success failed";
          elif [[ -f /tmp/speedracer-killed ]]; then echo "Speedracer loss — killed by monitor, winner handles check-run";
          elif [[ "$JOB_STATUS" == "failure" ]]; then echo "Real failure — resolving check-run"; [[ "$check_id" =~ ^[0-9]+$ ]] || { echo "no valid check-id, skipping"; exit 0; }; gh api "repos/${{ github.repository }}/check-runs/${check_id}" -X PATCH -f status=completed -f conclusion=failure -f 'output[title]=Speedracer cleanup' -f 'output[summary]=Job failed; check-run resolved.' && echo "check-run → failure" || echo "::warning::PATCH failure failed";
          else echo "job.status=${JOB_STATUS} — no action taken";
          fi
