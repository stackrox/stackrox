name: Page Cache Experiment (warm path)

on:
  workflow_dispatch:
  pull_request:
    types: [opened, reopened, synchronize]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

# This experiment measures whether tmpfs provides a measurable speedup over
# page-cache-resident ext4 reads for Go's SHA256 file hashing.
#
# Go's BUILD cache always reads + SHA256 hashes every source file (no mtime
# shortcut). Go's TEST cache uses stat (size, mode, mtime) only — never reads
# file contents. So tmpfs could help builds but not tests.
#
# Each strategy runs 3x (matrix.run) on different runners to measure variance.
# Each job also includes a micro-benchmark that isolates the SHA256 hashing
# time from compilation/linking overhead.

jobs:
  # ---------------------------------------------------------------------------
  # Go binary build (3x per strategy for statistical significance)
  # ---------------------------------------------------------------------------

  build-docker-tmpfs:
    strategy:
      fail-fast: false
      matrix:
        run: [1, 2, 3]
    runs-on: ubuntu-latest
    name: "build (docker-tmpfs) #${{ matrix.run }}"
    container:
      image: quay.io/stackrox-io/apollo-ci:stackrox-test-0.5.3
      volumes:
        - /usr:/mnt/usr
        - /opt:/mnt/opt
        - /home/runner/work:/__w_host
      options: >-
        --tmpfs /__w/stackrox/stackrox:rw,exec,size=2g
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Expose local actions to host
        run: cp -a .github /__w_host/stackrox/stackrox/.github

      - uses: ./.github/actions/job-preamble
        with:
          gcp-account: ${{ secrets.GCP_SERVICE_ACCOUNT_STACKROX_CI }}

      - uses: ./.github/actions/handle-tagged-build

      - name: Cache Go dependencies
        uses: ./.github/actions/cache-go-dependencies

      - name: SHA256 micro-benchmark
        run: |
          # Isolate file read + SHA256 time from compilation
          start=$(date +%s%N)
          find . -type f \( -name '*.go' -o -name '*.s' -o -name '*.c' -o -name '*.h' \) \
            -exec cat {} + | sha256sum > /dev/null
          end=$(date +%s%N)
          hash_ms=$(( (end - start) / 1000000 ))
          echo "### SHA256 micro-benchmark" >> "$GITHUB_STEP_SUMMARY"
          echo "| Metric | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|--------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Mode | \`docker-tmpfs\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Hash time | \`${hash_ms}ms\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Filesystem | \`$(df -Th . | tail -1 | awk '{print $2}')\` |" >> "$GITHUB_STEP_SUMMARY"

      - name: Build Go Binaries (timed)
        run: |
          start=$(date +%s%N)
          GOOS=linux GOARCH=amd64 CGO_ENABLED=1 make build-prep main-build-nodeps
          end=$(date +%s%N)
          elapsed_ms=$(( (end - start) / 1000000 ))
          echo "### Build timing" >> "$GITHUB_STEP_SUMMARY"
          echo "| Metric | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|--------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Mode | \`docker-tmpfs\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Run | \`${{ matrix.run }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Build time | \`${elapsed_ms}ms\` |" >> "$GITHUB_STEP_SUMMARY"

  build-page-cache:
    strategy:
      fail-fast: false
      matrix:
        cache-mode: [none, vmtouch-lock]
        run: [1, 2, 3]
    runs-on: ubuntu-latest
    name: "build (${{ matrix.cache-mode }}) #${{ matrix.run }}"
    container:
      image: quay.io/stackrox-io/apollo-ci:stackrox-test-0.5.3
      volumes:
        - /usr:/mnt/usr
        - /opt:/mnt/opt
      options: --cap-add IPC_LOCK --ulimit memlock=-1:-1
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Warm page cache
        uses: ./.github/actions/page-cache-warm
        with:
          mode: ${{ matrix.cache-mode }}

      - uses: ./.github/actions/job-preamble
        with:
          gcp-account: ${{ secrets.GCP_SERVICE_ACCOUNT_STACKROX_CI }}

      - uses: ./.github/actions/handle-tagged-build

      - name: Cache Go dependencies
        uses: ./.github/actions/cache-go-dependencies

      - name: SHA256 micro-benchmark
        run: |
          start=$(date +%s%N)
          find . -type f \( -name '*.go' -o -name '*.s' -o -name '*.c' -o -name '*.h' \) \
            -exec cat {} + | sha256sum > /dev/null
          end=$(date +%s%N)
          hash_ms=$(( (end - start) / 1000000 ))
          echo "### SHA256 micro-benchmark" >> "$GITHUB_STEP_SUMMARY"
          echo "| Metric | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|--------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Mode | \`${{ matrix.cache-mode }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Hash time | \`${hash_ms}ms\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Filesystem | \`$(df -Th . | tail -1 | awk '{print $2}')\` |" >> "$GITHUB_STEP_SUMMARY"

      - name: Build Go Binaries (timed)
        run: |
          start=$(date +%s%N)
          GOOS=linux GOARCH=amd64 CGO_ENABLED=1 make build-prep main-build-nodeps
          end=$(date +%s%N)
          elapsed_ms=$(( (end - start) / 1000000 ))
          echo "### Build timing" >> "$GITHUB_STEP_SUMMARY"
          echo "| Metric | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|--------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Mode | \`${{ matrix.cache-mode }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Run | \`${{ matrix.run }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Build time | \`${elapsed_ms}ms\` |" >> "$GITHUB_STEP_SUMMARY"

  # ---------------------------------------------------------------------------
  # Go unit tests (3x per strategy)
  # Test cache uses mtime-based stat, not SHA256 content hashing.
  # Expecting no tmpfs benefit here.
  # ---------------------------------------------------------------------------

  test-docker-tmpfs:
    strategy:
      fail-fast: false
      matrix:
        run: [1, 2, 3]
    runs-on: ubuntu-latest
    name: "test (docker-tmpfs) #${{ matrix.run }}"
    container:
      image: quay.io/stackrox-io/apollo-ci:stackrox-test-0.5.3
      volumes:
        - /usr:/mnt/usr
        - /opt:/mnt/opt
        - /home/runner/work:/__w_host
      options: >-
        --tmpfs /__w/stackrox/stackrox:rw,exec,size=2g
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Expose local actions to host
        run: cp -a .github /__w_host/stackrox/stackrox/.github

      - uses: ./.github/actions/job-preamble
        with:
          gcp-account: ${{ secrets.GCP_SERVICE_ACCOUNT_STACKROX_CI }}

      - uses: ./.github/actions/handle-tagged-build

      - name: Cache Go dependencies
        uses: ./.github/actions/cache-go-dependencies

      - name: Go unit tests (timed)
        run: |
          start=$(date +%s%N)
          make go-unit-tests
          end=$(date +%s%N)
          elapsed_ms=$(( (end - start) / 1000000 ))
          echo "### Test timing" >> "$GITHUB_STEP_SUMMARY"
          echo "| Metric | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|--------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Mode | \`docker-tmpfs\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Run | \`${{ matrix.run }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Test time | \`${elapsed_ms}ms\` |" >> "$GITHUB_STEP_SUMMARY"

      - name: Cache stats
        if: always()
        run: |
          f="test-output/test.log"
          cached=$(grep -c '(cached)' "$f" 2>/dev/null || true)
          total=$(grep -c '^ok ' "$f" 2>/dev/null || true)
          echo "| Cached | \`${cached:-0}/${total:-0}\` |" >> "$GITHUB_STEP_SUMMARY"

  test-page-cache:
    strategy:
      fail-fast: false
      matrix:
        cache-mode: [none, vmtouch-lock]
        run: [1, 2, 3]
    runs-on: ubuntu-latest
    name: "test (${{ matrix.cache-mode }}) #${{ matrix.run }}"
    container:
      image: quay.io/stackrox-io/apollo-ci:stackrox-test-0.5.3
      volumes:
        - /usr:/mnt/usr
        - /opt:/mnt/opt
      options: --cap-add IPC_LOCK --ulimit memlock=-1:-1
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Warm page cache
        uses: ./.github/actions/page-cache-warm
        with:
          mode: ${{ matrix.cache-mode }}

      - uses: ./.github/actions/job-preamble
        with:
          gcp-account: ${{ secrets.GCP_SERVICE_ACCOUNT_STACKROX_CI }}

      - uses: ./.github/actions/handle-tagged-build

      - name: Cache Go dependencies
        uses: ./.github/actions/cache-go-dependencies

      - name: Go unit tests (timed)
        run: |
          start=$(date +%s%N)
          make go-unit-tests
          end=$(date +%s%N)
          elapsed_ms=$(( (end - start) / 1000000 ))
          echo "### Test timing" >> "$GITHUB_STEP_SUMMARY"
          echo "| Metric | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|--------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Mode | \`${{ matrix.cache-mode }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Run | \`${{ matrix.run }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Test time | \`${elapsed_ms}ms\` |" >> "$GITHUB_STEP_SUMMARY"

      - name: Cache stats
        if: always()
        run: |
          f="test-output/test.log"
          cached=$(grep -c '(cached)' "$f" 2>/dev/null || true)
          total=$(grep -c '^ok ' "$f" 2>/dev/null || true)
          echo "| Cached | \`${cached:-0}/${total:-0}\` |" >> "$GITHUB_STEP_SUMMARY"

  # ---------------------------------------------------------------------------
  # Style (golangci-lint): heavy Go analysis, reads all source files
  # ---------------------------------------------------------------------------

  style-docker-tmpfs:
    runs-on: ubuntu-latest
    name: "style (docker-tmpfs)"
    container:
      image: quay.io/stackrox-io/apollo-ci:stackrox-test-0.5.3
      volumes:
        - /usr:/mnt/usr
        - /opt:/mnt/opt
        - /home/runner/work:/__w_host
      options: >-
        --tmpfs /__w/stackrox/stackrox:rw,exec,size=2g
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Expose local actions to host
        run: cp -a .github /__w_host/stackrox/stackrox/.github

      - uses: ./.github/actions/job-preamble
        with:
          gcp-account: ${{ secrets.GCP_SERVICE_ACCOUNT_STACKROX_CI }}

      - uses: ./.github/actions/handle-tagged-build

      - name: Cache Go dependencies
        uses: ./.github/actions/cache-go-dependencies

      - name: golangci-lint (timed)
        run: |
          start=$(date +%s%N)
          make golangci-lint
          end=$(date +%s%N)
          elapsed_ms=$(( (end - start) / 1000000 ))
          echo "### Style timing" >> "$GITHUB_STEP_SUMMARY"
          echo "| Metric | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|--------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Mode | \`docker-tmpfs\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Lint time | \`${elapsed_ms}ms\` |" >> "$GITHUB_STEP_SUMMARY"

  style-page-cache:
    strategy:
      fail-fast: false
      matrix:
        cache-mode: [none, vmtouch-lock]
    runs-on: ubuntu-latest
    name: "style (${{ matrix.cache-mode }})"
    container:
      image: quay.io/stackrox-io/apollo-ci:stackrox-test-0.5.3
      volumes:
        - /usr:/mnt/usr
        - /opt:/mnt/opt
      options: --cap-add IPC_LOCK --ulimit memlock=-1:-1
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Warm page cache
        uses: ./.github/actions/page-cache-warm
        with:
          mode: ${{ matrix.cache-mode }}

      - uses: ./.github/actions/job-preamble
        with:
          gcp-account: ${{ secrets.GCP_SERVICE_ACCOUNT_STACKROX_CI }}

      - uses: ./.github/actions/handle-tagged-build

      - name: Cache Go dependencies
        uses: ./.github/actions/cache-go-dependencies

      - name: golangci-lint (timed)
        run: |
          start=$(date +%s%N)
          make golangci-lint
          end=$(date +%s%N)
          elapsed_ms=$(( (end - start) / 1000000 ))
          echo "### Style timing" >> "$GITHUB_STEP_SUMMARY"
          echo "| Metric | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|--------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Mode | \`${{ matrix.cache-mode }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Lint time | \`${elapsed_ms}ms\` |" >> "$GITHUB_STEP_SUMMARY"
