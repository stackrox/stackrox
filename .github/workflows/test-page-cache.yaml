name: Page Cache Experiment

on:
  workflow_dispatch:
  pull_request:
    types: [opened, reopened, synchronize]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  # ---------------------------------------------------------------------------
  # Core comparison: container build (mirrors build.yaml pre-build-go-binaries)
  # Page cache warm happens immediately after checkout, before anything else
  # can evict pages.
  # ---------------------------------------------------------------------------
  pre-build-go:
    strategy:
      fail-fast: false
      matrix:
        cache-mode: [none, vmtouch-touch, vmtouch-lock, copy-tmpfs]
    runs-on: ubuntu-latest
    name: "pre-build-go (${{ matrix.cache-mode }})"
    container:
      image: quay.io/stackrox-io/apollo-ci:stackrox-test-0.5.3
      volumes:
        - /usr:/mnt/usr
        - /opt:/mnt/opt
      options: --cap-add IPC_LOCK --ulimit memlock=-1:-1 --shm-size=2g
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # Warm IMMEDIATELY after checkout — before any other step can evict pages
      - name: Warm page cache
        uses: ./.github/actions/page-cache-warm
        with:
          mode: ${{ matrix.cache-mode }}

      - uses: ./.github/actions/job-preamble
        with:
          gcp-account: ${{ secrets.GCP_SERVICE_ACCOUNT_STACKROX_CI }}

      - uses: ./.github/actions/handle-tagged-build

      - name: Cache Go dependencies
        uses: ./.github/actions/cache-go-dependencies

      - name: Report cache residency before build
        run: |
          if command -v vmtouch &>/dev/null; then
            echo "### Pre-build cache residency (after deps restore)" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            vmtouch "$GITHUB_WORKSPACE" 2>/dev/null | tee -a "$GITHUB_STEP_SUMMARY" || true
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Build Go Binaries (timed)
        run: |
          start=$(date +%s%N)
          GOOS=linux GOARCH=amd64 CGO_ENABLED=1 make build-prep main-build-nodeps
          end=$(date +%s%N)
          elapsed_ms=$(( (end - start) / 1000000 ))
          elapsed_s=$(( elapsed_ms / 1000 ))
          echo "### pre-build-go timing" >> "$GITHUB_STEP_SUMMARY"
          echo "| Metric | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|--------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Cache mode | \`${{ matrix.cache-mode }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Build time | \`${elapsed_s}s\` (\`${elapsed_ms}ms\`) |" >> "$GITHUB_STEP_SUMMARY"

      - name: Bundle the build to preserve permissions
        run: tar -cvzf go-binaries-build.tgz bin/linux_amd64

      - name: Report cache residency after build
        if: always()
        run: |
          if command -v vmtouch &>/dev/null; then
            echo "### Post-build cache residency" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            vmtouch "$GITHUB_WORKSPACE" 2>/dev/null | tee -a "$GITHUB_STEP_SUMMARY" || true
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          fi

  # ---------------------------------------------------------------------------
  # Same build on bare runner (no container)
  # ---------------------------------------------------------------------------
  pre-build-go-host:
    strategy:
      fail-fast: false
      matrix:
        cache-mode: [none, vmtouch-touch, vmtouch-lock, copy-tmpfs]
    runs-on: ubuntu-latest
    name: "pre-build-go-host (${{ matrix.cache-mode }})"
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # Warm IMMEDIATELY after checkout
      - name: Warm page cache
        uses: ./.github/actions/page-cache-warm
        with:
          mode: ${{ matrix.cache-mode }}

      - uses: ./.github/actions/job-preamble
        with:
          gcp-account: ${{ secrets.GCP_SERVICE_ACCOUNT_STACKROX_CI }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: ./.github/actions/handle-tagged-build

      - name: Cache Go dependencies
        uses: ./.github/actions/cache-go-dependencies

      - name: Report cache residency before build
        run: |
          if command -v vmtouch &>/dev/null; then
            echo "### Pre-build cache residency (after deps restore)" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            vmtouch "$GITHUB_WORKSPACE" 2>/dev/null | tee -a "$GITHUB_STEP_SUMMARY" || true
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Build Go Binaries (timed)
        run: |
          start=$(date +%s%N)
          GOOS=linux GOARCH=amd64 CGO_ENABLED=1 make build-prep main-build-nodeps
          end=$(date +%s%N)
          elapsed_ms=$(( (end - start) / 1000000 ))
          elapsed_s=$(( elapsed_ms / 1000 ))
          echo "### pre-build-go-host timing" >> "$GITHUB_STEP_SUMMARY"
          echo "| Metric | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|--------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Cache mode | \`${{ matrix.cache-mode }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Build time | \`${elapsed_s}s\` (\`${elapsed_ms}ms\`) |" >> "$GITHUB_STEP_SUMMARY"

      - name: Bundle the build to preserve permissions
        run: tar -cvzf go-binaries-build.tgz bin/linux_amd64

      - name: Report cache residency after build
        if: always()
        run: |
          if command -v vmtouch &>/dev/null; then
            echo "### Post-build cache residency" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            vmtouch "$GITHUB_WORKSPACE" 2>/dev/null | tee -a "$GITHUB_STEP_SUMMARY" || true
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          fi

  # ---------------------------------------------------------------------------
  # Unit tests: the real measure of whether SHA256 hashing speedup matters
  # ---------------------------------------------------------------------------
  go-test:
    strategy:
      fail-fast: false
      matrix:
        cache-mode: [none, vmtouch-touch, vmtouch-lock, copy-tmpfs]
    runs-on: ubuntu-latest
    name: "go-test (${{ matrix.cache-mode }})"
    container:
      image: quay.io/stackrox-io/apollo-ci:stackrox-test-0.5.3
      volumes:
        - /usr:/mnt/usr
        - /opt:/mnt/opt
      options: --cap-add IPC_LOCK --ulimit memlock=-1:-1 --shm-size=2g
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # Warm IMMEDIATELY after checkout
      - name: Warm page cache
        uses: ./.github/actions/page-cache-warm
        with:
          mode: ${{ matrix.cache-mode }}

      - uses: ./.github/actions/job-preamble
        with:
          gcp-account: ${{ secrets.GCP_SERVICE_ACCOUNT_STACKROX_CI }}

      - uses: ./.github/actions/handle-tagged-build

      - name: Cache Go dependencies
        uses: ./.github/actions/cache-go-dependencies
        with:
          save: false

      - name: Report cache residency before tests
        run: |
          if command -v vmtouch &>/dev/null; then
            echo "### Pre-test cache residency (after deps restore)" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            vmtouch "$GITHUB_WORKSPACE" 2>/dev/null | tee -a "$GITHUB_STEP_SUMMARY" || true
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Go unit tests (timed)
        run: |
          start=$(date +%s%N)
          make go-unit-tests
          end=$(date +%s%N)
          elapsed_ms=$(( (end - start) / 1000000 ))
          elapsed_s=$(( elapsed_ms / 1000 ))
          echo "### go-test timing" >> "$GITHUB_STEP_SUMMARY"
          echo "| Metric | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|--------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Cache mode | \`${{ matrix.cache-mode }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Test time | \`${elapsed_s}s\` (\`${elapsed_ms}ms\`) |" >> "$GITHUB_STEP_SUMMARY"

      - name: Report cache residency after tests
        if: always()
        run: |
          if command -v vmtouch &>/dev/null; then
            echo "### Post-test cache residency" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            vmtouch "$GITHUB_WORKSPACE" 2>/dev/null | tee -a "$GITHUB_STEP_SUMMARY" || true
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          fi

  # ---------------------------------------------------------------------------
  # Docker --tmpfs overlay: tmpfs is mounted directly on the workspace path
  # at container creation time. Checkout writes directly to tmpfs — no copy
  # needed. This is the approach from the stashed build.yaml experiments.
  #
  # The --tmpfs flag mounts a fresh tmpfs on /__w/stackrox/stackrox OVER the
  # bind mount. Checkout then writes into tmpfs natively. We must copy
  # .github/ back to the host bind mount so the GHA runner can resolve local
  # actions (it reads from the host filesystem, not the container's).
  # ---------------------------------------------------------------------------
  pre-build-go-docker-tmpfs:
    runs-on: ubuntu-latest
    name: "pre-build-go (docker-tmpfs)"
    container:
      image: quay.io/stackrox-io/apollo-ci:stackrox-test-0.5.3
      volumes:
        - /usr:/mnt/usr
        - /opt:/mnt/opt
        # Expose host workspace so we can copy .github/ back for action resolution
        - /home/runner/work:/__w_host
      options: >-
        --cap-add IPC_LOCK --ulimit memlock=-1:-1
        --tmpfs /__w/stackrox/stackrox:rw,exec,size=2g
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # Copy .github/ to the host bind mount so GHA can resolve local actions
      - name: Expose local actions to host
        run: cp -a .github /__w_host/stackrox/stackrox/.github

      - uses: ./.github/actions/job-preamble
        with:
          gcp-account: ${{ secrets.GCP_SERVICE_ACCOUNT_STACKROX_CI }}

      - uses: ./.github/actions/handle-tagged-build

      - name: Cache Go dependencies
        uses: ./.github/actions/cache-go-dependencies

      - name: Report filesystem type
        run: |
          echo "### Filesystem info" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          df -Th "$GITHUB_WORKSPACE" | tee -a "$GITHUB_STEP_SUMMARY"
          mount | grep -E '(stackrox|tmpfs)' | tee -a "$GITHUB_STEP_SUMMARY" || true
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Build Go Binaries (timed)
        run: |
          start=$(date +%s%N)
          GOOS=linux GOARCH=amd64 CGO_ENABLED=1 make build-prep main-build-nodeps
          end=$(date +%s%N)
          elapsed_ms=$(( (end - start) / 1000000 ))
          elapsed_s=$(( elapsed_ms / 1000 ))
          echo "### pre-build-go (docker-tmpfs) timing" >> "$GITHUB_STEP_SUMMARY"
          echo "| Metric | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|--------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Cache mode | \`docker-tmpfs\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Build time | \`${elapsed_s}s\` (\`${elapsed_ms}ms\`) |" >> "$GITHUB_STEP_SUMMARY"

      - name: Bundle the build to preserve permissions
        run: tar -cvzf go-binaries-build.tgz bin/linux_amd64

  go-test-docker-tmpfs:
    runs-on: ubuntu-latest
    name: "go-test (docker-tmpfs)"
    container:
      image: quay.io/stackrox-io/apollo-ci:stackrox-test-0.5.3
      volumes:
        - /usr:/mnt/usr
        - /opt:/mnt/opt
        - /home/runner/work:/__w_host
      options: >-
        --cap-add IPC_LOCK --ulimit memlock=-1:-1
        --tmpfs /__w/stackrox/stackrox:rw,exec,size=2g
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Expose local actions to host
        run: cp -a .github /__w_host/stackrox/stackrox/.github

      - uses: ./.github/actions/job-preamble
        with:
          gcp-account: ${{ secrets.GCP_SERVICE_ACCOUNT_STACKROX_CI }}

      - uses: ./.github/actions/handle-tagged-build

      - name: Cache Go dependencies
        uses: ./.github/actions/cache-go-dependencies
        with:
          save: false

      - name: Report filesystem type
        run: |
          echo "### Filesystem info" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          df -Th "$GITHUB_WORKSPACE" | tee -a "$GITHUB_STEP_SUMMARY"
          mount | grep -E '(stackrox|tmpfs)' | tee -a "$GITHUB_STEP_SUMMARY" || true
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Go unit tests (timed)
        run: |
          start=$(date +%s%N)
          make go-unit-tests
          end=$(date +%s%N)
          elapsed_ms=$(( (end - start) / 1000000 ))
          elapsed_s=$(( elapsed_ms / 1000 ))
          echo "### go-test (docker-tmpfs) timing" >> "$GITHUB_STEP_SUMMARY"
          echo "| Metric | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|--------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Cache mode | \`docker-tmpfs\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Test time | \`${elapsed_s}s\` (\`${elapsed_ms}ms\`) |" >> "$GITHUB_STEP_SUMMARY"
