name: Scanner E2E tests

on:
  workflow_run:
    workflows: ["Scanner build and push images"]
    types:
      - completed

  push:
    branches:
    - jvdm/*
  
jobs:
  e2e-run:
    runs-on: ubuntu-latest
    env:
      # 4.3.x-1163-g61a55af9c8
      SCANNER_E2E_IMAGE_TAG: 4.3.x-1165-g862a40727a
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: ./.github/actions/job-preamble

      - name: Start minikube
        id: minikube
        uses: medyagh/setup-minikube@master
        with:
          driver: none # baremetal
          cache: false
          cpus: max
          memory: max
          
      - name: Deploy chart
        id: deploy
        run: |
          d="${{ runner.temp }}"/pgdata
          mkdir -m 777 -p "$d"
          wait_deployment() {
              local ns
              local name
              ns="${1:?missing required arg 'ns'}"
              name="${2:?missing required arg 'name'}"
              while ! kubectl -n "$ns" wait --for=condition=available --timeout=5m deployment/"$name"; do
                  kubectl -n "$n" describe pods -l app="$name" || true
                  kubectl -n "$n" logs -l app="$name" --all-containers=true || true
              done
              echo "Deployment $name is ready" 
          }
          wait_deployment stackrox scanner-v4 &
          wait_deployment stackrox scanner-v4-db &
          make -C scanner e2e-deploy db-host-path="$d"

      - name: Deploy failure logging
        if: ${{ steps.deploy.outcome == 'failure' }}
        run: |
          kubectl -n stackrox describe pods -l app=scanner-v4-db || true
          kubectl -n stackrox logs -l app=scanner-v4-db --all-containers=true || true
          kubectl -n stackrox describe pods -l app=scanner-v4 || true
          kubectl -n stackrox logs -l app=scanner-v4 --all-containers=true || true

      - name: Services
        run: |
          minikube service list
          minikube -n stackrox service discover --url

      - name: Run tests
        run: |
          make -C scanner e2e-run
