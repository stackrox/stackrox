name: Scanner E2E tests

on:
  workflow_run:
    workflows: ["Scanner build and push images"]
    types:
      - completed

  push:
    branches:
    - jvdm/*
  
jobs:
  e2e-run:
    runs-on: ubuntu-latest
    env:
      # 4.3.x-1163-g61a55af9c8
      SCANNER_E2E_IMAGE_TAG: 4.3.x-1165-g862a40727a
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: ./.github/actions/job-preamble

      - name: Start minikube
        id: minikube
        uses: medyagh/setup-minikube@master
        with:
          driver: none # baremetal
          cache: true
          cpus: max
          memory: max
          
      - name: Install helm chart
        run: |
          d="${{ runner.temp }}"/pgdata
          mkdir -m 777 -p "$d"
          make -C scanner e2e-deploy db-host-path="$d"

      - name: Show deployment details
        if: success() || failure()
        run: |
          kubectl -n stackrox describe pods -l app=scanner-v4-db || true
          kubectl -n stackrox logs -l app=scanner-v4-db --all-containers=true || true
          kubectl -n stackrox describe pods -l app=scanner-v4 || true
          kubectl -n stackrox logs -l app=scanner-v4 --all-containers=true || true

      - name: Run tests
        run: |
          kubectl -n stackrox expose deployment scanner-v4 --type=NodePort --port=8443
          kubectl -n stackrox get svc
          url=$(minikube service -n stackrox scanner-v4 --url)
          echo $url
          make -C scanner e2e-run matcher-addr=${url#http://} indexer-addr=${url#http://} NODEPS=1
