name: Scanner E2E tests

on:
  workflow_run:
    workflows: ["Scanner build and push images"]
    types:
      - completed

  push:
    branches:
    - jvdm/*
  
jobs:
  e2e-run:
    runs-on: ubuntu-latest
    env:
      SCANNER_E2E_IMAGE_TAG: 4.3.x-1165-g862a40727a
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: ./.github/actions/job-preamble

      - name: Start minikube
        id: minikube
        uses: medyagh/setup-minikube@master
        with:
          driver: none # baremetal
          cache: false
          cpus: max
          memory: max
          
      - name: Deploy chart
        run: |
          make tag
          t=$(mktemp)
          while sleep 1; do
              kubectl -n stackrox logs deployment/scanner-v4-db init-db -f || true
          done&
          make -C scanner e2e-deploy db-host-path=${{ runner.temp }}
          kill %1
      - name: Services
        run: |
          minikube service list
          minikube service discover --url          

      - name: Run tests
        run: |
          make -C scanner e2e-run
