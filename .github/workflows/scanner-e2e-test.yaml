name: Scanner E2E tests

on:
  workflow_run:
    workflows: ["Scanner build and push images"]
    types:
      - completed

  push:
    branches:
    - jvdm/*
  
jobs:
  e2e-run:
    runs-on: ubuntu-latest
    env:
      SCANNER_E2E_IMAGE_TAG: 4.3.x-1163-g61a55af9c8
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: ./.github/actions/job-preamble

      - name: Start minikube
        id: minikube
        uses: medyagh/setup-minikube@master
        with:
          driver: none # baremetal
          cache: false
          cpus: max
          memory: max
          
      - name: Deploy chart
        run: |
          make tag
          while sleep 10; do
              kubectl -n stackrox get pod
              [ $(( c++ % 10 )) -eq 0 ] && {
                  kubectl -n stackrox describe pod
                  kubectl -n stackrox logs deployment/scanner-v4-db
              }
          done&
          v="${{ runner.temp }}"/pgdata
          mkdir -p "$v"
          ls -ld $v
          make -C scanner e2e-deploy db-host-path="$v"
          kill %1
      - name: Services
        run: |
          minikube service list
          minikube -n stackrox service discover --url

      - name: Run tests
        run: |
          make -C scanner e2e-run
