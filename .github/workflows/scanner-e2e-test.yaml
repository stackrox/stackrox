name: Scanner E2E tests

on:
  workflow_run:
    workflows: ["Scanner build and push images"]
    types:
      - completed

  push:
    branches:
    - jvdm/*
  
jobs:
  e2e-run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: ./.github/actions/job-preamble

      - name: Start minikube
        id: minikube
        uses: medyagh/setup-minikube@master
        with:
          driver: none # baremetal
          cache: false
          cpus: max
          memory: max
          
      - name: Deploy chart
        run: |
          make tag
          make -C scanner e2e-deploy db-host-path=${{ github.workspace }}

      - name: Services
        run: |
          minikube service list
          minikube service discover --url          

      - name: Run tests
        run: |
          make -C scanner e2e-run
