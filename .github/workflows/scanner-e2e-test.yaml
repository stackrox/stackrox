name: Scanner stand-alone E2E tests

on:
  workflow_run:
    workflows: ["Scanner build and push images"]
    types:
      - completed

  push:
    branches:
    - jvdm/*
  
jobs:
  e2e-run:
    runs-on: ubuntu-latest
    env:
      # 4.3.x-1163-g61a55af9c8
      SCANNER_E2E_IMAGE_TAG: 4.3.x-1165-g862a40727a
      SCANNER_E2E_QUAY_USERNAME: ${{ secrets.QUAY_RHACS_ENG_RO_USERNAME }}
      SCANNER_E2E_QUAY_PASSWORD: ${{ secrets.QUAY_RHACS_ENG_RO_PASSWORD }}
      SCANNER_E2E_REDHAT_USERNAME: ${{ secrets.REDHAT_USERNAME }}
      SCANNER_E2E_REDHAT_PASSWORD: ${{ secrets.REDHAT_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Preamble
        uses: ./.github/actions/job-preamble

      - name: Start minikube
        uses: medyagh/setup-minikube@master
        with:
          driver: docker
          cpus: max
          memory: max
          mount-path: ${{ runner.temp }}:/runner
          
      - name: Deploy
        run: |
          mkdir -m 777 -p "${{ runner.temp }}"/pgdata
          make -C scanner e2e-deploy db-host-path="/runner/pgdata"

      - name: Show deployment
        if: success() || failure()
        run: |
          kubectl -n stackrox describe pods -l app=scanner-v4-db || true
          kubectl -n stackrox logs -l app=scanner-v4-db --all-containers=true || true
          kubectl -n stackrox describe pods -l app=scanner-v4 || true
          kubectl -n stackrox logs -l app=scanner-v4 --all-containers=true || true

      - name: Run
        run: |
          set -x
          kubectl -n stackrox expose deployment scanner-v4
          kubectl -n stackrox get svc
          kubectl -n stackrox port-forward \
              "$(kubectl -n stackrox get pods
                         -l app=scanner-v4
                         -o jsonpath="{.items[*].metadata.name}")" \
              8443:8443 &
          trap 'kill $!' EXIT
          make -C scanner e2e-run NODEPS=1
