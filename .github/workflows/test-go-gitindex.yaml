name: Test Go Git Index Optimization

on:
  workflow_dispatch:
  push:
    branches:
      - 'davdhacs/gha-disable-buildvcs'
    paths:
      - '.github/workflows/test-go-gitindex.yaml'
      - 'scripts/go-gitindex.patch'
      - '.github/actions/cache-go-dependencies/**'

defaults:
  run:
    shell: bash

jobs:

  # ==================================================================
  # STOCK GO: pre-build-cli (mirrors build.yaml)
  # ==================================================================
  pre-build-cli:
    runs-on: ubuntu-latest
    container:
      image: quay.io/stackrox-io/apollo-ci:stackrox-test-0.5.2
      volumes:
        - /usr:/mnt/usr
        - /opt:/mnt/opt
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: ./.github/actions/job-preamble
        with:
          gcp-account: ${{ secrets.GCP_SERVICE_ACCOUNT_STACKROX_CI }}

      - name: Cache Go dependencies
        uses: ./.github/actions/cache-go-dependencies

      - name: Record environment
        run: |
          echo "Go: $(go version)"
          echo "GOCACHE: $(go env GOCACHE)"
          echo "GOCACHE size: $(du -sh "$(go env GOCACHE)" 2>/dev/null | cut -f1 || echo 'empty')"

      - name: "Build CLI (stock Go)"
        run: |
          echo "=== Build 1: stock Go ==="
          time make cli 2>&1

      - name: "Rebuild CLI (stock Go, known-warm cache)"
        run: |
          echo "=== Build 2: stock Go — known-warm rebuild ==="
          time make cli 2>&1

      - name: "Warm build timing (stock Go, 3 runs)"
        run: |
          echo "=== Warm build timing ==="
          for i in 1 2 3; do
            echo -n "run $i: "
            time make cli 2>&1 | grep real || true
          done

  # ==================================================================
  # PATCHED GO: pre-build-cli (with git index optimization)
  # ==================================================================
  pre-build-cli-patched:
    needs: pre-build-cli
    runs-on: ubuntu-latest
    container:
      image: quay.io/stackrox-io/apollo-ci:stackrox-test-0.5.2
      volumes:
        - /usr:/mnt/usr
        - /opt:/mnt/opt
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: ./.github/actions/job-preamble
        with:
          gcp-account: ${{ secrets.GCP_SERVICE_ACCOUNT_STACKROX_CI }}

      # Restore GOMODCACHE from shared cache, GOCACHE from our own previous run
      - name: Cache Go dependencies
        uses: ./.github/actions/cache-go-dependencies
        with:
          cache-job-name: pre-build-cli-patched

      - name: Build patched Go toolchain
        run: |
          set -euo pipefail
          echo "::group::Clone Go 1.25.7"
          git clone --depth=1 --branch go1.25.7 https://go.googlesource.com/go /tmp/go-patched 2>&1
          echo "::endgroup::"

          echo "::group::Apply patch"
          cd /tmp/go-patched
          git apply "$GITHUB_WORKSPACE/scripts/go-gitindex.patch"
          echo "::endgroup::"

          echo "::group::Build Go toolchain"
          cd /tmp/go-patched/src
          GOROOT_BOOTSTRAP="$(go env GOROOT)" ./make.bash 2>&1 | tail -5
          echo "::endgroup::"

          echo "Patched Go: $(/tmp/go-patched/bin/go version)"

          # Make patched Go the default for subsequent steps
          echo "/tmp/go-patched/bin" >> "$GITHUB_PATH"
          echo "GOROOT=/tmp/go-patched" >> "$GITHUB_ENV"

      - name: Record environment
        run: |
          echo "Go: $(go version)"
          echo "GOCACHE: $(go env GOCACHE)"
          echo "GOCACHE size: $(du -sh "$(go env GOCACHE)" 2>/dev/null | cut -f1 || echo 'empty')"

      - name: "Build CLI (patched Go, git index enabled)"
        run: |
          echo "=== Build 1: patched Go (enabled) ==="
          time make cli 2>&1

      - name: "Rebuild CLI (patched Go, known-warm cache)"
        run: |
          echo "=== Build 2: patched Go (enabled) — known-warm rebuild ==="
          time make cli 2>&1

      - name: "Warm build timing (patched Go enabled, 3 runs)"
        run: |
          echo "=== Warm build timing (git index ENABLED) ==="
          for i in 1 2 3; do
            echo -n "run $i: "
            time make cli 2>&1 | grep real || true
          done

      - name: "Warm build timing (patched Go disabled, 3 runs)"
        run: |
          echo "=== Warm build timing (git index DISABLED via GONOBITINDEX=1) ==="
          for i in 1 2 3; do
            echo -n "run $i: "
            GONOBITINDEX=1 time make cli 2>&1 | grep real || true
          done

      - name: "Modindex stats (enabled)"
        run: |
          export GODEBUG_MODINDEX=1
          echo "=== Modindex stats (git index enabled, warm) ==="
          GOOS=linux GOARCH=amd64 CGO_ENABLED=0 \
            go build -trimpath -buildvcs=false -o /dev/null ./roxctl/ 2>&1 | \
            grep -E "^(=|  )" || true

  # ==================================================================
  # STOCK GO: pre-build-go-binaries (mirrors build.yaml, amd64 only)
  # ==================================================================
  pre-build-go-binaries:
    runs-on: ubuntu-latest
    container:
      image: quay.io/stackrox-io/apollo-ci:stackrox-test-0.5.2
      volumes:
        - /usr:/mnt/usr
        - /opt:/mnt/opt
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: ./.github/actions/job-preamble
        with:
          gcp-account: ${{ secrets.GCP_SERVICE_ACCOUNT_STACKROX_CI }}

      - name: Cache Go dependencies
        uses: ./.github/actions/cache-go-dependencies

      - name: Record environment
        run: |
          echo "Go: $(go version)"
          echo "GOCACHE: $(go env GOCACHE)"
          echo "GOCACHE size: $(du -sh "$(go env GOCACHE)" 2>/dev/null | cut -f1 || echo 'empty')"

      - name: "Build Go Binaries (stock Go, amd64)"
        run: |
          echo "=== Build 1: stock Go, CGO_ENABLED=1 ==="
          time GOOS=linux GOARCH=amd64 CGO_ENABLED=1 make build-prep main-build-nodeps 2>&1

      - name: "Rebuild Go Binaries (stock Go, known-warm)"
        run: |
          echo "=== Build 2: stock Go — known-warm rebuild ==="
          time GOOS=linux GOARCH=amd64 CGO_ENABLED=1 make build-prep main-build-nodeps 2>&1

  # ==================================================================
  # PATCHED GO: pre-build-go-binaries (with git index optimization)
  # ==================================================================
  pre-build-go-binaries-patched:
    needs: pre-build-go-binaries
    runs-on: ubuntu-latest
    container:
      image: quay.io/stackrox-io/apollo-ci:stackrox-test-0.5.2
      volumes:
        - /usr:/mnt/usr
        - /opt:/mnt/opt
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: ./.github/actions/job-preamble
        with:
          gcp-account: ${{ secrets.GCP_SERVICE_ACCOUNT_STACKROX_CI }}

      - name: Cache Go dependencies
        uses: ./.github/actions/cache-go-dependencies
        with:
          cache-job-name: pre-build-go-binaries-patched

      - name: Build patched Go toolchain
        run: |
          set -euo pipefail
          echo "::group::Clone Go 1.25.7"
          git clone --depth=1 --branch go1.25.7 https://go.googlesource.com/go /tmp/go-patched 2>&1
          echo "::endgroup::"

          echo "::group::Apply patch"
          cd /tmp/go-patched
          git apply "$GITHUB_WORKSPACE/scripts/go-gitindex.patch"
          echo "::endgroup::"

          echo "::group::Build Go toolchain"
          cd /tmp/go-patched/src
          GOROOT_BOOTSTRAP="$(go env GOROOT)" ./make.bash 2>&1 | tail -5
          echo "::endgroup::"

          echo "Patched Go: $(/tmp/go-patched/bin/go version)"
          echo "/tmp/go-patched/bin" >> "$GITHUB_PATH"
          echo "GOROOT=/tmp/go-patched" >> "$GITHUB_ENV"

      - name: Record environment
        run: |
          echo "Go: $(go version)"
          echo "GOCACHE: $(go env GOCACHE)"
          echo "GOCACHE size: $(du -sh "$(go env GOCACHE)" 2>/dev/null | cut -f1 || echo 'empty')"

      - name: "Build Go Binaries (patched Go, amd64)"
        run: |
          echo "=== Build 1: patched Go (enabled), CGO_ENABLED=1 ==="
          time GOOS=linux GOARCH=amd64 CGO_ENABLED=1 make build-prep main-build-nodeps 2>&1

      - name: "Rebuild Go Binaries (patched Go, known-warm)"
        run: |
          echo "=== Build 2: patched Go (enabled) — known-warm rebuild ==="
          time GOOS=linux GOARCH=amd64 CGO_ENABLED=1 make build-prep main-build-nodeps 2>&1

      - name: "Warm build timing (patched Go enabled, 3 runs)"
        run: |
          echo "=== Warm build timing (git index ENABLED) ==="
          for i in 1 2 3; do
            echo "--- run $i ---"
            time GOOS=linux GOARCH=amd64 CGO_ENABLED=1 make build-prep main-build-nodeps 2>&1
          done

      - name: "Warm build timing (patched Go disabled, 3 runs)"
        run: |
          echo "=== Warm build timing (git index DISABLED) ==="
          for i in 1 2 3; do
            echo "--- run $i ---"
            GONOBITINDEX=1 time GOOS=linux GOARCH=amd64 CGO_ENABLED=1 make build-prep main-build-nodeps 2>&1
          done
