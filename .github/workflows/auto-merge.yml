name: Auto-Merge for Labeled PRs

on:
  schedule:
    - cron: '*/15 * * * *'  # Every 15 minutes
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: auto-merge
  cancel-in-progress: false

jobs:
  auto-merge:
    name: Enable auto-merge for eligible PRs
    runs-on: ubuntu-latest
    if: github.repository_owner == 'stackrox'

    steps:
      - name: Find and process PRs with auto-merge labels
        env:
          GH_TOKEN: ${{ secrets.RHACS_BOT_GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          # Extract repo owner and name
          OWNER="${{ github.repository_owner }}"
          REPO="${{ github.event.repository.name }}"

          echo "::notice::Querying PRs with auto-merge labels"

          # Get all open PRs with auto-merge or auto-merge-any labels
          PR_DATA=$(gh pr list \
            --repo "${{ github.repository }}" \
            --state open \
            --limit 50 \
            --json number,labels,isDraft,mergeable,author \
            --jq '.[] | select(
              .isDraft == false and
              .mergeable == "MERGEABLE" and
              (.labels | map(.name) | any(. == "auto-merge" or . == "auto-merge-any"))
            ) | {number, labels: [.labels[].name], author: .author.login}')

          if [[ -z "$PR_DATA" ]]; then
            echo "::notice::No eligible PRs found with auto-merge labels"
            exit 0
          fi

          # Process each PR
          echo "$PR_DATA" | jq -c '.' | while read -r PR_JSON; do
            PR_NUMBER=$(echo "$PR_JSON" | jq -r '.number')
            AUTHOR=$(echo "$PR_JSON" | jq -r '.author')
            LABELS=$(echo "$PR_JSON" | jq -r '.labels | join(",")')

            echo "::notice::Processing PR #$PR_NUMBER (author=$AUTHOR, labels=$LABELS)"

            # Check if all checks have passed using GraphQL statusCheckRollup
            STATUS=$(gh api graphql -F owner="$OWNER" -F repo="$REPO" -F number="$PR_NUMBER" -f query='
              query($owner: String!, $repo: String!, $number: Int!) {
                repository(owner: $owner, name: $repo) {
                  pullRequest(number: $number) {
                    commits(last: 1) {
                      nodes {
                        commit {
                          statusCheckRollup {
                            state
                          }
                        }
                      }
                    }
                  }
                }
              }
            ' --jq '.data.repository.pullRequest.commits.nodes[0].commit.statusCheckRollup.state' || echo "null")

            echo "::notice::PR #$PR_NUMBER status check rollup: $STATUS"

            # Only proceed if all checks passed
            if [[ "$STATUS" != "SUCCESS" ]]; then
              echo "::warning::Skipping PR #$PR_NUMBER - checks not passed (status: $STATUS)"
              continue
            fi

            # Check label and semver eligibility
            ELIGIBLE=false
            if echo "$LABELS" | grep -q "auto-merge-any"; then
              echo "::notice::PR #$PR_NUMBER has auto-merge-any label - proceeding"
              ELIGIBLE=true
            elif echo "$LABELS" | grep -q "auto-merge"; then
              # auto-merge label requires semver check for Dependabot PRs
              if [[ "$AUTHOR" == "dependabot[bot]" ]]; then
                # Get PR body to extract update-type
                PR_BODY=$(gh pr view "$PR_NUMBER" --repo "${{ github.repository }}" --json body --jq '.body')

                # Extract update type from PR body (Dependabot includes this metadata)
                # Look for patterns like "Update-type: version-update:semver-minor"
                UPDATE_TYPE=$(echo "$PR_BODY" | grep -i "update-type:" | grep -oE "semver-[a-z]+" || echo "unknown")

                echo "::notice::PR #$PR_NUMBER update type: $UPDATE_TYPE"

                if [[ "$UPDATE_TYPE" =~ ^(semver-minor|semver-patch)$ ]]; then
                  echo "::notice::PR #$PR_NUMBER is minor/patch update - proceeding"
                  ELIGIBLE=true
                else
                  echo "::warning::Skipping PR #$PR_NUMBER - major version update requires manual review (type: $UPDATE_TYPE)"
                  ELIGIBLE=false
                fi
              else
                echo "::warning::Skipping PR #$PR_NUMBER - auto-merge label only works for Dependabot (use auto-merge-any for human PRs)"
                ELIGIBLE=false
              fi
            fi

            if [[ "$ELIGIBLE" != "true" ]]; then
              echo "::warning::Skipping PR #$PR_NUMBER - not eligible for auto-merge"
              continue
            fi

            # All conditions met - enable auto-merge
            echo "::notice::Approving PR #$PR_NUMBER"
            gh pr review --repo "${{ github.repository }}" \
              --approve "$PR_NUMBER" || true

            echo "::notice::Enabling auto-merge for PR #$PR_NUMBER"
            gh pr merge --repo "${{ github.repository }}" \
              --auto --squash "$PR_NUMBER"

            echo "::notice::✓ Auto-merge enabled for PR #$PR_NUMBER"
          done
