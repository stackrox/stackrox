name: Speculative Run Test
on:
  push:
    branches: [davdhacs/speed-racer-build]
  workflow_dispatch:

permissions:
  checks: write

jobs:
  # Test 1: both copies are on fast runners.
  # Expected: copy a runs, copy b's monitor fires at 30s, sees a=success → cancels b.
  # copy a: success. copy b: cancelled (Work skipped).
  test-a-wins:
    strategy:
      fail-fast: false
      matrix:
        copy: [a, b]
    continue-on-error: true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
      - uses: ./.github/actions/speculative-run
        id: gate
        continue-on-error: true
        with:
          copy: ${{ matrix.copy }}
          last-copy: b
          slow-cpu-pattern: NEVER_MATCH_THIS

      - name: Work (60s — b should be cancelled at ~30s)
        if: steps.gate.conclusion == 'success'
        run: |
          echo "Copy ${{ matrix.copy }}: working..."
          sleep 60
          echo "Copy ${{ matrix.copy }}: done"

      - name: Declare win
        if: steps.gate.conclusion == 'success' && success()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api repos/${{ github.repository }}/check-runs \
            -f name="test-a-wins" \
            -f head_sha="${{ github.sha }}" \
            -f status=completed \
            -f conclusion=success \
            -f "output[title]=Copy ${{ matrix.copy }} won" \
            2>&1 || echo "::warning::check-run post failed"

  # Test 2: copy a is on a slow runner (cpu gate fires → gate fails).
  # copy b sees gate=failure → proceeds normally.
  # Expected: copy a=failure (gate), copy b=success (runs and declares win).
  test-a-slow-b-wins:
    strategy:
      fail-fast: false
      matrix:
        include:
          - copy: a
            slow_pattern: EPYC   # matches everything → always gated out
          - copy: b
            slow_pattern: NEVER_MATCH_THIS
    continue-on-error: true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
      - uses: ./.github/actions/speculative-run
        id: gate
        continue-on-error: true
        with:
          copy: ${{ matrix.copy }}
          last-copy: b
          slow-cpu-pattern: ${{ matrix.slow_pattern }}

      - name: Work
        if: steps.gate.conclusion == 'success'
        run: |
          echo "Copy ${{ matrix.copy }}: working..."
          sleep 5

      - name: Declare win
        if: steps.gate.conclusion == 'success' && success()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api repos/${{ github.repository }}/check-runs \
            -f name="test-a-slow-b-wins" \
            -f head_sha="${{ github.sha }}" \
            -f status=completed \
            -f conclusion=success \
            -f "output[title]=Copy ${{ matrix.copy }} won" \
            2>&1 || echo "::warning::check-run post failed"

  # Test 3: three-copy race. copy a wins on first runner, b/c cancelled at 30/60s.
  test-three-copy:
    strategy:
      fail-fast: false
      matrix:
        copy: [a, b, c]
    continue-on-error: true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
      - uses: ./.github/actions/speculative-run
        id: gate
        continue-on-error: true
        with:
          copy: ${{ matrix.copy }}
          last-copy: c
          slow-cpu-pattern: NEVER_MATCH_THIS

      - name: Work (90s — b cancelled at ~30s, c at ~60s)
        if: steps.gate.conclusion == 'success'
        run: |
          echo "Copy ${{ matrix.copy }}: working..."
          sleep 90
          echo "Copy ${{ matrix.copy }}: done"

      - name: Declare win
        if: steps.gate.conclusion == 'success' && success()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api repos/${{ github.repository }}/check-runs \
            -f name="test-three-copy" \
            -f head_sha="${{ github.sha }}" \
            -f status=completed \
            -f conclusion=success \
            -f "output[title]=Copy ${{ matrix.copy }} won" \
            2>&1 || echo "::warning::check-run post failed"
