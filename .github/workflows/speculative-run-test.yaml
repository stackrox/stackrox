name: Speculative Run Test
on:
  push:
    branches: [davdhacs/speed-racer-build]
  workflow_dispatch:

permissions:
  checks: write

jobs:
  # Test SIGKILL on new children — does it produce 'cancelled'?
  kill-sigkill-new-children:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Gate (SIGKILL new children after 5s)
        run: |
          parent=$PPID
          pgrep -P "$parent" | sort > /tmp/baseline
          nohup bash -c "
            sleep 5
            new=\$(comm -13 /tmp/baseline <(pgrep -P $parent | sort))
            echo 'Sending SIGKILL to: '\$new
            for pid in \$new; do kill -9 \$pid 2>/dev/null; done
          " > /tmp/monitor.log 2>&1 &
          disown

      - name: Work (sleep 30s — should be killed after 5s)
        run: |
          echo "Work PID=$$ sleeping 30s..."
          sleep 30
          echo "Work done (should NOT appear if kill worked)"

      - name: Result
        if: always()
        run: echo "=== Monitor ===" && cat /tmp/monitor.log || true

  # Control: SIGTERM (baseline — we know this gives 'failure')
  kill-sigterm-new-children:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Gate (SIGTERM new children after 5s)
        run: |
          parent=$PPID
          pgrep -P "$parent" | sort > /tmp/baseline
          nohup bash -c "
            sleep 5
            new=\$(comm -13 /tmp/baseline <(pgrep -P $parent | sort))
            echo 'Sending SIGTERM to: '\$new
            for pid in \$new; do kill -TERM \$pid 2>/dev/null; done
          " > /tmp/monitor.log 2>&1 &
          disown

      - name: Work (sleep 30s — should be killed after 5s)
        run: |
          echo "Work PID=$$ sleeping 30s..."
          sleep 30
          echo "Work done (should NOT appear)"

      - name: Result
        if: always()
        run: echo "=== Monitor ===" && cat /tmp/monitor.log || true

  # Control: no kill
  no-kill:
    runs-on: ubuntu-latest
    steps:
      - name: Work (runs normally)
        run: echo "Working..." && sleep 5 && echo "Done ✓"
