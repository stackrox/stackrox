name: Speculative Run Test
on:
  push:
    branches: [davdhacs/speed-racer-build]
  workflow_dispatch:

permissions:
  checks: write

jobs:
  # Test 1: a=fast, b=fast — a proceeds, b's monitor sees a=success after 30s → cancels b
  test-a-wins:
    strategy:
      fail-fast: false
      matrix:
        copy: [a, b]
    continue-on-error: true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
      - uses: ./.github/actions/speculative-run
        id: gate
        continue-on-error: true
        with:
          copy: ${{ matrix.copy }}
          last-copy: b
          slow-cpu-pattern: NEVER_MATCH   # all fast for this test

      - name: Work (sleeps 60s — b should be cancelled after ~30s)
        if: steps.gate.conclusion == 'success'
        run: |
          echo "Copy ${{ matrix.copy }} working..."
          sleep 60
          echo "Copy ${{ matrix.copy }} done."

      - name: Declare win
        if: steps.gate.conclusion == 'success' && success()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api repos/${{ github.repository }}/check-runs \
            -f name="test-a-wins" \
            -f head_sha="${{ github.sha }}" \
            -f status=completed -f conclusion=success \
            -f "output[title]=Copy ${{ matrix.copy }} won" 2>&1 || true

  # Test 2: a=slow, b=fast — a exits (gate failure), b's monitor sees a=failure → b runs
  test-b-fallback:
    strategy:
      fail-fast: false
      matrix:
        copy: [a, b]
    continue-on-error: true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
      - uses: ./.github/actions/speculative-run
        id: gate
        continue-on-error: true
        with:
          copy: ${{ matrix.copy }}
          last-copy: b
          slow-cpu-pattern: ${{ matrix.copy == 'a' && 'EPYC' || 'NEVER_MATCH' }}

      - name: Work
        if: steps.gate.conclusion == 'success'
        run: |
          echo "Copy ${{ matrix.copy }} working (should only be b)..."
          sleep 10

      - name: Declare win
        if: steps.gate.conclusion == 'success' && success()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api repos/${{ github.repository }}/check-runs \
            -f name="test-b-fallback" \
            -f head_sha="${{ github.sha }}" \
            -f status=completed -f conclusion=success \
            -f "output[title]=Copy ${{ matrix.copy }} won" 2>&1 || true
