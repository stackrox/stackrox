name: Speculative Run Test
on:
  push:
    branches: [davdhacs/speed-racer-build]
    paths:
      - .github/actions/speculative-run/**
      - .github/actions/speculative-declare-win/**
      - .github/workflows/speculative-run-test.yaml
  pull_request:
    paths:
      - .github/actions/speculative-run/**
      - .github/actions/speculative-declare-win/**
      - .github/workflows/speculative-run-test.yaml
  workflow_dispatch:

permissions:
  checks: write

jobs:
  # Test 0: DIRECT (no composite action) monitor to isolate the mechanism.
  # Expected: copy a=success, copy b=cancelled.
  test-direct-monitor:
    strategy:
      fail-fast: false
      matrix:
        copy: [a, b]
    continue-on-error: true
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Gate
        run: |
          MY_COPY="${{ matrix.copy }}"
          MY_PARENT=$PPID
          echo "MY_COPY=${MY_COPY} MY_PARENT=${MY_PARENT} PPID=${PPID}"
          if [[ "$MY_COPY" == "b" ]]; then
            pgrep -P "$MY_PARENT" | sort > /tmp/speculative-baseline
            nohup bash -c "
              sleep 25
              job_line=\$(gh api 'repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/jobs?per_page=100' \
                --jq '.jobs[] | select(.name | test(\"[( ,]a[)]\$\")) | \"\(.status)/\(.conclusion)\"' \
                2>/dev/null | head -1)
              echo \"[\$(date -u +%H:%M:%S)] Sibling a: '\${job_line}'\"
              if [[ \"\${job_line}\" == 'in_progress/'* || \"\${job_line}\" == 'completed/success' ]]; then
                echo 'Sibling a is winning — cancelling b.'
                kill -TERM ${MY_PARENT} 2>/dev/null
                sleep 0.1
                new=\$(comm -13 /tmp/speculative-baseline <(pgrep -P ${MY_PARENT} | sort) 2>/dev/null)
                for pid in \$new; do kill -9 \$pid 2>/dev/null; done
              else
                echo 'No winner found — proceeding.'
              fi
            " >> /tmp/direct-monitor.log 2>&1 &
            disown
            echo "Monitor started."
          fi

      - name: Work (60s — b should be cancelled at ~25s)
        run: |
          echo "Copy ${{ matrix.copy }}: working..."
          sleep 60
          echo "Copy ${{ matrix.copy }}: done"

      - name: Monitor log
        if: always()
        run: cat /tmp/direct-monitor.log 2>/dev/null || echo "(no log)"

  # Test 1: composite action — both copies fast.
  # Expected: copy a=success, copy b=cancelled.
  test-a-wins:
    strategy:
      fail-fast: false
      matrix:
        copy: [a, b]
    continue-on-error: true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
      - uses: ./.github/actions/speculative-run
        with:
          copy: ${{ matrix.copy }}
          check-name: test-a-wins
          last-copy: b
          slow-cpu-pattern: NEVER_MATCH_THIS

      - name: Work (60s — b should be cancelled)
        run: |
          echo "Copy ${{ matrix.copy }}: working..."
          sleep 60
          echo "Copy ${{ matrix.copy }}: done"

      - name: Monitor log
        if: always()
        run: cat /tmp/speculative-monitor.log 2>/dev/null || echo "(no log)"

      - uses: ./.github/actions/speculative-declare-win
        if: success()
        with:
          check-name: test-a-wins
          copy: ${{ matrix.copy }}

  # Test 2: three-copy race. copy a wins, b/c cancelled.
  # Expected: a=success, b=cancelled, c=cancelled.
  test-three-copy:
    strategy:
      fail-fast: false
      matrix:
        copy: [a, b, c]
    continue-on-error: true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
      - uses: ./.github/actions/speculative-run
        with:
          copy: ${{ matrix.copy }}
          check-name: test-three-copy
          last-copy: c
          slow-cpu-pattern: NEVER_MATCH_THIS

      - name: Work (90s — b cancelled, c cancelled)
        run: |
          echo "Copy ${{ matrix.copy }}: working..."
          sleep 90
          echo "Copy ${{ matrix.copy }}: done"

      - name: Monitor log
        if: always()
        run: cat /tmp/speculative-monitor.log 2>/dev/null || echo "(no log)"

      - uses: ./.github/actions/speculative-declare-win
        if: success()
        with:
          check-name: test-three-copy
          copy: ${{ matrix.copy }}

  # Test 3: both a AND b are slow → c falls back as last-copy.
  # Monitor for c finds spec-a and spec-b absent after 3 polls → all_gone → c proceeds.
  # Expected: a=failure (gate), b=failure (gate), c=success.
  test-ab-slow-c-wins:
    strategy:
      fail-fast: false
      matrix:
        include:
          - copy: a
            slow_pattern: EPYC   # matches all EPYC runners → always gated out
          - copy: b
            slow_pattern: EPYC
          - copy: c
            slow_pattern: NEVER_MATCH_THIS
    continue-on-error: true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
      - uses: ./.github/actions/speculative-run
        with:
          copy: ${{ matrix.copy }}
          check-name: test-ab-slow-c-wins
          last-copy: c
          slow-cpu-pattern: ${{ matrix.slow_pattern }}

      - name: Work
        run: |
          echo "Copy ${{ matrix.copy }}: working..."
          sleep 10

      - name: Monitor log
        if: always()
        run: cat /tmp/speculative-monitor.log 2>/dev/null || echo "(no log)"

      - uses: ./.github/actions/speculative-declare-win
        if: success()
        with:
          check-name: test-ab-slow-c-wins
          copy: ${{ matrix.copy }}

  # Test 4: copy a is on a slow runner (cpu gate fires → gate fails).
  # Expected: copy a=failure (gate), copy b=success.
  test-a-slow-b-wins:
    strategy:
      fail-fast: false
      matrix:
        include:
          - copy: a
            slow_pattern: EPYC
          - copy: b
            slow_pattern: NEVER_MATCH_THIS
    continue-on-error: true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
      - uses: ./.github/actions/speculative-run
        with:
          copy: ${{ matrix.copy }}
          check-name: test-a-slow-b-wins
          last-copy: b
          slow-cpu-pattern: ${{ matrix.slow_pattern }}

      - name: Work
        run: |
          echo "Copy ${{ matrix.copy }}: working..."
          sleep 5

      - uses: ./.github/actions/speculative-declare-win
        if: success()
        with:
          check-name: test-a-slow-b-wins
          copy: ${{ matrix.copy }}
