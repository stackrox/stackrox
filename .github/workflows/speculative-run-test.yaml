name: Speedracer Test
# Sample run 3 — automated CI sampling
on:
  push:
    branches: [davdhacs/speed-racer-build]
    paths:
      - .github/actions/speedracer-gate/**
      - .github/actions/speedracer-finish/**
      - .github/workflows/speculative-run-test.yaml
  pull_request:
    paths:
      - .github/actions/speedracer-gate/**
      - .github/actions/speedracer-finish/**
      - .github/workflows/speculative-run-test.yaml
  workflow_dispatch:

permissions:
  checks: write

jobs:
  # Test 0: DIRECT (no composite action) monitor to isolate the mechanism.
  # Expected: copy a=success, copy b=cancelled.
  test-direct-monitor:
    strategy:
      matrix:
        speedracer: [a, b]
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Gate
        run: |
          MY_COPY="${{ matrix.speedracer }}"
          MY_PARENT=$PPID
          echo "MY_COPY=${MY_COPY} MY_PARENT=${MY_PARENT} PPID=${PPID}"
          if [[ "$MY_COPY" == "b" ]]; then
            pgrep -P "$MY_PARENT" | sort > /tmp/speculative-baseline
            nohup bash -c "
              sleep 25
              job_line=\$(gh api 'repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/jobs?per_page=100' \
                --jq '.jobs[] | select(.name | test(\"[( ,]a[)]\$\")) | \"\(.status)/\(.conclusion)\"' \
                2>/dev/null | head -1)
              echo \"[\$(date -u +%H:%M:%S)] Sibling a: '\${job_line}'\"
              if [[ \"\${job_line}\" == 'in_progress/'* || \"\${job_line}\" == 'completed/success' ]]; then
                echo 'Sibling a is winning — cancelling b.'
                kill -TERM ${MY_PARENT} 2>/dev/null
                sleep 0.1
                new=\$(comm -13 /tmp/speculative-baseline <(pgrep -P ${MY_PARENT} | sort) 2>/dev/null)
                for pid in \$new; do kill -9 \$pid 2>/dev/null; done
              else
                echo 'No winner found — proceeding.'
              fi
            " >> /tmp/direct-monitor.log 2>&1 &
            disown
            echo "Monitor started."
          fi

      - name: Work (60s — b should be cancelled at ~25s)
        run: |
          echo "Copy ${{ matrix.speedracer }}: working..."
          sleep 60
          echo "Copy ${{ matrix.speedracer }}: done"

      - name: Monitor log
        if: always()
        run: cat /tmp/direct-monitor.log 2>/dev/null || echo "(no log)"

  # Test 1: composite action — both copies fast.
  # Expected: copy a=success, copy b=cancelled.
  test-a-wins:
    strategy:
      matrix:
        speedracer: [a, b]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
      - uses: ./.github/actions/speedracer-gate
        with:
          slow-cpu-pattern: NEVER_MATCH_THIS

      - name: Work (60s — b should be cancelled)
        run: |
          echo "Copy ${{ matrix.speedracer }}: working..."
          sleep 60
          echo "Copy ${{ matrix.speedracer }}: done"

      - name: Monitor log
        if: always()
        run: cat /tmp/speedracer-monitor.log 2>/dev/null || echo "(no log)"

      - uses: ./.github/actions/speedracer-finish

  # Test 2: three-copy race. copy a wins, b/c cancelled.
  # Expected: a=success, b=cancelled, c=cancelled.
  test-three-copy:
    strategy:
      matrix:
        speedracer: [a, b, c]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
      - uses: ./.github/actions/speedracer-gate
        with:
          slow-cpu-pattern: NEVER_MATCH_THIS

      - name: Work (90s — b cancelled, c cancelled)
        run: |
          echo "Copy ${{ matrix.speedracer }}: working..."
          sleep 90
          echo "Copy ${{ matrix.speedracer }}: done"

      - name: Monitor log
        if: always()
        run: cat /tmp/speedracer-monitor.log 2>/dev/null || echo "(no log)"

      - uses: ./.github/actions/speedracer-finish

  # Test 3: both a AND b are slow → c falls back as last-copy.
  # Uses deterministic CPU detection so the gate always fires on a and b
  # regardless of actual runner type (no EPYC dependency).
  # Expected: a=cancelled (gate), b=cancelled (gate), c=success.
  test-ab-slow-c-wins:
    strategy:
      matrix:
        speedracer: [a, b, c]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
      - name: Read CPU model (deterministic slow pattern for a and b)
        id: cpu
        run: |
          model=$(grep -m1 'model name' /proc/cpuinfo | cut -d: -f2 | xargs)
          echo "model=${model}" >> "$GITHUB_OUTPUT"
      - uses: ./.github/actions/speedracer-gate
        with:
          slow-cpu-pattern: ${{ contains(fromJSON('["a","b"]'), matrix.speedracer) && steps.cpu.outputs.model || 'NEVER_MATCH_THIS' }}

      - name: Work
        run: |
          echo "Copy ${{ matrix.speedracer }}: working..."
          sleep 10

      - name: Monitor log
        if: always()
        run: cat /tmp/speedracer-monitor.log 2>/dev/null || echo "(no log)"

      - uses: ./.github/actions/speedracer-finish

  # Test 4: copy a is on a slow runner (deterministic: reads actual CPU model
  # and uses it as the slow pattern so the gate always fires on any runner type).
  # Expected: copy a=cancelled (gate), copy b=success.
  test-a-slow-b-wins:
    strategy:
      matrix:
        speedracer: [a, b]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
      - name: Read CPU model (for deterministic slow-runner pattern on copy a)
        id: cpu
        run: |
          model=$(grep -m1 'model name' /proc/cpuinfo | cut -d: -f2 | xargs)
          echo "model=${model}" >> "$GITHUB_OUTPUT"
      - uses: ./.github/actions/speedracer-gate
        with:
          slow-cpu-pattern: ${{ matrix.speedracer == 'a' && steps.cpu.outputs.model || 'NEVER_MATCH_THIS' }}

      - name: Work
        run: |
          echo "Copy ${{ matrix.speedracer }}: working..."
          sleep 5

      - name: Monitor log
        if: always()
        run: cat /tmp/speedracer-monitor.log 2>/dev/null || echo "(no log)"

      - uses: ./.github/actions/speedracer-finish

  # Test 5: enabled=false → kill switch. Both copies run normally with no
  # racing or cancellation. Tests the emergency bypass input.
  # Expected: a=success, b=success (both complete independently).
  test-disabled:
    strategy:
      matrix:
        speedracer: [a, b]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
      - uses: ./.github/actions/speedracer-gate
        with:
          enabled: 'false'

      - name: Work (both copies must reach here — no cancellation)
        run: |
          echo "Copy ${{ matrix.speedracer }}: working (enabled=false, should not be cancelled)..."
          sleep 5

  # Test 6: winner completes before monitor's first poll (5-6s initial sleep).
  # Work is only 2s → copy a finishes and posts conclusion=success before copy b's
  # monitor wakes up. Tests the monitor's conclusion==success branch.
  # Expected: a=success (declares win ~10s), b=cancelled (monitor finds a=success).
  test-fast-winner:
    strategy:
      matrix:
        speedracer: [a, b]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
      - uses: ./.github/actions/speedracer-gate
        with:
          slow-cpu-pattern: NEVER_MATCH_THIS

      - name: Work (2s — completes before monitor's 5-6s initial sleep)
        run: |
          echo "Copy ${{ matrix.speedracer }}: fast work..."
          sleep 2

      - name: Monitor log
        if: always()
        run: cat /tmp/speedracer-monitor.log 2>/dev/null || echo "(no log)"

      - uses: ./.github/actions/speedracer-finish

  # Test 7: 4-copy (copy d). Tests the gate's d→"a b c" case and monitor
  # watching three siblings.
  # Expected: a=success, b/c/d=cancelled.
  test-four-copy:
    strategy:
      matrix:
        speedracer: [a, b, c, d]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
      - uses: ./.github/actions/speedracer-gate
        with:
          slow-cpu-pattern: NEVER_MATCH_THIS

      - name: Work (120s — d should be cancelled after a wins)
        run: |
          echo "Copy ${{ matrix.speedracer }}: working..."
          sleep 120

      - name: Monitor log
        if: always()
        run: cat /tmp/speedracer-monitor.log 2>/dev/null || echo "(no log)"

      - uses: ./.github/actions/speedracer-finish
