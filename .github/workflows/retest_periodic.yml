name: Auto /retest
on:
  workflow_dispatch:
  schedule:
  - cron: 5,15,25,35,45,55 * * * *
concurrency:
  group: Auto /retest
  cancel-in-progress: false
jobs:
  retest:
    if:  ${{ github.repository_owner == 'stackrox' }}
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # ratchet:actions/checkout@v7.0.0
      with:
        sparse-checkout: |
          .github
          tools/retest

    - name: Setup Go environment
      uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # ratchet:actions/setup-go@v6
      with:
        go-version-file: go.mod

    - name: Retest
      env:
        GITHUB_TOKEN: ${{ secrets.RHACS_BOT_GITHUB_TOKEN }}
      run: cd tools/retest && go run ./...
