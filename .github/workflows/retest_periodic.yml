name: Auto /retest
on:
  workflow_dispatch:
  schedule:
  - cron: 5,15,25,35,45,55 * * * *
concurrency:
  group: Auto /retest
  cancel-in-progress: false
jobs:
  retest:
    if:  ${{ github.repository_owner == 'stackrox' }}
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
      with:
        sparse-checkout: |
          .github
          tools/retest

    - name: Setup Go environment
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # ratchet:actions/setup-go@v6
      with:
        go-version-file: tools/retest/go.mod
        cache-dependency-path: tools/retest/go.sum

    - name: Retest
      env:
        GITHUB_TOKEN: ${{ secrets.RHACS_BOT_GITHUB_TOKEN }}
      run: cd tools/retest && go run ./...
