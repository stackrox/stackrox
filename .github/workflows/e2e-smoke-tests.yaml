name: E2E Smoke Tests

on:
  workflow_call:
    inputs:
      tag:
        description: "Image tag to test (e.g., 4.11.x-831-g8f262d83ee)"
        required: true
        type: string
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag to test"
        required: true
        type: string
  push:
    branches:
    - davdhacs/e2e-smoke-tests

defaults:
  run:
    shell: bash

jobs:
  kind-smoke-tests:
    name: "Smoke tests on KinD"
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      CLUSTER_NAME: kind-smoke-${{ github.run_id }}
      IMAGE_REGISTRY: quay.io/rhacs-eng
      TAG: ${{ inputs.tag || '4.11.x-831-g8f262d83ee' }}
      KIND_MEMORY_LIMIT: 6g
      ARTIFACT_DIR: ./test-artifacts

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Create KinD cluster
        run: |
          kind create cluster --name "$CLUSTER_NAME" --wait 60s
          kubectl cluster-info --context "kind-${CLUSTER_NAME}"

      - name: Set memory limit on KinD container
        run: |
          docker update --memory "${KIND_MEMORY_LIMIT}" --memory-swap "${KIND_MEMORY_LIMIT}" \
            "${CLUSTER_NAME}-control-plane"

      - name: Install metrics-server
        run: |
          kubectl apply -f https://github.com/kubernetes-sigs/metrics-server/releases/latest/download/components.yaml
          kubectl -n kube-system patch deployment metrics-server --type=json \
            -p='[{"op":"add","path":"/spec/template/spec/containers/0/args/-","value":"--kubelet-insecure-tls"}]'

      - name: Load images into KinD
        env:
          QUAY_USER: ${{ secrets.QUAY_RHACS_ENG_RO_USERNAME }}
          QUAY_PASS: ${{ secrets.QUAY_RHACS_ENG_RO_PASSWORD }}
        run: |
          # Pull images directly inside KinD node to avoid multi-arch issues
          # with "kind load docker-image" (same approach as sensor-integration-tests).
          NODE="${CLUSTER_NAME}-control-plane"
          for img in \
            "${IMAGE_REGISTRY}/main:${TAG}" \
            "${IMAGE_REGISTRY}/central-db:${TAG}" \
            "${IMAGE_REGISTRY}/scanner-v4:${TAG}" \
            "${IMAGE_REGISTRY}/scanner-v4-db:${TAG}"; do
            echo "Pulling $img into KinD node..."
            docker exec "$NODE" ctr -n k8s.io images pull \
              --user "${QUAY_USER}:${QUAY_PASS}" \
              --platform linux/amd64 \
              "$img"
          done

          # Verify images are loaded
          docker exec "$NODE" crictl images | grep -E "main|central-db|scanner" || true

      - name: Extract roxctl from main image
        env:
          QUAY_USER: ${{ secrets.QUAY_RHACS_ENG_RO_USERNAME }}
          QUAY_PASS: ${{ secrets.QUAY_RHACS_ENG_RO_PASSWORD }}
        run: |
          echo "${QUAY_PASS}" | docker login -u "${QUAY_USER}" --password-stdin quay.io
          docker pull "${IMAGE_REGISTRY}/main:${TAG}"
          container_id=$(docker create "${IMAGE_REGISTRY}/main:${TAG}")
          mkdir -p bin
          docker cp "${container_id}:/assets/downloads/cli/roxctl-linux-amd64" bin/roxctl
          docker rm "${container_id}"
          chmod +x bin/roxctl
          echo "$(pwd)/bin" >> "$GITHUB_PATH"
          bin/roxctl version

      - name: Deploy StackRox via Helm
        run: |
          # Generate the helm chart bundle using roxctl (replaces the entire
          # deploy-local.sh → deploy.sh → k8sbased.sh script chain).
          roxctl helm output central-services --image-defaults opensource --output-dir central-chart
          # roxctl dev builds hardcode 0.0.0 as image tags in internal/defaults.yaml.
          # Only patch tag: fields, not Chart.yaml version (must be valid SemVer).
          sed -i "s/tag: 0\.0\.0/tag: ${TAG}/g" central-chart/internal/defaults.yaml
          echo "Central chart image tags patched to ${TAG}"

          kubectl create namespace stackrox

          # Generate an admin password
          ROX_ADMIN_PASSWORD="$(openssl rand -base64 20)"
          echo "ROX_ADMIN_PASSWORD=${ROX_ADMIN_PASSWORD}" >> "$GITHUB_ENV"
          echo "::add-mask::${ROX_ADMIN_PASSWORD}"

          # Deploy full central-services stack including scanner-v4.
          # Resource requests set to minimal so pods always schedule.
          # The docker container cap (KIND_MEMORY_LIMIT) is the real ceiling.
          helm upgrade --install -n stackrox stackrox-central-services central-chart/ \
            --set image.registry="${IMAGE_REGISTRY}" \
            --set imagePullSecrets.allowNone=true \
            --set central.adminPassword.value="${ROX_ADMIN_PASSWORD}" \
            --set central.resources.requests.memory=100Mi \
            --set central.resources.requests.cpu=100m \
            --set central.resources.limits.memory=4Gi \
            --set central.resources.limits.cpu=2 \
            --set central.db.resources.requests.memory=100Mi \
            --set central.db.resources.requests.cpu=100m \
            --set central.db.resources.limits.memory=4Gi \
            --set central.db.resources.limits.cpu=2 \
            --set central.persistence.none=true \
            --set scanner.disable=true \
            --set scannerV4.disable=false \
            --set scannerV4.indexer.replicas=1 \
            --set scannerV4.indexer.resources.requests.memory=100Mi \
            --set scannerV4.indexer.resources.requests.cpu=100m \
            --set scannerV4.indexer.resources.limits.memory=2Gi \
            --set scannerV4.indexer.resources.limits.cpu=2 \
            --set scannerV4.matcher.replicas=1 \
            --set scannerV4.matcher.resources.requests.memory=100Mi \
            --set scannerV4.matcher.resources.requests.cpu=100m \
            --set scannerV4.matcher.resources.limits.memory=2Gi \
            --set scannerV4.matcher.resources.limits.cpu=2 \
            --set scannerV4.db.resources.requests.memory=100Mi \
            --set scannerV4.db.resources.requests.cpu=100m \
            --set scannerV4.db.resources.limits.memory=2Gi \
            --set scannerV4.db.resources.limits.cpu=2 \
            --set system.enablePodSecurityPolicies=false \
            --set central.telemetry.enabled=false

          echo "Waiting for Central..."
          kubectl -n stackrox rollout status deploy/central --timeout=5m
          kubectl -n stackrox rollout status deploy/central-db --timeout=5m
          echo "Waiting for Scanner V4..."
          kubectl -n stackrox rollout status deploy/scanner-v4-indexer --timeout=5m || true
          kubectl -n stackrox rollout status deploy/scanner-v4-matcher --timeout=5m || true
          kubectl -n stackrox rollout status deploy/scanner-v4-db --timeout=5m || true

      - name: Wait for Central API
        run: |
          kubectl -n stackrox port-forward svc/central 8000:443 &
          echo "PF_PID=$!" >> "$GITHUB_ENV"

          for i in $(seq 1 60); do
            if curl -sk "https://localhost:8000/v1/metadata" >/dev/null 2>&1; then
              break
            fi
            sleep 5
          done
          curl -sk -u "admin:${ROX_ADMIN_PASSWORD}" "https://localhost:8000/v1/metadata" | jq .

      - name: Deploy Sensor via Helm
        run: |
          roxctl helm output secured-cluster-services --image-defaults opensource --output-dir sensor-chart
          # Sensor chart stores defaults in internal/defaults/*.yaml (directory, not single file)
          find sensor-chart/internal -name "*.yaml" -exec sed -i "s/tag: 0\.0\.0/tag: ${TAG}/g" {} +
          echo "Sensor chart image tags patched to ${TAG}"

          # Generate init bundle (requires Central API)
          roxctl -e "https://localhost:8000" -p "${ROX_ADMIN_PASSWORD}" \
            --insecure-skip-tls-verify --insecure \
            central init-bundles generate kind-smoke \
            --output sensor-init-bundle.yaml

          helm upgrade --install -n stackrox stackrox-secured-cluster-services sensor-chart/ \
            --set image.registry="${IMAGE_REGISTRY}" \
            --set imagePullSecrets.allowNone=true \
            --set clusterName=remote \
            --set centralEndpoint=central.stackrox.svc:443 \
            --set sensor.resources.requests.memory=100Mi \
            --set sensor.resources.requests.cpu=100m \
            --set sensor.resources.limits.memory=4Gi \
            --set sensor.resources.limits.cpu=2 \
            --set collector.collectionMethod=CORE_BPF \
            --set collector.resources.requests.memory=100Mi \
            --set collector.resources.requests.cpu=50m \
            --set collector.resources.limits.memory=1Gi \
            --set collector.resources.limits.cpu=1 \
            --set collector.complianceResources.requests.memory=100Mi \
            --set collector.complianceResources.requests.cpu=50m \
            --set collector.complianceResources.limits.memory=1Gi \
            --set collector.complianceResources.limits.cpu=1 \
            --set admissionControl.replicas=1 \
            --set admissionControl.resources.requests.memory=100Mi \
            --set admissionControl.resources.requests.cpu=50m \
            --set admissionControl.resources.limits.memory=500Mi \
            --set admissionControl.resources.limits.cpu=500m \
            -f sensor-init-bundle.yaml

          echo "Waiting for Sensor..."
          kubectl -n stackrox rollout status deploy/sensor --timeout=5m
          kubectl -n stackrox rollout status deploy/admission-control --timeout=3m || true

      - name: Resource snapshot (pre-test)
        run: |
          echo "## Pod status"
          kubectl -n stackrox get pods
          echo ""
          echo "## Per-pod metrics"
          kubectl -n stackrox top pods --containers 2>/dev/null || echo "(metrics not yet available)"
          echo ""
          echo "## Docker memory"
          docker stats --no-stream --format "table {{.Name}}\t{{.CPUPerc}}\t{{.MemUsage}}\t{{.MemPerc}}"

      - name: Start resource monitor
        run: |
          NODE="${CLUSTER_NAME}-control-plane"
          (
            echo "=== Resource monitor started $(date) ==="
            echo "Memory limit: ${KIND_MEMORY_LIMIT}"
            PEAK_MB=0
            while true; do
              ts=$(date +%H:%M:%S)
              mem_raw=$(docker stats --no-stream --format "{{.MemUsage}}" "$NODE" 2>/dev/null || echo "?")
              central=$(kubectl -n stackrox top pod -l app=central --no-headers 2>/dev/null | awk '{print $3}' || echo "?")
              sensor=$(kubectl -n stackrox top pod -l app=sensor --no-headers 2>/dev/null | awk '{print $3}' || echo "?")
              centraldb=$(kubectl -n stackrox top pod -l app=central-db --no-headers 2>/dev/null | awk '{print $3}' || echo "?")
              restarts=$(kubectl -n stackrox get pods -o jsonpath='{range .items[*]}{.metadata.name}={.status.containerStatuses[0].restartCount} {end}' 2>/dev/null)
              echo "${ts} | docker=${mem_raw} | central=${central} centraldb=${centraldb} sensor=${sensor} | restarts: ${restarts}"

              # Track peak
              mem_val=$(echo "$mem_raw" | grep -oE '^[0-9.]+' || echo 0)
              mem_unit=$(echo "$mem_raw" | grep -oE '(MiB|GiB)' | head -1)
              if [ "$mem_unit" = "GiB" ]; then
                mem_mb=$(awk "BEGIN{printf \"%d\", $mem_val * 1024}")
              else
                mem_mb="${mem_val%.*}"
              fi
              if [ "$mem_mb" -gt "$PEAK_MB" ] 2>/dev/null; then
                PEAK_MB="$mem_mb"
                echo "${ts} | NEW PEAK: ${PEAK_MB}MB"
              fi

              sleep 15
            done
          ) > /tmp/resource-monitor.log 2>&1 &
          echo "MONITOR_PID=$!" >> "$GITHUB_ENV"

      - name: Generate auth token for Cypress
        run: |
          # Generate an API token using basic auth, same as cypress.sh/get-auth-token.sh
          ROX_AUTH_TOKEN=$(curl -sk -u "admin:${ROX_ADMIN_PASSWORD}" \
            "https://localhost:8000/v1/apitokens/generate" \
            -X POST -d '{"name":"ci-smoke","role":"Admin"}' | jq -r '.token')
          echo "ROX_AUTH_TOKEN=${ROX_AUTH_TOKEN}" >> "$GITHUB_ENV"
          echo "::add-mask::${ROX_AUTH_TOKEN}"

      - name: Run Cypress smoke test (fast validation)
        uses: cypress-io/github-action@v6
        with:
          working-directory: ui/apps/platform
          install: true
          browser: chrome
          spec: cypress/integration/smoke.test.js
          config: baseUrl=https://localhost:8000,specPattern=cypress/integration/**/*.test.{js,ts}
        env:
          CYPRESS_ROX_AUTH_TOKEN: ${{ env.ROX_AUTH_TOKEN }}

      - name: Run full Cypress e2e suite
        if: success()
        working-directory: ui/apps/platform
        run: |
          npx cypress run \
            --browser chrome \
            --config 'baseUrl=https://localhost:8000,specPattern=cypress/integration/**/*.test.{js,ts},video=false,screenshotOnRunFailure=false'
        env:
          CYPRESS_ROX_AUTH_TOKEN: ${{ env.ROX_AUTH_TOKEN }}
          CYPRESS_ORCHESTRATOR_FLAVOR: k8s

      - name: Resource report
        if: always()
        run: |
          kill "$MONITOR_PID" 2>/dev/null || true
          NODE="${CLUSTER_NAME}-control-plane"

          {
            echo "## Resource Report"
            echo ""
            echo "### Pod Status"
            echo ""
            echo "| Pod | Status | Restarts |"
            echo "|-----|--------|----------|"
            kubectl -n stackrox get pods --no-headers 2>/dev/null | while read name ready status restarts age; do
              echo "| ${name} | ${status} | ${restarts} |"
            done
            echo ""

            echo "### Per-Pod Resource Usage (final snapshot)"
            echo ""
            echo "| Pod | Container | CPU | Memory |"
            echo "|-----|-----------|-----|--------|"
            kubectl -n stackrox top pods --containers --no-headers 2>/dev/null | while read pod container cpu mem; do
              echo "| ${pod} | ${container} | ${cpu} | ${mem} |"
            done || echo "| (metrics-server not available) | | | |"
            echo ""

            echo "### KinD Container Total"
            echo ""
            docker_mem=$(docker stats --no-stream --format "{{.MemUsage}}" "$NODE" 2>/dev/null || echo "N/A")
            docker_cpu=$(docker stats --no-stream --format "{{.CPUPerc}}" "$NODE" 2>/dev/null || echo "N/A")
            echo "- **Memory**: ${docker_mem}"
            echo "- **CPU**: ${docker_cpu}"
            echo "- **Limit**: ${KIND_MEMORY_LIMIT}"
            echo ""

            echo "### Monitor Timeline (peak and alerts)"
            echo ""
            peaks=$(grep "NEW PEAK" /tmp/resource-monitor.log 2>/dev/null || echo "")
            if [ -n "$peaks" ]; then
              echo '```'
              echo "$peaks"
              echo '```'
              peak_val=$(echo "$peaks" | tail -1 | grep -oE '[0-9]+MB' || echo "unknown")
              echo ""
              echo "**Peak memory: ${peak_val}**"
            else
              echo "No peak data recorded."
            fi
            echo ""

            echo "### Health Checks"
            echo ""
            oom=$(kubectl -n stackrox get pods -o jsonpath='{range .items[*]}{range .status.containerStatuses[*]}{.lastState.terminated.reason}{end}{end}' 2>/dev/null)
            if echo "$oom" | grep -qi "oom"; then
              echo "- :x: **OOM kills detected**"
            else
              echo "- :white_check_mark: No OOM kills"
            fi
            any_restarts=$(kubectl -n stackrox get pods -o jsonpath='{range .items[*]}{.status.containerStatuses[0].restartCount}{" "}{end}' 2>/dev/null | tr ' ' '\n' | grep -v '^0$' | grep -v '^$' || true)
            if [ -n "$any_restarts" ]; then
              echo "- :x: **Pod restarts detected**"
            else
              echo "- :white_check_mark: No pod restarts"
            fi
            pending=$(kubectl -n stackrox get pods --field-selector=status.phase=Pending --no-headers 2>/dev/null | wc -l | tr -d ' ')
            if [ "$pending" -gt 0 ]; then
              echo "- :warning: **${pending} pods Pending**"
              echo ""
              echo "<details><summary>Pending pod events</summary>"
              echo ""
              echo '```'
              for pod in $(kubectl -n stackrox get pods --field-selector=status.phase=Pending -o name 2>/dev/null); do
                echo "--- $(basename "$pod") ---"
                kubectl -n stackrox describe "$pod" 2>/dev/null | grep -A5 "Events:" || true
              done
              echo '```'
              echo "</details>"
            else
              echo "- :white_check_mark: No Pending pods"
            fi
            echo ""

            echo "### Monitor Log (last 10 samples)"
            echo ""
            echo '```'
            tail -10 /tmp/resource-monitor.log 2>/dev/null || echo "(empty)"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

          # Also print to stdout for the log
          cat "$GITHUB_STEP_SUMMARY"

      - name: Check resource thresholds
        if: always()
        run: |
          # Fail if peak memory exceeded 80% of KIND_MEMORY_LIMIT.
          # This catches memory leaks, GC thrashing, or unexpectedly hungry pods
          # before they cause OOM kills or starve other processes on the runner.
          LIMIT_MB=$(echo "${KIND_MEMORY_LIMIT}" | sed 's/g$//' | awk '{print $1 * 1024}')
          THRESHOLD_MB=$(awk "BEGIN{printf \"%d\", $LIMIT_MB * 0.8}")
          PEAK_MB=$(grep "NEW PEAK" /tmp/resource-monitor.log 2>/dev/null | tail -1 | grep -oE '[0-9]+' | head -1 || echo 0)

          echo "Memory limit: ${LIMIT_MB}MB, threshold (80%): ${THRESHOLD_MB}MB, peak: ${PEAK_MB}MB"

          if [ "${PEAK_MB:-0}" -gt "$THRESHOLD_MB" ] 2>/dev/null; then
            echo "::error::Peak memory ${PEAK_MB}MB exceeded 80% threshold (${THRESHOLD_MB}MB of ${LIMIT_MB}MB limit)"
            exit 1
          fi
          echo "Memory OK: peak ${PEAK_MB}MB is within 80% of ${LIMIT_MB}MB limit"

          # Warn (but don't fail) if any pod restarted — likely OOM or crash
          restarts=$(kubectl -n stackrox get pods -o jsonpath='{range .items[*]}{.metadata.name}={.status.containerStatuses[0].restartCount}{" "}{end}' 2>/dev/null)
          if echo "$restarts" | tr ' ' '\n' | grep -v '=0$' | grep -q '='; then
            echo "::warning::Pod restarts detected: $restarts"
          fi

      - name: Collect logs
        if: always()
        run: |
          mkdir -p "$ARTIFACT_DIR"

          # StackRox pod logs
          for pod in $(kubectl -n stackrox get pods -o name 2>/dev/null); do
            pod_name=$(basename "$pod")
            kubectl -n stackrox logs "$pod" --all-containers > "${ARTIFACT_DIR}/${pod_name}.log" 2>&1 || true
          done

          # Cypress artifacts (screenshots, videos)
          cp -r ui/apps/platform/cypress/test-results/ "${ARTIFACT_DIR}/cypress-results/" 2>/dev/null || true
          cp -r ui/apps/platform/cypress/screenshots/ "${ARTIFACT_DIR}/cypress-screenshots/" 2>/dev/null || true
          cp -r ui/apps/platform/cypress/videos/ "${ARTIFACT_DIR}/cypress-videos/" 2>/dev/null || true

          # Resource monitor log
          cp /tmp/resource-monitor.log "${ARTIFACT_DIR}/resource-monitor.log" 2>/dev/null || true

      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # ratchet:actions/upload-artifact@v7
        if: always()
        with:
          name: kind-smoke-test-artifacts-${{ github.run_id }}
          path: ${{ env.ARTIFACT_DIR }}
          retention-days: 7

      - name: Cleanup
        if: always()
        run: |
          kill "$MONITOR_PID" 2>/dev/null || true
          kill "$PF_PID" 2>/dev/null || true
          kind delete cluster --name "$CLUSTER_NAME" 2>/dev/null || true

  # 8-shard matrix: each shard deploys its own KinD + full StackRox stack
  # and runs a subset of test specs. Deploy is parallelized for speed.
  kind-e2e-sharded:
    name: "Shard ${{ matrix.shard }}"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - shard: "1-access"
            specs: "cypress/integration/accessControl/**,cypress/integration/collections/**,cypress/integration/compliance/**,cypress/integration/compliance-enhanced/**"
          - shard: "2-clusters"
            specs: "cypress/integration/clusters/**,cypress/integration/administration/**"
          - shard: "3-config"
            specs: "cypress/integration/configmanagement/**"
          - shard: "4-ui"
            specs: "cypress/integration/dashboard/**,cypress/integration/integrations/**,cypress/integration/systemConfig/**,cypress/integration/systemHealth/**,cypress/integration/credentialExpiry/**"
          - shard: "5-policy"
            specs: "cypress/integration/policies/**,cypress/integration/risk/**,cypress/integration/violations/**,cypress/integration/networkGraph/**,cypress/integration/listeningEndpoints/**,cypress/integration/exceptionConfiguration/**,cypress/integration/main/**,cypress/integration/*.test.{js,ts}"
          - shard: "6-vuln-mgmt"
            specs: "cypress/integration/vulnmanagement/**"
          - shard: "7-vuln-except"
            specs: "cypress/integration/vulnerabilities/exceptionManagement/**,cypress/integration/vulnerabilities/nodeCves/**,cypress/integration/vulnerabilities/platformCves/**,cypress/integration/vulnerabilities/VulnerabilityReporting/**,cypress/integration/vulnerabilities/snooze*"
          - shard: "8-vuln-workload"
            specs: "cypress/integration/vulnerabilities/workloadCves/**"
    env:
      CLUSTER_NAME: kind-shard-${{ github.run_id }}-${{ strategy.job-index }}
      IMAGE_REGISTRY: quay.io/rhacs-eng
      TAG: ${{ inputs.tag || '4.11.x-831-g8f262d83ee' }}
      KIND_MEMORY_LIMIT: 6g
      ARTIFACT_DIR: ./test-artifacts

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Deploy StackRox on KinD
        env:
          QUAY_USER: ${{ secrets.QUAY_RHACS_ENG_RO_USERNAME }}
          QUAY_PASS: ${{ secrets.QUAY_RHACS_ENG_RO_PASSWORD }}
        run: |
          NODE="${CLUSTER_NAME}-control-plane"
          echo "${QUAY_PASS}" | docker login -u "${QUAY_USER}" --password-stdin quay.io

          # Phase 1 (parallel): KinD + docker pull (for roxctl) + npm install
          kind create cluster --name "$CLUSTER_NAME" --wait 60s &
          PID_KIND=$!
          docker pull "${IMAGE_REGISTRY}/main:${TAG}" &
          PID_DOCKER=$!
          (cd ui/apps/platform && npm ci --prefer-offline) &
          PID_NPM=$!

          wait $PID_KIND
          docker update --memory "${KIND_MEMORY_LIMIT}" --memory-swap "${KIND_MEMORY_LIMIT}" "$NODE"

          # Extract roxctl while images load into KinD
          wait $PID_DOCKER
          cid=$(docker create "${IMAGE_REGISTRY}/main:${TAG}")
          mkdir -p bin && docker cp "${cid}:/assets/downloads/cli/roxctl-linux-amd64" bin/roxctl && docker rm "${cid}"
          chmod +x bin/roxctl
          export PATH="$(pwd)/bin:$PATH"
          echo "$(pwd)/bin" >> "$GITHUB_PATH"

          # Phase 2 (parallel): Pull images into KinD + generate charts
          for img in "${IMAGE_REGISTRY}/main:${TAG}" "${IMAGE_REGISTRY}/central-db:${TAG}" \
                     "${IMAGE_REGISTRY}/scanner-v4:${TAG}" "${IMAGE_REGISTRY}/scanner-v4-db:${TAG}"; do
            echo "Pulling $img into KinD..."
            docker exec "$NODE" ctr -n k8s.io images pull --user "${QUAY_USER}:${QUAY_PASS}" --platform linux/amd64 "$img" &
          done
          # Generate charts in parallel with image pulls
          CENTRAL_CHART=central-chart
          SENSOR_CHART=sensor-chart
          roxctl helm output central-services --image-defaults opensource --output-dir "$CENTRAL_CHART" &
          roxctl helm output secured-cluster-services --image-defaults opensource --output-dir "$SENSOR_CHART" &
          wait
          # Patch 0.0.0 tags from roxctl dev build
          sed -i "s/tag: 0\.0\.0/tag: ${TAG}/g" "${CENTRAL_CHART}/internal/defaults.yaml"
          find "${SENSOR_CHART}/internal" -name "*.yaml" -exec sed -i "s/tag: 0\.0\.0/tag: ${TAG}/g" {} +

          # Phase 3: Deploy central
          kubectl create namespace stackrox
          ROX_ADMIN_PASSWORD="$(openssl rand -base64 20)"
          echo "ROX_ADMIN_PASSWORD=${ROX_ADMIN_PASSWORD}" >> "$GITHUB_ENV"
          echo "::add-mask::${ROX_ADMIN_PASSWORD}"

          helm upgrade --install -n stackrox stackrox-central-services "${CENTRAL_CHART}" \
            --set image.registry="${IMAGE_REGISTRY}" \
            --set imagePullSecrets.allowNone=true \
            --set central.adminPassword.value="${ROX_ADMIN_PASSWORD}" \
            --set central.resources.requests.memory=100Mi --set central.resources.requests.cpu=100m \
            --set central.resources.limits.memory=4Gi --set central.resources.limits.cpu=2 \
            --set central.db.resources.requests.memory=100Mi --set central.db.resources.requests.cpu=100m \
            --set central.db.resources.limits.memory=4Gi --set central.db.resources.limits.cpu=2 \
            --set central.persistence.none=true \
            --set scanner.disable=true --set scannerV4.disable=false \
            --set scannerV4.indexer.replicas=1 --set scannerV4.indexer.resources.requests.memory=100Mi --set scannerV4.indexer.resources.requests.cpu=100m --set scannerV4.indexer.resources.limits.memory=2Gi \
            --set scannerV4.matcher.replicas=1 --set scannerV4.matcher.resources.requests.memory=100Mi --set scannerV4.matcher.resources.requests.cpu=100m --set scannerV4.matcher.resources.limits.memory=2Gi \
            --set scannerV4.db.resources.requests.memory=100Mi --set scannerV4.db.resources.requests.cpu=100m --set scannerV4.db.resources.limits.memory=2Gi \
            --set system.enablePodSecurityPolicies=false --set central.telemetry.enabled=false

          # Phase 4: Wait ONLY for Central API (not full rollout of all pods)
          kubectl -n stackrox port-forward svc/central 8000:443 &
          echo "PF_PID=$!" >> "$GITHUB_ENV"
          echo "Waiting for Central API..."
          for i in $(seq 1 90); do
            curl -sk https://localhost:8000/v1/metadata >/dev/null 2>&1 && break
            sleep 2
          done
          curl -sk -u "admin:${ROX_ADMIN_PASSWORD}" "https://localhost:8000/v1/metadata" | jq -c .

          # Phase 5: Deploy sensor — use roxctl for init bundle (proven, API format TBD)
          roxctl -e "https://localhost:8000" -p "${ROX_ADMIN_PASSWORD}" \
            --insecure-skip-tls-verify --insecure \
            central init-bundles generate "shard-${{ strategy.job-index }}" \
            --output sensor-init-bundle.yaml

          helm upgrade --install -n stackrox stackrox-secured-cluster-services "${SENSOR_CHART}" \
            --set image.registry="${IMAGE_REGISTRY}" --set imagePullSecrets.allowNone=true \
            --set clusterName=remote --set centralEndpoint=central.stackrox.svc:443 \
            --set sensor.resources.requests.memory=100Mi --set sensor.resources.requests.cpu=100m --set sensor.resources.limits.memory=4Gi \
            --set collector.collectionMethod=CORE_BPF \
            --set collector.resources.requests.memory=100Mi --set collector.resources.requests.cpu=50m --set collector.resources.limits.memory=1Gi \
            --set admissionControl.replicas=1 --set admissionControl.resources.requests.memory=100Mi --set admissionControl.resources.requests.cpu=50m \
            -f sensor-init-bundle.yaml

          # Seed data + wait for npm — both in background, don't block
          kubectl create namespace qa-test 2>/dev/null || true
          kubectl -n qa-test create deployment nginx --image=nginx:1.12 --replicas=1 &
          wait $PID_NPM 2>/dev/null || true

          kubectl -n stackrox get pods
          echo "Deploy complete"

          # Start resource monitor
          (
            PEAK_MB=0
            while true; do
              mem_raw=$(docker stats --no-stream --format "{{.MemUsage}}" "$NODE" 2>/dev/null || echo "0MiB")
              mem_val=$(echo "$mem_raw" | grep -oE '^[0-9.]+' || echo 0)
              mem_unit=$(echo "$mem_raw" | grep -oE '(MiB|GiB)' | head -1)
              [ "$mem_unit" = "GiB" ] && mem_mb=$(awk "BEGIN{printf \"%d\", $mem_val * 1024}") || mem_mb="${mem_val%.*}"
              [ "${mem_mb:-0}" -gt "$PEAK_MB" ] 2>/dev/null && PEAK_MB="$mem_mb" && echo "$(date +%H:%M:%S) | NEW PEAK: ${PEAK_MB}MB"
              sleep 15
            done
          ) > /tmp/resource-monitor.log 2>&1 &
          echo "MONITOR_PID=$!" >> "$GITHUB_ENV"

      - name: Generate auth token
        run: |
          ROX_AUTH_TOKEN=$(curl -sk -u "admin:${ROX_ADMIN_PASSWORD}" \
            "https://localhost:8000/v1/apitokens/generate" \
            -X POST -d '{"name":"ci-shard","role":"Admin"}' | jq -r '.token')
          echo "ROX_AUTH_TOKEN=${ROX_AUTH_TOKEN}" >> "$GITHUB_ENV"
          echo "::add-mask::${ROX_AUTH_TOKEN}"

      - name: Run Cypress shard
        uses: cypress-io/github-action@v6
        with:
          working-directory: ui/apps/platform
          install: false
          browser: chrome
          spec: ${{ matrix.specs }}
          config: baseUrl=https://localhost:8000,specPattern=cypress/integration/**/*.test.{js,ts},video=false,screenshotOnRunFailure=false
        env:
          CYPRESS_ROX_AUTH_TOKEN: ${{ env.ROX_AUTH_TOKEN }}
          CYPRESS_ORCHESTRATOR_FLAVOR: k8s

      - name: Resource report
        if: always()
        run: |
          {
            echo "## Shard ${{ matrix.shard }} Resource Report"
            echo ""
            echo "| Pod | CPU | Memory |"
            echo "|-----|-----|--------|"
            kubectl -n stackrox top pods --no-headers 2>/dev/null | while read pod cpu mem; do
              echo "| ${pod} | ${cpu} | ${mem} |"
            done || echo "| (not available) | | |"
            echo ""
            mem=$(docker stats --no-stream --format "{{.MemUsage}}" "${CLUSTER_NAME}-control-plane" 2>/dev/null)
            echo "**Docker total: ${mem}**"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Check resource thresholds
        if: always()
        run: |
          LIMIT_MB=$(echo "${KIND_MEMORY_LIMIT}" | sed 's/g$//' | awk '{print $1 * 1024}')
          THRESHOLD_MB=$(awk "BEGIN{printf \"%d\", $LIMIT_MB * 0.8}")
          PEAK_MB=$(grep "NEW PEAK" /tmp/resource-monitor.log 2>/dev/null | tail -1 | grep -oE '[0-9]+' | head -1 || echo 0)
          echo "Memory limit: ${LIMIT_MB}MB, threshold (80%): ${THRESHOLD_MB}MB, peak: ${PEAK_MB}MB"
          if [ "${PEAK_MB:-0}" -gt "$THRESHOLD_MB" ] 2>/dev/null; then
            echo "::error::Peak memory ${PEAK_MB}MB exceeded 80% threshold (${THRESHOLD_MB}MB of ${LIMIT_MB}MB limit)"
            exit 1
          fi
          echo "Memory OK: peak ${PEAK_MB}MB is within 80% of ${LIMIT_MB}MB limit"

      - name: Cleanup
        if: always()
        run: |
          kill "$MONITOR_PID" 2>/dev/null || true
          kill "$PF_PID" 2>/dev/null || true
          kind delete cluster --name "$CLUSTER_NAME" 2>/dev/null || true
