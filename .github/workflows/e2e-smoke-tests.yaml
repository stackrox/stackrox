# StackRox UI E2E Tests on KinD
#
# Runs Cypress UI tests against a full StackRox deployment on a KinD cluster,
# all on a single GHA runner (ubuntu-latest: 4 vCPU, 16 GB RAM).
#
# Why KinD instead of GKE (Prow)?
#   - Free: no cloud infrastructure cost (GKE uses 3x e2-standard-8 = 24 vCPU, 96 GB)
#   - Fast: no cluster provisioning wait (~10 min saved)
#   - Self-contained: no external dependencies, no flaky cloud APIs
#
# Architecture:
#   Each shard runs independently on its own runner. Every shard:
#   1. Creates a KinD cluster (single node)
#   2. Renders helm charts from in-repo .htpl templates (no roxctl binary needed)
#   3. Pulls images directly into the KinD node via ctr (avoids multi-arch issues)
#   4. Deploys Central + Sensor via helm
#   5. Generates an init-bundle via the Central REST API (no roxctl needed)
#   6. Runs its assigned Cypress specs
#
#   Steps 1-5 run in a background subshell, overlapping with Cypress npm install
#   (~30s). The test step waits for an auth token file before starting.
#
# Resource budget:
#   KIND_MEMORY_LIMIT caps the KinD Docker container at 6 GB.
#   Typical peak usage: ~2.1 GiB (Central ~600 Mi, Central-DB ~500 Mi, Sensor ~200 Mi,
#   Scanner ~400 Mi, Scanner-DB ~200 Mi, kubelet/etcd ~200 Mi).
#   The 80% threshold check (4.8 GB) catches regressions before they cause OOMs.
#
# Image strategy:
#   Images are pulled compressed directly into the KinD node using ctr
#   (containerd CLI). This is faster than `docker save | kind load` because
#   docker save exports uncompressed tarballs (~1.5 GB for main vs ~500 MB
#   compressed). Same approach used by sensor-integration-tests.
#
#   All pulls run fully parallel with helm install — no image-wait gate.
#   Helm just creates k8s resources; kubelet starts each pod as its image
#   arrives (IfNotPresent policy). central-db is pulled first (smallest)
#   so its initdb gets a head start before Central's image arrives.
#
# Chart rendering:
#   Instead of building/extracting roxctl to run `roxctl helm output`, charts
#   are rendered from the .htpl templates checked into image/templates/helm/.
#   render-chart.sh copies templates, merges shared files, and substitutes
#   [< .ImageTag >] etc. with perl. This saves ~20s (no image pull + extract).
#
# Scanner configuration:
#   Matches Prow UI e2e config: legacy scanner enabled, Scanner V4 disabled
#   (ROX_SCANNER_V4=false). This reduces memory by ~1 GB and pull time by ~20s
#   while still providing vulnerability data for vuln-mgmt test shards.
#
# Init bundles:
#   Generated via POST /v1/cluster-init/init-bundles — the response contains
#   helmValuesBundle (base64-encoded YAML) that helm accepts directly via -f.
#   This registers the cluster ID in Central's database (static pre-generated
#   bundles don't work because Central rejects unknown cluster IDs).

name: E2E Smoke Tests

on:
  # Called by build.yaml after images are pushed to quay.io
  workflow_call:
    inputs:
      tag:
        description: "Image tag to test (e.g., 4.11.x-831-g8f262d83ee)"
        required: true
        type: string
  # Manual trigger for ad-hoc testing
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag to test"
        required: true
        type: string
  # Temporary: auto-trigger on branch push for iteration. Remove before merge.
  push:
    branches:
    - davdhacs/e2e-smoke-tests

defaults:
  run:
    shell: bash

jobs:
  kind-e2e-sharded:
    name: "Shard ${{ matrix.shard }}"
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      # Don't cancel other shards when one fails — we want full results
      fail-fast: false
      matrix:
        include:
          # Shards are grouped by feature area and data dependencies.
          # "Fast" shards only need Central API + Sensor deployment data.
          # "Data" shards also need scanner results or collector network flows,
          # which take 30-60s to accumulate after deploy.

          # --- Fast shards: no scanner/collector data needed ---
          - shard: "1-access"
            specs: "cypress/integration/accessControl/**,cypress/integration/collections/**,cypress/integration/compliance/**,cypress/integration/compliance-enhanced/**"
            needs_data: "false"
          - shard: "2-clusters"
            specs: "cypress/integration/clusters/**,cypress/integration/administration/**"
            needs_data: "false"
          - shard: "3-config"
            specs: "cypress/integration/configmanagement/**"
            needs_data: "false"
          - shard: "4-ui"
            specs: "cypress/integration/dashboard/**,cypress/integration/integrations/**,cypress/integration/systemConfig/**,cypress/integration/systemHealth/**,cypress/integration/credentialExpiry/**"
            needs_data: "false"

          # --- Data shards: need sensor deployments + network flows ---
          - shard: "5-policy"
            specs: "cypress/integration/policies/**,cypress/integration/risk/**,cypress/integration/violations/**,cypress/integration/networkGraph/**,cypress/integration/listeningEndpoints/**,cypress/integration/exceptionConfiguration/**,cypress/integration/main/**,cypress/integration/*.test.{js,ts}"
            needs_data: "true"

          # --- Scanner shards: need vulnerability scan results ---
          - shard: "6-vuln-mgmt"
            specs: "cypress/integration/vulnmanagement/**"
            needs_data: "true"
          - shard: "7-vuln-except"
            specs: "cypress/integration/vulnerabilities/exceptionManagement/**,cypress/integration/vulnerabilities/nodeCves/**,cypress/integration/vulnerabilities/platformCves/**,cypress/integration/vulnerabilities/VulnerabilityReporting/**,cypress/integration/vulnerabilities/snooze*"
            needs_data: "true"
          - shard: "8-vuln-workload"
            specs: "cypress/integration/vulnerabilities/workloadCves/**"
            needs_data: "true"

    env:
      # Unique cluster name per shard per run — prevents collisions on re-runs
      CLUSTER_NAME: kind-shard-${{ github.run_id }}-${{ strategy.job-index }}
      IMAGE_REGISTRY: quay.io/rhacs-eng
      TAG: ${{ inputs.tag || '4.11.x-831-g8f262d83ee' }}
      # Hard memory cap on the KinD Docker container. The runner has 16 GB;
      # 6 GB for k8s + StackRox leaves 10 GB for the OS, Docker, Node/Cypress.
      KIND_MEMORY_LIMIT: 6g
      ARTIFACT_DIR: ./test-artifacts

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      # ---------------------------------------------------------------
      # DEPLOY (background)
      #
      # The entire StackRox deployment runs in a background subshell.
      # GHA does NOT wait for background children in regular `run:` steps,
      # so the next step (npm install) starts immediately — overlapping
      # ~30s of Cypress install with the deploy.
      #
      # Timeline (typical):
      #   0s   - KinD create + chart render start (parallel)
      #   15s  - KinD ready, image pulls + helm install start (parallel)
      #   15s  - central-db image arrives first (smallest), pod starts initdb
      #   20s  - main image arrives, Central pod starts, migrator retries DB
      #   30s  - Central-DB ready, migrator connects, migration runs
      #   35s  - Central API reachable, auth token written
      #   45s  - Sensor deployed, test data seeding starts
      #   ~70s - Sensor reports >5 deployments → /tmp/data-ready touched
      #
      # The auth token is written to /tmp/rox-auth-token. The "Wait for
      # auth token" step polls for this file before Cypress runs.
      # ---------------------------------------------------------------
      - name: Deploy StackRox on KinD (background)
        env:
          QUAY_USER: ${{ secrets.QUAY_RHACS_ENG_RO_USERNAME }}
          QUAY_PASS: ${{ secrets.QUAY_RHACS_ENG_RO_PASSWORD }}
        run: |
          # Docker login before the subshell so ctr can pull from quay.io.
          # set +x prevents secrets from appearing in the GHA log — the echo
          # pipe means QUAY_PASS is a process argument briefly, but the log
          # is the real risk since ::add-mask:: hasn't registered yet.
          set +x
          echo "${QUAY_PASS}" | docker login -u "${QUAY_USER}" --password-stdin quay.io
          set -x

          # Admin password for Central — generated fresh each run
          ROX_ADMIN_PASSWORD="$(openssl rand -base64 20)"
          echo "ROX_ADMIN_PASSWORD=${ROX_ADMIN_PASSWORD}" >> "$GITHUB_ENV"
          echo "::add-mask::${ROX_ADMIN_PASSWORD}"

          (
            NODE="${CLUSTER_NAME}-control-plane"

            # Legacy scanner tag differs from main tag (stored in SCANNER_VERSION)
            SCANNER_TAG=$(cat SCANNER_VERSION)

            # --- Phase 1: KinD + chart render (parallel) ---
            # KinD create takes ~15s. Chart rendering is instant (cp + perl).
            # No --wait flag: saves ~15s, we use kubectl wait later.
            kind create cluster --name "$CLUSTER_NAME" &
            PID_KIND=$!

            # render-chart.sh processes .htpl templates from image/templates/helm/
            # into ready-to-install helm charts. Replaces `roxctl helm output`.
            .github/ci/render-chart.sh central /tmp/central-chart "$TAG" "$SCANNER_TAG" "$IMAGE_REGISTRY"
            .github/ci/render-chart.sh sensor /tmp/sensor-chart "$TAG" "$SCANNER_TAG" "$IMAGE_REGISTRY"

            wait $PID_KIND

            # Cap container memory — the KinD node is just a Docker container
            docker update --memory "${KIND_MEMORY_LIMIT}" --memory-swap "${KIND_MEMORY_LIMIT}" "$NODE"

            # --- Phase 2: Pull images + helm install (fully parallel) ---
            # ctr pull downloads compressed images directly into containerd.
            # Faster than `docker save | kind load` (compressed ~500 MB vs
            # uncompressed ~1.5 GB for main image alone).
            #
            # All image pulls run in background — helm install doesn't wait
            # for any of them. Helm just creates k8s resources; kubelet
            # handles image availability per-pod (imagePullPolicy: IfNotPresent).
            # Pods enter ErrImagePull until their image arrives via ctr, then
            # start automatically on kubelet's next retry.
            #
            # Image pulls run in their own background subprocess — the main
            # flow continues straight to helm install without waiting.
            # central-db gets exclusive bandwidth for PULL_DELAY seconds
            # before the other pulls start competing. Each shard uses a
            # different delay (0-7s via job-index) so we can measure the
            # optimal head start in a single run.
            PULL_DELAY=${{ strategy.job-index }}
            echo "central-db head start: ${PULL_DELAY}s (shard index ${{ strategy.job-index }})"
            (
              docker exec "$NODE" ctr -n k8s.io images pull --user "${QUAY_USER}:${QUAY_PASS}" --platform linux/amd64 \
                "${IMAGE_REGISTRY}/central-db:${TAG}" &
              sleep "$PULL_DELAY"
              docker exec "$NODE" ctr -n k8s.io images pull --user "${QUAY_USER}:${QUAY_PASS}" --platform linux/amd64 \
                "${IMAGE_REGISTRY}/main:${TAG}" &
              docker exec "$NODE" ctr -n k8s.io images pull --user "${QUAY_USER}:${QUAY_PASS}" --platform linux/amd64 \
                "${IMAGE_REGISTRY}/scanner:${SCANNER_TAG}" &
              docker exec "$NODE" ctr -n k8s.io images pull --user "${QUAY_USER}:${QUAY_PASS}" --platform linux/amd64 \
                "${IMAGE_REGISTRY}/scanner-db:${SCANNER_TAG}" &
              wait
            ) &

            # --- Phase 3: Deploy central-services (no image wait) ---
            # ci-values-central.yaml sets: minimal resources (100Mi/100m requests),
            # no persistence, legacy scanner on, scanner V4 off, telemetry off.
            # Central auto-generates its CA cert on first boot.
            # Pods start as images become available — no explicit wait needed.
            kubectl create namespace stackrox
            helm upgrade --install -n stackrox stackrox-central-services /tmp/central-chart \
              -f .github/ci/ci-values-central.yaml \
              --set image.registry="${IMAGE_REGISTRY}" \
              --set central.adminPassword.value="${ROX_ADMIN_PASSWORD}" >/dev/null

            # Port-forward with auto-reconnect — the loop restarts the forward
            # if it dies (e.g., during pod restart). Runs until the job ends.
            while true; do
              kubectl -n stackrox port-forward svc/central 8000:443 2>/dev/null || sleep 2
            done &

            # --- Phase 4: Wait for Central API + generate auth token ---
            # Poll /v1/metadata until Central responds (typically ~30s after helm install).
            for i in $(seq 1 90); do curl -sk https://localhost:8000/v1/metadata >/dev/null 2>&1 && break; sleep 2; done

            # Generate API token via basic auth. Written to a file so the
            # "Wait for auth token" step can pick it up across process boundaries.
            set +x
            curl -sk -u "admin:${ROX_ADMIN_PASSWORD}" \
              "https://localhost:8000/v1/apitokens/generate" \
              -X POST -d '{"name":"ci-shard","role":"Admin"}' | jq -r '.token' > /tmp/rox-auth-token
            set -x

            # --- Phase 5: Deploy secured-cluster-services ---
            # Generate init bundle via Central API (POST, not roxctl).
            # helmValuesBundle in the response is base64-encoded YAML containing
            # the CA cert, cluster ID, and service TLS certs. Central registers
            # the cluster ID in its database — static bundles don't work because
            # Central rejects unknown cluster IDs.
            set +x
            curl -sk -u "admin:${ROX_ADMIN_PASSWORD}" \
              "https://localhost:8000/v1/cluster-init/init-bundles" \
              -X POST -d "{\"name\":\"shard-${{ strategy.job-index }}\"}" \
              > /tmp/init-response.json
            set -x
            jq -r '.helmValuesBundle' /tmp/init-response.json | base64 -d > /tmp/sensor-init-bundle.yaml

            if ! grep -q "ca:" /tmp/sensor-init-bundle.yaml 2>/dev/null; then
              echo "ERROR: Init bundle generation failed"
              cat /tmp/init-response.json
              exit 1
            fi

            # ci-values-sensor.yaml sets: clusterName=remote, CORE_BPF collector,
            # 1 admission-control replica, minimal resources.
            helm upgrade --install -n stackrox stackrox-secured-cluster-services /tmp/sensor-chart \
              -f .github/ci/ci-values-sensor.yaml \
              --set image.registry="${IMAGE_REGISTRY}" \
              --set centralEndpoint=central.stackrox.svc:443 \
              -f /tmp/sensor-init-bundle.yaml >/dev/null 2>&1

            # --- Phase 6: Seed test workloads ---
            # Some test shards (risk, networkGraph, violations) need real
            # deployments observed by Sensor. Create a small workload that
            # generates network traffic for collector to observe.
            kubectl create namespace qa-test 2>/dev/null || true
            kubectl -n qa-test create deployment nginx --image=nginx:1.12 --replicas=1 2>/dev/null
            kubectl -n qa-test run busybox --image=busybox --restart=Always -- \
              sh -c 'while true; do wget -q -O /dev/null http://central.stackrox:443 2>/dev/null; sleep 5; done' 2>/dev/null

            # Wait until Sensor has reported enough deployments to Central.
            # Data-dependent shards (vuln, risk, networkGraph) wait on /tmp/data-ready.
            for i in $(seq 1 60); do
              dep_count=$(curl -sk -u "admin:${ROX_ADMIN_PASSWORD}" \
                "https://localhost:8000/v1/deploymentscount" 2>/dev/null | jq -r '.count // 0')
              [ "${dep_count:-0}" -gt 5 ] && break
              sleep 3
            done
            touch /tmp/data-ready
          ) > /tmp/deploy.log 2>&1 &

          echo "Deploy started in background (PID $!). Proceeding to Cypress install..."

          # --- Resource monitor (background) ---
          # Tracks peak Docker container memory every 15s. The "Check resource
          # thresholds" step reads /tmp/resource-monitor.log after tests finish
          # and fails the job if peak exceeded 80% of KIND_MEMORY_LIMIT.
          NODE="${CLUSTER_NAME}-control-plane"
          (
            PEAK_MB=0
            while true; do
              mem_raw=$(docker stats --no-stream --format "{{.MemUsage}}" "$NODE" 2>/dev/null || echo "0MiB")
              mem_val=$(echo "$mem_raw" | grep -oE '^[0-9.]+' || echo 0)
              mem_unit=$(echo "$mem_raw" | grep -oE '(MiB|GiB)' | head -1)
              [ "$mem_unit" = "GiB" ] && mem_mb=$(awk "BEGIN{printf \"%d\", $mem_val * 1024}") || mem_mb="${mem_val%.*}"
              [ "${mem_mb:-0}" -gt "$PEAK_MB" ] 2>/dev/null && PEAK_MB="$mem_mb" && echo "$(date +%H:%M:%S) | NEW PEAK: ${PEAK_MB}MB"
              sleep 15
            done
          ) > /tmp/resource-monitor.log 2>&1 &
          echo "MONITOR_PID=$!" >> "$GITHUB_ENV"

      # ---------------------------------------------------------------
      # CYPRESS INSTALL (overlaps with background deploy)
      #
      # npm ci runs while KinD + image pulls + helm install happen in
      # the background. This step takes ~30-40s. By the time it finishes,
      # the deploy is usually done or nearly done, so the auth-wait step
      # sees the token immediately or waits only a few seconds.
      #
      # Split from cypress-io/github-action (which bundles install+run)
      # to reclaim ~30s that was previously dead time in the auth-wait.
      # ---------------------------------------------------------------
      - name: Install Cypress dependencies
        working-directory: ui/apps/platform
        run: npm ci

      # ---------------------------------------------------------------
      # WAIT FOR AUTH TOKEN
      #
      # The background deploy writes /tmp/rox-auth-token once Central's
      # API is reachable and an admin token has been generated. With npm
      # install running first (~30s), the deploy usually finishes during
      # that step, so this wait is often <10s or instant.
      # ---------------------------------------------------------------
      - name: Wait for auth token
        run: |
          echo "Waiting for auth token (Central API must be ready)..."
          for i in $(seq 1 90); do
            [ -s /tmp/rox-auth-token ] && break
            sleep 2
          done
          if [ ! -s /tmp/rox-auth-token ]; then
            echo "::error::Auth token not generated after 3 minutes — deploy likely failed"
            echo "=== Deploy log (last 50 lines) ==="
            tail -50 /tmp/deploy.log 2>/dev/null || echo "(no log)"
            exit 1
          fi
          set +x
          ROX_AUTH_TOKEN=$(cat /tmp/rox-auth-token)
          echo "ROX_AUTH_TOKEN=${ROX_AUTH_TOKEN}" >> "$GITHUB_ENV"
          echo "::add-mask::${ROX_AUTH_TOKEN}"
          set -x
          echo "Auth token ready"

      # ---------------------------------------------------------------
      # WAIT FOR TEST DATA (scanner/collector shards only)
      #
      # Vuln-mgmt and policy shards need scanner results and/or Sensor
      # deployment observations to exist before tests make assertions.
      # The background deploy touches /tmp/data-ready once Sensor has
      # reported >5 deployments to Central. Scanner indexing may still
      # be in progress — some vuln tests may see partial results.
      # ---------------------------------------------------------------
      - name: Wait for test data (scanner + sensor)
        if: matrix.needs_data == 'true'
        run: |
          echo "This shard needs scanner/collector data. Waiting..."
          for i in $(seq 1 180); do
            [ -f /tmp/data-ready ] && echo "Data ready" && break
            sleep 2
          done
          if [ ! -f /tmp/data-ready ]; then
            echo "::warning::Data readiness timeout — tests may see partial results"
          fi
          curl -sk -u "admin:${ROX_ADMIN_PASSWORD}" "https://localhost:8000/v1/deploymentscount" 2>/dev/null | jq -c .
          curl -sk -u "admin:${ROX_ADMIN_PASSWORD}" "https://localhost:8000/v1/imagecount" 2>/dev/null | jq -c .

      # ---------------------------------------------------------------
      # CYPRESS TEST EXECUTION
      #
      # cypress-io/github-action handles Chrome launch and spec selection.
      # install: false — dependencies were already installed in the
      # "Install Cypress dependencies" step above (overlapping with deploy).
      #
      # Video recording and failure screenshots are disabled to save
      # disk and upload time. Re-enable screenshotOnRunFailure for
      # debugging specific failures.
      # ---------------------------------------------------------------
      - name: Run Cypress shard
        uses: cypress-io/github-action@v6
        with:
          working-directory: ui/apps/platform
          install: false
          browser: chrome
          spec: ${{ matrix.specs }}
          config: baseUrl=https://localhost:8000,specPattern=cypress/integration/**/*.test.{js,ts},video=false,screenshotOnRunFailure=false
        env:
          CYPRESS_ROX_AUTH_TOKEN: ${{ env.ROX_AUTH_TOKEN }}
          CYPRESS_ORCHESTRATOR_FLAVOR: k8s

      # ---------------------------------------------------------------
      # POST-TEST: resource report, threshold check, cleanup
      # ---------------------------------------------------------------
      - name: Resource report
        if: always()
        run: |
          {
            echo "## Shard ${{ matrix.shard }} Resource Report (pull delay: ${{ strategy.job-index }}s)"
            echo ""
            echo "| Pod | CPU | Memory |"
            echo "|-----|-----|--------|"
            kubectl -n stackrox top pods --no-headers 2>/dev/null | while read pod cpu mem; do
              echo "| ${pod} | ${cpu} | ${mem} |"
            done || echo "| (not available) | | |"
            echo ""
            mem=$(docker stats --no-stream --format "{{.MemUsage}}" "${CLUSTER_NAME}-control-plane" 2>/dev/null)
            echo "**Docker total: ${mem}**"
          } >> "$GITHUB_STEP_SUMMARY"

      # Memory threshold check: fail the job if peak memory exceeded 80%
      # of KIND_MEMORY_LIMIT. Catches memory regressions early — before
      # they cause OOM kills or starve Cypress/Node on the runner.
      - name: Check resource thresholds
        if: always()
        run: |
          LIMIT_MB=$(echo "${KIND_MEMORY_LIMIT}" | sed 's/g$//' | awk '{print $1 * 1024}')
          THRESHOLD_MB=$(awk "BEGIN{printf \"%d\", $LIMIT_MB * 0.8}")
          PEAK_MB=$(grep "NEW PEAK" /tmp/resource-monitor.log 2>/dev/null | tail -1 | grep -oE '[0-9]+' | head -1 || echo 0)
          echo "Memory limit: ${LIMIT_MB}MB, threshold (80%): ${THRESHOLD_MB}MB, peak: ${PEAK_MB}MB"
          if [ "${PEAK_MB:-0}" -gt "$THRESHOLD_MB" ] 2>/dev/null; then
            echo "::error::Peak memory ${PEAK_MB}MB exceeded 80% threshold (${THRESHOLD_MB}MB of ${LIMIT_MB}MB limit)"
            exit 1
          fi
          echo "Memory OK: peak ${PEAK_MB}MB is within 80% of ${LIMIT_MB}MB limit"

      - name: Collect logs
        if: always()
        run: |
          mkdir -p "$ARTIFACT_DIR"
          for pod in $(kubectl -n stackrox get pods -o name 2>/dev/null); do
            pod_name=$(basename "$pod")
            kubectl -n stackrox logs "$pod" --all-containers > "${ARTIFACT_DIR}/${pod_name}.log" 2>&1 || true
          done
          cp -r ui/apps/platform/cypress/screenshots/ "${ARTIFACT_DIR}/cypress-screenshots/" 2>/dev/null || true
          cp /tmp/deploy.log "${ARTIFACT_DIR}/deploy.log" 2>/dev/null || true
          cp /tmp/resource-monitor.log "${ARTIFACT_DIR}/resource-monitor.log" 2>/dev/null || true

      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # ratchet:actions/upload-artifact@v7
        if: always()
        with:
          name: kind-e2e-shard-${{ matrix.shard }}-${{ github.run_id }}
          path: ${{ env.ARTIFACT_DIR }}
          retention-days: 7

      - name: Cleanup
        if: always()
        run: |
          kill "$MONITOR_PID" 2>/dev/null || true
          kind delete cluster --name "$CLUSTER_NAME" 2>/dev/null || true
