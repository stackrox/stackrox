name: E2E Smoke Tests

on:
  workflow_call:
    inputs:
      tag:
        description: "Image tag to test (e.g., 4.11.x-831-g8f262d83ee)"
        required: true
        type: string
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag to test"
        required: true
        type: string
  push:
    branches:
    - davdhacs/e2e-smoke-tests

defaults:
  run:
    shell: bash

jobs:
  kind-smoke-tests:
    name: "Smoke tests on KinD"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CLUSTER_NAME: kind-smoke-${{ github.run_id }}
      IMAGE_REGISTRY: quay.io/rhacs-eng
      TAG: ${{ inputs.tag || '4.11.x-831-g8f262d83ee' }}
      KIND_MEMORY_LIMIT: 6g
      ARTIFACT_DIR: ./test-artifacts

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Create KinD cluster
        run: |
          kind create cluster --name "$CLUSTER_NAME" --wait 60s
          kubectl cluster-info --context "kind-${CLUSTER_NAME}"

      - name: Set memory limit on KinD container
        run: |
          docker update --memory "${KIND_MEMORY_LIMIT}" --memory-swap "${KIND_MEMORY_LIMIT}" \
            "${CLUSTER_NAME}-control-plane"

      - name: Install metrics-server
        run: |
          kubectl apply -f https://github.com/kubernetes-sigs/metrics-server/releases/latest/download/components.yaml
          kubectl -n kube-system patch deployment metrics-server --type=json \
            -p='[{"op":"add","path":"/spec/template/spec/containers/0/args/-","value":"--kubelet-insecure-tls"}]'

      - name: Load images into KinD
        env:
          QUAY_USER: ${{ secrets.QUAY_RHACS_ENG_RO_USERNAME }}
          QUAY_PASS: ${{ secrets.QUAY_RHACS_ENG_RO_PASSWORD }}
        run: |
          # Pull images directly inside KinD node to avoid multi-arch issues
          # with "kind load docker-image" (same approach as sensor-integration-tests).
          NODE="${CLUSTER_NAME}-control-plane"
          for img in \
            "${IMAGE_REGISTRY}/main:${TAG}" \
            "${IMAGE_REGISTRY}/central-db:${TAG}"; do
            echo "Pulling $img into KinD node..."
            docker exec "$NODE" ctr -n k8s.io images pull \
              --user "${QUAY_USER}:${QUAY_PASS}" \
              --platform linux/amd64 \
              "$img"
          done

          # Verify images are loaded
          docker exec "$NODE" crictl images | grep -E "main|central-db" || true

      - name: Extract roxctl from main image
        env:
          QUAY_USER: ${{ secrets.QUAY_RHACS_ENG_RO_USERNAME }}
          QUAY_PASS: ${{ secrets.QUAY_RHACS_ENG_RO_PASSWORD }}
        run: |
          echo "${QUAY_PASS}" | docker login -u "${QUAY_USER}" --password-stdin quay.io
          docker pull "${IMAGE_REGISTRY}/main:${TAG}"
          container_id=$(docker create "${IMAGE_REGISTRY}/main:${TAG}")
          mkdir -p bin
          docker cp "${container_id}:/assets/downloads/cli/roxctl-linux-amd64" bin/roxctl
          docker rm "${container_id}"
          chmod +x bin/roxctl
          echo "$(pwd)/bin" >> "$GITHUB_PATH"
          bin/roxctl version

      - name: Deploy StackRox via Helm
        run: |
          # Generate the helm chart bundle using roxctl (replaces the entire
          # deploy-local.sh → deploy.sh → k8sbased.sh script chain).
          roxctl helm output central-services --image-defaults opensource --output-dir central-chart
          # roxctl dev builds hardcode 0.0.0 as image tags in internal/defaults.yaml.
          # Only patch tag: fields, not Chart.yaml version (must be valid SemVer).
          sed -i "s/tag: 0\.0\.0/tag: ${TAG}/g" central-chart/internal/defaults.yaml
          echo "Central chart image tags patched to ${TAG}"

          kubectl create namespace stackrox

          # Generate an admin password
          ROX_ADMIN_PASSWORD="$(openssl rand -base64 20)"
          echo "ROX_ADMIN_PASSWORD=${ROX_ADMIN_PASSWORD}" >> "$GITHUB_ENV"
          echo "::add-mask::${ROX_ADMIN_PASSWORD}"

          # Deploy central-services. No scanner, no persistence.
          # Resource requests set to minimal so pods always schedule.
          # No per-pod limits — the docker container cap (KIND_MEMORY_LIMIT)
          # is the real ceiling. Monitor tracks actual usage.
          helm upgrade --install -n stackrox stackrox-central-services central-chart/ \
            --set image.registry="${IMAGE_REGISTRY}" \
            --set imagePullSecrets.allowNone=true \
            --set central.adminPassword.value="${ROX_ADMIN_PASSWORD}" \
            --set central.resources.requests.memory=100Mi \
            --set central.resources.requests.cpu=100m \
            --set central.resources.limits.memory=4Gi \
            --set central.resources.limits.cpu=2 \
            --set central.db.resources.requests.memory=100Mi \
            --set central.db.resources.requests.cpu=100m \
            --set central.db.resources.limits.memory=4Gi \
            --set central.db.resources.limits.cpu=2 \
            --set central.persistence.none=true \
            --set scanner.disable=true \
            --set scannerV4.disable=true \
            --set system.enablePodSecurityPolicies=false \
            --set central.telemetry.enabled=false

          echo "Waiting for Central..."
          kubectl -n stackrox rollout status deploy/central --timeout=5m
          kubectl -n stackrox rollout status deploy/central-db --timeout=5m

      - name: Wait for Central API
        run: |
          kubectl -n stackrox port-forward svc/central 8000:443 &
          echo "PF_PID=$!" >> "$GITHUB_ENV"

          for i in $(seq 1 60); do
            if curl -sk "https://localhost:8000/v1/metadata" >/dev/null 2>&1; then
              break
            fi
            sleep 5
          done
          curl -sk -u "admin:${ROX_ADMIN_PASSWORD}" "https://localhost:8000/v1/metadata" | jq .

      - name: Deploy Sensor via Helm
        run: |
          roxctl helm output secured-cluster-services --image-defaults opensource --output-dir sensor-chart
          sed -i "s/tag: 0\.0\.0/tag: ${TAG}/g" sensor-chart/internal/defaults.yaml
          echo "Sensor chart image tags patched to ${TAG}"

          # Generate init bundle (requires Central API)
          roxctl -e "https://localhost:8000" -p "${ROX_ADMIN_PASSWORD}" \
            --insecure-skip-tls-verify --insecure \
            central init-bundles generate kind-smoke \
            --output sensor-init-bundle.yaml

          helm upgrade --install -n stackrox stackrox-secured-cluster-services sensor-chart/ \
            --set image.registry="${IMAGE_REGISTRY}" \
            --set imagePullSecrets.allowNone=true \
            --set clusterName=kind-smoke \
            --set centralEndpoint=central.stackrox.svc:443 \
            --set sensor.resources.requests.memory=100Mi \
            --set sensor.resources.requests.cpu=100m \
            --set sensor.resources.limits.memory=4Gi \
            --set sensor.resources.limits.cpu=2 \
            --set collector.collectionMethod=NO_COLLECTION \
            --set admissionControl.replicas=0 \
            --set admissionControl.listenOnCreates=false \
            --set admissionControl.listenOnUpdates=false \
            -f sensor-init-bundle.yaml

          echo "Waiting for Sensor..."
          kubectl -n stackrox rollout status deploy/sensor --timeout=5m

      - name: Resource snapshot (pre-test)
        run: |
          echo "## Pod status"
          kubectl -n stackrox get pods
          echo ""
          echo "## Per-pod metrics"
          kubectl -n stackrox top pods --containers 2>/dev/null || echo "(metrics not yet available)"
          echo ""
          echo "## Docker memory"
          docker stats --no-stream --format "table {{.Name}}\t{{.CPUPerc}}\t{{.MemUsage}}\t{{.MemPerc}}"

      - name: Start resource monitor
        run: |
          NODE="${CLUSTER_NAME}-control-plane"
          (
            echo "=== Resource monitor started $(date) ==="
            echo "Memory limit: ${KIND_MEMORY_LIMIT}"
            PEAK_MB=0
            while true; do
              ts=$(date +%H:%M:%S)
              mem_raw=$(docker stats --no-stream --format "{{.MemUsage}}" "$NODE" 2>/dev/null || echo "?")
              central=$(kubectl -n stackrox top pod -l app=central --no-headers 2>/dev/null | awk '{print $3}' || echo "?")
              sensor=$(kubectl -n stackrox top pod -l app=sensor --no-headers 2>/dev/null | awk '{print $3}' || echo "?")
              centraldb=$(kubectl -n stackrox top pod -l app=central-db --no-headers 2>/dev/null | awk '{print $3}' || echo "?")
              restarts=$(kubectl -n stackrox get pods -o jsonpath='{range .items[*]}{.metadata.name}={.status.containerStatuses[0].restartCount} {end}' 2>/dev/null)
              echo "${ts} | docker=${mem_raw} | central=${central} centraldb=${centraldb} sensor=${sensor} | restarts: ${restarts}"

              # Track peak
              mem_val=$(echo "$mem_raw" | grep -oE '^[0-9.]+' || echo 0)
              mem_unit=$(echo "$mem_raw" | grep -oE '(MiB|GiB)' | head -1)
              if [ "$mem_unit" = "GiB" ]; then
                mem_mb=$(awk "BEGIN{printf \"%d\", $mem_val * 1024}")
              else
                mem_mb="${mem_val%.*}"
              fi
              if [ "$mem_mb" -gt "$PEAK_MB" ] 2>/dev/null; then
                PEAK_MB="$mem_mb"
                echo "${ts} | NEW PEAK: ${PEAK_MB}MB"
              fi

              sleep 15
            done
          ) > /tmp/resource-monitor.log 2>&1 &
          echo "MONITOR_PID=$!" >> "$GITHUB_ENV"

      - name: Set up Java
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # ratchet:actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Run smoke tests
        env:
          API_HOSTNAME: localhost
          API_PORT: "8000"
          CLUSTER: K8S
        run: |
          cd qa-tests-backend

          # copy_scanner_protos.sh uses `go list -m` to find scanner proto files
          # in the Go module cache. Download just that module first.
          go mod download github.com/stackrox/scanner
          scripts/copy_scanner_protos.sh

          # Run 3 fast deploy-time policy tests to validate the deployment.
          # These trigger within seconds (no violation wait timeouts).
          ./gradlew test \
            --tests="PolicyConfigurationTest.Verify policy configuration Image Tag*" \
            --tests="PolicyConfigurationTest.Verify policy configuration Required Label*" \
            --tests="PolicyConfigurationTest.Verify policy configuration Privileged*"

      - name: Resource report
        if: always()
        run: |
          kill "$MONITOR_PID" 2>/dev/null || true
          NODE="${CLUSTER_NAME}-control-plane"

          {
            echo "## Resource Report"
            echo ""
            echo "### Pod Status"
            echo ""
            echo "| Pod | Status | Restarts |"
            echo "|-----|--------|----------|"
            kubectl -n stackrox get pods --no-headers 2>/dev/null | while read name ready status restarts age; do
              echo "| ${name} | ${status} | ${restarts} |"
            done
            echo ""

            echo "### Per-Pod Resource Usage (final snapshot)"
            echo ""
            echo "| Pod | Container | CPU | Memory |"
            echo "|-----|-----------|-----|--------|"
            kubectl -n stackrox top pods --containers --no-headers 2>/dev/null | while read pod container cpu mem; do
              echo "| ${pod} | ${container} | ${cpu} | ${mem} |"
            done || echo "| (metrics-server not available) | | | |"
            echo ""

            echo "### KinD Container Total"
            echo ""
            docker_mem=$(docker stats --no-stream --format "{{.MemUsage}}" "$NODE" 2>/dev/null || echo "N/A")
            docker_cpu=$(docker stats --no-stream --format "{{.CPUPerc}}" "$NODE" 2>/dev/null || echo "N/A")
            echo "- **Memory**: ${docker_mem}"
            echo "- **CPU**: ${docker_cpu}"
            echo "- **Limit**: ${KIND_MEMORY_LIMIT}"
            echo ""

            echo "### Monitor Timeline (peak and alerts)"
            echo ""
            peaks=$(grep "NEW PEAK" /tmp/resource-monitor.log 2>/dev/null || echo "")
            if [ -n "$peaks" ]; then
              echo '```'
              echo "$peaks"
              echo '```'
              peak_val=$(echo "$peaks" | tail -1 | grep -oE '[0-9]+MB' || echo "unknown")
              echo ""
              echo "**Peak memory: ${peak_val}**"
            else
              echo "No peak data recorded."
            fi
            echo ""

            echo "### Health Checks"
            echo ""
            oom=$(kubectl -n stackrox get pods -o jsonpath='{range .items[*]}{range .status.containerStatuses[*]}{.lastState.terminated.reason}{end}{end}' 2>/dev/null)
            if echo "$oom" | grep -qi "oom"; then
              echo "- :x: **OOM kills detected**"
            else
              echo "- :white_check_mark: No OOM kills"
            fi
            any_restarts=$(kubectl -n stackrox get pods -o jsonpath='{range .items[*]}{.status.containerStatuses[0].restartCount}{" "}{end}' 2>/dev/null | tr ' ' '\n' | grep -v '^0$' | grep -v '^$' || true)
            if [ -n "$any_restarts" ]; then
              echo "- :x: **Pod restarts detected**"
            else
              echo "- :white_check_mark: No pod restarts"
            fi
            pending=$(kubectl -n stackrox get pods --field-selector=status.phase=Pending --no-headers 2>/dev/null | wc -l | tr -d ' ')
            if [ "$pending" -gt 0 ]; then
              echo "- :warning: **${pending} pods Pending**"
              echo ""
              echo "<details><summary>Pending pod events</summary>"
              echo ""
              echo '```'
              for pod in $(kubectl -n stackrox get pods --field-selector=status.phase=Pending -o name 2>/dev/null); do
                echo "--- $(basename "$pod") ---"
                kubectl -n stackrox describe "$pod" 2>/dev/null | grep -A5 "Events:" || true
              done
              echo '```'
              echo "</details>"
            else
              echo "- :white_check_mark: No Pending pods"
            fi
            echo ""

            echo "### Monitor Log (last 10 samples)"
            echo ""
            echo '```'
            tail -10 /tmp/resource-monitor.log 2>/dev/null || echo "(empty)"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

          # Also print to stdout for the log
          cat "$GITHUB_STEP_SUMMARY"

      - name: Collect logs
        if: always()
        run: |
          mkdir -p "$ARTIFACT_DIR"

          # StackRox pod logs
          for pod in $(kubectl -n stackrox get pods -o name 2>/dev/null); do
            pod_name=$(basename "$pod")
            kubectl -n stackrox logs "$pod" --all-containers > "${ARTIFACT_DIR}/${pod_name}.log" 2>&1 || true
          done

          # Groovy test results
          cp -r qa-tests-backend/build/reports/tests/testSMOKE/ "${ARTIFACT_DIR}/test-report/" 2>/dev/null || true
          cp -r qa-tests-backend/build/test-results/testSMOKE/ "${ARTIFACT_DIR}/test-results/" 2>/dev/null || true

          # Resource monitor log
          cp /tmp/resource-monitor.log "${ARTIFACT_DIR}/resource-monitor.log" 2>/dev/null || true

      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # ratchet:actions/upload-artifact@v7
        if: always()
        with:
          name: kind-smoke-test-artifacts-${{ github.run_id }}
          path: ${{ env.ARTIFACT_DIR }}
          retention-days: 7

      - name: Publish test summary
        uses: test-summary/action@31493c76ec9e7aa675f1585d3ed6f1da69269a86 # ratchet:test-summary/action@v2
        if: always()
        with:
          paths: test-artifacts/test-results/*.xml
          show: all

      - name: Cleanup
        if: always()
        run: |
          kill "$PF_PID" 2>/dev/null || true
          kind delete cluster --name "$CLUSTER_NAME" 2>/dev/null || true
