name: Build
on:
  workflow_dispatch:
    inputs:
      commit:
        description: 'Commit SHA to build'
        required: true
        type: string
  workflow_call:
  push:
    tags:
    - '*-nightly-*'
    branches:
    - master
  pull_request:
    types:
    - opened
    - reopened
    - synchronize

defaults:
  run:
    # This enables `-o pipefail` for all jobs as compared to when shell isn't set.
    # See https://docs.github.com/en/actions/writing-workflows/workflow-syntax-for-github-actions#defaultsrunshell
    shell: bash

jobs:
  define-job-matrix:
    outputs:
      matrix: ${{ steps.define-job-matrix.outputs.matrix }}
      build-tag: ${{ steps.build-tag.outputs.tag }}
      short-commit: ${{ steps.short-commit.outputs.shortcommit }}
      gotags: ${{ steps.gotags.outputs.gotags }}
      quay-tag-expiration: ${{ steps.quay-tag-expiration.outputs.expiration }}
    runs-on: ubuntu-slim
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ inputs.commit || github.event.pull_request.head.sha }}

      - uses: ./.github/actions/handle-tagged-build

      - name: Compute build tag
        id: build-tag
        run: |
          TAG=$(make --quiet --no-print-directory tag)
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Compute short commit
        id: short-commit
        run: |
          SHORTCOMMIT=$(make --quiet --no-print-directory shortcommit)
          echo "shortcommit=${SHORTCOMMIT}" >> "$GITHUB_OUTPUT"

      - name: Compute GOTAGS
        id: gotags
        run: |
          GOTAGS=""
          if [[ "${GITHUB_REF}" =~ ^refs/tags/ ]]; then
            # Tag builds (release or nightly) get release GOTAGS
            GOTAGS="release"
          fi
          echo "gotags=${GOTAGS}" >> "$GITHUB_OUTPUT"

      - name: Compute Quay tag expiration
        id: quay-tag-expiration
        run: |
          EXPIRATION="13w"
          if [[ "${GITHUB_REF}" =~ ^refs/tags/ ]]; then
            # Tag builds (release or nightly) never expire
            EXPIRATION="never"
          fi
          echo "expiration=${EXPIRATION}" >> "$GITHUB_OUTPUT"

      - name: Define the matrix for build jobs
        id: define-job-matrix
        run: |
          source './scripts/ci/lib.sh'

          matrix='{
            "pre_build_go_binaries": { "name":[], "arch":[] },
            "build_and_push_main": { "name":[], "arch":[] },
            "push_main_multiarch_manifests": { "name":[] },
            "build_and_push_operator": { "name":[], "arch":[] },
            "push_operator_multiarch_manifests": { "name":[] },
            "build_and_push_scanner": { "name":[], "goos":[], "arch":[], "registry":[] },
            "push_scanner_manifests": { "name":[], "registry":[] },
            "scan_images_with_roxctl": { "name":[], "image":[], "exclude":[] }
          }'

          # The base matrix
          matrix="$(jq '.pre_build_go_binaries.name += ["default"]' <<< "$matrix")"
          matrix="$(jq '.pre_build_go_binaries.arch += ["amd64", "arm64"]' <<< "$matrix")"

          matrix="$(jq '.build_and_push_main.name += ["RHACS_BRANDING", "STACKROX_BRANDING"]' <<< "$matrix")"
          matrix="$(jq '.build_and_push_main.arch += ["amd64", "arm64"]' <<< "$matrix")"

          matrix="$(jq '.push_main_multiarch_manifests.name += ["RHACS_BRANDING", "STACKROX_BRANDING"]' <<< "$matrix")"

          matrix="$(jq '.build_and_push_operator.name += ["RHACS_BRANDING", "STACKROX_BRANDING"]' <<< "$matrix")"
          matrix="$(jq '.build_and_push_operator.arch += ["amd64", "arm64"]' <<< "$matrix")"

          matrix="$(jq '.push_operator_multiarch_manifests.name += ["RHACS_BRANDING", "STACKROX_BRANDING"]' <<< "$matrix")"
          matrix="$(jq '.push_operator_multiarch_manifests.archs = [.build_and_push_operator.arch | join(",")]' <<< "$matrix")"

          matrix="$(jq '.build_and_push_scanner.name += ["default"]' <<< "$matrix")"
          matrix="$(jq '.build_and_push_scanner.goos += ["linux"]' <<< "$matrix")"
          matrix="$(jq '.build_and_push_scanner.arch += ["amd64", "arm64"]' <<< "$matrix")"
          matrix="$(jq '.build_and_push_scanner.registry += ["quay.io/stackrox-io", "quay.io/rhacs-eng"]' <<< "$matrix")"

          matrix="$(jq '.push_scanner_manifests.name += ["default"]' <<< "$matrix")"
          matrix="$(jq '.push_scanner_manifests.registry += ["quay.io/stackrox-io", "quay.io/rhacs-eng"]' <<< "$matrix")"

          matrix="$(jq '.scan_images_with_roxctl.name += ["RHACS_BRANDING", "STACKROX_BRANDING"]' <<< "$matrix")"
          matrix="$(jq '.scan_images_with_roxctl.image += ["central-db", "collector", "fact", "main", "roxctl", "scanner", "scanner-db", "scanner-db-slim", "scanner-slim", "stackrox-operator", "scanner-v4", "scanner-v4-db"]' <<< "$matrix")"
          # TODO(ROX-27191): remove the exclusion once there's a community operator.
          matrix="$(jq '.scan_images_with_roxctl.exclude += [{ "name": "STACKROX_BRANDING", "image": "stackrox-operator" }]' <<< "$matrix")"

          if ! is_in_PR_context || pr_has_label ci-build-all-arch; then
            matrix="$(jq '.pre_build_go_binaries.arch += ["ppc64le", "s390x"]' <<< "$matrix")"
            matrix="$(jq '.build_and_push_main.arch += ["ppc64le", "s390x"]' <<< "$matrix")"
            matrix="$(jq '.build_and_push_operator.arch += ["ppc64le", "s390x"]' <<< "$matrix")"
            matrix="$(jq '.build_and_push_scanner.arch += ["ppc64le", "s390x"]' <<< "$matrix")"
          fi;

          # Conditionally add a prerelease build (binaries built with GOTAGS=release)
          if ! is_tagged; then
            if ! is_in_PR_context || pr_has_label ci-build-prerelease; then
              matrix="$(jq '.pre_build_go_binaries.name += ["prerelease"]' <<< "$matrix")"
              matrix="$(jq '.build_and_push_main.name += ["prerelease"]' <<< "$matrix")"
              matrix="$(jq '.push_main_multiarch_manifests.name += ["prerelease"]' <<< "$matrix")"
              matrix="$(jq '.build_and_push_scanner.name += ["prerelease"]' <<< "$matrix")"
              matrix="$(jq '.push_scanner_manifests.name += ["prerelease"]' <<< "$matrix")"
            fi
          fi

          # Conditionally add a -race debug build (binaries built with -race)
          if ! is_in_PR_context || pr_has_label ci-build-race-condition-debug; then
            matrix="$(jq '.pre_build_go_binaries.name += ["race-condition-debug"]' <<< "$matrix")"
            matrix="$(jq '.build_and_push_main.name += ["race-condition-debug"]' <<< "$matrix")"
            matrix="$(jq '.push_main_multiarch_manifests.name += ["race-condition-debug"]' <<< "$matrix")"
            matrix="$(jq '.build_and_push_scanner.name += ["race-condition-debug"]' <<< "$matrix")"
            matrix="$(jq '.push_scanner_manifests.name += ["race-condition-debug"]' <<< "$matrix")"
            # Exclude "arm64", "ppc64le", "s390x"
            matrix="$(jq '.pre_build_go_binaries.exclude = [{ "name": "race-condition-debug", "arch": "arm64" }]' <<< "$matrix")"
            matrix="$(jq '.pre_build_go_binaries.exclude += [{ "name": "race-condition-debug", "arch": "ppc64le" }]' <<< "$matrix")"
            matrix="$(jq '.pre_build_go_binaries.exclude += [{ "name": "race-condition-debug", "arch": "s390x" }]' <<< "$matrix")"
            matrix="$(jq '.build_and_push_main.exclude = [{ "name": "race-condition-debug", "arch": "arm64" }]' <<< "$matrix")"
            matrix="$(jq '.build_and_push_main.exclude += [{ "name": "race-condition-debug", "arch": "ppc64le" }]' <<< "$matrix")"
            matrix="$(jq '.build_and_push_main.exclude += [{ "name": "race-condition-debug", "arch": "s390x" }]' <<< "$matrix")"
            matrix="$(jq '.build_and_push_scanner.exclude = [{ "name": "race-condition-debug", "arch": "arm64" }]' <<< "$matrix")"
            matrix="$(jq '.build_and_push_scanner.exclude += [{ "name": "race-condition-debug", "arch": "ppc64le" }]' <<< "$matrix")"
            matrix="$(jq '.build_and_push_scanner.exclude += [{ "name": "race-condition-debug", "arch": "s390x" }]' <<< "$matrix")"
          fi

          echo "Job matrix after conditionals:"
          jq <<< "$matrix"

          condensed="$(jq -c <<< "$matrix")"
          echo "matrix=$condensed" >> "$GITHUB_OUTPUT"

  pre-build-ui:
    strategy:
      fail-fast: false
      matrix:
        branding: [ RHACS_BRANDING, STACKROX_BRANDING ]
    env:
      ROX_PRODUCT_BRANDING: ${{ matrix.branding }}
      # For consistency with `image/rhel/konflux.Dockerfile`, see comment there.
      UI_PKG_INSTALL_EXTRA_ARGS: --ignore-scripts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ inputs.commit || github.event.pull_request.head.sha }}

      - uses: ./.github/actions/job-preamble
        with:
          gcp-account: ${{ secrets.GCP_SERVICE_ACCOUNT_STACKROX_CI }}

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # ratchet:actions/setup-node@v6
        with:
          node-version-file: ui/package.json

      - name: Cache UI dependencies
        id: cache-ui
        uses: ./.github/actions/cache-ui-dependencies

      - name: Fetch UI deps
        if: steps.cache-ui.outputs.cache-hit != 'true'
        run: make -C ui deps

      - name: Skip UI deps on cache hit
        if: steps.cache-ui.outputs.cache-hit == 'true'
        run: touch ui/deps

      - name: Build UI
        run: make -C ui build

      - uses: ./.github/actions/upload-artifact-with-retry
        with:
          name: ui-${{env.ROX_PRODUCT_BRANDING}}-build
          path: |
            ui/build
            ui/apps/platform/package-lock.json

  pre-build-cli:
    needs: define-job-matrix
    runs-on: ubuntu-latest
    env:
      BUILD_TAG: ${{ needs.define-job-matrix.outputs.build-tag }}
      SHORTCOMMIT: ${{ needs.define-job-matrix.outputs.short-commit }}
      GOTAGS: ${{ needs.define-job-matrix.outputs.gotags }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
        with:
          ref: ${{ inputs.commit || github.event.pull_request.head.sha }}

      - uses: ./.github/actions/job-preamble
        with:
          gcp-account: ${{ secrets.GCP_SERVICE_ACCOUNT_STACKROX_CI }}

      - name: Create CLI stub files
        if: |
          !(needs.define-job-matrix.outputs.gotags == 'release'
            || github.ref_name == 'master'
            || github.event_name == 'workflow_call'
            || contains(github.event.pull_request.labels.*.name, 'ci-build-cli'))
        run: |
          cat > stub.txt << 'EOF'
          This is a placeholder file. CLI binaries were not built for this PR build.

          To build CLI binaries in PR builds:
          - Add the "ci-build-cli" label to your pull request
          - Re-push to trigger a new build

          To download the latest roxctl binary:
          - Visit https://mirror.openshift.com/pub/rhacs/assets/latest/bin/

          EOF

          mkdir -p bin/{linux_{amd64,arm64,ppc64le,s390x},darwin_{amd64,arm64},windows_amd64}

          for arch in linux_amd64 linux_arm64 linux_ppc64le linux_s390x darwin_amd64 darwin_arm64; do
            cp stub.txt bin/${arch}/roxctl
            cp stub.txt bin/${arch}/roxagent
          done
          cp stub.txt bin/windows_amd64/roxctl.exe

      - name: PR labels
        uses: joerick/pr-labels-action@0543b277721e852d821c6738d449f2f4dea03d5f # ratchet:joerick/pr-labels-action@v1.0.9

      - name: Cache Go dependencies
        if: |
          needs.define-job-matrix.outputs.gotags == 'release'
            || github.ref_name == 'master'
            || github.event_name == 'workflow_call'
            || contains(github.event.pull_request.labels.*.name, 'ci-build-cli')
        uses: ./.github/actions/cache-go-dependencies

      - name: Build CLI
        if: |
          needs.define-job-matrix.outputs.gotags == 'release'
            || github.ref_name == 'master'
            || github.event_name == 'workflow_call'
            || contains(github.event.pull_request.labels.*.name, 'ci-build-cli')
        run: make cli

      - name: Bundle build to preserve permissions
        run: tar -cvf cli-build.tar bin

      - uses: ./.github/actions/upload-artifact-with-retry
        with:
          name: cli-build
          path: cli-build.tar
          compression-level: 1

  pre-build-go-binaries:
    strategy:
      # Supports three go binary builds:
      # default - built with environment defaults (see env.mk)
      # prerelease - built with GOTAGS=release
      # race-condition-debug - built with -race
      matrix: ${{ fromJson(needs.define-job-matrix.outputs.matrix).pre_build_go_binaries }}
    needs: define-job-matrix
    runs-on: ubuntu-latest
    env:
      BUILD_TAG: ${{ needs.define-job-matrix.outputs.build-tag }}
      SHORTCOMMIT: ${{ needs.define-job-matrix.outputs.short-commit }}
      GOTAGS: ${{ needs.define-job-matrix.outputs.gotags }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
        with:
          ref: ${{ inputs.commit || github.event.pull_request.head.sha }}

      - uses: ./.github/actions/job-preamble
        with:
          gcp-account: ${{ secrets.GCP_SERVICE_ACCOUNT_STACKROX_CI }}

      - name: Cache Go dependencies
        env:
          GOARCH: ${{ matrix.arch }}
        uses: ./.github/actions/cache-go-dependencies
        with:
          # Only race needs a separate cache (-race/CGO_ENABLED=1 produces 39% unique entries).
          # Default and prerelease share 93% of entries and should use the same cache.
          key-suffix: ${{ (matrix.name == 'race-condition-debug' && 'race') || '' }}

      - name: PR labels
        uses: joerick/pr-labels-action@0543b277721e852d821c6738d449f2f4dea03d5f # ratchet:joerick/pr-labels-action@v1.0.9

      - name: Setup build env for debugging support
        run: |
          if [[ "${GITHUB_HEAD_REF:-}" =~ -debug ]]; then
            echo "DEBUG_BUILD=yes" >> "${GITHUB_ENV}"
          fi

      - name: Setup Go build environment for release
        if: |
          contains(github.event.pull_request.labels.*.name, 'ci-release-build')
            ||
          matrix.name == 'prerelease'
        run: echo "GOTAGS=release" >> "$GITHUB_ENV"

      - name: Setup Go build environment for -race
        if: |
          matrix.arch == 'amd64'
            &&
          (
            contains(github.event.pull_request.labels.*.name, 'ci-race-tests')
              ||
            matrix.name == 'race-condition-debug'
          )
        run: echo "RACE=true" >> "$GITHUB_ENV"

      - name: Install musl-tools for race builds
        if: |
          matrix.arch == 'amd64'
            &&
          (
            contains(github.event.pull_request.labels.*.name, 'ci-race-tests')
              ||
            matrix.name == 'race-condition-debug'
          )
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq musl-tools musl-dev linux-libc-dev
          # musl-gcc searches /usr/include/x86_64-linux-musl by default
          sudo ln -sf /usr/include/linux /usr/include/x86_64-linux-musl/linux
          sudo ln -sf /usr/include/asm-generic /usr/include/x86_64-linux-musl/asm-generic
          sudo ln -sf /usr/include/asm /usr/include/x86_64-linux-musl/asm

      - name: Build Go Binaries
        run: GOOS=linux GOARCH=${{ matrix.arch }} CGO_ENABLED=0 make build-prep main-build-nodeps

      - name: Bundle the build to preserve permissions
        run: tar -cvf go-binaries-build.tar bin/linux_${{ matrix.arch }}

      - uses: ./.github/actions/upload-artifact-with-retry
        with:
          name: go-binaries-build-${{ matrix.arch }}-${{ matrix.name }}
          path: go-binaries-build.tar
          compression-level: 1

  pre-build-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ inputs.commit || github.event.pull_request.head.sha }}

      - uses: ./.github/actions/job-preamble
        with:
          gcp-account: ${{ secrets.GCP_SERVICE_ACCOUNT_STACKROX_CI }}

      - name: Cache Go dependencies
        uses: ./.github/actions/cache-go-dependencies

      - name: Download scanner module for proto generation
        run: go mod download github.com/stackrox/scanner

      - name: Generate the swagger docs
        run: |
          make swagger-docs
          # Workaround to handle https://github.com/actions/cache/issues/753
          rm -rf .proto

      - uses: ./.github/actions/upload-artifact-with-retry
        with:
          name: docs-build
          path: |
            image/rhel/docs

  pre-build-oss-notice:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
      with:
        fetch-depth: 0
        ref: ${{ inputs.commit || github.event.pull_request.head.sha }}

    - uses: ./.github/actions/job-preamble
      with:
        gcp-account: ${{ secrets.GCP_SERVICE_ACCOUNT_STACKROX_CI }}

    - name: Set up Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # ratchet:actions/setup-node@v6
      with:
        node-version-file: ui/package.json

    - name: Cache Go dependencies
      uses: ./.github/actions/cache-go-dependencies

    - name: Cache UI dependencies
      id: cache-ui
      uses: ./.github/actions/cache-ui-dependencies

    - name: Fetch UI deps
      if: steps.cache-ui.outputs.cache-hit != 'true'
      run: make -C ui deps

    - name: Skip UI deps on cache hit
      if: steps.cache-ui.outputs.cache-hit == 'true'
      run: touch ui/deps

    - name: Generate OSS notice
      run: make ossls-notice

    - uses: ./.github/actions/upload-artifact-with-retry
      with:
        name: oss-notice
        path: image/rhel/THIRD_PARTY_NOTICES

  build-and-push-db:
    runs-on: ubuntu-latest
    needs:
      - define-job-matrix
    if: ${{ !cancelled() }}
    env:
      BUILD_TAG: ${{ needs.define-job-matrix.outputs.build-tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
        with:
          ref: ${{ inputs.commit || github.event.pull_request.head.sha }}

      - uses: ./.github/actions/job-preamble
        with:
          gcp-account: ${{ secrets.GCP_SERVICE_ACCOUNT_STACKROX_CI }}

      - name: Login to docker.io to mitigate rate limiting on downloading images
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # ratchet:docker/login-action@v4
        if: |
          github.event_name == 'push' || !github.event.pull_request.head.repo.fork
        with:
          username: ${{ secrets.DOCKERHUB_CI_ACCOUNT_USERNAME }}
          password: ${{ secrets.DOCKERHUB_CI_ACCOUNT_PASSWORD }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # ratchet:docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # ratchet:docker/setup-buildx-action@v4

      - name: Determine platforms
        id: platforms
        run: |
          PLATFORMS="linux/amd64,linux/arm64"
          if [[ "${{ github.event_name }}" != "pull_request" ]] || \
             [[ "${{ contains(github.event.pull_request.labels.*.name, 'ci-build-all-arch') }}" == "true" ]]; then
            PLATFORMS="linux/amd64,linux/arm64,linux/ppc64le,linux/s390x"
          fi
          echo "platforms=${PLATFORMS}" >> "$GITHUB_OUTPUT"

      - name: Login to quay.io/stackrox-io
        if: |
          github.event_name == 'push' || !github.event.pull_request.head.repo.fork
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # ratchet:docker/login-action@v4
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_STACKROX_IO_RW_USERNAME }}
          password: ${{ secrets.QUAY_STACKROX_IO_RW_PASSWORD }}

      # scanner/image/db/Dockerfile does COPY init-bundles/db-init.dump.zst.
      # This file is not in git - the Makefile creates it as empty by default
      # (or populated if SCANNER_DB_INIT_BUNDLE_ENABLED=force, which is not used).
      # Since we bypass make and build directly with buildx, we create the empty
      # file here to match the default make behavior. The init script ignores it.
      - name: Create empty init bundle for scanner-v4-db
        run: |
          mkdir -p scanner/image/db/init-bundles
          touch scanner/image/db/init-bundles/db-init.dump.zst

      - name: Build and push DB images in parallel with bake
        if: |
          github.event_name == 'push' || !github.event.pull_request.head.repo.fork
        uses: docker/bake-action@5be5f02ff8819ecd3092ea6b2e6261c31774f2b4 # ratchet:docker/bake-action@v6
        with:
          source: .
          files: .github/docker/images.hcl
          targets: databases
          push: true
        env:
          TAG: ${{ env.BUILD_TAG }}
          PLATFORMS: ${{ steps.platforms.outputs.platforms }}
          REGISTRY: quay.io/stackrox-io
          QUAY_TAG_EXPIRATION: ${{ needs.define-job-matrix.outputs.quay-tag-expiration }}

      # We can't push to both quay.io/stackrox-io and quay.io/rhacs-eng in a single
      # build because they require different credentials (different organizations).
      # Instead, we build once and push to stackrox-io, then use skopeo to copy the
      # multi-arch manifest list to rhacs-eng. This is more efficient than building
      # twice and matches the pattern used for collector retag.
      - name: Login to quay.io/rhacs-eng
        if: |
          github.event_name == 'push' || !github.event.pull_request.head.repo.fork
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # ratchet:docker/login-action@v4
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_RHACS_ENG_RW_USERNAME }}
          password: ${{ secrets.QUAY_RHACS_ENG_RW_PASSWORD }}

      - name: Copy central-db to rhacs-eng registry
        if: |
          github.event_name == 'push' || !github.event.pull_request.head.repo.fork
        run: |
          skopeo copy --retry-times 5 --all \
            "docker://quay.io/stackrox-io/central-db:${{ env.BUILD_TAG }}" \
            "docker://quay.io/rhacs-eng/central-db:${{ env.BUILD_TAG }}"

      - name: Copy scanner-v4-db to rhacs-eng registry
        if: |
          github.event_name == 'push' || !github.event.pull_request.head.repo.fork
        run: |
          skopeo copy --retry-times 5 --all \
            "docker://quay.io/stackrox-io/scanner-v4-db:${{ env.BUILD_TAG }}" \
            "docker://quay.io/rhacs-eng/scanner-v4-db:${{ env.BUILD_TAG }}"

  build-operator-bundle:
    runs-on: ubuntu-latest
    env:
      QUAY_ORG: rhacs-eng
      QUAY_RHACS_ENG_RW_PASSWORD: ${{ secrets.QUAY_RHACS_ENG_RW_PASSWORD }}
      QUAY_RHACS_ENG_RW_USERNAME: ${{ secrets.QUAY_RHACS_ENG_RW_USERNAME }}
      ROX_OPERATOR_SKIP_PROTO_GENERATED_SRCS: true
      ROX_PRODUCT_BRANDING: RHACS_BRANDING
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ inputs.commit || github.event.pull_request.head.sha }}

      - uses: ./.github/actions/job-preamble
        with:
          gcp-account: ${{ secrets.GCP_SERVICE_ACCOUNT_STACKROX_CI }}

      - name: Cache Go dependencies
        uses: ./.github/actions/cache-go-dependencies

      - uses: ./.github/actions/handle-tagged-build

      - name: Build Operator Bundle
        run: make -C operator/ bundle bundle-build

      - name: Push Operator Bundle and Index
        # Skip for external contributions.
        if: |
          github.event_name == 'push' || !github.event.pull_request.head.repo.fork
        run: |
          ./scripts/ci/lib.sh registry_rw_login "quay.io/${QUAY_ORG}"
          make -C operator/ docker-push-bundle | cat
          make -C operator/ index-build
          make -C operator/ docker-push-index | cat

  build-and-push-main:
    # Use native arm64 runner to avoid QEMU emulation overhead (~2x slower).
    runs-on: ${{ (matrix.arch == 'arm64' && 'ubuntu-24.04-arm') || 'ubuntu-latest' }}
    needs:
      - define-job-matrix
      - pre-build-cli
      - pre-build-docs
      - pre-build-go-binaries
      - pre-build-oss-notice
      - pre-build-ui
    # This step will run even if required pre-* steps failed. By following this
    # approach as much of the build matrix as possible is completed despite
    # transient issues e.g. docker pull timeouts. In this way some e2e jobs that
    # require some part of the build matrix can still proceed.
    if: ${{ !cancelled() }}
    strategy:
      # Supports four image builds (see Setup build env):
      # STACKROX_BRANDING
      # RHACS_BRANDING
      # prerelease
      # race-condition-debug
      fail-fast: false
      matrix: ${{ fromJson(needs.define-job-matrix.outputs.matrix).build_and_push_main }}
    env:
      GO_BINARIES_BUILD_ARTIFACT: ""
      ROX_PRODUCT_BRANDING: ""
      BUILD_TAG: ${{ needs.define-job-matrix.outputs.build-tag }}
      SHORTCOMMIT: ${{ needs.define-job-matrix.outputs.short-commit }}
      GOTAGS: ${{ needs.define-job-matrix.outputs.gotags }}
    steps:
      - name: Setup build env
        run: |
          case "${{ matrix.name }}" in
            STACKROX_BRANDING)
              go_binaries="default"
              brand="STACKROX_BRANDING"
              ;;
            RHACS_BRANDING)
              go_binaries="default"
              brand="RHACS_BRANDING"
              ;;
            race-condition-debug)
              go_binaries="race-condition-debug"
              brand="RHACS_BRANDING"
              ;;
            prerelease)
              go_binaries="prerelease"
              brand="RHACS_BRANDING"
              ;;
            *)
              echo "Unsupported build: ${{ matrix.name }}"
              exit 1
          esac

          {
            echo "GO_BINARIES_BUILD_ARTIFACT=go-binaries-build-${{ matrix.arch }}-${go_binaries}"
            echo "ROX_PRODUCT_BRANDING=${brand}"
          } >> "$GITHUB_ENV"
          if [[ "${GITHUB_HEAD_REF:-}" =~ -debug ]]; then
            echo "DEBUG_BUILD=yes" >> "${GITHUB_ENV}"
          fi

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
        with:
          ref: ${{ inputs.commit || github.event.pull_request.head.sha }}

      - uses: ./.github/actions/job-preamble
        with:
          gcp-account: ${{ secrets.GCP_SERVICE_ACCOUNT_STACKROX_CI }}

      - name: Login to docker.io to mitigate rate limiting on downloading images
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # ratchet:docker/login-action@v4
        continue-on-error: true
        # Skip for external contributions.
        if: |
          matrix.arch != 'amd64' && matrix.arch != 'arm64' &&
          (github.event_name == 'push' || !github.event.pull_request.head.repo.fork)
        with:
          username: ${{ secrets.DOCKERHUB_CI_ACCOUNT_USERNAME }}
          password: ${{ secrets.DOCKERHUB_CI_ACCOUNT_PASSWORD }}

      - name: Set up QEMU
        if: matrix.arch != 'amd64' && matrix.arch != 'arm64'
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # ratchet:docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # ratchet:docker/setup-buildx-action@v4

      - name: Checkout submodules
        run: |
            git submodule update --init

      - uses: ./.github/actions/download-artifact-with-retry
        with:
          name: ui-${{ env.ROX_PRODUCT_BRANDING }}-build
          path: ui

      - uses: ./.github/actions/download-artifact-with-retry
        with:
          name: cli-build

      - name: Unpack cli build
        run: |
          tar xvf cli-build.tar

      - uses: ./.github/actions/download-artifact-with-retry
        with:
          name: ${{ env.GO_BINARIES_BUILD_ARTIFACT }}

      - name: Unpack Go binaries build
        run: |
          tar xvf go-binaries-build.tar

      - uses: ./.github/actions/download-artifact-with-retry
        with:
          name: docs-build
          path: image/rhel/docs

      - uses: ./.github/actions/download-artifact-with-retry
        with:
          name: oss-notice
          path: image/rhel/THIRD_PARTY_NOTICES

      - name: Set build tag for prerelease images
        if: matrix.name == 'prerelease'
        run: echo "BUILD_TAG=$(make --quiet --no-print-directory tag)-prerelease" >> "$GITHUB_ENV"

      - name: Set build tag for race condition images
        if: matrix.name == 'race-condition-debug'
        run: echo "BUILD_TAG=$(make --quiet --no-print-directory tag)-rcd" >> "$GITHUB_ENV"

      - name: Build main images
        run: |
          GOOS=linux GOARCH=${{ matrix.arch }} scripts/lib.sh retry 6 true make docker-build-main-image

      - name: Check debugger presence in the main image
        if: github.event_name != 'pull_request'
        run: make check-debugger

      - name: Prepare roxctl build context
        run: |
          cp -r image/rhel/THIRD_PARTY_NOTICES image/roxctl/THIRD_PARTY_NOTICES

      - name: Build roxctl image
        run: |
          GOOS=linux GOARCH=${{ matrix.arch }} scripts/lib.sh retry 6 true make docker-build-roxctl-image

      # needed for docs ensure_image.sh initial pull with RHACS_BRANDING
      - name: Docker login
        # Skip for external contributions.
        if: |
          github.event_name == 'push' || !github.event.pull_request.head.repo.fork
        env:
          QUAY_RHACS_ENG_RO_USERNAME: ${{ secrets.QUAY_RHACS_ENG_RO_USERNAME }}
          QUAY_RHACS_ENG_RO_PASSWORD: ${{ secrets.QUAY_RHACS_ENG_RO_PASSWORD }}
        run: |
          ./scripts/ci/lib.sh registry_ro_login "quay.io/rhacs-eng"

      - name: Push images
        # Skip for external contributions.
        if: |
          github.event_name == 'push' || !github.event.pull_request.head.repo.fork
        env:
          QUAY_RHACS_ENG_RW_USERNAME: ${{ secrets.QUAY_RHACS_ENG_RW_USERNAME }}
          QUAY_RHACS_ENG_RW_PASSWORD: ${{ secrets.QUAY_RHACS_ENG_RW_PASSWORD }}
          QUAY_STACKROX_IO_RW_USERNAME: ${{ secrets.QUAY_STACKROX_IO_RW_USERNAME }}
          QUAY_STACKROX_IO_RW_PASSWORD: ${{ secrets.QUAY_STACKROX_IO_RW_PASSWORD }}
        run: |
            source ./scripts/ci/lib.sh
            echo "Will determine context from: ${{ github.event_name }} & ${{ github.ref_name }}"
            push_context=""
            if [[ "${{ github.event_name }}" == "push" && "${{ github.ref_name }}" == "master" ]]; then
              push_context="merge-to-master"
            fi
            push_main_image_set "$push_context" "${{ env.ROX_PRODUCT_BRANDING }}" "${{ matrix.arch }}"

  push-matching-collector-scanner:
    runs-on: ubuntu-latest
    needs:
      - define-job-matrix
    if: ${{ !cancelled() }}
    strategy:
      fail-fast: false
      matrix:
        name: [RHACS_BRANDING, STACKROX_BRANDING]
    env:
      ROX_PRODUCT_BRANDING: ${{ matrix.name }}
      BUILD_TAG: ${{ needs.define-job-matrix.outputs.build-tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
        with:
          ref: ${{ inputs.commit || github.event.pull_request.head.sha }}

      - uses: ./.github/actions/job-preamble
        with:
          gcp-account: ${{ secrets.GCP_SERVICE_ACCOUNT_STACKROX_CI }}

      - name: Push matching collector and scanner images
        if: github.event_name == 'push' || !github.event.pull_request.head.repo.fork
        env:
          QUAY_RHACS_ENG_RW_USERNAME: ${{ secrets.QUAY_RHACS_ENG_RW_USERNAME }}
          QUAY_RHACS_ENG_RW_PASSWORD: ${{ secrets.QUAY_RHACS_ENG_RW_PASSWORD }}
          QUAY_STACKROX_IO_RW_USERNAME: ${{ secrets.QUAY_STACKROX_IO_RW_USERNAME }}
          QUAY_STACKROX_IO_RW_PASSWORD: ${{ secrets.QUAY_STACKROX_IO_RW_PASSWORD }}
        run: |
          source ./scripts/ci/lib.sh
          push_matching_collector_scanner_images "${{ env.ROX_PRODUCT_BRANDING }}"

  push-main-manifests:
    runs-on: ubuntu-latest
    needs:
    - define-job-matrix
    - build-and-push-main
    # This step will run even if some of the build-and-push-matrix steps failed.
    # By following this approach as much of the build matrix as possible is
    # completed despite transient issues e.g. docker pull timeouts. In this way
    # some e2e jobs that require some part of the build matrix can still
    # proceed.
    if: ${{ !cancelled() }}
    permissions:
      pull-requests: write
    strategy:
      # Supports four image builds (see Setup build env):
      # STACKROX_BRANDING
      # RHACS_BRANDING
      # prerelease
      # race-condition-debug
      fail-fast: false
      matrix: ${{ fromJson(needs.define-job-matrix.outputs.matrix).push_main_multiarch_manifests }}
    env:
      ROX_PRODUCT_BRANDING: ""
      BUILD_TAG: ${{ needs.define-job-matrix.outputs.build-tag }}
      SHORTCOMMIT: ${{ needs.define-job-matrix.outputs.short-commit }}
      GOTAGS: ${{ needs.define-job-matrix.outputs.gotags }}
    steps:
    - name: Setup build env
      run: |
        case "${{ matrix.name }}" in
          STACKROX_BRANDING)
            brand="STACKROX_BRANDING"
            ;;
          RHACS_BRANDING)
            brand="RHACS_BRANDING"
            ;;
          race-condition-debug)
            brand="RHACS_BRANDING"
            ;;
          prerelease)
            brand="RHACS_BRANDING"
            ;;
          *)
            echo "Unsupported build: ${{ matrix.name }}"
            exit 1
        esac

        {
          echo "ROX_PRODUCT_BRANDING=${brand}"
        } >> "$GITHUB_ENV"

    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
      with:
        ref: ${{ inputs.commit || github.event.pull_request.head.sha }}

    - uses: ./.github/actions/job-preamble
      with:
        gcp-account: ${{ secrets.GCP_SERVICE_ACCOUNT_STACKROX_CI }}

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # ratchet:docker/setup-buildx-action@v4

    - name: Checkout submodules
      run: |
        git submodule update --init

    - name: Set build tag for prerelease images
      if: matrix.name == 'prerelease'
      run: echo "BUILD_TAG=$(make --quiet --no-print-directory tag)-prerelease" >> "$GITHUB_ENV"

    - name: Set build tag for race condition images
      if: matrix.name == 'race-condition-debug'
      run: echo "BUILD_TAG=$(make --quiet --no-print-directory tag)-rcd" >> "$GITHUB_ENV"

    - name: Build and push manifest lists
      # Skip for external contributions.
      if: |
        github.event_name == 'push' || !github.event.pull_request.head.repo.fork
      env:
        QUAY_RHACS_ENG_RW_USERNAME: ${{ secrets.QUAY_RHACS_ENG_RW_USERNAME }}
        QUAY_RHACS_ENG_RW_PASSWORD: ${{ secrets.QUAY_RHACS_ENG_RW_PASSWORD }}
        QUAY_STACKROX_IO_RW_USERNAME: ${{ secrets.QUAY_STACKROX_IO_RW_USERNAME }}
        QUAY_STACKROX_IO_RW_PASSWORD: ${{ secrets.QUAY_STACKROX_IO_RW_PASSWORD }}
      run: |
        source ./scripts/ci/lib.sh
        echo "Will determine context from: ${{ github.event_name }} & ${{ github.ref_name }}"
        push_context=""
        if [[ "${{ github.event_name }}" == "push" && "${{ github.ref_name }}" == "master" ]]; then
          push_context="merge-to-master"
        fi
        architectures="amd64,arm64"
        if ! is_in_PR_context || pr_has_label ci-build-all-arch; then
          architectures="amd64,arm64,ppc64le,s390x"
        fi
        if [[ "${{ matrix.name }}" == "race-condition-debug" ]]; then
          architectures="amd64"
        fi
        push_image_manifest_lists "$push_context" "${{ env.ROX_PRODUCT_BRANDING }}" "$architectures"

    - name: Prepare build comment
      # Skip for external contributions.
      if: |
        github.event_name == 'push' || !github.event.pull_request.head.repo.fork
      run: |
        cat > build-comment.md <<EOF
        ## 🚀 Build Images Ready

        Images are ready for commit ${{ needs.define-job-matrix.outputs.short-commit }}. To use with deploy scripts:
        \`\`\`bash
        export MAIN_IMAGE_TAG=${{ needs.define-job-matrix.outputs.build-tag }}
        \`\`\`
        EOF

    - name: Comment on the PR
      # Skip for external contributions.
      if: |
        github.event_name == 'push' || !github.event.pull_request.head.repo.fork
      uses: mshick/add-pr-comment@8e4927817251f1ff60c001f04568532b38e0b4a0 # ratchet:mshick/add-pr-comment@v3
      with:
        message-id: build-images-ready
        message-path: build-comment.md

  # Create GKE cluster early — runs in parallel with the entire build.
  # By the time images are pushed (~30 min), the cluster is already ready.
  # Only created when 'e2e-gke' label is present on the PR.
  create-e2e-gke-cluster:
    if: >-
      contains(github.event.pull_request.labels.*.name, 'e2e-gke')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      cluster-name: ${{ steps.create.outputs.cluster-name }}
    steps:
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
      with:
        ref: ${{ github.event.pull_request.head.sha || github.sha }}
        fetch-depth: 0
    - name: Create GKE cluster
      id: create
      uses: ./.github/actions/create-gke-cluster
      with:
        cluster-name: e2e-${{ github.run_id }}
        tag: placeholder
        gcp-account: ${{ secrets.GCP_SERVICE_ACCOUNT_STACKROX_CI }}
        quay-user: ${{ secrets.QUAY_RHACS_ENG_RO_USERNAME }}
        quay-pass: ${{ secrets.QUAY_RHACS_ENG_RO_PASSWORD }}
    - name: Export cluster name
      run: echo "cluster-name=e2e-${{ github.run_id }}" >> "$GITHUB_OUTPUT"

  # Start GKE cluster in parallel with build — ready before images are pushed.
  # Spot VMs for cost savings. Only when ui-e2e-gke label is present.
  create-ui-e2e-gke-cluster:
    if: contains(github.event.pull_request.labels.*.name, 'e2e-ui-gke')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      cluster-name: ${{ steps.create.outputs.cluster-name }}
      zone: ${{ steps.create.outputs.zone }}
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
      with:
        ref: ${{ github.event.pull_request.head.sha || github.sha }}
        fetch-depth: 1
    - name: Create GKE cluster (spot)
      id: create
      uses: ./.github/actions/create-gke-cluster
      with:
        cluster-name: ui-e2e-${{ github.run_id }}
        tag: placeholder
        spot: "true"
        gcp-account: ${{ secrets.GCP_SERVICE_ACCOUNT_STACKROX_CI }}
        quay-user: ${{ secrets.QUAY_RHACS_ENG_RO_USERNAME }}
        quay-pass: ${{ secrets.QUAY_RHACS_ENG_RO_PASSWORD }}

  ui-e2e:
    needs:
    - define-job-matrix
    - push-main-manifests
    - create-ui-e2e-gke-cluster
    if: >-
      !cancelled() && needs.push-main-manifests.result == 'success' &&
      contains(github.event.pull_request.labels.*.name, 'e2e-ui') &&
      (needs.create-ui-e2e-gke-cluster.result == 'success' || needs.create-ui-e2e-gke-cluster.result == 'skipped')
    uses: ./.github/workflows/ui-e2e.yaml
    with:
      tag: ${{ needs.define-job-matrix.outputs.build-tag }}
      gke-cluster-name: ${{ needs.create-ui-e2e-gke-cluster.outputs.cluster-name || '' }}
      gke-zone: ${{ needs.create-ui-e2e-gke-cluster.outputs.zone || '' }}
    secrets: inherit

  # Cleanup the pre-provisioned GKE cluster after UI E2E tests complete
  cleanup-ui-e2e-gke:
    if: always() && needs.create-ui-e2e-gke-cluster.result == 'success'
    needs: [create-ui-e2e-gke-cluster, ui-e2e]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
    - uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # ratchet:google-github-actions/auth@v2
      with:
        credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_STACKROX_CI }}
    - uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # ratchet:google-github-actions/setup-gcloud@v3
      with:
        install_components: "gke-gcloud-auth-plugin"
    - name: Delete GKE cluster
      run: |
        gcloud container clusters delete \
          "${{ needs.create-ui-e2e-gke-cluster.outputs.cluster-name }}" \
          --zone "${{ needs.create-ui-e2e-gke-cluster.outputs.zone }}" \
          --project acs-san-stackroxci \
          --async --quiet || true

  build-and-push-operator:
    runs-on: ${{ (matrix.arch == 'arm64' && 'ubuntu-24.04-arm') || 'ubuntu-latest' }}
    needs:
      - define-job-matrix
      - pre-build-go-binaries
      - pre-build-oss-notice
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.define-job-matrix.outputs.matrix).build_and_push_operator }}
    env:
      ROX_PRODUCT_BRANDING: ${{ matrix.name }}
      # Proto sources freshness is checked in another workflow.
      ROX_OPERATOR_SKIP_PROTO_GENERATED_SRCS: true
      BUILD_TAG: ${{ needs.define-job-matrix.outputs.build-tag }}
      SHORTCOMMIT: ${{ needs.define-job-matrix.outputs.short-commit }}
      GOTAGS: ${{ needs.define-job-matrix.outputs.gotags }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
        with:
          ref: ${{ inputs.commit || github.event.pull_request.head.sha }}

      - uses: ./.github/actions/job-preamble
        with:
          free-disk-space: 40
          gcp-account: ${{ secrets.GCP_SERVICE_ACCOUNT_STACKROX_CI }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # ratchet:docker/setup-buildx-action@v4

      - name: Download prebuilt operator binaries
        uses: ./.github/actions/download-artifact-with-retry
        with:
          name: go-binaries-build-${{ matrix.arch }}-default

      - name: Extract prebuilt binaries
        run: tar xf go-binaries-build.tar

      - uses: ./.github/actions/download-artifact-with-retry
        with:
          name: oss-notice
          path: THIRD_PARTY_NOTICES

      - name: PR labels
        uses: joerick/pr-labels-action@0543b277721e852d821c6738d449f2f4dea03d5f # ratchet:joerick/pr-labels-action@v1.0.9

      - name: Setup Go release build environment
        if: contains(github.event.pull_request.labels.*.name, 'ci-release-build')
        run: echo "GOTAGS=release" >> "$GITHUB_ENV"

      - name: Setup Go RHACS build environment
        if: matrix.name == 'RHACS_BRANDING'
        run: echo "QUAY_ORG=rhacs-eng" >> "$GITHUB_ENV"

      - name: Setup Go StackRox build environment
        if: matrix.name == 'STACKROX_BRANDING'
        run: echo "QUAY_ORG=stackrox-io" >> "$GITHUB_ENV"

      - name: Docker login
        # Skip for external contributions.
        if: |
          github.event_name == 'push' || !github.event.pull_request.head.repo.fork
        env:
          QUAY_RHACS_ENG_RW_USERNAME: ${{ secrets.QUAY_RHACS_ENG_RW_USERNAME }}
          QUAY_RHACS_ENG_RW_PASSWORD: ${{ secrets.QUAY_RHACS_ENG_RW_PASSWORD }}
          QUAY_STACKROX_IO_RW_USERNAME: ${{ secrets.QUAY_STACKROX_IO_RW_USERNAME }}
          QUAY_STACKROX_IO_RW_PASSWORD: ${{ secrets.QUAY_STACKROX_IO_RW_PASSWORD }}
        run: |
          ./scripts/ci/lib.sh registry_rw_login "quay.io/${QUAY_ORG}"

      - name: Build Operator image
        run: |
          GOARCH=${{ matrix.arch }} scripts/lib.sh retry 6 true make -C operator/ docker-build-prebuilt

      - name: Login to docker.io to mitigate rate limiting on downloading images
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # ratchet:docker/login-action@v4
        continue-on-error: true
        # Skip for external contributions.
        if: |
          matrix.arch != 'amd64' && matrix.arch != 'arm64' &&
          (github.event_name == 'push' || !github.event.pull_request.head.repo.fork)
        with:
          username: ${{ secrets.DOCKERHUB_CI_ACCOUNT_USERNAME }}
          password: ${{ secrets.DOCKERHUB_CI_ACCOUNT_PASSWORD }}

      - name: Set up QEMU
        if: matrix.arch != 'amd64' && matrix.arch != 'arm64'
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # ratchet:docker/setup-qemu-action@v4

      - name: Check that Operator image is runnable
        run: docker run --rm --platform linux/${{ matrix.arch }} "quay.io/${QUAY_ORG}/stackrox-operator:$(make --quiet --no-print-directory -C operator tag)" --help

      - name: Push image
        # Skip for external contributions.
        if: |
          github.event_name == 'push' || !github.event.pull_request.head.repo.fork
        env:
          QUAY_RHACS_ENG_RW_USERNAME: ${{ secrets.QUAY_RHACS_ENG_RW_USERNAME }}
          QUAY_RHACS_ENG_RW_PASSWORD: ${{ secrets.QUAY_RHACS_ENG_RW_PASSWORD }}
          QUAY_RHACS_ENG_BEARER_TOKEN: ${{ secrets.QUAY_RHACS_ENG_BEARER_TOKEN }}
          QUAY_STACKROX_IO_RW_USERNAME: ${{ secrets.QUAY_STACKROX_IO_RW_USERNAME }}
          QUAY_STACKROX_IO_RW_PASSWORD: ${{ secrets.QUAY_STACKROX_IO_RW_PASSWORD }}
        run: |
            source ./scripts/ci/lib.sh
            echo "Will determine context from: ${{ github.event_name }} & ${{ github.ref_name }}"
            push_context=""
            if [[ "${{ github.event_name }}" == "push" && "${{ github.ref_name }}" == "master" ]]; then
              push_context="merge-to-master"
            fi
            echo "Starting operator image push for context: \"$push_context\", branding: \"${{ env.ROX_PRODUCT_BRANDING }}\", arch: \"${{ matrix.arch }}\""
            if ! push_operator_image "$push_context" "${{ env.ROX_PRODUCT_BRANDING }}" "${{ matrix.arch }}"; then
              echo "ERROR: push_operator_image failed" >&2
              exit 1
            fi
            echo "Operator image push completed successfully"

  build-and-push-scanner:
    runs-on: ${{ (matrix.arch == 'arm64' && 'ubuntu-24.04-arm') || 'ubuntu-latest' }}
    needs:
      - define-job-matrix
      - build-and-push-db
      - pre-build-go-binaries
      - pre-build-oss-notice
    if: ${{ !cancelled() }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.define-job-matrix.outputs.matrix).build_and_push_scanner }}
    env:
      BUILD_TAG: ${{ needs.define-job-matrix.outputs.build-tag }}
      SHORTCOMMIT: ${{ needs.define-job-matrix.outputs.short-commit }}
      GOTAGS: ${{ needs.define-job-matrix.outputs.gotags }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
        with:
          ref: ${{ inputs.commit || github.event.pull_request.head.sha }}

      - uses: ./.github/actions/job-preamble
        with:
          gcp-account: ${{ secrets.GCP_SERVICE_ACCOUNT_STACKROX_CI }}

      - name: Login to docker.io to mitigate rate limiting on downloading images
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # ratchet:docker/login-action@v4
        continue-on-error: true
        if: |
          matrix.arch != 'amd64' && matrix.arch != 'arm64' &&
          (github.event_name == 'push' || !github.event.pull_request.head.repo.fork)
        with:
          username: ${{ secrets.DOCKERHUB_CI_ACCOUNT_USERNAME }}
          password: ${{ secrets.DOCKERHUB_CI_ACCOUNT_PASSWORD }}

      - name: Set up QEMU
        if: matrix.arch != 'amd64' && matrix.arch != 'arm64'
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # ratchet:docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # ratchet:docker/setup-buildx-action@v4

      - uses: ./.github/actions/handle-tagged-build

      - uses: ./.github/actions/download-artifact-with-retry
        with:
          name: go-binaries-build-${{ matrix.arch }}-${{ matrix.name }}

      - name: Unpack Go binaries
        run: tar xvf go-binaries-build.tar

      - uses: ./.github/actions/download-artifact-with-retry
        with:
          name: oss-notice
          path: scanner/image/scanner/THIRD_PARTY_NOTICES

      - name: Copy scanner binary to expected location
        run: |
          mkdir -p scanner/image/scanner/bin
          cp bin/linux_${{ matrix.arch }}/scanner scanner/image/scanner/bin/scanner

      - name: Set build tag for prerelease images
        if: matrix.name == 'prerelease'
        run: echo "BUILD_TAG=$(make -C scanner --quiet --no-print-directory tag)-prerelease" >> "$GITHUB_ENV"

      - name: Set build tag for race condition images
        if: matrix.name == 'race-condition-debug'
        run: echo "BUILD_TAG=$(make -C scanner --quiet --no-print-directory tag)-rcd" >> "$GITHUB_ENV"

      - name: Build Scanner and ScannerDB images
        run: scripts/lib.sh retry 6 true make -C scanner GOOS=${{ matrix.goos }} GOARCH=${{ matrix.arch }} images

      - name: Push Scanner and ScannerDB images
        if: |
          github.event_name == 'push' || !github.event.pull_request.head.repo.fork
        env:
          QUAY_RHACS_ENG_RW_USERNAME: ${{ secrets.QUAY_RHACS_ENG_RW_USERNAME }}
          QUAY_RHACS_ENG_RW_PASSWORD: ${{ secrets.QUAY_RHACS_ENG_RW_PASSWORD }}
          QUAY_STACKROX_IO_RW_USERNAME: ${{ secrets.QUAY_STACKROX_IO_RW_USERNAME }}
          QUAY_STACKROX_IO_RW_PASSWORD: ${{ secrets.QUAY_STACKROX_IO_RW_PASSWORD }}
        run: |
          source ./scripts/ci/lib.sh
          push_scanner_image_set "${{ matrix.registry }}" "${{ matrix.arch }}"

  push-scanner-manifests:
    runs-on: ubuntu-latest
    needs:
      - define-job-matrix
      - build-and-push-scanner
    # This step will run even if some of the build-and-push-scanner steps failed.
    # By following this approach as much of the build matrix as possible is
    # completed despite transient issues e.g. docker pull timeouts. In this way
    # some e2e jobs that require some part of the build matrix can still
    # proceed.
    if: ${{ !cancelled() }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.define-job-matrix.outputs.matrix).push_scanner_manifests }}
    env:
      BUILD_TAG: ${{ needs.define-job-matrix.outputs.build-tag }}
      SHORTCOMMIT: ${{ needs.define-job-matrix.outputs.short-commit }}
      GOTAGS: ${{ needs.define-job-matrix.outputs.gotags }}
    steps:
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
      with:
        ref: ${{ inputs.commit || github.event.pull_request.head.sha }}

    - uses: ./.github/actions/job-preamble
      with:
        gcp-account: ${{ secrets.GCP_SERVICE_ACCOUNT_STACKROX_CI }}

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # ratchet:docker/setup-buildx-action@v4

    - name: Set build tag for prerelease images
      if: matrix.name == 'prerelease'
      run: echo "BUILD_TAG=$(make -C scanner --quiet --no-print-directory tag)-prerelease" >> "$GITHUB_ENV"

    - name: Set build tag for race condition images
      if: matrix.name == 'race-condition-debug'
      run: echo "BUILD_TAG=$(make -C scanner --quiet --no-print-directory tag)-rcd" >> "$GITHUB_ENV"

    - name: Push Scanner and ScannerDB image manifests
      if: |
        github.event_name == 'push' || !github.event.pull_request.head.repo.fork
      env:
        QUAY_RHACS_ENG_RW_USERNAME: ${{ secrets.QUAY_RHACS_ENG_RW_USERNAME }}
        QUAY_RHACS_ENG_RW_PASSWORD: ${{ secrets.QUAY_RHACS_ENG_RW_PASSWORD }}
        QUAY_STACKROX_IO_RW_USERNAME: ${{ secrets.QUAY_STACKROX_IO_RW_USERNAME }}
        QUAY_STACKROX_IO_RW_PASSWORD: ${{ secrets.QUAY_STACKROX_IO_RW_PASSWORD }}
      run: |
          source ./scripts/ci/lib.sh

          architectures="amd64,arm64"
          if ! is_in_PR_context || pr_has_label ci-build-all-arch; then
            architectures="amd64,arm64,ppc64le,s390x"
          fi
          if [[ "${{ matrix.name }}" == "race-condition-debug" ]]; then
            architectures="amd64"
          fi

          push_scanner_image_manifest_lists "${{ matrix.registry }}" "$architectures"

  push-operator-manifests:
    runs-on: ubuntu-latest
    needs:
    - define-job-matrix
    - build-and-push-operator
    # This step will run even if some of the build-and-push-matrix steps failed.
    # By following this approach as much of the build matrix as possible is
    # completed despite transient issues e.g. docker pull timeouts. In this way
    # some e2e jobs that require some part of the build matrix can still
    # proceed.
    if: ${{ !cancelled() }}
    strategy:
      # Supports image builds (see Setup build env):
      # RHACS_BRANDING
      # STACKROX_BRANDING
      fail-fast: false
      matrix: ${{ fromJson(needs.define-job-matrix.outputs.matrix).push_operator_multiarch_manifests }}
    env:
      ROX_PRODUCT_BRANDING: ${{ matrix.name }}
      BUILD_TAG: ${{ needs.define-job-matrix.outputs.build-tag }}
      SHORTCOMMIT: ${{ needs.define-job-matrix.outputs.short-commit }}
      GOTAGS: ${{ needs.define-job-matrix.outputs.gotags }}
    steps:
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
      with:
        ref: ${{ inputs.commit || github.event.pull_request.head.sha }}

    - uses: ./.github/actions/job-preamble
      with:
        gcp-account: ${{ secrets.GCP_SERVICE_ACCOUNT_STACKROX_CI }}

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # ratchet:docker/setup-buildx-action@v4

    - name: Push operator manifest lists
      # Skip for external contributions.
      if: |
        github.event_name == 'push' || !github.event.pull_request.head.repo.fork
      env:
        QUAY_RHACS_ENG_RW_USERNAME: ${{ secrets.QUAY_RHACS_ENG_RW_USERNAME }}
        QUAY_RHACS_ENG_RW_PASSWORD: ${{ secrets.QUAY_RHACS_ENG_RW_PASSWORD }}
        QUAY_STACKROX_IO_RW_USERNAME: ${{ secrets.QUAY_STACKROX_IO_RW_USERNAME }}
        QUAY_STACKROX_IO_RW_PASSWORD: ${{ secrets.QUAY_STACKROX_IO_RW_PASSWORD }}
      run: |
        source ./scripts/ci/lib.sh
        echo "Will determine context from: ${{ github.event_name }} & ${{ github.ref_name }}"
        push_context=""
        if [[ "${{ github.event_name }}" == "push" && "${{ github.ref_name }}" == "master" ]]; then
          push_context="merge-to-master"
        fi
        push_operator_manifest_lists "$push_context" "${{ env.ROX_PRODUCT_BRANDING }}" ${{ matrix.archs }}

  scan-go-binaries:
    if: |
      contains(github.event.pull_request.labels.*.name, 'scan-go-binaries')
    env:
      ARTIFACT_DIR: junit-reports/
    runs-on: ubuntu-latest
    needs:
    - pre-build-cli
    - pre-build-go-binaries
    steps:
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
      with:
        fetch-depth: 1
        ref: ${{ inputs.commit || github.event.pull_request.head.sha }}

    - uses: ./.github/actions/job-preamble
      with:
        gcp-account: ${{ secrets.GCP_SERVICE_ACCOUNT_STACKROX_CI }}

    - uses: ./.github/actions/download-artifact-with-retry
      with:
        name: cli-build

    - name: Unpack cli build
      run: |
        tar xvf cli-build.tar

    - uses: ./.github/actions/download-artifact-with-retry
      with:
        name: go-binaries-build-amd64-default

    - name: Unpack Go binaries build
      run: |
        tar xvf go-binaries-build.tar

    - name: Scan
      run: |
        ./scripts/ci/govulncheck.sh

    - name: Publish Test Report
      uses: test-summary/action@37b508cfee6d4d080eedd00b5bb240a6a784a6a5 # ratchet:test-summary/action@v2
      if: always()
      with:
        paths: 'junit-reports/**/*.xml'

    - name: Report junit failures in jira
      uses: ./.github/actions/junit2jira
      if: always()
      with:
        jira-user: ${{ secrets.JIRA_USER }}
        jira-token: ${{ secrets.JIRA_TOKEN }}
        gcp-account: ${{ secrets.GCP_SERVICE_ACCOUNT_STACKROX_CI }}
        directory: 'junit-reports'

  scan-images-with-roxctl:
    if: github.event_name == 'push' ||
      contains(github.event.pull_request.labels.*.name, 'scan-images-with-roxctl')
    needs:
      - build-and-push-db
      - build-and-push-main
      - build-and-push-operator
      - build-and-push-scanner
      - define-job-matrix
      - push-main-manifests
      - push-matching-collector-scanner
      - push-scanner-manifests
    name: Check images for vulnerabilities
    runs-on: ubuntu-latest
    permissions:
      # Needed for stackrox/central-login to create the JWT token.
      id-token: write
      security-events: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.define-job-matrix.outputs.matrix).scan_images_with_roxctl }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
        with:
          ref: ${{ inputs.commit || github.event.pull_request.head.sha }}

      - uses: ./.github/actions/job-preamble
        with:
          gcp-account: ${{ secrets.GCP_SERVICE_ACCOUNT_STACKROX_CI }}

      - name: Central login
        uses: stackrox/central-login@a090772359782ced9df63d091123154ce297ac6a # ratchet:stackrox/central-login@v1
        with:
          endpoint: ${{ vars.ACS_DOGFOODING_CENTRAL_URL }}

      - name: Install roxctl
        uses: stackrox/roxctl-installer-action@47fb4f5b275066b8322369e6e33fa010915b0d13 # ratchet:stackrox/roxctl-installer-action@v1
        with:
          central-endpoint: ${{ vars.ACS_DOGFOODING_CENTRAL_URL }}
          central-token: ${{ env.ROX_API_TOKEN }}

      - name: Scan images for vulnerabilities
        env:
          BUILD_TAG: ${{ needs.define-job-matrix.outputs.build-tag }}
          SHORTCOMMIT: ${{ needs.define-job-matrix.outputs.short-commit }}
          GOTAGS: ${{ needs.define-job-matrix.outputs.gotags }}
        run: |
          release_tag="$(make --quiet --no-print-directory tag)"
          if [[ "${{ matrix.image }}" =~ "operator" ]]; then
            release_tag="$(make -C operator --quiet --no-print-directory tag)"
          fi

          registry="$(./scripts/ci/lib.sh registry_from_branding "${{ matrix.name }}")"

          roxctl image scan --retries=10 --retry-delay=15 --force --severity=CRITICAL,IMPORTANT --output=sarif \
            --image="${registry}/${{ matrix.image }}:${release_tag}" \
            | tee results.sarif

      # TODO: re-enable roxctl scan results upload once quota issue has been resolved
      # - name: Upload roxctl scan results to GitHub Security tab
      #   uses: github/codeql-action/upload-sarif@v3
      #   with:
      #     category: ${{ matrix.image }}
      #     sarif_file: results.sarif

  slack-on-build-failure:
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      SLACK_CI_INTEGRATION_TESTING_WEBHOOK: ${{ secrets.SLACK_CI_INTEGRATION_TESTING_WEBHOOK }}
      TEST_FAILURES_NOTIFY_WEBHOOK: ${{ secrets.TEST_FAILURES_NOTIFY_WEBHOOK }}
    if: |
      failure() && (
          github.event_name == 'push' ||
          contains(github.event.pull_request.labels.*.name, 'ci-test-github-action-slack-messages')
      )
    name: Post failure message to Slack
    runs-on: ubuntu-latest
    needs:
      - build-and-push-db
      - build-and-push-main
      - build-and-push-operator
      - build-and-push-scanner
      - build-operator-bundle
      - pre-build-cli
      - pre-build-docs
      - pre-build-go-binaries
      - pre-build-ui
      - push-matching-collector-scanner
      - scan-go-binaries
      - scan-images-with-roxctl
    permissions:
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6

      - name: Slack message
        env:
          GITHUB_CONTEXT: ${{ toJSON(github) }}
        run: |
          source scripts/ci/lib.sh
          slack_workflow_failure
