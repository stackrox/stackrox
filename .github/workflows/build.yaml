name: Build

on:
  workflow_dispatch:
  push:
    branches:
    - main
    - master
  pull_request:
    types:
    - opened
    - reopened
    - synchronize

env:
  REGISTRY: quay.io/klape
  ROX_PRODUCT_BRANDING: STACKROX_BRANDING

defaults:
  run:
    shell: bash

jobs:
  # =============================================================================
  # Pre-build jobs run in apollo-ci container (need Go, Node, etc.)
  # =============================================================================
  pre-build-ui:
    runs-on: ubuntu-latest
    container:
      image: quay.io/klape/apollo-ci-buildah:0.5.1
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch UI deps
        run: make -C ui deps

      - name: Build UI
        run: make -C ui build

      - uses: actions/upload-artifact@v4
        with:
          name: ui-build
          path: ui/build
          retention-days: 1

  pre-build-cli:
    runs-on: ubuntu-latest
    container:
      image: quay.io/klape/apollo-ci-buildah:0.5.1
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build CLI
        run: make cli

      - name: Bundle build to preserve permissions
        run: tar -cvzf cli-build.tgz bin

      - uses: actions/upload-artifact@v4
        with:
          name: cli-build
          path: cli-build.tgz
          retention-days: 1

  pre-build-go-binaries:
    runs-on: ubuntu-latest
    container:
      image: quay.io/klape/apollo-ci-buildah:0.5.1
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout submodules
        run: git submodule update --init

      - name: Build Go binaries
        env:
          GOARCH: amd64
          GOOS: linux
        run: make main-build-nodeps

      - name: Bundle build to preserve permissions
        run: tar -cvzf go-binaries-build.tgz bin

      - uses: actions/upload-artifact@v4
        with:
          name: go-binaries-build
          path: go-binaries-build.tgz
          retention-days: 1

  pre-build-docs:
    runs-on: ubuntu-latest
    container:
      image: quay.io/klape/apollo-ci-buildah:0.5.1
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build docs
        run: make docs-build || echo "Docs build skipped, continuing..."

      - uses: actions/upload-artifact@v4
        with:
          name: docs-build
          path: image/rhel/docs
          retention-days: 1
          if-no-files-found: ignore

  # =============================================================================
  # Build images with buildah in apollo-ci-buildah container
  # =============================================================================
  build-and-push-main:
    runs-on: ubuntu-latest
    needs:
      - pre-build-ui
      - pre-build-cli
      - pre-build-go-binaries
      - pre-build-docs
    if: ${{ !cancelled() }}
    container:
      image: quay.io/klape/apollo-ci-buildah:0.5.1
    env:
      QUAY_USERNAME: ${{ secrets.QUAY_USERNAME }}
      QUAY_PASSWORD: ${{ secrets.QUAY_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout submodules
        run: git submodule update --init

      - uses: actions/download-artifact@v4
        with:
          name: ui-build
          path: ui/build

      - uses: actions/download-artifact@v4
        with:
          name: cli-build

      - name: Unpack cli build
        run: tar xvzf cli-build.tgz

      - uses: actions/download-artifact@v4
        with:
          name: go-binaries-build

      - name: Unpack Go binaries build
        run: tar xvzf go-binaries-build.tgz

      - uses: actions/download-artifact@v4
        with:
          name: docs-build
          path: image/rhel/docs
        continue-on-error: true

      - name: Login to Quay.io with buildah
        run: |
          buildah login -u "$QUAY_USERNAME" -p "$QUAY_PASSWORD" quay.io

      - name: Get image tag
        id: tag
        run: |
          TAG=$(make --quiet --no-print-directory tag)
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Building with tag: $TAG"

      - name: Prepare image directory
        run: |
          # Copy binaries to image directory
          mkdir -p image/rhel/bin
          cp -r bin/* image/rhel/bin/ 2>/dev/null || true

      - name: Build main image with buildah
        env:
          GOARCH: amd64
        run: |
          buildah bud \
            --platform linux/amd64 \
            --layers \
            -t ${{ env.REGISTRY }}/main:${{ steps.tag.outputs.tag }} \
            --build-arg DEBUG_BUILD="${DEBUG_BUILD:-}" \
            --build-arg ROX_PRODUCT_BRANDING=${{ env.ROX_PRODUCT_BRANDING }} \
            --build-arg TARGET_ARCH=amd64 \
            --build-arg ROX_IMAGE_FLAVOR=opensource \
            --build-arg LABEL_VERSION=${{ steps.tag.outputs.tag }} \
            --build-arg LABEL_RELEASE=${{ steps.tag.outputs.tag }} \
            --file image/rhel/Dockerfile \
            image/rhel

      - name: Build roxctl image with buildah
        run: |
          buildah bud \
            --platform linux/amd64 \
            --layers \
            -t ${{ env.REGISTRY }}/roxctl:${{ steps.tag.outputs.tag }} \
            --file image/roxctl/Dockerfile \
            image/roxctl

      - name: Build central-db image with buildah
        run: |
          # Build central-db from postgres base
          buildah bud \
            --platform linux/amd64 \
            --layers \
            -t ${{ env.REGISTRY }}/central-db:${{ steps.tag.outputs.tag }} \
            --file image/postgres/Dockerfile \
            image/postgres

      - name: Push images with buildah
        run: |
          TAG="${{ steps.tag.outputs.tag }}"

          for image in main roxctl central-db; do
            echo "Pushing ${{ env.REGISTRY }}/${image}:${TAG}"
            buildah push ${{ env.REGISTRY }}/${image}:${TAG} \
              docker://${{ env.REGISTRY }}/${image}:${TAG}
          done

  # =============================================================================
  # Build operator with buildah in apollo-ci-buildah container
  # =============================================================================
  build-and-push-operator:
    runs-on: ubuntu-latest
    container:
      image: quay.io/klape/apollo-ci-buildah:0.5.1
    env:
      QUAY_USERNAME: ${{ secrets.QUAY_USERNAME }}
      QUAY_PASSWORD: ${{ secrets.QUAY_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Login to Quay.io with buildah
        run: |
          buildah login -u "$QUAY_USERNAME" -p "$QUAY_PASSWORD" quay.io

      - name: Get image tag
        id: tag
        run: |
          TAG=$(make --quiet --no-print-directory -C operator tag)
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Building operator with tag: $TAG"

      - name: Build Operator binary
        env:
          GOARCH: amd64
          CGO_ENABLED: "0"
        run: |
          make -C operator/ build

      - name: Build Operator image with buildah
        run: |
          cd operator
          buildah bud \
            --platform linux/amd64 \
            --layers \
            -t ${{ env.REGISTRY }}/stackrox-operator:${{ steps.tag.outputs.tag }} \
            --file Dockerfile \
            .

      - name: Push operator image with buildah
        run: |
          buildah push \
            ${{ env.REGISTRY }}/stackrox-operator:${{ steps.tag.outputs.tag }} \
            docker://${{ env.REGISTRY }}/stackrox-operator:${{ steps.tag.outputs.tag }}

  # NOTE: Multi-arch support requires either:
  # 1. Multi-arch apollo-ci image for pre-build jobs
  # 2. Native arm64 runners with buildah
  # For now, this PoC builds amd64 only.
