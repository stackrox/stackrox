name: Unit Tests
on:
  push:
    tags:
    - '*'
    branches:
    - master
    - release-*
  pull_request:
    types:
    - opened
    - reopened
    - synchronize
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}-${{ github.sha }}
  cancel-in-progress: false

jobs:
  detect-changes:
    uses: ./.github/workflows/detect-changes.yml
    with:
      run_all: |
        ^Makefile$
        ^make/
        ^.github/workflows/unit-tests.yaml$
        ^.github/actions/job-preamble/

  pick-runner:
    runs-on: ubuntu-latest
    outputs:
      go-runner: ${{ steps.check.outputs.runner }}
    steps:
      - name: Check for warm runners
        id: check
        env:
          GH_TOKEN: ${{ secrets.RUNNER_ADMIN_TOKEN }}
        run: |
          if [[ -z "$GH_TOKEN" ]]; then
            echo 'runner="ubuntu-latest"' >> "$GITHUB_OUTPUT"
            exit 0
          fi
          available=$(gh api "orgs/${{ github.repository_owner }}/actions/runners" \
            --jq '[.runners[]? | select(.labels[]?.name == "warm-go-norace") | select(.status == "online")] | length' 2>/dev/null || echo 0)
          echo "Warm-go-norace runners available: $available"
          if [[ "$available" -gt 0 ]]; then
            echo 'runner=["self-hosted","warm-go-norace"]' >> "$GITHUB_OUTPUT"
          else
            echo 'runner="ubuntu-latest"' >> "$GITHUB_OUTPUT"
          fi

  go:
    needs: pick-runner
    strategy:
      fail-fast: false
      matrix:
        gotags: [ 'GOTAGS=""', 'GOTAGS=release' ]
        exclude:
          - gotags: ${{ github.event_name == 'pull_request' && !contains(github.event.pull_request.labels.*.name, 'ci-release-build') && 'GOTAGS=release' }}
    runs-on: ${{ fromJSON(needs.pick-runner.outputs.go-runner) }}
    outputs:
      new-jiras: ${{ steps.junit2jira.outputs.new-jiras }}
    # Stable version ldflags for test caching: Go's test cache keys include
    # link ActionID which includes -X ldflags. Fixed BUILD_TAG/SHORTCOMMIT
    # prevent per-commit cache misses.
    env:
      BUILD_TAG: 0.0.0
      SHORTCOMMIT: "0000000"
    steps:
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
      with:
        fetch-depth: 0

    - uses: ./.github/actions/job-preamble
      with:
        gcp-account: ${{ secrets.GCP_SERVICE_ACCOUNT_STACKROX_CI }}
        free-disk-space: 30

    - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # ratchet:actions/setup-go@v6
      with:
        go-version-file: go.mod

    - name: Check local cache
      id: local-cache
      run: |
        gocache_files=$(find $(go env GOCACHE) -type f 2>/dev/null | wc -l)
        echo "GOCACHE files: $gocache_files"
        if [[ "$gocache_files" -gt 1000 ]]; then
          echo "Local GOCACHE is warm ($gocache_files files). Skipping GHA restore."
          echo "warm=true" >> "$GITHUB_OUTPUT"
        else
          echo "Local GOCACHE is cold ($gocache_files files). Restoring from GHA."
          echo "warm=false" >> "$GITHUB_OUTPUT"
        fi

    - name: Cache Go dependencies
      if: steps.local-cache.outputs.warm != 'true'
      uses: ./.github/actions/cache-go-dependencies
      with:
        key-suffix: ${{ matrix.gotags }}

    - name: Stabilize file mtimes for test cache
      run: |
        git ls-files -z | xargs -0 touch -t 200101010000
        git ls-files -z | sed -z 's|/[^/]*$||' | sort -uz | xargs -0 touch -t 200101010000

    - name: Runner diagnostic
      run: |
        echo "=== Runner info ==="
        echo "runner_name=${RUNNER_NAME:-github-hosted}"
        echo "cpu_model=$(grep -m1 'model name' /proc/cpuinfo 2>/dev/null | cut -d: -f2 | xargs)"
        echo "go_version=$(go version)"
        echo "go_env_GOROOT=$(go env GOROOT)"
        echo "go_env_GOTOOLCHAIN=$(go env GOTOOLCHAIN)"
        echo "go_env_CC=$(go env CC)"
        echo "gcc_version=$(gcc --version 2>/dev/null | head -1)"
        echo "GOCACHE=$(go env GOCACHE)"
        echo "GOCACHE_size=$(du -sh $(go env GOCACHE) 2>/dev/null | cut -f1)"
        echo "GOCACHE_files=$(find $(go env GOCACHE) -type f 2>/dev/null | wc -l)"
        echo "disk_free=$(df -h / | tail -1 | awk '{print $4}')"
        echo "disk_iops=$(cat /dev/shm/cpu_score.txt 2>/dev/null || echo '?')"
        echo "mem_avail=$(free -m | awk '/^Mem:/{print $7}')MB"
        echo "processes=$(ps aux | wc -l)"
        echo "load_avg=$(cat /proc/loadavg)"
        echo "=== Compile benchmarks ==="
        start=$SECONDS; go build ./pkg/set/... 2>&1; echo "compile_pkg_set: $((SECONDS - start))s"
        start=$SECONDS; go build ./pkg/concurrency/... 2>&1; echo "compile_pkg_concurrency: $((SECONDS - start))s"
        start=$SECONDS; go build ./central/... 2>&1 | tail -1; echo "compile_central: $((SECONDS - start))s"
        echo "=== Test compile benchmarks (no execution) ==="
        start=$SECONDS; go test -run XXXX -count=1 ./pkg/set/... 2>&1; echo "test_compile_pkg_set: $((SECONDS - start))s"
        start=$SECONDS; go test -run XXXX -count=1 -race ./pkg/set/... 2>&1; echo "test_compile_race_pkg_set: $((SECONDS - start))s"
        echo "=== Disk I/O benchmark ==="
        dd if=/dev/zero of=/tmp/.bench bs=1M count=256 conv=fdatasync 2>&1 | tail -1
        rm -f /tmp/.bench
        echo "=== Top CPU consumers ==="
        ps aux --sort=-%cpu | head -10
        echo "=== Runner agent processes ==="
        ps aux | grep -E 'Runner\.|run\.sh|keep-alive' | grep -v grep

    - name: Quick test subset (fast signal)
      run: |
        echo "=== Quick subset test (pkg/set, pkg/concurrency, pkg/utils) ==="
        start=$SECONDS
        go test -race -count=1 -v ./pkg/set/... ./pkg/concurrency/... ./pkg/utils/... 2>&1 | tail -10
        echo "=== Quick subset took $((SECONDS - start))s ==="

    - name: Go Unit Tests (no race, testing cache benefit)
      run: |
        echo "=== Running without -race to isolate cache benefit ==="
        start=$SECONDS
        ${{ matrix.gotags }} TESTFLAGS="-p 4" make go-unit-tests
        echo "=== Tests took $((SECONDS - start))s ==="

    - uses: codecov/codecov-action@ab904c41d6ece82784817410c45d8b8c02684457 # ratchet:codecov/codecov-action@v3
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        flags: go-unit-tests

    - name: Generate junit report
      if: always()
      run: make generate-junit-reports

    - name: Publish Test Report
      uses: test-summary/action@31493c76ec9e7aa675f1585d3ed6f1da69269a86 # ratchet:test-summary/action@v2
      if: always()
      with:
        paths: 'junit-reports/report.xml'

    - name: Go Integration Unit Tests
      run: ${{ matrix.gotags }} make integration-unit-tests

    - name: Go Operator Integration Tests
      run: ${{ matrix.gotags }} make -C operator/ test-integration

    - name: Go Operator Helm Tests
      run: ${{ matrix.gotags }} make -C operator/ test-helm

    - name: Generate junit report
      if: always()
      run: make generate-junit-reports

    - name: Publish Test Report
      uses: test-summary/action@31493c76ec9e7aa675f1585d3ed6f1da69269a86 # ratchet:test-summary/action@v2
      if: always()
      with:
        paths: 'junit-reports/report.xml'

    - name: Report test failures to Jira
      if: (!cancelled())
      id: junit2jira
      uses: ./.github/actions/junit2jira
      with:
        create-jiras: ${{ github.event_name == 'push' }}
        jira-user: ${{ secrets.JIRA_USER }}
        jira-token: ${{ secrets.JIRA_TOKEN }}
        gcp-account: ${{ secrets.GCP_SERVICE_ACCOUNT_STACKROX_CI }}
        directory: 'junit-reports'

  go-postgres:
    strategy:
      fail-fast: false
      matrix:
        gotags: [ 'GOTAGS=""', 'GOTAGS=release' ]
        pg: [ '15' ]
        exclude:
          - gotags: ${{ github.event_name == 'pull_request' && !contains(github.event.pull_request.labels.*.name, 'ci-release-build') && 'GOTAGS=release' }}
    runs-on: ubuntu-latest
    outputs:
      new-jiras: ${{ steps.junit2jira.outputs.new-jiras }}
    # Stable version ldflags for test caching: Go's test cache keys include
    # link ActionID which includes -X ldflags. Fixed BUILD_TAG/SHORTCOMMIT
    # prevent per-commit cache misses.
    env:
      BUILD_TAG: 0.0.0
      SHORTCOMMIT: "0000000"
    container:
      image: quay.io/stackrox-io/apollo-ci:stackrox-test-0.5.11@sha256:df3459cf038e73775314b3a5d36d14dda41e6df438a0273c9efa8d23e0f2358a # ratchet:quay.io/stackrox-io/apollo-ci:stackrox-test-0.5.11
      volumes:
        - /usr:/mnt/usr
        - /opt:/mnt/opt
    steps:
    - name: Set Postgres version
      run: |
        echo "/usr/pgsql-${{ matrix.pg }}/bin" >> "${GITHUB_PATH}"

    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
      with:
        fetch-depth: 0

    - uses: ./.github/actions/job-preamble
      with:
        gcp-account: ${{ secrets.GCP_SERVICE_ACCOUNT_STACKROX_CI }}

    - name: Run Postgres
      run: |
        su postgres -c 'initdb -D /tmp/data'
        su postgres -c 'pg_ctl -D /tmp/data start'

    - name: Cache Go dependencies
      uses: ./.github/actions/cache-go-dependencies
      with:
        key-suffix: ${{ matrix.gotags }}

    - name: Is Postgres ready
      run: pg_isready -h 127.0.0.1

    - name: Go Unit Tests
      run: ${{ matrix.gotags }} make go-postgres-unit-tests

    - uses: codecov/codecov-action@ab904c41d6ece82784817410c45d8b8c02684457 # ratchet:codecov/codecov-action@v3
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        flags: go-unit-tests

    - name: Generate junit report
      if: always()
      run: make generate-junit-reports

    - name: Publish Test Report
      uses: test-summary/action@31493c76ec9e7aa675f1585d3ed6f1da69269a86 # ratchet:test-summary/action@v2
      if: always()
      with:
        paths: 'junit-reports/report.xml'

    - name: Report junit failures in jira
      if: (!cancelled())
      id: junit2jira
      uses: ./.github/actions/junit2jira
      with:
        create-jiras: ${{ github.event_name == 'push' }}
        jira-user: ${{ secrets.JIRA_USER }}
        jira-token: ${{ secrets.JIRA_TOKEN }}
        gcp-account: ${{ secrets.GCP_SERVICE_ACCOUNT_STACKROX_CI }}
        directory: 'junit-reports'

  go-bench:
    continue-on-error: true
    strategy:
      matrix:
        copy: [a, b, c, d, e, f]
    runs-on: ubuntu-latest
    env:
      BUILD_TAG: 0.0.0
      SHORTCOMMIT: "0000000"
    steps:
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6

    - name: Speculative run check
      uses: ./.github/actions/speculative-run
      id: spec
      with:
        job-name: go-bench
        copies: a,b,c,d,e,f

    - uses: ./.github/actions/job-preamble
      if: steps.spec.outputs.run == 'true'
      with:
        gcp-account: ${{ secrets.GCP_SERVICE_ACCOUNT_STACKROX_CI }}

    - name: Start Postgres
      if: steps.spec.outputs.run == 'true'
      run: |
        sudo sed -i '/^host/s/scram-sha-256/trust/' /etc/postgresql/*/main/pg_hba.conf
        cat << 'PGCONF' | sudo tee -a /etc/postgresql/*/main/postgresql.conf
        shared_buffers = 1GB
        work_mem = 256MB
        maintenance_work_mem = 512MB
        effective_cache_size = 4GB
        fsync = off
        synchronous_commit = off
        full_page_writes = off
        max_wal_size = 2GB
        checkpoint_completion_target = 0.9
        random_page_cost = 1.1
        PGCONF
        sudo systemctl start postgresql.service

    - name: Cache Go dependencies
      if: steps.spec.outputs.run == 'true'
      uses: ./.github/actions/cache-go-dependencies

    - name: Is Postgres ready
      if: steps.spec.outputs.run == 'true'
      run: |
        timeout 60 bash -c 'until pg_isready; do sleep 1; done' \
          || { sudo journalctl -u postgresql --no-pager -n 20; exit 1; }

    - name: Go Bench Tests
      if: steps.spec.outputs.run == 'true'
      run: make go-postgres-bench-tests

    - name: Stop container
      if: always()
      run: docker rm -f pg-container 2>/dev/null || true

    - name: Generate junit report
      if: always()
      run: make generate-junit-reports

    - name: Publish Test Report
      uses: test-summary/action@31493c76ec9e7aa675f1585d3ed6f1da69269a86 # ratchet:test-summary/action@v2
      if: always()
      with:
        paths: 'junit-reports/report.xml'

    # Do not create junit report for bench tests:
    # https://github.com/jstemmer/go-junit-report/issues/174

  ui:
    needs: detect-changes
    if: >-
      !needs.detect-changes.outputs.files ||
      contains(needs.detect-changes.outputs.files, '^ui/') ||
      contains(needs.detect-changes.outputs.files, '^.github/actions/cache-ui-dependencies/')
    runs-on: ubuntu-latest
    outputs:
      new-jiras: ${{ steps.junit2jira.outputs.new-jiras }}
    steps:
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6

    - uses: ./.github/actions/job-preamble
      with:
        gcp-account: ${{ secrets.GCP_SERVICE_ACCOUNT_STACKROX_CI }}

    - name: Set up Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # ratchet:actions/setup-node@v6
      with:
        node-version-file: ui/package.json

    - name: Cache UI dependencies
      uses: ./.github/actions/cache-ui-dependencies

    - name: UI Unit Tests
      run: make ui-test

    - name: Publish Test Report
      uses: test-summary/action@31493c76ec9e7aa675f1585d3ed6f1da69269a86 # ratchet:test-summary/action@v2
      if: always()
      with:
        paths: 'ui/apps/platform/test-results/reports/*.xml'

    - name: Report junit failures in jira
      if: (!cancelled())
      id: junit2jira
      uses: ./.github/actions/junit2jira
      with:
        create-jiras: ${{ github.event_name == 'push' }}
        jira-user: ${{ secrets.JIRA_USER }}
        jira-token: ${{ secrets.JIRA_TOKEN }}
        gcp-account: ${{ secrets.GCP_SERVICE_ACCOUNT_STACKROX_CI }}
        directory: 'ui/apps/platform/test-results/reports'

  ui-component:
    needs: detect-changes
    if: >-
      !needs.detect-changes.outputs.files ||
      contains(needs.detect-changes.outputs.files, '^ui/') ||
      contains(needs.detect-changes.outputs.files, '^.github/actions/cache-ui-dependencies/')
    runs-on: ubuntu-latest
    outputs:
      new-jiras: ${{ steps.junit2jira.outputs.new-jiras }}
    steps:
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6

    - uses: ./.github/actions/job-preamble
      with:
        gcp-account: ${{ secrets.GCP_SERVICE_ACCOUNT_STACKROX_CI }}

    - name: Set up Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # ratchet:actions/setup-node@v6
      with:
        node-version-file: ui/package.json

    - name: Cache UI dependencies
      uses: ./.github/actions/cache-ui-dependencies

    - name: UI Component Tests
      run: make ui-component-tests

    - name: Upload Cypress test result artifacts
      uses: ./.github/actions/upload-artifact-with-retry
      if: always()
      with:
        name: Cypress test results
        path: ui/apps/platform/cypress/test-results/

    - name: Publish Test Report
      uses: test-summary/action@31493c76ec9e7aa675f1585d3ed6f1da69269a86 # ratchet:test-summary/action@v2
      if: always()
      with:
        paths: 'ui/apps/platform/cypress/test-results/reports/**/*.xml'

    - name: Report junit failures in jira
      if: (!cancelled())
      id: junit2jira
      uses: ./.github/actions/junit2jira
      with:
        create-jiras: ${{ github.event_name == 'push' }}
        jira-user: ${{ secrets.JIRA_USER }}
        jira-token: ${{ secrets.JIRA_TOKEN }}
        gcp-account: ${{ secrets.GCP_SERVICE_ACCOUNT_STACKROX_CI }}
        directory: 'ui/apps/platform/cypress/test-results/reports'

  local-roxctl-tests:
    runs-on: ubuntu-latest
    outputs:
      new-jiras: ${{ steps.junit2jira.outputs.new-jiras }}
    container:
      image: quay.io/stackrox-io/apollo-ci:stackrox-test-0.5.11@sha256:df3459cf038e73775314b3a5d36d14dda41e6df438a0273c9efa8d23e0f2358a # ratchet:quay.io/stackrox-io/apollo-ci:stackrox-test-0.5.11
      volumes:
        - /usr:/mnt/usr
        - /opt:/mnt/opt
    steps:
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
      with:
        fetch-depth: 0
        ref: ${{ github.event.pull_request.head.sha }}

    - uses: ./.github/actions/job-preamble
      with:
        gcp-account: ${{ secrets.GCP_SERVICE_ACCOUNT_STACKROX_CI }}

    - name: Cache Go dependencies
      uses: ./.github/actions/cache-go-dependencies

    - uses: ./.github/actions/handle-tagged-build

    - name: Local roxctl tests
      run: ./scripts/ci/jobs/local-roxctl-tests.sh

    - name: Publish Test Report
      uses: test-summary/action@31493c76ec9e7aa675f1585d3ed6f1da69269a86 # ratchet:test-summary/action@v2
      if: always()
      with:
        paths: 'roxctl-test-output/*.xml'

    - name: Report junit failures in jira
      if: (!cancelled())
      id: junit2jira
      uses: ./.github/actions/junit2jira
      with:
        create-jiras: ${{ github.event_name == 'push' }}
        jira-user: ${{ secrets.JIRA_USER }}
        jira-token: ${{ secrets.JIRA_TOKEN }}
        gcp-account: ${{ secrets.GCP_SERVICE_ACCOUNT_STACKROX_CI }}
        directory: 'roxctl-test-output'

  shell-unit-tests:
    runs-on: ubuntu-latest
    outputs:
      new-jiras: ${{ steps.junit2jira.outputs.new-jiras }}
    container:
      image: quay.io/stackrox-io/apollo-ci:stackrox-test-0.5.11@sha256:df3459cf038e73775314b3a5d36d14dda41e6df438a0273c9efa8d23e0f2358a # ratchet:quay.io/stackrox-io/apollo-ci:stackrox-test-0.5.11
    steps:
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
      with:
        fetch-depth: 0
        ref: ${{ github.event.pull_request.head.sha }}

    - uses: ./.github/actions/job-preamble
      with:
        gcp-account: ${{ secrets.GCP_SERVICE_ACCOUNT_STACKROX_CI }}

    - name: Shell Unit Tests
      run: make shell-unit-tests

    - name: Publish Test Report
      uses: test-summary/action@31493c76ec9e7aa675f1585d3ed6f1da69269a86 # ratchet:test-summary/action@v2
      if: always()
      with:
        paths: 'shell-test-output/*.xml'

    - name: Report junit failures in jira
      if: (!cancelled())
      id: junit2jira
      uses: ./.github/actions/junit2jira
      with:
        create-jiras: ${{ github.event_name == 'push' }}
        jira-user: ${{ secrets.JIRA_USER }}
        jira-token: ${{ secrets.JIRA_TOKEN }}
        gcp-account: ${{ secrets.GCP_SERVICE_ACCOUNT_STACKROX_CI }}
        directory: 'shell-test-output'

  openshift-ci-unit-tests:
    runs-on: ubuntu-latest
    container:
      image: quay.io/stackrox-io/apollo-ci:stackrox-test-0.5.11@sha256:df3459cf038e73775314b3a5d36d14dda41e6df438a0273c9efa8d23e0f2358a # ratchet:quay.io/stackrox-io/apollo-ci:stackrox-test-0.5.11
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - uses: ./.github/actions/job-preamble
        with:
          gcp-account: ${{ secrets.GCP_SERVICE_ACCOUNT_STACKROX_CI }}

      - name: OpenShift CI Wrapper Unit Tests
        run: make -C .openshift-ci test

  sensor-integration-tests:
    env:
      KUBECONFIG: "/tmp/kubeconfig"
      # Stable version ldflags for test caching (see go job comment).
      BUILD_TAG: 0.0.0
      SHORTCOMMIT: "0000000"
    runs-on: ubuntu-latest
    outputs:
      new-jiras: ${{ steps.junit2jira.outputs.new-jiras }}
    steps:
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
      with:
        fetch-depth: 0

    - uses: ./.github/actions/job-preamble
      with:
        gcp-account: ${{ secrets.GCP_SERVICE_ACCOUNT_STACKROX_CI }}

    - name: Cache Go dependencies
      uses: ./.github/actions/cache-go-dependencies

    - name: Login to Quay.io
      uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # ratchet:docker/login-action@v4
      with:
        registry: quay.io
        username: ${{ secrets.QUAY_RHACS_ENG_RO_USERNAME }}
        password: ${{ secrets.QUAY_RHACS_ENG_RO_PASSWORD }}

    - name: Create k8s Kind Cluster
      uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # ratchet:helm/kind-action@v1
      with:
        kubeconfig: "${{ env.KUBECONFIG }}"

    - name: Load test images into Kind
      run: |
        source scripts/lib.sh
        # Read images from prefetch list (single source of truth)
        while IFS= read -r image; do
          # Skip empty lines and comments
          [[ -z "$image" || "$image" =~ ^# ]] && continue
          echo "Loading $image into Kind..."
          # Pull directly inside Kind node to avoid docker save/import issues with multi-arch
          # This bypasses the problematic "kind load docker-image" which uses --all-platforms
          # GitHub Actions runners are linux/amd64, so we only need that platform
          # Use --user flag to pass quay.io credentials to ctr
          retry 5 true docker exec chart-testing-control-plane ctr -n k8s.io images pull \
            --user "${{ secrets.QUAY_RHACS_ENG_RO_USERNAME }}:${{ secrets.QUAY_RHACS_ENG_RO_PASSWORD }}" \
            --platform linux/amd64 \
            "$image"
        done < sensor/tests/images-to-prefetch.txt

    - name: Run sensor integration tests
      run: make sensor-integration-test

    - name: Generate junit report
      if: always()
      run: make generate-junit-reports

    - name: Publish Test Report
      uses: test-summary/action@31493c76ec9e7aa675f1585d3ed6f1da69269a86 # ratchet:test-summary/action@v2
      if: always()
      with:
        paths: 'junit-reports/report.xml'

    - name: Report junit failures in jira
      if: (!cancelled())
      id: junit2jira
      uses: ./.github/actions/junit2jira
      with:
        create-jiras: ${{ github.event_name == 'push' }}
        jira-user: ${{ secrets.JIRA_USER }}
        jira-token: ${{ secrets.JIRA_TOKEN }}
        gcp-account: ${{ secrets.GCP_SERVICE_ACCOUNT_STACKROX_CI }}
        directory: 'junit-reports'

  slack-on-unit-tests-failure:
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      SLACK_CI_INTEGRATION_TESTING_WEBHOOK: ${{ secrets.SLACK_CI_INTEGRATION_TESTING_WEBHOOK }}
      TEST_FAILURES_NOTIFY_WEBHOOK: ${{ secrets.TEST_FAILURES_NOTIFY_WEBHOOK }}
    if: |
      failure() && (
          github.event_name == 'push' ||
          contains(github.event.pull_request.labels.*.name, 'ci-test-github-action-slack-messages')
      )
    name: Post failure message to Slack
    runs-on: ubuntu-latest
    needs:
      - go
      - go-bench
      - go-postgres
      - local-roxctl-tests
      - openshift-ci-unit-tests
      - sensor-integration-tests
      - shell-unit-tests
      - ui
      - ui-component
    permissions:
      actions: read
    steps:
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6

    - name: Slack message
      env:
        GITHUB_CONTEXT: ${{ toJSON(github) }}
        mention_author: ${{ needs.go.outputs.new-jiras || needs.go-postgres.outputs.new-jiras || needs.local-roxctl-tests.outputs.new-jiras || needs.ui.outputs.new-jiras || needs.go.outputs.new-jiras || needs.shell-unit-tests.outputs.new-jiras || needs.sensor-integration-tests.outputs.new-jiras }}
      run: |
        source scripts/ci/lib.sh
        slack_workflow_failure

  # Seed a warm-cache runner: build Go to warm caches, check runner
  # quality, register as self-hosted if fast. Only on workflow_dispatch.
  seed-warm-runner:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        slot: [1, 2, 3, 4]
    outputs:
      registered: ${{ steps.register.outputs.registered }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6

      - name: Check runner quality
        id: quality
        run: |
          cpu_model=$(grep -m1 'model name' /proc/cpuinfo 2>/dev/null | cut -d: -f2 | xargs)
          echo "cpu_model=${cpu_model}"
          if [[ "$cpu_model" == *"7763"* ]]; then
            echo "::warning::Slow runner (${cpu_model}). Not worth seeding."
            echo "fast=false" >> "$GITHUB_OUTPUT"
          else
            echo "Fast runner (${cpu_model}). Proceeding with seed."
            echo "fast=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # ratchet:actions/setup-go@v6
        if: steps.quality.outputs.fast == 'true'
        with:
          go-version-file: go.mod

      - name: Stabilize file mtimes for cache
        if: steps.quality.outputs.fast == 'true'
        run: |
          git ls-files -z | xargs -0 touch -t 200101010000
          git ls-files -z | sed -z 's|/[^/]*$||' | sort -uz | xargs -0 touch -t 200101010000

      - name: Cache Go dependencies
        if: steps.quality.outputs.fast == 'true'
        uses: ./.github/actions/cache-go-dependencies

      - name: Warm GOCACHE with full test suite
        if: steps.quality.outputs.fast == 'true'
        env:
          BUILD_TAG: 0.0.0
          SHORTCOMMIT: "0000000"
        run: |
          echo "Running full test suite WITHOUT -race to warm cache..."
          start=$SECONDS
          TESTFLAGS="-p 4" make go-unit-tests 2>&1 | tail -5 || true
          echo "=== Seed test run took $((SECONDS - start))s ==="
          echo "GOCACHE: $(du -sh $(go env GOCACHE) 2>/dev/null | cut -f1)"
          echo "GOCACHE files: $(find $(go env GOCACHE) -type f 2>/dev/null | wc -l)"

      - name: Register as warm self-hosted runner
        id: register
        if: steps.quality.outputs.fast == 'true'
        env:
          GH_TOKEN: ${{ secrets.RUNNER_ADMIN_TOKEN }}
        run: |
          if [[ -z "$GH_TOKEN" ]]; then
            echo "::warning::RUNNER_ADMIN_TOKEN not set. Skipping registration."
            echo "registered=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [[ "${RUNNER_NAME:-}" == warm-* ]]; then
            echo "Already on a warm runner (${RUNNER_NAME}). Skipping."
            echo "registered=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "registered=true" >> "$GITHUB_OUTPUT"
          bash .github/actions/job-preamble/keep-alive.sh "warm-go-norace" "30"


