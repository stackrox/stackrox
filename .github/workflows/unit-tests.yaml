name: Unit Tests
on:
  push:
    tags:
    - '*'
    branches:
    - master
    - release-*
  pull_request:
    types:
    - opened
    - reopened
    - synchronize

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  go:
    strategy:
      fail-fast: false
      matrix:
        gotags: [ 'GOTAGS=""', 'GOTAGS=release' ]
        shard:
          - name: pkg-helm
            packages: ./pkg/helm/...
          - name: pkg-other
            packages: ./pkg/...
            exclude-pattern: /helm/
          - name: central-1
            packages: ./central/...
            exclude-pattern: /central/[o-z]
          - name: central-2
            packages: ./central/...
            exclude-pattern: /central/[a-n]
          - name: rest
            packages: ./...
            exclude-pattern: /pkg/|/central/
    runs-on: ubuntu-latest
    outputs:
      new-jiras: ${{ steps.junit2jira.outputs.new-jiras }}
    # Stable version ldflags for test caching: Go's test cache keys include
    # link ActionID which includes -X ldflags. Fixed BUILD_TAG/SHORTCOMMIT
    # prevent per-commit cache misses.
    env:
      BUILD_TAG: 0.0.0
      SHORTCOMMIT: "0000000"
    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - uses: actions/setup-go@v6
      with:
        go-version-file: go.mod
        cache: false

    # setup-go sets GOTOOLCHAIN=local; override so sub-module tools
    # with newer go directives can auto-download.
    - name: Override GOTOOLCHAIN
      run: echo "GOTOOLCHAIN=auto" >> "$GITHUB_ENV"

    - uses: ./.github/actions/job-preamble
      with:
        gcp-account: ${{ secrets.GCP_SERVICE_ACCOUNT_STACKROX_CI }}
        free-disk-space: 30

    - name: Cache Go dependencies
      uses: ./.github/actions/cache-go-dependencies
      with:
        key-suffix: ${{ matrix.gotags }}-${{ matrix.shard.name }}

    - name: Go Unit Tests
      run: |
        mkdir -p bin test-output
        set -o pipefail
        # Build package list, filtering out packages that have their own dedicated jobs
        EXCLUDE='sensor/tests|operator/tests|/scanner/e2etests'
        if [[ -n '${{ matrix.shard.exclude-pattern }}' ]]; then
          EXCLUDE="${EXCLUDE}|${{ matrix.shard.exclude-pattern }}"
        fi
        PACKAGES=$(go list ${{ matrix.shard.packages }} | grep -Ev "$EXCLUDE")
        # shellcheck disable=SC2086
        GOTAGS="${GOTAGS:+$GOTAGS,}test" CGO_ENABLED=1 GOEXPERIMENT=cgocheck2 MUTEX_WATCHDOG_TIMEOUT_SECS=30 \
          scripts/go-test.sh -timeout 25m -race -cover \
          -coverprofile test-output/coverage.out -v \
          $PACKAGES \
          | tee test-output/test.log
      shell: bash

    - name: Generate junit report
      if: always()
      run: make generate-junit-reports

    - name: Publish Test Report
      uses: test-summary/action@v2
      if: always()
      with:
        paths: 'junit-reports/report.xml'

    - name: Report test failures to Jira
      if: (!cancelled())
      id: junit2jira
      uses: ./.github/actions/junit2jira
      with:
        create-jiras: ${{ github.event_name == 'push' }}
        jira-user: ${{ secrets.JIRA_USER }}
        jira-token: ${{ secrets.JIRA_TOKEN }}
        gcp-account: ${{ secrets.GCP_SERVICE_ACCOUNT_STACKROX_CI }}
        directory: 'junit-reports'

  go-integration:
    strategy:
      fail-fast: false
      matrix:
        gotags: [ 'GOTAGS=""', 'GOTAGS=release' ]
    runs-on: ubuntu-latest
    env:
      BUILD_TAG: 0.0.0
      SHORTCOMMIT: "0000000"
    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - uses: actions/setup-go@v6
      with:
        go-version-file: go.mod
        cache: false

    # setup-go sets GOTOOLCHAIN=local; override so sub-module tools
    # with newer go directives can auto-download.
    - name: Override GOTOOLCHAIN
      run: echo "GOTOOLCHAIN=auto" >> "$GITHUB_ENV"

    - uses: ./.github/actions/job-preamble
      with:
        gcp-account: ${{ secrets.GCP_SERVICE_ACCOUNT_STACKROX_CI }}

    - name: Cache Go dependencies
      uses: ./.github/actions/cache-go-dependencies
      with:
        key-suffix: ${{ matrix.gotags }}-integration

    - name: Go Integration Unit Tests
      run: |
        mkdir -p test-output
        set -o pipefail
        PACKAGES=$(go list ./... | grep -E 'registries|scanners|notifiers')
        # shellcheck disable=SC2086
        ${{ matrix.gotags }} GOTAGS="${GOTAGS:+$GOTAGS,}test,integration" CGO_ENABLED=1 GOEXPERIMENT=cgocheck2 MUTEX_WATCHDOG_TIMEOUT_SECS=30 \
          scripts/go-test.sh -v $PACKAGES | tee test-output/test.log
      shell: bash

    - name: Generate junit report
      if: always()
      run: make generate-junit-reports

    - name: Publish Test Report
      uses: test-summary/action@v2
      if: always()
      with:
        paths: 'junit-reports/report.xml'

  go-operator-integration:
    strategy:
      fail-fast: false
      matrix:
        gotags: [ 'GOTAGS=""', 'GOTAGS=release' ]
    runs-on: ubuntu-latest
    env:
      BUILD_TAG: 0.0.0
      SHORTCOMMIT: "0000000"
    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - uses: actions/setup-go@v6
      with:
        go-version-file: go.mod
        cache: false

    # setup-go sets GOTOOLCHAIN=local; override so sub-module tools
    # with newer go directives can auto-download.
    - name: Override GOTOOLCHAIN
      run: echo "GOTOOLCHAIN=auto" >> "$GITHUB_ENV"

    - uses: ./.github/actions/job-preamble
      with:
        gcp-account: ${{ secrets.GCP_SERVICE_ACCOUNT_STACKROX_CI }}

    - name: Cache Go dependencies
      uses: ./.github/actions/cache-go-dependencies

    - name: Download scanner module for proto generation
      run: go mod download github.com/stackrox/scanner

    - name: Go Operator Integration Tests
      run: ${{ matrix.gotags }} make -C operator/ test-integration

    - name: Go Operator Helm Tests
      run: ${{ matrix.gotags }} make -C operator/ test-helm

  go-postgres:
    strategy:
      fail-fast: false
      matrix:
        gotags: [ 'GOTAGS=""', 'GOTAGS=release' ]
        pg: [ '15' ]
        shard:
          - name: main
            make-target: go-postgres-unit-tests-main
          - name: migrator
            make-target: go-postgres-unit-tests-migrator
    runs-on: ubuntu-latest
    outputs:
      new-jiras: ${{ steps.junit2jira.outputs.new-jiras }}
    # Stable version ldflags for test caching: Go's test cache keys include
    # link ActionID which includes -X ldflags. Fixed BUILD_TAG/SHORTCOMMIT
    # prevent per-commit cache misses.
    env:
      BUILD_TAG: 0.0.0
      SHORTCOMMIT: "0000000"
    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - uses: actions/setup-go@v6
      with:
        go-version-file: go.mod
        cache: false

    # setup-go sets GOTOOLCHAIN=local; override so sub-module tools
    # with newer go directives can auto-download.
    - name: Override GOTOOLCHAIN
      run: echo "GOTOOLCHAIN=auto" >> "$GITHUB_ENV"

    - uses: ./.github/actions/job-preamble
      with:
        gcp-account: ${{ secrets.GCP_SERVICE_ACCOUNT_STACKROX_CI }}

    - name: Run Postgres
      run: |
        docker run --rm -d --name postgres \
          -e POSTGRES_HOST_AUTH_METHOD=trust \
          -e POSTGRES_INITDB_ARGS="--locale=C" \
          -p 5432:5432 \
          docker.io/library/postgres:${{ matrix.pg }}

    - name: Cache Go dependencies
      uses: ./.github/actions/cache-go-dependencies
      with:
        key-suffix: ${{ matrix.gotags }}-${{ matrix.shard.name }}

    - name: Is Postgres ready
      run: |
        for _ in $(seq 1 60); do
          docker exec postgres pg_isready -h 127.0.0.1 && exit 0
          sleep 1
        done
        echo "Postgres failed to become ready"
        docker logs postgres
        exit 1

    - name: Go Unit Tests
      run: SKIP_DEPS=1 ${{ matrix.gotags }} make ${{ matrix.shard.make-target }}

    - uses: codecov/codecov-action@v3
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        flags: go-unit-tests

    - name: Generate junit report
      if: always()
      run: make generate-junit-reports

    - name: Publish Test Report
      uses: test-summary/action@v2
      if: always()
      with:
        paths: 'junit-reports/report.xml'

    - name: Report junit failures in jira
      if: (!cancelled())
      id: junit2jira
      uses: ./.github/actions/junit2jira
      with:
        create-jiras: ${{ github.event_name == 'push' }}
        jira-user: ${{ secrets.JIRA_USER }}
        jira-token: ${{ secrets.JIRA_TOKEN }}
        gcp-account: ${{ secrets.GCP_SERVICE_ACCOUNT_STACKROX_CI }}
        directory: 'junit-reports'

  go-bench:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - uses: actions/setup-go@v6
      with:
        go-version-file: go.mod
        cache: false

    # setup-go sets GOTOOLCHAIN=local; override so sub-module tools
    # with newer go directives can auto-download.
    - name: Override GOTOOLCHAIN
      run: echo "GOTOOLCHAIN=auto" >> "$GITHUB_ENV"

    - uses: ./.github/actions/job-preamble
      with:
        gcp-account: ${{ secrets.GCP_SERVICE_ACCOUNT_STACKROX_CI }}

    - name: Run Postgres
      run: |
        docker run --rm -d --name postgres \
          -e POSTGRES_HOST_AUTH_METHOD=trust \
          -e POSTGRES_INITDB_ARGS="--locale=C" \
          -p 5432:5432 \
          docker.io/library/postgres:15

    - name: Cache Go dependencies
      uses: ./.github/actions/cache-go-dependencies

    - name: Is Postgres ready
      run: |
        for _ in $(seq 1 60); do
          docker exec postgres pg_isready -h 127.0.0.1 && exit 0
          sleep 1
        done
        echo "Postgres failed to become ready"
        docker logs postgres
        exit 1

    - name: Go Bench Tests
      run: make go-postgres-bench-tests

    - name: Generate junit report
      if: always()
      run: make generate-junit-reports

    - name: Publish Test Report
      uses: test-summary/action@v2
      if: always()
      with:
        paths: 'junit-reports/report.xml'

    # Do not create junit report for bench tests:
    # https://github.com/jstemmer/go-junit-report/issues/174

  ui:
    runs-on: ubuntu-latest
    outputs:
      new-jiras: ${{ steps.junit2jira.outputs.new-jiras }}
    container:
      image: quay.io/stackrox-io/apollo-ci:stackrox-test-0.5.3
    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - uses: ./.github/actions/job-preamble
      with:
        gcp-account: ${{ secrets.GCP_SERVICE_ACCOUNT_STACKROX_CI }}

    - name: Cache UI dependencies
      uses: ./.github/actions/cache-ui-dependencies

    - name: UI Unit Tests
      run: make ui-test

    - name: Publish Test Report
      uses: test-summary/action@v2
      if: always()
      with:
        paths: 'ui/apps/platform/test-results/reports/*.xml'

    - name: Report junit failures in jira
      if: (!cancelled())
      id: junit2jira
      uses: ./.github/actions/junit2jira
      with:
        create-jiras: ${{ github.event_name == 'push' }}
        jira-user: ${{ secrets.JIRA_USER }}
        jira-token: ${{ secrets.JIRA_TOKEN }}
        gcp-account: ${{ secrets.GCP_SERVICE_ACCOUNT_STACKROX_CI }}
        directory: 'ui/apps/platform/test-results/reports'

  ui-component:
    runs-on: ubuntu-latest
    outputs:
      new-jiras: ${{ steps.junit2jira.outputs.new-jiras }}
    container:
      image: quay.io/stackrox-io/apollo-ci:stackrox-ui-test-0.5.3
    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - uses: ./.github/actions/job-preamble
      with:
        gcp-account: ${{ secrets.GCP_SERVICE_ACCOUNT_STACKROX_CI }}

    - name: Cache UI dependencies
      uses: ./.github/actions/cache-ui-dependencies

    - name: UI Component Tests
      run: make ui-component-tests

    - name: Upload Cypress test result artifacts
      uses: ./.github/actions/upload-artifact-with-retry
      if: always()
      with:
        name: Cypress test results
        path: ui/apps/platform/cypress/test-results/

    - name: Publish Test Report
      uses: test-summary/action@v2
      if: always()
      with:
        paths: 'ui/apps/platform/cypress/test-results/reports/**/*.xml'

    - name: Report junit failures in jira
      if: (!cancelled())
      id: junit2jira
      uses: ./.github/actions/junit2jira
      with:
        create-jiras: ${{ github.event_name == 'push' }}
        jira-user: ${{ secrets.JIRA_USER }}
        jira-token: ${{ secrets.JIRA_TOKEN }}
        gcp-account: ${{ secrets.GCP_SERVICE_ACCOUNT_STACKROX_CI }}
        directory: 'ui/apps/platform/cypress/test-results/reports'

  local-roxctl-tests:
    runs-on: ubuntu-latest
    outputs:
      new-jiras: ${{ steps.junit2jira.outputs.new-jiras }}
    container:
      image: quay.io/stackrox-io/apollo-ci:stackrox-test-0.5.3
      volumes:
        - /usr:/mnt/usr
        - /opt:/mnt/opt
    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        fetch-depth: 0
        ref: ${{ github.event.pull_request.head.sha }}

    - uses: ./.github/actions/job-preamble
      with:
        gcp-account: ${{ secrets.GCP_SERVICE_ACCOUNT_STACKROX_CI }}

    - name: Cache Go dependencies
      uses: ./.github/actions/cache-go-dependencies

    - uses: ./.github/actions/handle-tagged-build

    - name: Local roxctl tests
      run: ./scripts/ci/jobs/local-roxctl-tests.sh

    - name: Publish Test Report
      uses: test-summary/action@v2
      if: always()
      with:
        paths: 'roxctl-test-output/*.xml'

    - name: Report junit failures in jira
      if: (!cancelled())
      id: junit2jira
      uses: ./.github/actions/junit2jira
      with:
        create-jiras: ${{ github.event_name == 'push' }}
        jira-user: ${{ secrets.JIRA_USER }}
        jira-token: ${{ secrets.JIRA_TOKEN }}
        gcp-account: ${{ secrets.GCP_SERVICE_ACCOUNT_STACKROX_CI }}
        directory: 'roxctl-test-output'

  shell-unit-tests:
    runs-on: ubuntu-latest
    outputs:
      new-jiras: ${{ steps.junit2jira.outputs.new-jiras }}
    container:
      image: quay.io/stackrox-io/apollo-ci:stackrox-test-0.5.3
    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        fetch-depth: 0
        ref: ${{ github.event.pull_request.head.sha }}

    - uses: ./.github/actions/job-preamble
      with:
        gcp-account: ${{ secrets.GCP_SERVICE_ACCOUNT_STACKROX_CI }}

    - name: Shell Unit Tests
      run: make shell-unit-tests

    - name: Publish Test Report
      uses: test-summary/action@v2
      if: always()
      with:
        paths: 'shell-test-output/*.xml'

    - name: Report junit failures in jira
      if: (!cancelled())
      id: junit2jira
      uses: ./.github/actions/junit2jira
      with:
        create-jiras: ${{ github.event_name == 'push' }}
        jira-user: ${{ secrets.JIRA_USER }}
        jira-token: ${{ secrets.JIRA_TOKEN }}
        gcp-account: ${{ secrets.GCP_SERVICE_ACCOUNT_STACKROX_CI }}
        directory: 'shell-test-output'

  openshift-ci-unit-tests:
    runs-on: ubuntu-latest
    container:
      image: quay.io/stackrox-io/apollo-ci:stackrox-test-0.5.3
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - uses: ./.github/actions/job-preamble
        with:
          gcp-account: ${{ secrets.GCP_SERVICE_ACCOUNT_STACKROX_CI }}

      - name: OpenShift CI Wrapper Unit Tests
        run: make -C .openshift-ci test

  sensor-integration-tests:
    env:
      KUBECONFIG: "/tmp/kubeconfig"
      # Stable version ldflags for test caching (see go job comment).
      BUILD_TAG: 0.0.0
      SHORTCOMMIT: "0000000"
    runs-on: ubuntu-latest
    outputs:
      new-jiras: ${{ steps.junit2jira.outputs.new-jiras }}
    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version-file: go.mod
        cache: false

    - uses: ./.github/actions/job-preamble
      with:
        gcp-account: ${{ secrets.GCP_SERVICE_ACCOUNT_STACKROX_CI }}

    - name: Cache Go dependencies
      uses: ./.github/actions/cache-go-dependencies

    - name: Login to Quay.io
      uses: docker/login-action@v4
      with:
        registry: quay.io
        username: ${{ secrets.QUAY_RHACS_ENG_RO_USERNAME }}
        password: ${{ secrets.QUAY_RHACS_ENG_RO_PASSWORD }}

    - name: Create k8s Kind Cluster
      uses: helm/kind-action@v1
      with:
        kubeconfig: "${{ env.KUBECONFIG }}"

    - name: Load test images into Kind
      run: |
        source scripts/lib.sh
        # Read images from prefetch list (single source of truth)
        while IFS= read -r image; do
          # Skip empty lines and comments
          [[ -z "$image" || "$image" =~ ^# ]] && continue
          echo "Loading $image into Kind..."
          # Pull directly inside Kind node to avoid docker save/import issues with multi-arch
          # This bypasses the problematic "kind load docker-image" which uses --all-platforms
          # GitHub Actions runners are linux/amd64, so we only need that platform
          # Use --user flag to pass quay.io credentials to ctr
          retry 5 true docker exec chart-testing-control-plane ctr -n k8s.io images pull \
            --user "${{ secrets.QUAY_RHACS_ENG_RO_USERNAME }}:${{ secrets.QUAY_RHACS_ENG_RO_PASSWORD }}" \
            --platform linux/amd64 \
            "$image"
        done < sensor/tests/images-to-prefetch.txt

    - name: Run sensor integration tests
      run: make sensor-integration-test

    - name: Generate junit report
      if: always()
      run: make generate-junit-reports

    - name: Publish Test Report
      uses: test-summary/action@v2
      if: always()
      with:
        paths: 'junit-reports/report.xml'

    - name: Report junit failures in jira
      if: (!cancelled())
      id: junit2jira
      uses: ./.github/actions/junit2jira
      with:
        create-jiras: ${{ github.event_name == 'push' }}
        jira-user: ${{ secrets.JIRA_USER }}
        jira-token: ${{ secrets.JIRA_TOKEN }}
        gcp-account: ${{ secrets.GCP_SERVICE_ACCOUNT_STACKROX_CI }}
        directory: 'junit-reports'

  slack-on-unit-tests-failure:
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      SLACK_CI_INTEGRATION_TESTING_WEBHOOK: ${{ secrets.SLACK_CI_INTEGRATION_TESTING_WEBHOOK }}
      TEST_FAILURES_NOTIFY_WEBHOOK: ${{ secrets.TEST_FAILURES_NOTIFY_WEBHOOK }}
    if: |
      failure() && (
          github.event_name == 'push' ||
          contains(github.event.pull_request.labels.*.name, 'ci-test-github-action-slack-messages')
      )
    name: Post failure message to Slack
    runs-on: ubuntu-latest
    needs:
      - go
      - go-integration
      - go-operator-integration
      - go-bench
      - go-postgres
      - local-roxctl-tests
      - openshift-ci-unit-tests
      - sensor-integration-tests
      - shell-unit-tests
      - ui
      - ui-component
    permissions:
      actions: read
    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Slack message
      env:
        GITHUB_CONTEXT: ${{ toJSON(github) }}
        mention_author: ${{ needs.go.outputs.new-jiras || needs.go-postgres.outputs.new-jiras || needs.local-roxctl-tests.outputs.new-jiras || needs.ui.outputs.new-jiras || needs.go.outputs.new-jiras || needs.shell-unit-tests.outputs.new-jiras || needs.sensor-integration-tests.outputs.new-jiras }}
      run: |
        source scripts/ci/lib.sh
        slack_workflow_failure
