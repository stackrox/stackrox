name: Style
on:
  push:
    tags:
    - '*'
    branches:
    - master
    - release-*
  pull_request:
    types:
    - opened
    - reopened
    - synchronize
env:
  ROX_PRODUCT_BRANDING: RHACS_BRANDING

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  check-generated-files:
    env:
      ARTIFACT_DIR: junit-reports/
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        fetch-depth: 0
        ref: ${{ github.event.pull_request.head.sha }}

    - uses: ./.github/actions/job-preamble
      with:
        gcp-account: ${{ secrets.GCP_SERVICE_ACCOUNT_STACKROX_CI }}

    - uses: actions/setup-go@v6
      with:
        go-version-file: go.mod
        cache: false

    - uses: actions/setup-python@v5
      with:
        python-version: '3.9'  # operator/Makefile pins pip==21.3.1 which requires Python <3.12

    # setup-go@v6 sets GOTOOLCHAIN=local; override so sub-module tools
    # with newer go directives (e.g. tools/proto) can auto-download.
    - name: Override GOTOOLCHAIN
      run: echo "GOTOOLCHAIN=auto" >> "$GITHUB_ENV"

    - name: Create artifacts dir
      run: mkdir -p "$ARTIFACT_DIR"

    - name: Cache Go dependencies
      uses: ./.github/actions/cache-go-dependencies
      with:
        save: false  # ~752 MB, style-dominated, no critical path speedup

    - name: Check Generated
      run: scripts/ci/jobs/check-generated.sh

  misc-checks:
    env:
      ARTIFACT_DIR: junit-reports/
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        fetch-depth: 0
        ref: ${{ github.event.pull_request.head.sha }}

    - uses: ./.github/actions/job-preamble
      with:
        gcp-account: ${{ secrets.GCP_SERVICE_ACCOUNT_STACKROX_CI }}

    - uses: actions/setup-go@v6
      with:
        go-version-file: go.mod
        cache: false

    - name: Override GOTOOLCHAIN
      run: echo "GOTOOLCHAIN=auto" >> "$GITHUB_ENV"

    - name: Create artifacts dir
      run: mkdir -p "$ARTIFACT_DIR"

    - name: Ensure no trailing whitespaces
      if: github.event_name == 'pull_request'
      # Markdown files aren't checked for trailing whitespaces because it's a valid linebreak there.
      run: git diff --check "${{ github.event.pull_request.base.sha }}"...HEAD ':(exclude)*.md'

    - name: Check PR fixes
      run: scripts/ci/jobs/check-pr-fixes.sh

    - name: Check TODOs
      run: scripts/ci/jobs/check-todos.sh

    - name: Check Policies
      run: scripts/ci/jobs/policy-checks.sh

    - name: Check Konflux setup
      run: scripts/ci/jobs/check-konflux-setup.sh

    - name: Check build & test image versions
      run: scripts/ci/jobs/check-image-version.sh

    - name: Check dependabot knows about pinned prefetched images
      run: scripts/ci/jobs/check-dependabot-pinned-image.sh

    - name: Check dependabot gomod configurations match go.mod files
      run: if [ -s scripts/ci/jobs/check-dependabot-gomod.sh ]; then scripts/ci/jobs/check-dependabot-gomod.sh; fi

  style-targets:
    # Discover style-slim sub-targets from the Makefile so the matrix
    # stays in sync without hardcoding target names in the workflow.
    runs-on: ubuntu-latest
    outputs:
      targets: ${{ steps.discover.outputs.targets }}
    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: Makefile
      - id: discover
        run: |
          # Parse the style-slim prerequisite list from the Makefile.
          # shellcheck disable=SC1003
          targets=$(sed -n '/^style-slim:/,/^$/p' Makefile \
            | tr '\\' ' ' | xargs \
            | sed 's/^style-slim: //')
          # Shard roxvet across top-level package directories for parallelism.
          targets=${targets/roxvet/roxvet:central roxvet:pkg roxvet:other}
          json=$(echo "$targets" | jq -Rc 'split(" ")')
          echo "targets=$json" >> "$GITHUB_OUTPUT"
          echo "Discovered targets: $targets"

  style-check:
    needs: style-targets
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: ${{ fromJson(needs.style-targets.outputs.targets) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - uses: ./.github/actions/job-preamble
        with:
          gcp-account: ${{ secrets.GCP_SERVICE_ACCOUNT_STACKROX_CI }}

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false

      - name: Override GOTOOLCHAIN
        run: echo "GOTOOLCHAIN=auto" >> "$GITHUB_ENV"

      - uses: actions/setup-node@v4
        if: matrix.target == 'ui-lint'
        with:
          node-version-file: ui/package.json

      - name: Install xmlstarlet
        if: matrix.target == 'shell-style'
        run: sudo apt-get update -qq && sudo apt-get install -y -qq xmlstarlet

      - name: Install Python linters
        if: matrix.target == 'openshift-ci-style'
        run: python3 -m pip install -r .openshift-ci/dev-requirements.txt

      - name: Cache Go dependencies
        uses: ./.github/actions/cache-go-dependencies
        with:
          save: false

      - name: Cache UI dependencies
        if: matrix.target == 'ui-lint'
        uses: ./.github/actions/cache-ui-dependencies

      - name: Cache QA Test dependencies
        if: matrix.target == 'qa-tests-style'
        uses: ./.github/actions/cache-gradle-dependencies

      - name: Fetch UI deps
        if: matrix.target == 'ui-lint'
        run: make -C ui deps

      - name: make ${{ matrix.target }}
        run: |
          target="${{ matrix.target }}"
          if [[ "$target" == roxvet:* ]]; then
            shard="${target#roxvet:}"
            case "$shard" in
              central) scope="./central/..." ;;
              pkg)     scope="./pkg/..." ;;
              other)   scope="./sensor/... ./roxctl/... ./migrator/... ./compliance/... ./scanner/... ./tools/... ./generated/... ./operator/... ./config-controller/... ./tests/... ./scale/... ./image/... ./webhookserver/..." ;;
            esac
            make roxvet ROXVET_SCOPE="$scope"
          else
            make "$target"
          fi

  golangci-lint:
    timeout-minutes: 240
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - uses: ./.github/actions/job-preamble
      with:
        gcp-account: ${{ secrets.GCP_SERVICE_ACCOUNT_STACKROX_CI }}

    - uses: actions/setup-go@v6
      with:
        go-version-file: 'tools/linters/go.mod'
        cache: false  # ~3,354 MB via setup-go; disabled to stay within 10 GB budget

    - name: Check Cache golangci-lint
      run: make golangci-lint-cache-status

    - name: Cache golangci-lint
      if: github.event_name == 'push' && github.ref_name == github.event.repository.default_branch
      uses: actions/cache@v5
      with:
        path: ${{ env.HOME }}/.cache/golangci-lint
        key: go-lint-v2-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          go-lint-v2-

    - name: Restore golangci-lint analysis cache
      if: ${{ !(github.event_name == 'push' && github.ref_name == github.event.repository.default_branch) }}
      uses: actions/cache/restore@v5
      with:
        path: ${{ env.HOME }}/.cache/golangci-lint
        key: go-lint-v2-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          go-lint-v2-

    - name: Check cache golangci-lint
      run: make golangci-lint-cache-status

    - name: Check Go version is in sync in .golangci.yml and go.mod
      run: |
        [ "$(awk '/^go /{print $2}' go.mod | cut -d. -f 1-2)" = "$(yq e .run.go .golangci.yml)" ]

    - name: make golangci-lint
      run: make golangci-lint

    - name: Check Cache golangci-lint
      run: make golangci-lint-cache-status

  check-dependent-images-exist:
    # This job ensures that COLLECTOR_VERSION, FACT_VERSION or SCANNER_VERSION files cannot be updated to a version
    # for which the image was not successfully built on Konflux (suffix "-fast"). It also verifies that GHA-built image
    # is there (no suffix) so that the failure also happens in this job.
    runs-on: ubuntu-latest
    strategy:
      matrix:
        image: ["collector", "fact", "scanner", "scanner-slim", "scanner-db", "scanner-db-slim"]
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - uses: ./.github/actions/job-preamble
        with:
          gcp-account: ${{ secrets.GCP_SERVICE_ACCOUNT_STACKROX_CI }}

      - name: Get image tag from COLLECTOR|FACT|SCANNER_VERSION file
        id: image-tag
        run: |
          if [[ "${{ matrix.image }}" == "collector" ]]; then
            makefile_target="collector-tag"
          elif [[ "${{ matrix.image }}" == "fact" ]]; then
            makefile_target="fact-tag"
          else
            makefile_target="scanner-tag"
          fi
          echo "image-tag=$(make --quiet --no-print-directory "${makefile_target}")" >> "${GITHUB_OUTPUT}"

      - name: Check GHA-built image exists
        uses: stackrox/actions/release/wait-for-image@v1
        # Skip for external contributions.
        if: |
          github.event_name == 'push' || !github.event.pull_request.head.repo.fork
        with:
          token: ${{ secrets.QUAY_RHACS_ENG_BEARER_TOKEN }}
          image: rhacs-eng/${{ matrix.image }}:${{ steps.image-tag.outputs.image-tag }}
          limit: 300

      - name: Check Konflux-built image exists
        uses: stackrox/actions/release/wait-for-image@v1
        # Skip for external contributions.
        if: |
          github.event_name == 'push' || !github.event.pull_request.head.repo.fork
        with:
          token: ${{ secrets.QUAY_RHACS_ENG_BEARER_TOKEN }}
          image: rhacs-eng/release-${{ matrix.image }}:${{ steps.image-tag.outputs.image-tag }}-fast
          limit: 300

  github-actions-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/job-preamble
        with:
          gcp-account: ${{ secrets.GCP_SERVICE_ACCOUNT_STACKROX_CI }}
      - name: Download actionlint
        id: get_actionlint
        run: bash <(curl https://raw.githubusercontent.com/rhysd/actionlint/2ab3a12c7848f6c15faca9a92612ef4261d0e370/scripts/download-actionlint.bash) 1.6.27
        shell: bash
      - name: Check workflow files
        run: ${{ steps.get_actionlint.outputs.executable }} -color
        shell: bash

  github-actions-shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/job-preamble
        with:
          gcp-account: ${{ secrets.GCP_SERVICE_ACCOUNT_STACKROX_CI }}
      - name: Check scripts with shellcheck
        run: shellcheck -P SCRIPTDIR -x ./.github/workflows/scripts/*.sh

  openshift-ci-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - uses: ./.github/actions/job-preamble
        with:
          gcp-account: ${{ secrets.GCP_SERVICE_ACCOUNT_STACKROX_CI }}

      - name: Install Python linters
        run: python3 -m pip install -r .openshift-ci/dev-requirements.txt

      - name: pycodestyle
        run: make -C .openshift-ci style

      - name: Pylint
        run: make -C .openshift-ci lint

  slack-on-style-failure:
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      SLACK_CI_INTEGRATION_TESTING_WEBHOOK: ${{ secrets.SLACK_CI_INTEGRATION_TESTING_WEBHOOK }}
      TEST_FAILURES_NOTIFY_WEBHOOK: ${{ secrets.TEST_FAILURES_NOTIFY_WEBHOOK }}
    if: |
      failure() && (
          github.event_name == 'push' ||
          contains(github.event.pull_request.labels.*.name, 'ci-test-github-action-slack-messages')
      )
    name: Post failure message to Slack
    runs-on: ubuntu-latest
    needs:
      - check-generated-files
      - misc-checks
      - style-check
      - golangci-lint
      - check-dependent-images-exist
      - github-actions-lint
      - github-actions-shellcheck
      - openshift-ci-lint
    permissions:
      actions: read
    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Slack message
      env:
        GITHUB_CONTEXT: ${{ toJSON(github) }}
      run: |
        source scripts/ci/lib.sh
        slack_workflow_failure
