name: QA E2E Tests (4 Parallel Groups)

on:
  workflow_dispatch:
  push:
    tags: ['*']
    branches: [master, 'release-*']
  pull_request:
    types: [opened, reopened, labeled, synchronize]

jobs:
  gke-qa-e2e-tests:
    if: |
      github.repository == 'stackrox/stackrox' &&
      (github.event_name != 'pull_request' || !github.event.pull_request.head.repo.fork)

    runs-on: ubuntu-latest
    timeout-minutes: ${{ (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'ci-build-race-condition-debug')) && 180 || 120 }}

    strategy:
      fail-fast: false
      matrix:
        test-group:
          - "testBegin testParallel"
          - "testBAT"
          - "testRest"
          - "sensor-bounce-test"

    env:
      CLUSTER_NAME: e2e-${{ github.run_id }}-${{ github.run_attempt }}-${{ strategy.job-index }}
      CI_JOB_NAME: qa-e2e-tests-${{ strategy.job-index }}
      ARTIFACT_DIR: ./junit-reports
      ORCHESTRATOR_FLAVOR: k8s
      GCP_IMAGE_TYPE: cos_containerd
      OUTPUT_FORMAT: helm
      ROX_RISK_REPROCESSING_INTERVAL: 15s
      ROX_SENSOR_CONNECTION_RETRY_MAX_INTERVAL: 30s
      USE_GKE_GCLOUD_AUTH_PLUGIN: "True"
      IS_RACE_BUILD: ${{ (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'ci-build-race-condition-debug')) && 'true' || 'false' }}

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - uses: ./.github/actions/job-preamble
        with:
          gcp-account: ${{ secrets.GCP_SERVICE_ACCOUNT_STACKROX_CI }}

      - name: Get tag
        run: |
          echo "tag=$(make --quiet --no-print-directory tag)" >> "$GITHUB_ENV"

      - name: Create GKE cluster
        uses: stackrox/actions/infra/create-cluster@v1
        with:
          token: ${{ secrets.INFRA_TOKEN }}
          flavor: gke-default
          name: ${{ env.CLUSTER_NAME }}
          lifespan: 3h
          args: nodes=3,machine-type=e2-standard-8
          wait: false

      - name: Docker login
        uses: docker/login-action@v3
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_RHACS_ENG_RO_USERNAME }}
          password: ${{ secrets.QUAY_RHACS_ENG_RO_PASSWORD }}

      - name: Build tools
        run: make roxctl_linux-amd64

      - uses: stackrox/actions/infra/install-infractl@v1

      - uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_STACKROX_CI }}
          export_environment_variables: true

      - uses: google-github-actions/setup-gcloud@v3
        with:
          install_components: "gke-gcloud-auth-plugin"

      - name: Wait for cluster and get kubeconfig
        timeout-minutes: 10
        env:
          INFRA_TOKEN: ${{ secrets.INFRA_TOKEN }}
        run: |
          infractl wait "${CLUSTER_NAME}"
          infractl artifacts "${CLUSTER_NAME}" --download-dir artifacts
          echo "KUBECONFIG=$(pwd)/artifacts/kubeconfig" >> "$GITHUB_ENV"

      - name: Wait for container images
        uses: stackrox/actions/release/wait-for-image@v1
        with:
          token: ${{ secrets.QUAY_RHACS_ENG_BEARER_TOKEN }}
          image: |
            rhacs-eng/main:${{ env.tag }}
            rhacs-eng/central-db:${{ env.tag }}
            rhacs-eng/roxctl:${{ env.tag }}
            rhacs-eng/scanner-v4:${{ env.tag }}
            rhacs-eng/scanner-v4-db:${{ env.tag }}
            rhacs-eng/collector:${{ env.tag }}

      - name: Run pre-test setup
        shell: python
        env:
          QUAY_RHACS_ENG_BEARER_TOKEN: ${{ secrets.QUAY_RHACS_ENG_BEARER_TOKEN }}
          PYTHONUNBUFFERED: "1"
        run: |
          import sys
          sys.path.append('.openshift-ci')
          from pre_tests import PreSystemTests
          PreSystemTests().run()

      - name: Deploy StackRox
        env:
          MAIN_IMAGE_TAG: ${{ env.tag }}
          REGISTRY_USERNAME: ${{ secrets.QUAY_RHACS_ENG_RO_USERNAME }}
          REGISTRY_PASSWORD: ${{ secrets.QUAY_RHACS_ENG_RO_PASSWORD }}
        run: |
          source qa-tests-backend/scripts/run-part-1.sh
          config_part_1

      - name: Execute test group
        if: |
          github.event_name != 'pull_request' ||
          contains(github.event.pull_request.labels.*.name, 'ci-all-qa-tests') ||
          !github.event.pull_request.draft ||
          matrix.test-group != 'testRest'
        env:
          REGISTRY_USERNAME: ${{ secrets.QUAY_RHACS_ENG_RO_USERNAME }}
          REGISTRY_PASSWORD: ${{ secrets.QUAY_RHACS_ENG_RO_PASSWORD }}
          GOOGLE_CREDENTIALS_GCR_SCANNER_V2: ${{ secrets.GOOGLE_CREDENTIALS_GCR_SCANNER_V2 }}
          REDHAT_USERNAME: ${{ secrets.RH_REGISTRY_USERNAME_RO }}
          REDHAT_PASSWORD: ${{ secrets.RH_REGISTRY_PASSWORD_RO }}
          LOAD_BALANCER: lb
        run: |
          echo "Running test group: ${{ matrix.test-group }}"
          cd qa-tests-backend
          make compile
          ./gradlew ${{ matrix.test-group }}

      - name: Collect artifacts
        if: always()
        shell: python
        env:
          PYTHONUNBUFFERED: "1"
        run: |
          import sys
          sys.path.append('.openshift-ci')
          from post_tests import PostClusterTest
          PostClusterTest(collect_central_artifacts=True).run([
            "/tmp/qa-tests-backend-logs",
            "${{ env.ARTIFACT_DIR }}"
          ])

      - name: Final post-test
        if: always()
        shell: python
        env:
          QA_TEST_DEBUG_LOGS: /tmp/qa-tests-backend-logs
          PYTHONUNBUFFERED: "1"
        run: |
          import sys
          sys.path.append('.openshift-ci')
          from post_tests import FinalPost
          FinalPost(store_qa_tests_data=True).run()

      - name: Publish test summary
        uses: test-summary/action@v2
        if: always()
        with:
          paths: ${{ env.ARTIFACT_DIR }}/**/*.xml
          show: all

      - name: Report failures to JIRA
        if: (!cancelled())
        uses: ./.github/actions/junit2jira
        with:
          create-jiras: ${{ github.event_name == 'push' }}
          jira-user: ${{ secrets.JIRA_USER }}
          jira-token: ${{ secrets.JIRA_TOKEN }}
          gcp-account: ${{ secrets.GCP_SERVICE_ACCOUNT_STACKROX_CI }}
          directory: ${{ env.ARTIFACT_DIR }}

      - name: Delete cluster
        if: always()
        env:
          INFRA_TOKEN: ${{ secrets.INFRA_TOKEN }}
        run: infractl delete "${CLUSTER_NAME}"
