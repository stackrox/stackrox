name: QA E2E Tests (4 Parallel Groups)

on:
  workflow_dispatch:
  push:
    tags: ['*']
    branches: [master, 'release-*']
  pull_request:
    types: [opened, reopened, labeled, synchronize]

jobs:
  gke-qa-e2e-tests:
    if: |
      github.repository == 'stackrox/stackrox' &&
      (github.event_name != 'pull_request' || !github.event.pull_request.head.repo.fork)

    runs-on: ubuntu-latest
    timeout-minutes: ${{ (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'ci-build-race-condition-debug')) && 180 || 120 }}

    strategy:
      fail-fast: false
      matrix:
        test-group:
          - "testParallel"  # Skip testBegin (VulnMgmtSACTest) - requires scanner integration which is failing
          # - "testBegin testParallel"
          # - "testBAT"
          # - "testRest"
          # - "testSensorBounce testSensorBounceNext"

    env:
      CLUSTER_NAME: e2e-${{ github.run_id }}-${{ github.run_attempt }}-${{ strategy.job-index }}
      CI_JOB_NAME: qa-e2e-tests-${{ strategy.job-index }}
      ARTIFACT_DIR: ./junit-reports
      ORCHESTRATOR_FLAVOR: k8s
      KUBERNETES_PROVIDER: gke
      POD_SECURITY_POLICIES: "false"
      GCP_IMAGE_TYPE: cos_containerd
      OUTPUT_FORMAT: helm
      ROX_RISK_REPROCESSING_INTERVAL: 15s
      ROX_SENSOR_CONNECTION_RETRY_MAX_INTERVAL: 30s
      USE_GKE_GCLOUD_AUTH_PLUGIN: "True"
      IS_RACE_BUILD: ${{ (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'ci-build-race-condition-debug')) && 'true' || 'false' }}

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - uses: ./.github/actions/job-preamble
        with:
          gcp-account: ${{ secrets.GCP_SERVICE_ACCOUNT_STACKROX_CI }}

      - name: Get tag
        run: |
          echo "tag=$(make --quiet --no-print-directory tag)" >> "$GITHUB_ENV"
          echo "scanner_tag=$(make --quiet --no-print-directory scanner-tag)" >> "$GITHUB_ENV"

      - name: Create GKE cluster
        uses: stackrox/actions/infra/create-cluster@v1
        with:
          token: ${{ secrets.INFRA_TOKEN }}
          flavor: gke-default
          name: ${{ env.CLUSTER_NAME }}
          lifespan: 3h
          args: nodes=3,machine-type=e2-standard-8
          wait: false

      - name: Docker login
        uses: docker/login-action@v3
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_RHACS_ENG_RO_USERNAME }}
          password: ${{ secrets.QUAY_RHACS_ENG_RO_PASSWORD }}

      - name: Build tools
        run: make roxctl_linux-amd64

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Generate proto and compile tests
        run: |
          make proto-generated-srcs
          cd qa-tests-backend
          make compile

      - uses: stackrox/actions/infra/install-infractl@v1

      - uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_STACKROX_CI }}
          export_environment_variables: true

      - uses: google-github-actions/setup-gcloud@v3
        with:
          install_components: "gke-gcloud-auth-plugin"

      - name: Wait for cluster and get kubeconfig
        timeout-minutes: 30
        env:
          INFRA_TOKEN: ${{ secrets.INFRA_TOKEN }}
        run: |
          infractl wait "${CLUSTER_NAME}"
          infractl artifacts "${CLUSTER_NAME}" --download-dir artifacts
          echo "KUBECONFIG=$(pwd)/artifacts/kubeconfig" >> "$GITHUB_ENV"

      - name: Wait for container images
        uses: stackrox/actions/release/wait-for-image@v1
        with:
          token: ${{ secrets.QUAY_RHACS_ENG_BEARER_TOKEN }}
          image: |
            rhacs-eng/main:${{ env.tag }}
            rhacs-eng/central-db:${{ env.tag }}
            rhacs-eng/roxctl:${{ env.tag }}
            rhacs-eng/scanner:${{ env.scanner_tag }}
            rhacs-eng/scanner-db:${{ env.scanner_tag }}
            rhacs-eng/collector:${{ env.tag }}

      - name: Run pre-test setup
        shell: python
        env:
          QUAY_RHACS_ENG_BEARER_TOKEN: ${{ secrets.QUAY_RHACS_ENG_BEARER_TOKEN }}
          QUAY_RHACS_ENG_RO_USERNAME: ${{ secrets.QUAY_RHACS_ENG_RO_USERNAME }}
          QUAY_RHACS_ENG_RO_PASSWORD: ${{ secrets.QUAY_RHACS_ENG_RO_PASSWORD }}
          PYTHONUNBUFFERED: "1"
        run: |
          import sys
          sys.path.append('.openshift-ci')
          from pre_tests import PreSystemTests
          PreSystemTests().run()

      - name: Deploy StackRox
        if: |
          github.event_name != 'pull_request' ||
          contains(github.event.pull_request.labels.*.name, 'ci-all-qa-tests') ||
          !github.event.pull_request.draft ||
          matrix.test-group != 'testRest'
        env:
          QUAY_RHACS_ENG_RO_USERNAME: ${{ secrets.QUAY_RHACS_ENG_RO_USERNAME }}
          QUAY_RHACS_ENG_RO_PASSWORD: ${{ secrets.QUAY_RHACS_ENG_RO_PASSWORD }}
          MAIN_IMAGE_TAG: ${{ env.tag }}
          REGISTRY_USERNAME: ${{ secrets.QUAY_RHACS_ENG_RO_USERNAME }}
          REGISTRY_PASSWORD: ${{ secrets.QUAY_RHACS_ENG_RO_PASSWORD }}
          GOOGLE_CREDENTIALS_GCR_SCANNER_V2: ${{ secrets.GOOGLE_CREDENTIALS_GCR_SCANNER_V2 }}
          REDHAT_USERNAME: ${{ secrets.RH_REGISTRY_USERNAME_RO }}
          REDHAT_PASSWORD: ${{ secrets.RH_REGISTRY_PASSWORD_RO }}
          LOAD_BALANCER: lb
        run: |
          set -euo pipefail

          echo "ORCHESTRATOR_FLAVOR=$ORCHESTRATOR_FLAVOR"
          echo "KUBECONFIG=$KUBECONFIG"
          echo "Current directory: $(pwd)"

          # Source the script which will set ROOT and source dependencies
          source qa-tests-backend/scripts/run-part-1.sh

          # Deploy StackRox (sets ROX_USERNAME, ROX_ADMIN_PASSWORD, etc.)
          if ! config_part_1; then
            echo "::group::Pod status"
            kubectl -n stackrox get pods -o wide || true
            echo "::endgroup::"
            echo "::group::Central pod describe"
            kubectl -n stackrox describe pod -l app=central || true
            echo "::endgroup::"
            echo "::group::Central logs"
            kubectl -n stackrox logs deployment/central --all-containers=true --tail=200 || true
            echo "::endgroup::"
            echo "::group::Scanner V4 DB logs"
            kubectl -n stackrox logs deployment/scanner-v4-db --tail=100 || true
            echo "::endgroup::"
            exit 1
          fi

          # Mask the admin password in GitHub Actions logs
          echo "::add-mask::${ROX_ADMIN_PASSWORD}"

          # Show pod status after successful deployment
          echo "::group::Pod status after deployment"
          kubectl -n stackrox get pods -o wide
          echo "::endgroup::"

          # Export deployment env vars for next step
          {
            echo "ROX_USERNAME=${ROX_USERNAME}"
            echo "ROX_ADMIN_PASSWORD=${ROX_ADMIN_PASSWORD}"
            echo "API_ENDPOINT=${API_ENDPOINT}"
          } >> "$GITHUB_ENV"

          # Wait for cluster to be registered in Central (cluster name is "remote")
          echo "Waiting for cluster 'remote' to be registered in Central..."
          if ! scripts/ci/cluster-registration-wait.sh "remote" stackrox 120; then
            echo "::group::Diagnostic logs - Sensor"
            kubectl -n stackrox logs deployment/sensor --tail=100 || true
            echo "::endgroup::"
            echo "::group::Diagnostic logs - Central"
            kubectl -n stackrox logs deployment/central --tail=100 || true
            echo "::endgroup::"
            exit 1
          fi

      - name: Execute tests
        if: |
          github.event_name != 'pull_request' ||
          contains(github.event.pull_request.labels.*.name, 'ci-all-qa-tests') ||
          !github.event.pull_request.draft ||
          matrix.test-group != 'testRest'
        env:
          CLUSTER: K8S  # Tests need CLUSTER as orchestrator type enum (K8S or OPENSHIFT)
          QUAY_RHACS_ENG_RO_USERNAME: ${{ secrets.QUAY_RHACS_ENG_RO_USERNAME }}
          QUAY_RHACS_ENG_RO_PASSWORD: ${{ secrets.QUAY_RHACS_ENG_RO_PASSWORD }}
          MAIN_IMAGE_TAG: ${{ env.tag }}
          REGISTRY_USERNAME: ${{ secrets.QUAY_RHACS_ENG_RO_USERNAME }}
          REGISTRY_PASSWORD: ${{ secrets.QUAY_RHACS_ENG_RO_PASSWORD }}
          GOOGLE_CREDENTIALS_GCR_SCANNER_V2: ${{ secrets.GOOGLE_CREDENTIALS_GCR_SCANNER_V2 }}
          REDHAT_USERNAME: ${{ secrets.RH_REGISTRY_USERNAME_RO }}
          REDHAT_PASSWORD: ${{ secrets.RH_REGISTRY_PASSWORD_RO }}
        run: |
          set -euo pipefail

          # Split API_ENDPOINT into API_HOSTNAME and API_PORT for tests
          export API_HOSTNAME="${API_ENDPOINT%:*}"
          export API_PORT="${API_ENDPOINT#*:}"

          echo "API_HOSTNAME=${API_HOSTNAME}"
          echo "API_PORT=${API_PORT}"

          # BaseSpecification.groovy handles GHA log grouping per test spec
          cd qa-tests-backend
          ./gradlew ${{ matrix.test-group }}

      - name: Collect pod logs
        if: always()
        run: |
          set -euo pipefail

          mkdir -p ${{ env.ARTIFACT_DIR }}/pod-logs

          # Collect StackRox pod logs
          for pod in $(kubectl -n stackrox get pods -o name 2>/dev/null || true); do
            pod_name=$(basename "$pod")
            echo "Collecting logs for $pod_name"
            kubectl -n stackrox logs "$pod" --all-containers=true --tail=1000 > "${{ env.ARTIFACT_DIR }}/pod-logs/${pod_name}.log" 2>&1 || true
          done

          # Copy test results if they exist
          cp -r qa-tests-backend/build/test-results/* ${{ env.ARTIFACT_DIR }}/ 2>/dev/null || true
          cp -r qa-tests-backend/build/reports/* ${{ env.ARTIFACT_DIR }}/ 2>/dev/null || true

      - name: Final post-test
        if: always()
        shell: python
        env:
          QA_TEST_DEBUG_LOGS: /tmp/qa-tests-backend-logs
          PYTHONUNBUFFERED: "1"
        run: |
          import sys
          sys.path.append('.openshift-ci')
          from post_tests import FinalPost
          FinalPost(store_qa_tests_data=True).run()

      - name: Publish test summary
        uses: test-summary/action@v2
        if: always()
        with:
          paths: ${{ env.ARTIFACT_DIR }}/**/*.xml
          show: all

      - name: Report failures to JIRA
        if: (!cancelled())
        uses: ./.github/actions/junit2jira
        with:
          create-jiras: ${{ github.event_name == 'push' }}
          jira-user: ${{ secrets.JIRA_USER }}
          jira-token: ${{ secrets.JIRA_TOKEN }}
          gcp-account: ${{ secrets.GCP_SERVICE_ACCOUNT_STACKROX_CI }}
          directory: ${{ env.ARTIFACT_DIR }}

      - name: Delete cluster
        if: always()
        env:
          INFRA_TOKEN: ${{ secrets.INFRA_TOKEN }}
        run: infractl delete "${CLUSTER_NAME}"
