name: Batch load test metrics
on:
  workflow_dispatch:
  schedule:
  - cron: 23 * * * *

# Ensure that only a single batch loader is running
concurrency: Batch load test metrics

jobs:
  batch-load-test-metrics:
    if:  ${{ github.repository_owner == 'stackrox' }}
    runs-on: ubuntu-latest
    container:
      image: quay.io/stackrox-io/apollo-ci:stackrox-test-0.5.11@sha256:df3459cf038e73775314b3a5d36d14dda41e6df438a0273c9efa8d23e0f2358a # ratchet:quay.io/stackrox-io/apollo-ci:stackrox-test-0.5.11
    steps:
    - name: Checkout
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # ratchet:actions/checkout@v7.0.0
    - name: Load
      env:
        GCP_SERVICE_ACCOUNT_STACKROX_CI: ${{ secrets.GCP_SERVICE_ACCOUNT_STACKROX_CI }}
      shell: bash
      run: |
        source scripts/ci/lib.sh

        setup_gcp
        batch_load_test_metrics
