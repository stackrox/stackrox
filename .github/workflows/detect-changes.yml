name: Detect changed files
on:
  workflow_call:
    inputs:
      filters:
        description: >
          JSON object mapping labels to arrays of pathspec patterns.
          Example: { "ui": ["ui/**"], "go": ["**/*.go", "go.mod"] }
        type: string
        required: true
    outputs:
      matches:
        description: "space-separated string of matched filter labels"
        value: ${{ jobs.detect.outputs.matches }}

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      matches: ${{ steps.compare.outputs.matches }}
    steps:
      - name: Compare list of files changed with filters
        id: compare
        shell: bash
        env:
          FILTERS: ${{ inputs.filters }}
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -eo pipefail

          glob_to_regex() {
            local regex="${1//\./\\.}"
            regex="${regex//\*\*/@@GLOBSTAR@@}"
            regex="${regex//\*/[^/]*}"
            regex="${regex//@@GLOBSTAR@@\//(.+/)?}"
            regex="${regex//\/@@GLOBSTAR@@//.+}"
            regex="${regex//@@GLOBSTAR@@/.+}"
            echo "^${regex}$"
          }

          mapfile -t files < <(gh api "repos/${GH_REPO}/pulls/${PR_NUMBER}/files" --paginate --jq '.[].filename')
          echo "Changed files (${#files[@]}):" >&2
          printf '  %s\n' "${files[@]}" >&2

          matched=()
          for k in $(echo "${FILTERS}" | jq -r 'keys[]'); do
            mapfile -t patterns < <(echo "${FILTERS}" | jq -r --arg k "$k" '.[$k][]')
            found=false
            for p in "${patterns[@]}"; do
              regex=$(glob_to_regex "$p")
              for f in "${files[@]}"; do
                if [[ $f =~ $regex ]]; then
                  found=true
                  break 2
                fi
              done
            done
            if $found; then
              echo "${k}: matched" >&2
              matched+=("${k}")
            else
              echo "${k}: no match" >&2
            fi
          done

          echo "matches=${matched[*]}" | tee -a "${GITHUB_OUTPUT}"
