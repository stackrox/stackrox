name: Detect changed files

# Outputs the list of files changed in a PR as a newline-separated
# string. Each job does its own matching with contains(), startsWith(),
# or endsWith() directly in its if: condition.
#
# Empty output (push events, API failure, 3000+ files) is falsy,
# so jobs use: !needs.detect-changes.outputs.files || contains(...)
# to default to "run" when the file list is unavailable.
#
# Examples:
#   if: !needs.detect-changes.outputs.files || contains(needs.detect-changes.outputs.files, '.go')
#   if: !needs.detect-changes.outputs.files || contains(needs.detect-changes.outputs.files, 'ui/')

on:
  workflow_call:
    outputs:
      files:
        description: >
          Newline-separated list of changed filenames, or empty
          string on push/failure (falsy, so jobs default to run).
        value: ${{ jobs.detect.outputs.files }}

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      files: ${{ steps.list.outputs.files }}
    steps:
      - name: List changed files
        id: list
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        shell: bash
        run: |
          set -eo pipefail

          if [[ -z "${PR_NUMBER}" ]]; then
            echo "Not a PR" >&2
            exit 0
          fi

          if ! output="$(gh api "repos/${GH_REPO}/pulls/${PR_NUMBER}/files" --paginate --jq '.[].filename')"; then
            echo "::warning::GitHub API call failed" >&2
            exit 0
          fi

          mapfile -t files < <(echo -n "${output}")
          echo "Changed files (${#files[@]}):" >&2
          printf '  %s\n' "${files[@]}" >&2

          if [[ ${#files[@]} -ge 3000 ]]; then
            echo "::warning::PR has 3000+ changed files" >&2
            exit 0
          fi

          {
            echo "files<<EOF"
            printf '%s\n' "${files[@]}"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"
