name: Detect changed files
on:
  workflow_call:
    inputs:
      filters:
        description: >
          JSON object mapping job names to arrays of pathspec patterns.
          Example: { "ui": ["ui/**"], "go": ["**/*.go", "go.mod"] }
        type: string
        required: true
    outputs:
      unchanged:
        description: >
          JSON object with true for jobs whose files are unchanged.
          Jobs check: ! fromJSON(unchanged)[github.job]
          Missing keys default to run (safe if filter is forgotten).
        value: ${{ jobs.detect.outputs.unchanged }}

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      unchanged: ${{ steps.compare.outputs.unchanged }}
    steps:
      - name: Compare list of files changed with filters
        id: compare
        shell: bash
        env:
          FILTERS: ${{ inputs.filters }}
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -eo pipefail

          glob_to_regex() {
            local regex="${1//\./\\.}"
            regex="${regex//\*\*/@@GLOBSTAR@@}"
            regex="${regex//\*/[^/]*}"
            regex="${regex//@@GLOBSTAR@@\//(.+/)?}"
            regex="${regex//\/@@GLOBSTAR@@//.+}"
            regex="${regex//@@GLOBSTAR@@/.+}"
            echo "^${regex}$"
          }

          if [[ -z "${PR_NUMBER}" ]]; then
            echo "Not a PR, nothing unchanged" >&2
            echo "unchanged={}" | tee -a "${GITHUB_OUTPUT}"
            exit 0
          fi

          if ! gh_output="$(gh api "repos/${GH_REPO}/pulls/${PR_NUMBER}/files" --paginate --jq '.[].filename')"; then
            echo "::warning::GitHub API call failed, nothing unchanged" >&2
            echo "unchanged={}" | tee -a "${GITHUB_OUTPUT}"
            exit 0
          fi

          mapfile -t files < <(echo -n "${gh_output}")
          echo "Changed files (${#files[@]}):" >&2
          printf '  %s\n' "${files[@]}" >&2

          if [[ ${#files[@]} -ge 3000 ]]; then
            echo "::warning::PR has 3000+ changed files, nothing unchanged" >&2
            echo "unchanged={}" | tee -a "${GITHUB_OUTPUT}"
            exit 0
          fi

          unchanged=()
          for k in $(echo "${FILTERS}" | jq -r 'keys[]'); do
            mapfile -t patterns < <(echo "${FILTERS}" | jq -r --arg k "$k" '.[$k][]')
            found=false
            for p in "${patterns[@]}"; do
              regex=$(glob_to_regex "$p")
              for f in "${files[@]}"; do
                if [[ $f =~ $regex ]]; then
                  found=true
                  break 2
                fi
              done
            done
            if $found; then
              echo "${k}: changed" >&2
            else
              echo "${k}: unchanged" >&2
              unchanged+=("${k}")
            fi
          done

          if [[ ${#unchanged[@]} -gt 0 ]]; then
            result=$(printf '%s\n' "${unchanged[@]}" | jq -Rsc 'split("\n") | map(select(. != "")) | map({(.): true}) | add')
          else
            result='{}'
          fi
          echo "unchanged=${result}" | tee -a "${GITHUB_OUTPUT}"
