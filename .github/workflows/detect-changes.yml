name: Detect changed files

# Auto-detects which directories, file extensions, and root files
# changed in a PR. Output keys use gitignore-style patterns:
#   "ui/**": true          — files changed under ui/
#   "**/*.go": true        — .go files changed somewhere
#   "go.mod": true         — root file changed
#
# Optional filters input adds composite keys for complex patterns:
#   { "go": ["**/*.go", "go.mod", "go.sum", "Makefile", "make/**"] }
#
# All keys default to true. A key is set to false only when the PR
# is confirmed to NOT contain matching changes. This means:
#   - Push events (no PR): all true, every job runs.
#   - API failure or 3000+ files: all true, every job runs.
#   - Missing key: null != false → runs (safe default).
#
# Simple:  if: fromJSON(needs.detect-changes.outputs.changed)['ui/**'] != false
# Complex: if: fromJSON(needs.detect-changes.outputs.changed).go != false

on:
  workflow_call:
    inputs:
      filters:
        description: >
          Optional JSON object mapping composite labels to arrays of
          pathspec patterns for complex multi-pattern checks.
          Example: { "go": ["**/*.go", "go.mod", "Makefile", "make/**"] }
        type: string
        required: false
        default: '{}'
    outputs:
      changed:
        description: >
          JSON object with true/false per key. Auto-generated keys
          for directories, extensions, and root files, plus any
          composite keys from filters input.
          Check with: fromJSON(changed)['key'] != false
        value: ${{ jobs.detect.outputs.changed }}

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.compare.outputs.changed }}
    steps:
      - name: Detect changed files
        id: compare
        shell: bash
        env:
          FILTERS: ${{ inputs.filters }}
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -eo pipefail

          glob_to_regex() {
            local regex="${1//\./\\.}"
            regex="${regex//\*\*/@@GLOBSTAR@@}"
            regex="${regex//\*/[^/]*}"
            regex="${regex//@@GLOBSTAR@@\//(.+/)?}"
            regex="${regex//\/@@GLOBSTAR@@//.+}"
            regex="${regex//@@GLOBSTAR@@/.+}"
            echo "^${regex}$"
          }

          if [[ -z "${PR_NUMBER}" ]]; then
            echo "Not a PR, reporting all changed" >&2
            echo "changed={}" | tee -a "${GITHUB_OUTPUT}"
            exit 0
          fi

          if ! gh_output="$(gh api "repos/${GH_REPO}/pulls/${PR_NUMBER}/files" --paginate --jq '.[].filename')"; then
            echo "::warning::GitHub API call failed, reporting all changed" >&2
            echo "changed={}" | tee -a "${GITHUB_OUTPUT}"
            exit 0
          fi

          mapfile -t files < <(echo -n "${gh_output}")
          echo "Changed files (${#files[@]}):" >&2
          printf '  %s\n' "${files[@]}" >&2

          if [[ ${#files[@]} -ge 3000 ]]; then
            echo "::warning::PR has 3000+ changed files, reporting all changed" >&2
            echo "changed={}" | tee -a "${GITHUB_OUTPUT}"
            exit 0
          fi

          declare -A keys

          # Auto-detect: directories, extensions, root files.
          for f in "${files[@]}"; do
            if [[ "$f" == */* ]]; then
              keys["${f%%/*}/**"]=true
            fi
            if [[ "$f" == *.* ]]; then
              keys["**/*.${f##*.}"]=true
            fi
            if [[ "$f" != */* ]]; then
              keys["$f"]=true
            fi
          done

          # Composite filters: match each filter's patterns against
          # changed files. Default true, set false only if no match.
          for k in $(echo "${FILTERS}" | jq -r 'keys[]'); do
            keys["$k"]=true
            mapfile -t patterns < <(echo "${FILTERS}" | jq -r --arg k "$k" '.[$k][]')
            found=false
            for p in "${patterns[@]}"; do
              regex=$(glob_to_regex "$p")
              for f in "${files[@]}"; do
                if [[ $f =~ $regex ]]; then
                  found=true
                  break 2
                fi
              done
            done
            if ! $found; then
              keys["$k"]=false
            fi
          done

          echo "Detected keys:" >&2
          for k in $(echo "${!keys[@]}" | tr ' ' '\n' | sort); do
            echo "  ${k}: ${keys[$k]}" >&2
          done

          result=$(for k in "${!keys[@]}"; do
            if [[ "${keys[$k]}" == "true" ]]; then
              echo "${k} true"
            else
              echo "${k} false"
            fi
          done | jq -Rsc 'split("\n") | map(select(. != "")) | map(split(" ") | {(.[0]): (.[1] == "true")}) | add // {}')
          echo "changed=${result}" | tee -a "${GITHUB_OUTPUT}"
