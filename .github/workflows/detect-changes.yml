name: Detect changed files
on:
  workflow_call:
    inputs:
      filters:
        description: >
          JSON object mapping job names to arrays of pathspec patterns.
          Example: { "ui": ["ui/**"], "go": ["**/*.go", "go.mod"] }
        type: string
        required: true
    outputs:
      changed:
        description: >
          JSON object: true/false per filter key. Missing keys
          evaluate as null which is != false, so jobs whose filter
          key is missing will run (safe default on key drift).
          Usage: fromJSON(changed)[github.job] != false
        value: ${{ jobs.detect.outputs.changed }}

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.compare.outputs.changed }}
    steps:
      - name: Compare list of files changed with filters
        id: compare
        shell: bash
        env:
          FILTERS: ${{ inputs.filters }}
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -eo pipefail

          glob_to_regex() {
            local regex="${1//\./\\.}"
            regex="${regex//\*\*/@@GLOBSTAR@@}"
            regex="${regex//\*/[^/]*}"
            regex="${regex//@@GLOBSTAR@@\//(.+/)?}"
            regex="${regex//\/@@GLOBSTAR@@//.+}"
            regex="${regex//@@GLOBSTAR@@/.+}"
            echo "^${regex}$"
          }

          all_true=$(echo "${FILTERS}" | jq -c 'to_entries | map({(.key): true}) | add')

          if [[ -z "${PR_NUMBER}" ]]; then
            echo "Not a PR, all changed" >&2
            echo "changed=${all_true}" | tee -a "${GITHUB_OUTPUT}"
            exit 0
          fi

          if ! gh_output="$(gh api "repos/${GH_REPO}/pulls/${PR_NUMBER}/files" --paginate --jq '.[].filename')"; then
            echo "::warning::GitHub API call failed, assuming all changed" >&2
            echo "changed=${all_true}" | tee -a "${GITHUB_OUTPUT}"
            exit 0
          fi

          mapfile -t files < <(echo -n "${gh_output}")
          echo "Changed files (${#files[@]}):" >&2
          printf '  %s\n' "${files[@]}" >&2

          if [[ ${#files[@]} -ge 3000 ]]; then
            echo "::warning::PR has 3000+ changed files, assuming all changed" >&2
            echo "changed=${all_true}" | tee -a "${GITHUB_OUTPUT}"
            exit 0
          fi

          declare -A results
          for k in $(echo "${FILTERS}" | jq -r 'keys[]'); do
            mapfile -t patterns < <(echo "${FILTERS}" | jq -r --arg k "$k" '.[$k][]')
            found=false
            for p in "${patterns[@]}"; do
              regex=$(glob_to_regex "$p")
              for f in "${files[@]}"; do
                if [[ $f =~ $regex ]]; then
                  found=true
                  break 2
                fi
              done
            done
            results["$k"]=$found
            echo "${k}: ${found}" >&2
          done

          result=$(for k in "${!results[@]}"; do echo "${k} ${results[$k]}"; done \
            | jq -Rsc 'split("\n") | map(select(. != "")) | map(split(" ") | {(.[0]): (.[1] == "true")}) | add')
          echo "changed=${result}" | tee -a "${GITHUB_OUTPUT}"
