name: Detect changed files
on:
  workflow_call:
    inputs:
      filters:
        description: >
          JSON object mapping labels to arrays of pathspec patterns.
          Keys must be valid GHA expression identifiers (a-z, 0-9, _)
          since they are accessed via fromJSON(changed).key.
          Example: { "ui": ["ui/**"], "go": ["**/*.go", "go.mod"] }
        type: string
        required: true
    outputs:
      any:
        description: "'true' if any filter matched, empty string otherwise"
        value: ${{ jobs.detect.outputs.any }}
      changed:
        description: >
          JSON object with true for each matched label, {} if none.
          Use fromJSON(changed).label for exact key checks.
        value: ${{ jobs.detect.outputs.changed }}

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      any: ${{ steps.compare.outputs.any }}
      changed: ${{ steps.compare.outputs.changed }}
    steps:
      - name: Compare list of files changed with filters
        id: compare
        shell: bash
        env:
          FILTERS: ${{ inputs.filters }}
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -eo pipefail

          glob_to_regex() {
            local regex="${1//\./\\.}"
            regex="${regex//\*\*/@@GLOBSTAR@@}"
            regex="${regex//\*/[^/]*}"
            regex="${regex//@@GLOBSTAR@@\//(.+/)?}"
            regex="${regex//\/@@GLOBSTAR@@//.+}"
            regex="${regex//@@GLOBSTAR@@/.+}"
            echo "^${regex}$"
          }

          all_keys=$(echo "${FILTERS}" | jq -c 'to_entries | map({(.key): true}) | add')

          if ! gh_output="$(gh api "repos/${GH_REPO}/pulls/${PR_NUMBER}/files" --paginate --jq '.[].filename')"; then
            echo "::warning::GitHub API call failed, matching all filters" >&2
            {
              echo "any=true"
              echo "changed=${all_keys}"
            } | tee -a "${GITHUB_OUTPUT}"
            exit 0
          fi

          mapfile -t files < <(echo -n "${gh_output}")
          echo "Changed files (${#files[@]}):" >&2
          printf '  %s\n' "${files[@]}" >&2

          if [[ ${#files[@]} -ge 3000 ]]; then
            echo "::warning::PR has 3000+ changed files, matching all filters" >&2
            {
              echo "any=true"
              echo "changed=${all_keys}"
            } | tee -a "${GITHUB_OUTPUT}"
            exit 0
          fi

          matched=()
          for k in $(echo "${FILTERS}" | jq -r 'keys[]'); do
            mapfile -t patterns < <(echo "${FILTERS}" | jq -r --arg k "$k" '.[$k][]')
            found=false
            for p in "${patterns[@]}"; do
              regex=$(glob_to_regex "$p")
              for f in "${files[@]}"; do
                if [[ $f =~ $regex ]]; then
                  found=true
                  break 2
                fi
              done
            done
            if $found; then
              echo "${k}: matched" >&2
              matched+=("${k}")
            else
              echo "${k}: no match" >&2
            fi
          done

          if [[ ${#matched[@]} -gt 0 ]]; then
            result=$(printf '%s\n' "${matched[@]}" | jq -Rsc 'split("\n") | map(select(. != "")) | map({(.) : true}) | add')
            echo "any=true" | tee -a "${GITHUB_OUTPUT}"
          else
            result='{}'
            echo "any=" | tee -a "${GITHUB_OUTPUT}"
          fi
          echo "changed=${result}" | tee -a "${GITHUB_OUTPUT}"
