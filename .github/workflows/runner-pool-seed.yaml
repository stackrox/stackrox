# Seed warm-cache runner pool. Triggered on schedule or manually.
# Each job warms caches (Go, UI, Docker) then registers as a
# self-hosted runner to serve real build jobs with local caches.
#
# Production workflows target warm runners via pick-runner job.
# If no warm runner is available, they fall back to ubuntu-latest.
name: Seed Runner Pool
on:
  workflow_dispatch:
    inputs:
      keep-alive-minutes:
        description: 'How long each runner stays alive (minutes)'
        required: false
        default: '120'
      pool-size:
        description: 'Number of runners per pool type'
        required: false
        default: '2'

jobs:
  seed-go-build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        slot: [1, 2]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6

      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # ratchet:actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Warm Go caches
        run: |
          echo "Warming GOCACHE and GOMODCACHE..."
          go build ./... 2>&1 | tail -5 || true
          echo "GOCACHE size: $(du -sh $(go env GOCACHE) 2>/dev/null | cut -f1)"
          echo "GOMODCACHE size: $(du -sh $(go env GOMODCACHE) 2>/dev/null | cut -f1)"

      - name: Register as warm runner
        env:
          GH_TOKEN: ${{ secrets.RUNNER_ADMIN_TOKEN }}
        run: |
          if [[ -z "$GH_TOKEN" ]]; then
            echo "::warning::RUNNER_ADMIN_TOKEN not set. Skipping registration."
            echo "Add a PAT with repo+admin:org scope as RUNNER_ADMIN_TOKEN secret."
            exit 0
          fi
          bash .github/actions/job-preamble/keep-alive.sh \
            "warm-go" \
            "${{ inputs.keep-alive-minutes || '120' }}"

  seed-ui-build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        slot: [1, 2]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # ratchet:actions/setup-node@v6
        with:
          node-version-file: ui/package.json

      - name: Warm UI caches
        run: |
          echo "Warming node_modules..."
          make -C ui deps 2>&1 | tail -5 || true
          make -C ui build 2>&1 | tail -5 || true
          echo "node_modules size: $(du -sh ui/node_modules 2>/dev/null | cut -f1)"

      - name: Register as warm runner
        env:
          GH_TOKEN: ${{ secrets.RUNNER_ADMIN_TOKEN }}
        run: |
          if [[ -z "$GH_TOKEN" ]]; then
            echo "::warning::RUNNER_ADMIN_TOKEN not set. Skipping registration."
            exit 0
          fi
          bash .github/actions/job-preamble/keep-alive.sh \
            "warm-ui" \
            "${{ inputs.keep-alive-minutes || '120' }}"
