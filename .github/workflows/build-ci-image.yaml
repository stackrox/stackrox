name: Build CI Image

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/images/apollo-ci-buildah/**'

env:
  REGISTRY: quay.io/klape
  IMAGE_NAME: apollo-ci-buildah

jobs:
  build-ci-image:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: stackrox-runners-amd64
          - arch: arm64
            runner: stackrox-runners-arm64
    runs-on: ${{ matrix.runner }}
    env:
      QUAY_USERNAME: ${{ secrets.QUAY_USERNAME }}
      QUAY_PASSWORD: ${{ secrets.QUAY_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Quay.io
        run: |
          echo "$QUAY_PASSWORD" | docker login -u "$QUAY_USERNAME" --password-stdin quay.io

      - name: Build and push CI image
        run: |
          docker buildx build \
            --platform linux/${{ matrix.arch }} \
            --push \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:0.6.0-${{ matrix.arch }} \
            --file .github/images/apollo-ci-buildah/Dockerfile \
            .github/images/apollo-ci-buildah

  push-manifest:
    runs-on: stackrox-runners-amd64
    needs: build-ci-image
    env:
      QUAY_USERNAME: ${{ secrets.QUAY_USERNAME }}
      QUAY_PASSWORD: ${{ secrets.QUAY_PASSWORD }}
    steps:
      - name: Login to Quay.io
        run: |
          echo "$QUAY_PASSWORD" | docker login -u "$QUAY_USERNAME" --password-stdin quay.io

      - name: Create and push multi-arch manifest
        run: |
          docker manifest create ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:0.6.0 \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:0.6.0-amd64 \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:0.6.0-arm64

          docker manifest push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:0.6.0

          docker manifest create ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:0.6.0-amd64 \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:0.6.0-arm64

          docker manifest push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
