name: Build CI Image

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/images/apollo-ci-buildah/**'

env:
  REGISTRY: quay.io/klape
  IMAGE_NAME: apollo-ci-buildah

jobs:
  build-ci-image:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: stackrox-runners-amd64
          - arch: arm64
            runner: stackrox-runners-arm64
    runs-on: ${{ matrix.runner }}
    container:
      image: quay.io/buildah/stable
      options: --privileged
    env:
      QUAY_USERNAME: ${{ secrets.QUAY_USERNAME }}
      QUAY_PASSWORD: ${{ secrets.QUAY_PASSWORD }}
      HOME: /tmp
      XDG_RUNTIME_DIR: /tmp
      BUILDAH_ISOLATION: chroot
      STORAGE_DRIVER: vfs
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Quay.io
        run: |
          buildah login -u "$QUAY_USERNAME" -p "$QUAY_PASSWORD" quay.io

      - name: Build CI image
        run: |
          buildah bud \
            --layers \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:0.6.1-${{ matrix.arch }} \
            --file .github/images/apollo-ci-buildah/Dockerfile \
            .github/images/apollo-ci-buildah

      - name: Push CI image
        run: |
          buildah push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:0.6.1-${{ matrix.arch }} \
            docker://${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:0.6.1-${{ matrix.arch }}

  push-manifest:
    runs-on: stackrox-runners-amd64
    needs: build-ci-image
    container:
      image: quay.io/buildah/stable
      options: --privileged
    env:
      QUAY_USERNAME: ${{ secrets.QUAY_USERNAME }}
      QUAY_PASSWORD: ${{ secrets.QUAY_PASSWORD }}
      HOME: /tmp
      XDG_RUNTIME_DIR: /tmp
      BUILDAH_ISOLATION: chroot
      STORAGE_DRIVER: vfs
    steps:
      - name: Login to Quay.io
        run: |
          buildah login -u "$QUAY_USERNAME" -p "$QUAY_PASSWORD" quay.io

      - name: Create and push multi-arch manifest
        run: |
          buildah manifest create ${{ env.IMAGE_NAME }}:0.6.1 \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:0.6.1-amd64 \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:0.6.1-arm64

          buildah manifest push --all ${{ env.IMAGE_NAME }}:0.6.1 \
            docker://${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:0.6.1

          buildah manifest push --all ${{ env.IMAGE_NAME }}:0.6.1 \
            docker://${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
