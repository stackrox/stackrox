name: Build CI Image

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/images/apollo-ci-buildah/**'

env:
  REGISTRY: quay.io/klape
  IMAGE_NAME: apollo-ci-buildah

jobs:
  build-ci-image:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: stackrox-runners-amd64
          - arch: arm64
            runner: stackrox-runners-arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Quay.io
        run: |
          echo "${{ secrets.QUAY_PASSWORD }}" | docker login -u "${{ secrets.QUAY_USERNAME }}" --password-stdin quay.io

      - name: Build CI image
        run: |
          docker build \
            --provenance=false \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:0.6.1-${{ matrix.arch }} \
            -f .github/images/apollo-ci-buildah/Dockerfile \
            .github/images/apollo-ci-buildah

      - name: Push CI image
        run: |
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:0.6.1-${{ matrix.arch }}

  push-manifest:
    runs-on: stackrox-runners-amd64
    needs: build-ci-image
    steps:
      - name: Login to Quay.io
        run: |
          echo "${{ secrets.QUAY_PASSWORD }}" | docker login -u "${{ secrets.QUAY_USERNAME }}" --password-stdin quay.io

      - name: Create and push multi-arch manifest
        run: |
          docker buildx imagetools create -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:0.6.1 \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:0.6.1-amd64 \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:0.6.1-arm64

          docker buildx imagetools create -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:0.6.1-amd64 \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:0.6.1-arm64
