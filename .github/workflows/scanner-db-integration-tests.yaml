name: Scanner DB integration tests

on:
  push:
    tags:
    - '*'
    branches:
    - master
    - release-*
  pull_request:
    types:
    - opened
    - reopened
    - synchronize

jobs:
  # Separate job so that dependent jobs are skipped entirely on
  # PRs where their component's files haven't changed.
  detect-changes:
    uses: ./.github/workflows/detect-changes.yml

  db-integration-tests:
    needs: detect-changes
    if: >-
      fromJSON(needs.detect-changes.outputs.changed)['scanner/**'] != false ||
      fromJSON(needs.detect-changes.outputs.changed)['go.mod'] != false ||
      fromJSON(needs.detect-changes.outputs.changed)['go.sum'] != false
    runs-on: ubuntu-latest
    container:
      image: quay.io/stackrox-io/apollo-ci:scanner-test-0.5.3@sha256:1161dae82604108deeaffd17261af4a3220b01d726201ea721b49a0c1a3a072d # ratchet:quay.io/stackrox-io/apollo-ci:scanner-test-0.5.3
    steps:
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
      with:
        fetch-depth: 0

    - uses: ./.github/actions/job-preamble
      with:
        gcp-account: ${{ secrets.GCP_SERVICE_ACCOUNT_STACKROX_CI }}

    - name: Run Postgres
      run: |
        su postgres -c 'initdb -D /tmp/data'
        su postgres -c 'pg_ctl -D /tmp/data start'

    - name: Cache Go dependencies
      uses: ./.github/actions/cache-go-dependencies

    - name: Is Postgres ready
      run: pg_isready -h 127.0.0.1

    - name: DB Integration tests
      run: make -C scanner db-integration-test
