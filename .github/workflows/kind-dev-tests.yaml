name: KinD Local Dev Tests

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - 'dev-tools/**'
      - 'deploy/common/local-dev-values.yaml'
      - 'deploy/common/kind-noscan-values.yaml'
      - 'image/rhel/Dockerfile'
      - '.github/workflows/kind-dev-tests.yaml'
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'dev-tools/**'
      - 'deploy/common/local-dev-values.yaml'
      - 'deploy/common/kind-noscan-values.yaml'
      - 'image/rhel/Dockerfile'
      - '.github/workflows/kind-dev-tests.yaml'

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  kind-dev-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    if: ${{ !github.event.pull_request.head.repo.fork }}
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # ratchet:actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # ratchet:actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false

      - name: Install tools
        run: |
          go install sigs.k8s.io/kind@latest

          curl -fsSLo /usr/local/bin/skaffold \
            "https://storage.googleapis.com/skaffold/releases/latest/skaffold-linux-amd64"
          chmod +x /usr/local/bin/skaffold

          command -v helm || {
            curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
          }

          VERSION_PKG="github.com/stackrox/rox/pkg/version/internal"
          CGO_ENABLED=0 go build -buildvcs=false -trimpath \
            -ldflags="-s -w \
              -X ${VERSION_PKG}.MainVersion=0.0.0-dev \
              -X ${VERSION_PKG}.CollectorVersion=0.0.0-dev \
              -X ${VERSION_PKG}.ScannerVersion=0.0.0-dev \
              -X ${VERSION_PKG}.GitShortSha=dev" \
            -o /usr/local/bin/roxctl ./roxctl

          echo "Tools installed:"
          kind version
          skaffold version
          helm version --short
          roxctl version || true

      - name: Run tests
        env:
          DEFAULT_IMAGE_REGISTRY: quay.io/stackrox-io
        run: ./dev-tools/test-kind-dev.sh

      - name: Export KinD logs
        if: failure()
        run: kind export logs /tmp/kind-logs --name "${KIND_CLUSTER_NAME:-stackrox-test}" || true

      - name: Upload logs
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # ratchet:actions/upload-artifact@v7
        with:
          name: kind-dev-test-logs-${{ github.run_id }}
          path: |
            /tmp/kind-dev-*.log
            /tmp/kind-logs/
          retention-days: 5
