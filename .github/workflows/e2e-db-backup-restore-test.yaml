name: e2e-db-backup-restore-test

on:
  workflow_dispatch:
  push:
    tags:
    - '*'
    branches:
    - master
    - release-*
  pull_request:
    types:
    - opened
    - reopened
    - labeled
    - synchronize

defaults:
  run:
    shell: bash

jobs:
  kind-db-backup-restore-test:
    if: >-
      !github.event.pull_request.head.repo.fork && (
        github.event_name != 'pull_request' ||
        contains(github.event.pull_request.labels.*.name, 'e2e-db-backup-restore-test')
      )
    runs-on: ubuntu-latest
    env:
      CLUSTER_NAME: e2e-dbbr-${{ github.run_id }}
      # EXPERIMENT: hardcode known-good tag
      TAG: 4.11.x-831-g8f262d83ee
    timeout-minutes: 30
    steps:

    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
      with:
        ref: ${{ github.event.pull_request.head.sha || github.sha }}
        fetch-depth: 1

    # KinD + deploy run in background. roxctl builds in parallel.
    - name: Create KinD cluster (background)
      uses: ./.github/actions/create-kind-cluster
      with:
        cluster-name: ${{ env.CLUSTER_NAME }}
        tag: ${{ env.TAG }}
        quay-user: ${{ secrets.QUAY_RHACS_ENG_RO_USERNAME }}
        quay-pass: ${{ secrets.QUAY_RHACS_ENG_RO_PASSWORD }}

    - name: Deploy StackRox (background)
      uses: ./.github/actions/deploy-stackrox

    - name: Build roxctl
      run: |
        make roxctl_linux-amd64
        echo "$(pwd)/bin/linux_amd64" >> "$GITHUB_PATH"

    - name: Wait for Central API
      run: |
        for i in $(seq 1 180); do
          [ -s /tmp/rox-auth-token ] && break
          sleep 2
        done
        if [ ! -s /tmp/rox-auth-token ]; then
          echo "::error::Central API not ready after 6 minutes"
          cat /tmp/deploy.log 2>/dev/null | tail -50 || true
          exit 1
        fi
        echo "Central API ready"

    - name: DB backup and restore test
      run: |
        set +x
        ROX_ADMIN_PASSWORD="$(cat /tmp/rox-admin-password)"
        set -x
        API_ENDPOINT="localhost:8000"

        # Save original config
        curl -sk -u "admin:${ROX_ADMIN_PASSWORD}" \
          "https://${API_ENDPOINT}/v1/config" | jq . > /tmp/original-config.json

        # Backup
        echo "Running central backup..."
        roxctl --insecure-skip-tls-verify -e "${API_ENDPOINT}" \
          -p "${ROX_ADMIN_PASSWORD}" \
          central backup --output /tmp/db-backup

        # Modify config (so restore has something to revert)
        echo "Modifying config..."
        NEW_CONFIG=$(jq '. + { publicConfig: { header: { enabled: true, text: "modified-by-test" } } }' < /tmp/original-config.json)
        curl -sk -u "admin:${ROX_ADMIN_PASSWORD}" \
          "https://${API_ENDPOINT}/v1/config" \
          -X PUT -d "{ \"config\": ${NEW_CONFIG} }" > /dev/null

        # Restore
        echo "Running central db restore..."
        roxctl --insecure-skip-tls-verify -e "${API_ENDPOINT}" \
          -p "${ROX_ADMIN_PASSWORD}" \
          central db restore /tmp/db-backup/postgres_db_*

        # Wait for Central to come back after restore
        for i in $(seq 1 60); do
          curl -sk "https://${API_ENDPOINT}/v1/metadata" >/dev/null 2>&1 && break
          sleep 2
        done

        # Verify config matches original
        echo "Verifying config restored correctly..."
        curl -sk -u "admin:${ROX_ADMIN_PASSWORD}" \
          "https://${API_ENDPOINT}/v1/config" | jq . > /tmp/restored-config.json

        if ! diff /tmp/original-config.json /tmp/restored-config.json; then
          echo "::error::Config after restore differs from original!"
          exit 1
        fi
        echo "DB backup and restore test PASSED"

    - name: Collect logs
      if: always()
      run: |
        mkdir -p /tmp/test-artifacts
        for pod in $(kubectl -n stackrox get pods -o name 2>/dev/null); do
          kubectl -n stackrox logs "$(basename "$pod")" --all-containers \
            > "/tmp/test-artifacts/$(basename "$pod").log" 2>&1 || true
        done

    - name: Upload artifacts
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # ratchet:actions/upload-artifact@v7
      if: always()
      with:
        name: db-backup-restore-${{ github.run_id }}
        path: /tmp/test-artifacts
        retention-days: 7

    - name: Cleanup
      if: always()
      run: kind delete cluster --name "$CLUSTER_NAME" 2>/dev/null || true
