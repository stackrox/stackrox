name: e2e-db-backup-restore-test

on:
  workflow_dispatch:
  pull_request:
    types:
    - opened
    - reopened
    - labeled
    - synchronize

defaults:
  run:
    shell: bash

jobs:
  kind-qa-e2e:
    # Label-gated: only run on PRs with the label. No master/release
    # triggers until KinD-based QA tests are fully stabilized.
    if: >-
      !github.event.pull_request.head.repo.fork &&
      contains(github.event.pull_request.labels.*.name, 'e2e-db-backup-restore-test')
    name: "QA ${{ matrix.name }} (${{ matrix.cluster-type }})"
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        # Each shard runs on KinD. The auth shard also runs on GKE
        # to validate that the same tests pass on both providers.
        include:
          - name: auth
            cluster-type: kind
            tests: >-
              --tests AuthServiceTest
              --tests CertRotationTest
              --tests ClientCertAuthTest
              --tests K8sRbacTest
              --tests SecretsTest
              --tests ServiceAccountTest

          # Same auth shard on GKE for comparison
          - name: auth
            cluster-type: gke
            tests: >-
              --tests AuthServiceTest
              --tests CertRotationTest
              --tests ClientCertAuthTest
              --tests K8sRbacTest
              --tests SecretsTest
              --tests ServiceAccountTest

          - name: cluster
            cluster-type: kind
            tests: >-
              --tests DeploymentCheck
              --tests DeploymentTest
              --tests NetworkFlowTest
              --tests NetworkSimulator
              --tests K8sEventDetectionTest
              --tests GlobalSearch
              --tests CSVTest

          - name: policy
            cluster-type: kind
            tests: >-
              --tests PolicyConfigurationTest
              --tests PolicyFieldsTest
              --tests Enforcement
              --tests ComplianceTest
              --tests DeclarativeConfigTest

          - name: runtime
            cluster-type: kind
            tests: >-
              --tests RuntimePolicyTest
              --tests RuntimeViolationLifecycleTest
              --tests ProcessBaselinesTest
              --tests ProcessVisualizationTest
              --tests AuditLogAlertsTest
              --tests AuditScrubbingTest
              --tests AttemptedAlertsTest
              --tests FileActivityTest

          - name: vuln
            cluster-type: kind
            tests: >-
              --tests DefaultPoliciesTest
              --tests ImageManagementTest
              --tests ImageScanningTest
              --tests VulnScanPermissionTest
              --tests VulnReportingTest
              --tests AdmissionControllerTest
              --tests AdmissionControllerNoImageScanTest

          - name: integrations
            cluster-type: kind
            tests: >-
              --tests IntegrationsTest
              --tests PaginationTest
              --tests AutocompleteTest
              --tests BuiltinPoliciesTest
              --tests GraphQLResourcePaginationTest

    env:
      CLUSTER_NAME: qa-e2e-${{ matrix.cluster-type }}-${{ github.run_id }}-${{ strategy.job-index }}
      TAG: 4.11.x-879-g846c8632d9

    steps:
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
      with:
        ref: ${{ github.event.pull_request.head.sha || github.sha }}
        # GKE needs full history for gke.sh cluster naming; KinD only needs files
        fetch-depth: ${{ matrix.cluster-type == 'gke' && 0 || 1 }}

    - name: Create KinD cluster (background)
      if: matrix.cluster-type == 'kind'
      uses: ./.github/actions/create-kind-cluster
      with:
        cluster-name: ${{ env.CLUSTER_NAME }}
        tag: ${{ env.TAG }}
        quay-user: ${{ secrets.QUAY_RHACS_ENG_RO_USERNAME }}
        quay-pass: ${{ secrets.QUAY_RHACS_ENG_RO_PASSWORD }}

    - name: Create GKE cluster
      if: matrix.cluster-type == 'gke'
      uses: ./.github/actions/create-gke-cluster
      with:
        cluster-name: ${{ env.CLUSTER_NAME }}
        tag: ${{ env.TAG }}
        gcp-account: ${{ secrets.GCP_SERVICE_ACCOUNT_STACKROX_CI }}
        quay-user: ${{ secrets.QUAY_RHACS_ENG_RO_USERNAME }}
        quay-pass: ${{ secrets.QUAY_RHACS_ENG_RO_PASSWORD }}

    # deploy-stackrox is cluster-agnostic — works with KinD or GKE
    - name: Deploy StackRox (background)
      uses: ./.github/actions/deploy-stackrox

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 21

    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version-file: go.mod

    - name: Wait for Central API
      run: |
        for _ in $(seq 1 180); do
          [ -s /tmp/rox-auth-token ] && break
          sleep 2
        done
        if [ ! -s /tmp/rox-auth-token ]; then
          echo "::error::Central API not ready"
          cat /tmp/deploy.log 2>/dev/null | tail -50 || true
          exit 1
        fi
        echo "Central API ready"

    - name: Add registry integration + pull secrets
      env:
        QUAY_USER: ${{ secrets.QUAY_RHACS_ENG_RO_USERNAME }}
        QUAY_PASS: ${{ secrets.QUAY_RHACS_ENG_RO_PASSWORD }}
      run: |
        set +x
        ROX_ADMIN_PASSWORD="$(cat /tmp/rox-admin-password)"

        # Central needs registry creds to pull manifests for scanning
        curl -sk -u "admin:${ROX_ADMIN_PASSWORD}" \
          "https://localhost:8000/v1/imageintegrations" \
          -X POST -d "{
            \"name\": \"quay-ci\",
            \"type\": \"docker\",
            \"categories\": [\"REGISTRY\"],
            \"docker\": {
              \"endpoint\": \"https://quay.io\",
              \"username\": \"${QUAY_USER}\",
              \"password\": \"${QUAY_PASS}\"
            }
          }" | jq -r '.id // .error'

        # Test workloads need pull secrets for private qa-multi-arch images.
        # Add to qa namespace (main test namespace) and default namespace.
        for ns in qa default; do
          kubectl create namespace "$ns" 2>/dev/null || true
          kubectl -n "$ns" create secret docker-registry quay-pull-secret \
            --docker-server=quay.io \
            --docker-username="${QUAY_USER}" \
            --docker-password="${QUAY_PASS}" 2>/dev/null || true
          kubectl -n "$ns" patch serviceaccount default \
            -p '{"imagePullSecrets":[{"name":"quay-pull-secret"}]}' 2>/dev/null || true
        done
        set -x

    - name: Setup TLS client certs
      run: |
        # Generate client CA + certs using the same script Prow uses.
        # setup_client_TLS_certs calls export_client_TLS_certs which sets
        # KEYSTORE_PATH, CLIENT_CA_PATH, TRUSTSTORE_PATH in the shell.
        # The keystore uses empty password (pass:) matching the Java code.
        source tests/scripts/setup-certs.sh
        setup_client_TLS_certs "/tmp/client-tls-certs"
        echo "CLIENT_CA_PATH=${CLIENT_CA_PATH}" >> "$GITHUB_ENV"
        echo "KEYSTORE_PATH=${KEYSTORE_PATH}" >> "$GITHUB_ENV"
        echo "TRUSTSTORE_PATH=${TRUSTSTORE_PATH}" >> "$GITHUB_ENV"

    - name: Compile QA tests
      working-directory: qa-tests-backend
      run: |
        go mod download github.com/stackrox/scanner
        scripts/copy_scanner_protos.sh
        make compile

    - name: "Run QA tests: ${{ matrix.name }}"
      working-directory: qa-tests-backend
      env:
        API_HOSTNAME: localhost
        API_PORT: "8000"
        ROX_ADMIN_PASSWORD_FILE: /tmp/rox-admin-password
        CLUSTER: K8S
        POD_SECURITY_POLICIES: "false"
        REGISTRY_USERNAME: ${{ secrets.QUAY_RHACS_ENG_RO_USERNAME }}
        REGISTRY_PASSWORD: ${{ secrets.QUAY_RHACS_ENG_RO_PASSWORD }}
        # GCR/GCS credentials
        GOOGLE_CREDENTIALS_GCR_SCANNER_V2: ${{ secrets.GOOGLE_CREDENTIALS_GCR_SCANNER_V2 }}
        GOOGLE_CREDENTIALS_GCR_NO_ACCESS_KEY_V2: ${{ secrets.GOOGLE_CREDENTIALS_GCR_NO_ACCESS_KEY_V2 }}
        GCP_GCS_BACKUP_TEST_BUCKET_NAME_V2: ${{ secrets.GCP_GCS_BACKUP_TEST_BUCKET_NAME_V2 }}
        GOOGLE_GCS_BACKUP_SERVICE_ACCOUNT_V2: ${{ secrets.GOOGLE_GCS_BACKUP_SERVICE_ACCOUNT_V2 }}
        # Quay
        QUAY_RHACS_ENG_BEARER_TOKEN: ${{ secrets.QUAY_RHACS_ENG_BEARER_TOKEN }}
        QUAY_RHACS_ENG_RO_USERNAME: ${{ secrets.QUAY_RHACS_ENG_RO_USERNAME }}
        QUAY_RHACS_ENG_RO_PASSWORD: ${{ secrets.QUAY_RHACS_ENG_RO_PASSWORD }}
        # AWS
        AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        AWS_S3_BACKUP_TEST_BUCKET_NAME: ${{ secrets.AWS_S3_BACKUP_TEST_BUCKET_NAME }}
        AWS_S3_BACKUP_TEST_BUCKET_REGION: ${{ secrets.AWS_S3_BACKUP_TEST_BUCKET_REGION }}
        AWS_ECR_REGISTRY_NAME: ${{ secrets.AWS_ECR_REGISTRY_NAME }}
        AWS_ECR_REGISTRY_REGION: ${{ secrets.AWS_ECR_REGISTRY_REGION }}
        AWS_ASSUME_ROLE_ACCESS_KEY_ID: ${{ secrets.AWS_ASSUME_ROLE_ACCESS_KEY_ID }}
        AWS_ASSUME_ROLE_SECRET_ACCESS_KEY: ${{ secrets.AWS_ASSUME_ROLE_SECRET_ACCESS_KEY }}
        AWS_ASSUME_ROLE_ROLE_ID: ${{ secrets.AWS_ASSUME_ROLE_ROLE_ID }}
        AWS_ASSUME_ROLE_EXTERNAL_ID: ${{ secrets.AWS_ASSUME_ROLE_EXTERNAL_ID }}
        AWS_ASSUME_ROLE_TEST_CONDITION_ID: ${{ secrets.AWS_ASSUME_ROLE_TEST_CONDITION_ID }}
        REMOTE_CLUSTER_ARCH: multi-arch
        # Slack webhooks: dummy values to satisfy mustGet() without
        # sending real notifications. Some test classes (DefaultPoliciesTest,
        # IntegrationsTest) load SlackUtil at class init which crashes if
        # these are missing. Replace with real webhook URLs from the vault
        # to restore in-job Slack reporting of test results.
        SLACK_MAIN_WEBHOOK: "https://hooks.slack.com/services/disabled"
        SLACK_ALT_WEBHOOK: "https://hooks.slack.com/services/disabled"
        SLACK_FIXABLE_VULNS_CHANNEL: "https://hooks.slack.com/services/disabled"
      run: |
        set +x
        export ROX_ADMIN_PASSWORD="$(cat "$ROX_ADMIN_PASSWORD_FILE")"
        set -x
        unset CI
        ./gradlew testBAT ${{ matrix.tests }}

    - name: Collect logs
      if: always()
      run: |
        mkdir -p /tmp/test-artifacts

        # Pod logs — scrub potential secrets before saving
        for pod in $(kubectl -n stackrox get pods -o name 2>/dev/null); do
          kubectl -n stackrox logs "$(basename "$pod")" --all-containers 2>&1 \
            | sed -E 's/(password|token|secret|credential|bearer)[=: ]*[^ "]+/\1=REDACTED/gi' \
            > "/tmp/test-artifacts/$(basename "$pod").log" || true
        done

        # Test reports (HTML + XML) — safe, contain test names and assertions
        cp -r qa-tests-backend/build/reports/ /tmp/test-artifacts/reports/ 2>/dev/null || true
        cp -r qa-tests-backend/build/test-results/ /tmp/test-artifacts/test-results/ 2>/dev/null || true

        # Never upload: /tmp/rox-admin-password, /tmp/rox-auth-token,
        # /tmp/sensor-init-bundle.yaml, /tmp/init-response.json,
        # /tmp/deploy.log (may contain ctr --user credentials),
        # /tmp/kind-create.log (may contain ctr --user credentials)

    - name: Upload artifacts
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # ratchet:actions/upload-artifact@v7
      if: always()
      with:
        name: qa-e2e-${{ matrix.name }}-${{ matrix.cluster-type }}-${{ github.run_id }}
        path: /tmp/test-artifacts
        retention-days: 7

    - name: Cleanup
      if: always()
      run: |
        if [ "${{ matrix.cluster-type }}" = "kind" ]; then
          kind delete cluster --name "$CLUSTER_NAME" 2>/dev/null || true
        elif [ "${{ matrix.cluster-type }}" = "gke" ]; then
          source scripts/ci/gke.sh
          teardown_gke_cluster 2>/dev/null || true
        fi
