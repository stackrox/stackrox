name: e2e-db-backup-restore-test

on:
  workflow_dispatch:
  push:
    branches:
    - master
  pull_request:
    types:
    - opened
    - reopened
    - labeled
    - synchronize

defaults:
  run:
    shell: bash

jobs:
  kind-qa-e2e:
    if: >-
      !github.event.pull_request.head.repo.fork && (
        github.event_name != 'pull_request' ||
        contains(github.event.pull_request.labels.*.name, 'e2e-db-backup-restore-test')
      )
    name: "QA ${{ matrix.name }}"
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          # Area-based sharding: each shard gets its own KinD + StackRox.
          # Grouped by functional area so engineers see which area is slow.
          #
          # Scanner-independent shards run fast (~5 min).
          # Scanner-dependent shards (vuln) need indexing time (~15-20 min).

          - name: auth
            tests: >-
              --tests AuthServiceTest
              --tests CertRotationTest
              --tests ClientCertAuthTest
              --tests K8sRbacTest
              --tests SecretsTest
              --tests ServiceAccountTest

          - name: cluster
            tests: >-
              --tests DeploymentCheck
              --tests DeploymentTest
              --tests NetworkFlowTest
              --tests NetworkSimulator
              --tests K8sEventDetectionTest
              --tests GlobalSearch
              --tests CSVTest

          - name: policy
            tests: >-
              --tests PolicyConfigurationTest
              --tests PolicyFieldsTest
              --tests Enforcement
              --tests ComplianceTest
              --tests DeclarativeConfigTest

          - name: runtime
            tests: >-
              --tests RuntimePolicyTest
              --tests RuntimeViolationLifecycleTest
              --tests ProcessBaselinesTest
              --tests ProcessVisualizationTest
              --tests AuditLogAlertsTest
              --tests AuditScrubbingTest
              --tests AttemptedAlertsTest
              --tests FileActivityTest

          - name: vuln
            tests: >-
              --tests DefaultPoliciesTest
              --tests ImageManagementTest
              --tests ImageScanningTest
              --tests VulnScanPermissionTest
              --tests VulnReportingTest
              --tests AdmissionControllerTest
              --tests AdmissionControllerNoImageScanTest

          - name: integrations
            tests: >-
              --tests IntegrationsTest
              --tests PaginationTest
              --tests AutocompleteTest
              --tests BuiltinPoliciesTest
              --tests GraphQLResourcePaginationTest

    env:
      CLUSTER_NAME: qa-e2e-${{ github.run_id }}-${{ strategy.job-index }}
      TAG: 4.11.x-879-g846c8632d9

    steps:
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
      with:
        ref: ${{ github.event.pull_request.head.sha || github.sha }}
        fetch-depth: 1

    - name: Create KinD cluster (background)
      uses: ./.github/actions/create-kind-cluster
      with:
        cluster-name: ${{ env.CLUSTER_NAME }}
        tag: ${{ env.TAG }}
        quay-user: ${{ secrets.QUAY_RHACS_ENG_RO_USERNAME }}
        quay-pass: ${{ secrets.QUAY_RHACS_ENG_RO_PASSWORD }}

    - name: Deploy StackRox (background)
      uses: ./.github/actions/deploy-stackrox

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 21

    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version-file: go.mod

    - name: Wait for Central API
      run: |
        for _ in $(seq 1 180); do
          [ -s /tmp/rox-auth-token ] && break
          sleep 2
        done
        if [ ! -s /tmp/rox-auth-token ]; then
          echo "::error::Central API not ready"
          cat /tmp/deploy.log 2>/dev/null | tail -50 || true
          exit 1
        fi
        echo "Central API ready"

    - name: Add registry integration + pull secrets
      env:
        QUAY_USER: ${{ secrets.QUAY_RHACS_ENG_RO_USERNAME }}
        QUAY_PASS: ${{ secrets.QUAY_RHACS_ENG_RO_PASSWORD }}
      run: |
        set +x
        ROX_ADMIN_PASSWORD="$(cat /tmp/rox-admin-password)"

        # Central needs registry creds to pull manifests for scanning
        curl -sk -u "admin:${ROX_ADMIN_PASSWORD}" \
          "https://localhost:8000/v1/imageintegrations" \
          -X POST -d "{
            \"name\": \"quay-ci\",
            \"type\": \"docker\",
            \"categories\": [\"REGISTRY\"],
            \"docker\": {
              \"endpoint\": \"https://quay.io\",
              \"username\": \"${QUAY_USER}\",
              \"password\": \"${QUAY_PASS}\"
            }
          }" | jq -r '.id // .error'

        # Test workloads need pull secrets for private qa-multi-arch images.
        # Add to qa namespace (main test namespace) and default namespace.
        for ns in qa default; do
          kubectl create namespace "$ns" 2>/dev/null || true
          kubectl -n "$ns" create secret docker-registry quay-pull-secret \
            --docker-server=quay.io \
            --docker-username="${QUAY_USER}" \
            --docker-password="${QUAY_PASS}" 2>/dev/null || true
          kubectl -n "$ns" patch serviceaccount default \
            -p '{"imagePullSecrets":[{"name":"quay-pull-secret"}]}' 2>/dev/null || true
        done
        set -x

    - name: Setup TLS client certs
      run: |
        # Generate client CA + certs for ClientCertAuthTest.
        # Uses the same setup-certs.sh that Prow uses.
        source tests/scripts/setup-certs.sh
        CERT_DIR="/tmp/client-tls-certs"
        setup_client_TLS_certs "$CERT_DIR"

        # Extract Central's CA for truststore
        kubectl -n stackrox get secret central-tls \
          -o jsonpath='{.data.ca\.pem}' | base64 -d > /tmp/central-ca.pem

        # Create Java truststore with Central's CA
        keytool -import -noprompt -trustcacerts \
          -alias central-ca -file /tmp/central-ca.pem \
          -keystore /tmp/truststore.jks -storepass changeit 2>/dev/null

        echo "CLIENT_CA_PATH=${CERT_DIR}/ca.crt" >> "$GITHUB_ENV"
        echo "KEYSTORE_PATH=${CERT_DIR}/keystore.p12" >> "$GITHUB_ENV"
        echo "TRUSTSTORE_PATH=/tmp/truststore.jks" >> "$GITHUB_ENV"

    - name: Compile QA tests
      working-directory: qa-tests-backend
      run: |
        go mod download github.com/stackrox/scanner
        scripts/copy_scanner_protos.sh
        make compile

    - name: "Run QA tests: ${{ matrix.name }}"
      working-directory: qa-tests-backend
      env:
        API_HOSTNAME: localhost
        API_PORT: "8000"
        ROX_ADMIN_PASSWORD_FILE: /tmp/rox-admin-password
        CLUSTER: K8S
        POD_SECURITY_POLICIES: "false"
        REGISTRY_USERNAME: ${{ secrets.QUAY_RHACS_ENG_RO_USERNAME }}
        REGISTRY_PASSWORD: ${{ secrets.QUAY_RHACS_ENG_RO_PASSWORD }}
        GOOGLE_CREDENTIALS_GCR_SCANNER_V2: ${{ secrets.GOOGLE_CREDENTIALS_GCR_SCANNER_V2 || '{}' }}
        QUAY_RHACS_ENG_BEARER_TOKEN: ${{ secrets.QUAY_RHACS_ENG_BEARER_TOKEN }}
        REMOTE_CLUSTER_ARCH: multi-arch
      run: |
        set +x
        export ROX_ADMIN_PASSWORD="$(cat "$ROX_ADMIN_PASSWORD_FILE")"
        set -x
        unset CI
        ./gradlew testBAT ${{ matrix.tests }}

    - name: Collect logs
      if: always()
      run: |
        mkdir -p /tmp/test-artifacts

        # Pod logs — scrub potential secrets before saving
        for pod in $(kubectl -n stackrox get pods -o name 2>/dev/null); do
          kubectl -n stackrox logs "$(basename "$pod")" --all-containers 2>&1 \
            | sed -E 's/(password|token|secret|credential|bearer)[=: ]*[^ "]+/\1=REDACTED/gi' \
            > "/tmp/test-artifacts/$(basename "$pod").log" || true
        done

        # Test reports (HTML + XML) — safe, contain test names and assertions
        cp -r qa-tests-backend/build/reports/ /tmp/test-artifacts/reports/ 2>/dev/null || true
        cp -r qa-tests-backend/build/test-results/ /tmp/test-artifacts/test-results/ 2>/dev/null || true

        # Never upload: /tmp/rox-admin-password, /tmp/rox-auth-token,
        # /tmp/sensor-init-bundle.yaml, /tmp/init-response.json,
        # /tmp/deploy.log (may contain ctr --user credentials),
        # /tmp/kind-create.log (may contain ctr --user credentials)

    - name: Upload artifacts
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # ratchet:actions/upload-artifact@v7
      if: always()
      with:
        name: qa-e2e-${{ matrix.name }}-${{ github.run_id }}
        path: /tmp/test-artifacts
        retention-days: 7

    - name: Cleanup
      if: always()
      run: kind delete cluster --name "$CLUSTER_NAME" 2>/dev/null || true
