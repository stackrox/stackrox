name: e2e-db-backup-restore-test

on:
  workflow_dispatch:
  push:
    tags:
    - '*'
    branches:
    - master
    - release-*
  pull_request:
    types:
    - opened
    - reopened
    - labeled
    - synchronize

defaults:
  run:
    shell: bash

jobs:
  kind-e2e-test:
    if: >-
      !github.event.pull_request.head.repo.fork && (
        github.event_name != 'pull_request' ||
        contains(github.event.pull_request.labels.*.name, 'e2e-db-backup-restore-test')
      )
    runs-on: ubuntu-latest
    env:
      CLUSTER_NAME: e2e-test-${{ github.run_id }}
      # EXPERIMENT: hardcode known-good tag
      TAG: 4.11.x-831-g8f262d83ee
    timeout-minutes: 30
    steps:

    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
      with:
        ref: ${{ github.event.pull_request.head.sha || github.sha }}
        fetch-depth: 1

    - name: Create KinD cluster (background)
      uses: ./.github/actions/create-kind-cluster
      with:
        cluster-name: ${{ env.CLUSTER_NAME }}
        tag: ${{ env.TAG }}
        quay-user: ${{ secrets.QUAY_RHACS_ENG_RO_USERNAME }}
        quay-pass: ${{ secrets.QUAY_RHACS_ENG_RO_PASSWORD }}

    - name: Deploy StackRox (background)
      uses: ./.github/actions/deploy-stackrox

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 21

    - name: Wait for Central API
      run: |
        for i in $(seq 1 180); do
          [ -s /tmp/rox-auth-token ] && break
          sleep 2
        done
        if [ ! -s /tmp/rox-auth-token ]; then
          echo "::error::Central API not ready"
          cat /tmp/deploy.log 2>/dev/null | tail -50 || true
          exit 1
        fi
        echo "Central API ready"

    - name: Run QA SMOKE tests
      working-directory: qa-tests-backend
      env:
        API_HOSTNAME: localhost
        API_PORT: "8000"
        ROX_ADMIN_PASSWORD_FILE: /tmp/rox-admin-password
        CLUSTER: K8S
        ORCHESTRATOR_FLAVOR: k8s
      run: |
        set +x
        export ROX_ADMIN_PASSWORD="$(cat "$ROX_ADMIN_PASSWORD_FILE")"
        set -x
        ./gradlew testSMOKE --info 2>&1 | tail -100

    - name: Collect logs
      if: always()
      run: |
        mkdir -p /tmp/test-artifacts
        for pod in $(kubectl -n stackrox get pods -o name 2>/dev/null); do
          kubectl -n stackrox logs "$(basename "$pod")" --all-containers \
            > "/tmp/test-artifacts/$(basename "$pod").log" 2>&1 || true
        done
        cp -r qa-tests-backend/build/reports/ /tmp/test-artifacts/reports/ 2>/dev/null || true

    - name: Upload artifacts
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # ratchet:actions/upload-artifact@v7
      if: always()
      with:
        name: e2e-test-${{ github.run_id }}
        path: /tmp/test-artifacts
        retention-days: 7

    - name: Cleanup
      if: always()
      run: kind delete cluster --name "$CLUSTER_NAME" 2>/dev/null || true
