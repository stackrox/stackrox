name: Triage Report
on:
  workflow_dispatch:
  schedule:
  - cron: 0 15 * * 1-5
jobs:
  triage-report:
    if:  ${{ github.repository_owner == 'stackrox' }}
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # ratchet:actions/checkout@v7.0.0
    - name: Report to Slack
      env:
        JIRA_USER: ${{ secrets.JIRA_USER }}
        JIRA_TOKEN: ${{ secrets.JIRA_TOKEN }}
        SLACK_WEBHOOK: ${{ secrets.SLACK_ACS_SUPPORT_TRIAGE_WEBHOOK }}
      run: ./scripts/run-support-triage-report.sh
