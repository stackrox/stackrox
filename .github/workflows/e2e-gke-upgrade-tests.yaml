name: e2e-gke-upgrade-tests

on:
  workflow_dispatch:
  push:
    tags:
    - '*'
    branches:
    - master
    - release-*
  pull_request:
    types:
    - opened
    - reopened
    - labeled
    - synchronize

defaults:
  run:
    shell: bash

jobs:
  wait-for-images:
    runs-on: ubuntu-latest
    env:
      # TODO: remove the image tag override
      MAIN_IMAGE_TAG: 4.11.x-244-g092168e534
    steps:
    - name: Checkout repo
      uses: actions/checkout@v6
      with:
        fetch-depth: 0
        ref: ${{ github.event.pull_request.head.sha || github.sha }}
    - name: Get image tag
      id: get-tag
      run: |
        echo "tag=${MAIN_IMAGE_TAG:-$(make --quiet --no-print-directory tag)}" | tee -a "$GITHUB_ENV"
    - name: Wait for images
      uses: stackrox/actions/release/wait-for-image@v1
      with:
        token: ${{ secrets.QUAY_RHACS_ENG_BEARER_TOKEN }}
        image: |
          rhacs-eng/main:${{ env.tag }}
          rhacs-eng/central-db:${{ env.tag }}
          rhacs-eng/roxctl:${{ env.tag }}
          rhacs-eng/scanner-v4:${{ env.tag }}
          rhacs-eng/scanner-v4-db:${{ env.tag }}
          rhacs-eng/collector:${{ env.tag }}

  # Verifies Sensor/Secured Cluster `upgrader` (applicable to manifest installations only).
  gke-upgrade-tests-sensor:
    needs: [ wait-for-images ]
    if: >-
      !github.event.pull_request.head.repo.fork && (
        github.event_name != 'pull_request' ||
        contains(github.event.pull_request.labels.*.name, 'e2e-gke-upgrade-tests') ||
        !github.event.pull_request.draft
      )
    runs-on: ubuntu-latest
    env:
      USE_GKE_GCLOUD_AUTH_PLUGIN: "True"
      INFRA_TOKEN: ${{ secrets.INFRA_TOKEN }}
      # The cluster name must be no longer than 26 characters.
      CLUSTER_NAME: e2e-sens-${{ github.run_id }}-${{ github.run_attempt }}
      # Not making CI_JOB_NAME match *gke-upgrade-tests because JUnit reporting will be broken since this is only a
      # part of the entire former gke-upgrade-tests.
      CI_JOB_NAME: gke-upgrade-tests-sensor
      ARTIFACT_DIR: ./junit-reports/
      # TODO: remove the image tag override
      MAIN_IMAGE_TAG: 4.11.x-244-g092168e534
    container:
      image: quay.io/stackrox-io/apollo-ci:stackrox-ui-test-0.5.3
      volumes:
      - /usr:/mnt/usr
      - /opt:/mnt/opt
    timeout-minutes: 60 # Keep in sync with cluster's lifespan
    steps:
    - name: Checkout repo
      uses: actions/checkout@v6
      with:
        fetch-depth: 0
        ref: ${{ github.event.pull_request.head.sha || github.sha }}

    - uses: ./.github/actions/job-preamble
      with:
        gcp-account: ${{ secrets.GCP_SERVICE_ACCOUNT_STACKROX_CI }}

    - name: Fix $PATH for infractl
      run: echo "$HOME/.local/bin" | tee -a "$GITHUB_PATH"

    - name: Trigger test cluster creation
      uses: stackrox/actions/infra/create-cluster@v1
      with:
        token: ${{ secrets.INFRA_TOKEN }}
        flavor: gke-default
        name: ${{ env.CLUSTER_NAME }}
        lifespan: 1h # Keep in sync with job's timeout-minutes
        args: nodes=3,machine-type=e2-standard-8
        wait: false

    - name: Docker login to Quay.io
      env:
        REGISTRY_USERNAME: ${{ secrets.QUAY_RHACS_ENG_RO_USERNAME }}
        REGISTRY_PASSWORD: ${{ secrets.QUAY_RHACS_ENG_RO_PASSWORD }}
      run: |
        docker login -u "${REGISTRY_USERNAME}" --password-stdin quay.io <<<"${REGISTRY_PASSWORD}"

    - name: Set up Cloud SDK
      uses: google-github-actions/setup-gcloud@v3
      with:
        install_components: "gke-gcloud-auth-plugin"

    - name: Build roxctl and upgrader
      run: |
        make roxctl_linux-amd64 upgrader

    - name: Wait for the cluster and grab artifacts
      timeout-minutes: 25
      run: |
        infractl wait "${CLUSTER_NAME}"
        infractl artifacts "${CLUSTER_NAME}" --download-dir artifacts > /dev/null
        echo "KUBECONFIG=$(pwd)/artifacts/kubeconfig" >> "$GITHUB_ENV"

    - name: Verify kubectl access
      run: |
        kubectl cluster-info
        kubectl get nodes

    - name: Run pre-test
      shell: python
      env:
        QUAY_RHACS_ENG_BEARER_TOKEN: ${{ secrets.QUAY_RHACS_ENG_BEARER_TOKEN }}
        PYTHONUNBUFFERED: "1"
      run: |
        import sys
        sys.path.append('.openshift-ci')
        from pre_tests import PreSystemTests
        PreSystemTests().run()

    - name: Run postgres sensor upgrade test
      env:
        LONGTERM_LICENSE: todo - remove me
        QUAY_RHACS_ENG_RO_USERNAME: ${{ secrets.QUAY_RHACS_ENG_RO_USERNAME }}
        QUAY_RHACS_ENG_RO_PASSWORD: ${{ secrets.QUAY_RHACS_ENG_RO_PASSWORD }}
        REGISTRY_USERNAME: ${{ secrets.QUAY_RHACS_ENG_RO_USERNAME }}
        REGISTRY_PASSWORD: ${{ secrets.QUAY_RHACS_ENG_RO_PASSWORD }}
        LOAD_BALANCER: lb
      run: |
        tests/upgrade/postgres_sensor_run.sh /tmp/postgres-sensor-upgrade-test-logs

    - name: Run post-test
      if: always()
      shell: python
      env:
        PYTHONUNBUFFERED: "1"
      run: |
        import sys
        sys.path.append('.openshift-ci')
        from post_tests import PostClusterTest
        # The particular test removes StackRox resources, therefore not collecting their artifacts.
        PostClusterTest(collect_central_artifacts=False).run(['/tmp/postgres-sensor-upgrade-test-logs'])

    - name: Run final-post
      if: always()
      shell: python
      env:
        PYTHONUNBUFFERED: "1"
      run: |
        import sys
        sys.path.append('.openshift-ci')
        from post_tests import FinalPost
        FinalPost(store_qa_tests_data=False).run()

    - name: Delete cluster
      if: always()
      run: |
        infractl delete "${CLUSTER_NAME}"

    - name: Report junit failures in jira
      if: (!cancelled())
      id: junit2jira
      uses: ./.github/actions/junit2jira
      with:
        create-jiras: ${{ github.event_name == 'push' }}
        jira-token: ${{ secrets.JIRA_TOKEN }}
        gcp-account: ${{ secrets.GCP_SERVICE_ACCOUNT_STACKROX_CI }}
        directory: ${{ env.ARTIFACT_DIR }}

  # Verifies Central DB upgrades/rollbacks.
  gke-upgrade-tests-central:
    needs: [ wait-for-images ]
    if: >-
      !github.event.pull_request.head.repo.fork && (
        github.event_name != 'pull_request' ||
