name: Page Cache Precise Benchmark

on:
  workflow_dispatch:
  pull_request:
    types: [opened, reopened, synchronize]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

# Single-runner precision benchmark: all strategies run sequentially on ONE
# runner to eliminate runner-to-runner variance. Sub-millisecond timing via
# date +%s%N. /proc/stat for I/O stats. Multiple iterations per strategy.

jobs:
  precise-build:
    runs-on: ubuntu-latest
    name: "precise-build"
    container:
      image: quay.io/stackrox-io/apollo-ci:stackrox-test-0.5.3
      volumes:
        - /usr:/mnt/usr
        - /opt:/mnt/opt
      options: --cap-add IPC_LOCK --ulimit memlock=-1:-1 --privileged
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: ./.github/actions/job-preamble
        with:
          gcp-account: ${{ secrets.GCP_SERVICE_ACCOUNT_STACKROX_CI }}

      - uses: ./.github/actions/handle-tagged-build

      - name: Cache Go dependencies
        uses: ./.github/actions/cache-go-dependencies

      - name: Install tools
        run: |
          # Install vmtouch
          tmp="$(mktemp -d)"
          curl -sSfL https://raw.githubusercontent.com/hoytech/vmtouch/master/vmtouch.c -o "$tmp/vmtouch.c"
          gcc -O2 -o /usr/local/bin/vmtouch "$tmp/vmtouch.c"
          rm -rf "$tmp"
          # Install time (GNU time, not bash builtin)
          apt-get update -qq && apt-get install -y -qq time > /dev/null 2>&1 || true

      - name: System info
        run: |
          echo "### System Info" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "CPU: $(grep 'model name' /proc/cpuinfo | head -1 | cut -d: -f2 | xargs)" | tee -a "$GITHUB_STEP_SUMMARY"
          echo "Cores: $(nproc)" | tee -a "$GITHUB_STEP_SUMMARY"
          echo "RAM: $(free -h | awk '/Mem:/ {print $2}')" | tee -a "$GITHUB_STEP_SUMMARY"
          echo "Workspace FS: $(df -Th . | tail -1 | awk '{print $1, $2}')" | tee -a "$GITHUB_STEP_SUMMARY"
          echo "GOCACHE: $(go env GOCACHE)" | tee -a "$GITHUB_STEP_SUMMARY"
          echo "Kernel: $(uname -r)" | tee -a "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Seed build (warm GOCACHE)
        run: GOOS=linux GOARCH=amd64 CGO_ENABLED=1 make build-prep main-build-nodeps 2>&1 | tail -3

      - name: Benchmark helper
        run: |
          # Helper script for all benchmark iterations
          cat > /tmp/bench.sh << 'BENCH'
          #!/bin/bash
          set -eo pipefail
          label="$1"; shift
          iters="${1:-5}"; shift

          for i in $(seq 1 "$iters"); do
            rm -rf bin/

            # Capture I/O counters before
            io_before=$(awk '/^rchar:/{r=$2} /^syscr:/{sr=$2} /^read_bytes:/{rb=$2} END{print r, sr, rb}' /proc/self/io 2>/dev/null || echo "0 0 0")

            start_ns=$(date +%s%N)
            GOOS=linux GOARCH=amd64 CGO_ENABLED=1 make build-prep main-build-nodeps > /dev/null 2>&1
            end_ns=$(date +%s%N)
            elapsed_ms=$(( (end_ns - start_ns) / 1000000 ))

            # Capture I/O counters after
            io_after=$(awk '/^rchar:/{r=$2} /^syscr:/{sr=$2} /^read_bytes:/{rb=$2} END{print r, sr, rb}' /proc/self/io 2>/dev/null || echo "0 0 0")

            echo "${label} #${i}: ${elapsed_ms}ms"
          done
          BENCH
          chmod +x /tmp/bench.sh

      - name: "Benchmark: disk (page cache warm)"
        run: |
          echo "### Disk — page cache warm (5 iterations)" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          # Ensure page cache is warm by reading everything once
          find . -type f -exec cat {} + > /dev/null 2>&1 || true
          vmtouch . 2>/dev/null | grep Resident || true
          /tmp/bench.sh "disk-warm" 5 | tee -a "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: "Benchmark: disk (cold page cache)"
        run: |
          echo "### Disk — cold page cache (3 iterations)" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          for i in 1 2 3; do
            # Drop page cache
            sync && echo 3 > /proc/sys/vm/drop_caches 2>/dev/null || true
            rm -rf bin/
            start_ns=$(date +%s%N)
            GOOS=linux GOARCH=amd64 CGO_ENABLED=1 make build-prep main-build-nodeps > /dev/null 2>&1
            end_ns=$(date +%s%N)
            echo "disk-cold #${i}: $(( (end_ns - start_ns) / 1000000 ))ms" | tee -a "$GITHUB_STEP_SUMMARY"
          done
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: "Benchmark: vmtouch-lock (page cache pinned)"
        run: |
          echo "### vmtouch-lock — page cache pinned (5 iterations)" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          vmtouch -tl . &
          VMTOUCH_PID=$!
          sleep 1
          vmtouch . 2>/dev/null | grep Resident | tee -a "$GITHUB_STEP_SUMMARY" || true
          /tmp/bench.sh "vmtouch-lock" 5 | tee -a "$GITHUB_STEP_SUMMARY"
          kill $VMTOUCH_PID 2>/dev/null || true
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: "Benchmark: tmpfs (workspace copied to RAM)"
        run: |
          echo "### tmpfs — workspace on RAM (5 iterations)" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          TMPFS_DIR="/tmp/tmpfs-bench"
          mkdir -p "$TMPFS_DIR"
          mount -t tmpfs -o size=4G,exec tmpfs "$TMPFS_DIR"
          cp -a "$GITHUB_WORKSPACE/." "$TMPFS_DIR/"
          # Copy GOCACHE too so ActionIDs match (same paths in cache)
          GOCACHE_DIR=$(go env GOCACHE)
          cp -a "$GOCACHE_DIR" "${TMPFS_DIR}/.gocache" 2>/dev/null || true

          cd "$TMPFS_DIR"
          git config --global --add safe.directory "$TMPFS_DIR"
          echo "Filesystem: $(df -Th . | tail -1 | awk '{print $1, $2}')" | tee -a "$GITHUB_STEP_SUMMARY"

          for i in 1 2 3 4 5; do
            rm -rf bin/
            start_ns=$(date +%s%N)
            GOOS=linux GOARCH=amd64 CGO_ENABLED=1 make build-prep main-build-nodeps > /dev/null 2>&1
            end_ns=$(date +%s%N)
            echo "tmpfs #${i}: $(( (end_ns - start_ns) / 1000000 ))ms" | tee -a "$GITHUB_STEP_SUMMARY"
          done

          cd "$GITHUB_WORKSPACE"
          umount "$TMPFS_DIR" 2>/dev/null || true
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: "SHA256 hash micro-benchmark"
        shell: bash --noprofile --norc -o pipefail {0}
        run: |
          set +e  # Don't exit on SIGPIPE from cat|sha256sum
          echo "### SHA256 micro-benchmark" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

          find "$GITHUB_WORKSPACE" -type f \( -name '*.go' -o -name '*.s' -o -name '*.c' -o -name '*.h' \) > /tmp/filelist.txt
          file_count=$(wc -l < /tmp/filelist.txt)
          total_mb=$(du -shc $(cat /tmp/filelist.txt) 2>/dev/null | tail -1 | cut -f1)
          echo "Source files: $file_count ($total_mb)" | tee -a "$GITHUB_STEP_SUMMARY"

          # Bulk hash: disk cold
          sync && echo 3 > /proc/sys/vm/drop_caches 2>/dev/null || true
          for i in 1 2 3; do
            start_ns=$(date +%s%N)
            xargs -a /tmp/filelist.txt cat 2>/dev/null | sha256sum > /dev/null
            end_ns=$(date +%s%N)
            echo "bulk-disk-cold #$i: $(( (end_ns - start_ns) / 1000000 ))ms" | tee -a "$GITHUB_STEP_SUMMARY"
          done

          # Bulk hash: disk warm
          xargs -a /tmp/filelist.txt cat > /dev/null 2>&1
          for i in 1 2 3; do
            start_ns=$(date +%s%N)
            xargs -a /tmp/filelist.txt cat 2>/dev/null | sha256sum > /dev/null
            end_ns=$(date +%s%N)
            echo "bulk-disk-warm #$i: $(( (end_ns - start_ns) / 1000000 ))ms" | tee -a "$GITHUB_STEP_SUMMARY"
          done

          # Bulk hash: tmpfs
          TMPFS_DIR="/tmp/tmpfs-hash"
          mkdir -p "$TMPFS_DIR"
          mount -t tmpfs -o size=4G tmpfs "$TMPFS_DIR"
          cp -a "$GITHUB_WORKSPACE/." "$TMPFS_DIR/"
          find "$TMPFS_DIR" -type f \( -name '*.go' -o -name '*.s' -o -name '*.c' -o -name '*.h' \) > /tmp/filelist_tmpfs.txt
          for i in 1 2 3; do
            start_ns=$(date +%s%N)
            xargs -a /tmp/filelist_tmpfs.txt cat 2>/dev/null | sha256sum > /dev/null
            end_ns=$(date +%s%N)
            echo "bulk-tmpfs #$i: $(( (end_ns - start_ns) / 1000000 ))ms" | tee -a "$GITHUB_STEP_SUMMARY"
          done
          umount "$TMPFS_DIR" 2>/dev/null || true

          # Per-file hash (Go's actual pattern): 1000 files
          find "$GITHUB_WORKSPACE" -type f -name '*.go' | head -1000 > /tmp/sample.txt
          n=$(wc -l < /tmp/sample.txt)

          # disk warm
          xargs -a /tmp/sample.txt cat > /dev/null 2>&1
          start_ns=$(date +%s%N)
          while IFS= read -r f; do sha256sum "$f" > /dev/null 2>&1; done < /tmp/sample.txt
          end_ns=$(date +%s%N)
          elapsed_us=$(( (end_ns - start_ns) / 1000 ))
          echo "per-file-disk: $(( elapsed_us / 1000 ))ms total, $(( elapsed_us / n ))us/file ($n files)" | tee -a "$GITHUB_STEP_SUMMARY"

          # tmpfs
          TMPFS_DIR="/tmp/tmpfs-perfile"
          mkdir -p "$TMPFS_DIR"
          mount -t tmpfs -o size=4G tmpfs "$TMPFS_DIR"
          cp -a "$GITHUB_WORKSPACE/." "$TMPFS_DIR/"
          find "$TMPFS_DIR" -type f -name '*.go' | head -1000 > /tmp/sample_tmpfs.txt
          start_ns=$(date +%s%N)
          while IFS= read -r f; do sha256sum "$f" > /dev/null 2>&1; done < /tmp/sample_tmpfs.txt
          end_ns=$(date +%s%N)
          elapsed_us=$(( (end_ns - start_ns) / 1000 ))
          echo "per-file-tmpfs: $(( elapsed_us / 1000 ))ms total, $(( elapsed_us / n ))us/file ($n files)" | tee -a "$GITHUB_STEP_SUMMARY"
          umount "$TMPFS_DIR" 2>/dev/null || true

          echo '```' >> "$GITHUB_STEP_SUMMARY"

  precise-test:
    runs-on: ubuntu-latest
    name: "precise-test"
    container:
      image: quay.io/stackrox-io/apollo-ci:stackrox-test-0.5.3
      volumes:
        - /usr:/mnt/usr
        - /opt:/mnt/opt
      options: --cap-add IPC_LOCK --ulimit memlock=-1:-1 --privileged
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: ./.github/actions/job-preamble
        with:
          gcp-account: ${{ secrets.GCP_SERVICE_ACCOUNT_STACKROX_CI }}

      - uses: ./.github/actions/handle-tagged-build

      - name: Cache Go dependencies
        uses: ./.github/actions/cache-go-dependencies

      - name: "Test: disk baseline"
        run: |
          echo "### Test from disk" >> "$GITHUB_STEP_SUMMARY"
          start_ns=$(date +%s%N)
          make go-unit-tests 2>&1 | tail -5 || true
          end_ns=$(date +%s%N)
          elapsed_ms=$(( (end_ns - start_ns) / 1000000 ))
          elapsed_s=$(( elapsed_ms / 1000 ))

          cached=$(grep -c '(cached)' test-output/test.log 2>/dev/null || true)
          total=$(grep -c '^ok ' test-output/test.log 2>/dev/null || true)

          {
            echo "| Metric | Value |"
            echo "|--------|-------|"
            echo "| Mode | \`disk\` |"
            echo "| Time | \`${elapsed_s}s\` (\`${elapsed_ms}ms\`) |"
            echo "| Test cache | \`${cached}/${total}\` |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: "Test: tmpfs"
        run: |
          echo "### Test from tmpfs" >> "$GITHUB_STEP_SUMMARY"
          TMPFS_DIR="/tmp/tmpfs-test"
          mkdir -p "$TMPFS_DIR"
          mount -t tmpfs -o size=4G,exec tmpfs "$TMPFS_DIR"
          cp -a "$GITHUB_WORKSPACE/." "$TMPFS_DIR/"
          cd "$TMPFS_DIR"
          git config --global --add safe.directory "$TMPFS_DIR"

          rm -rf test-output/
          start_ns=$(date +%s%N)
          make go-unit-tests 2>&1 | tail -5 || true
          end_ns=$(date +%s%N)
          elapsed_ms=$(( (end_ns - start_ns) / 1000000 ))
          elapsed_s=$(( elapsed_ms / 1000 ))

          cached=$(grep -c '(cached)' test-output/test.log 2>/dev/null || true)
          total=$(grep -c '^ok ' test-output/test.log 2>/dev/null || true)

          {
            echo "| Metric | Value |"
            echo "|--------|-------|"
            echo "| Mode | \`tmpfs\` |"
            echo "| Time | \`${elapsed_s}s\` (\`${elapsed_ms}ms\`) |"
            echo "| Test cache | \`${cached}/${total}\` |"
          } >> "$GITHUB_STEP_SUMMARY"

          cd "$GITHUB_WORKSPACE"
          umount "$TMPFS_DIR" 2>/dev/null || true
