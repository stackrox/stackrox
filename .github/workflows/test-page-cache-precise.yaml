name: Page Cache Precise Benchmark

on:
  workflow_dispatch:
  pull_request:
    types: [opened, reopened, synchronize]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

# Single-runner precision benchmark: all strategies run sequentially on ONE
# runner to eliminate runner-to-runner variance. Sub-second timing via
# date +%s%N. /usr/bin/time for I/O stats. Multiple iterations per strategy.

jobs:
  # ---------------------------------------------------------------------------
  # Precise build benchmark: all strategies on one runner
  # ---------------------------------------------------------------------------
  precise-build:
    runs-on: ubuntu-latest
    name: "precise-build"
    container:
      image: quay.io/stackrox-io/apollo-ci:stackrox-test-0.5.3
      volumes:
        - /usr:/mnt/usr
        - /opt:/mnt/opt
      options: --cap-add IPC_LOCK --ulimit memlock=-1:-1 --privileged
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: ./.github/actions/job-preamble
        with:
          gcp-account: ${{ secrets.GCP_SERVICE_ACCOUNT_STACKROX_CI }}

      - uses: ./.github/actions/handle-tagged-build

      - name: Cache Go dependencies
        uses: ./.github/actions/cache-go-dependencies

      - name: Install vmtouch
        uses: ./.github/actions/page-cache-warm
        with:
          mode: vmtouch-touch

      - name: System info
        run: |
          echo "### System Info" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "CPU: $(grep 'model name' /proc/cpuinfo | head -1 | cut -d: -f2 | xargs)" >> "$GITHUB_STEP_SUMMARY"
          echo "Cores: $(nproc)" >> "$GITHUB_STEP_SUMMARY"
          echo "RAM: $(free -h | awk '/Mem:/ {print $2}')" >> "$GITHUB_STEP_SUMMARY"
          echo "Filesystem: $(df -Th . | tail -1 | awk '{print $1, $2}')" >> "$GITHUB_STEP_SUMMARY"
          echo "Kernel: $(uname -r)" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Warm build once (seed in-process state)
        run: |
          GOOS=linux GOARCH=amd64 CGO_ENABLED=1 make build-prep main-build-nodeps 2>&1 | tail -5

      - name: Precise benchmark — disk baseline
        run: |
          echo "### Disk Baseline (5 iterations)" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

          # Drop page cache to get true disk baseline
          sync && echo 3 > /proc/sys/vm/drop_caches 2>/dev/null || true

          for i in 1 2 3 4 5; do
            # Clean build outputs to force re-link
            rm -rf bin/

            start_ns=$(date +%s%N)
            /usr/bin/time -v bash -c 'GOOS=linux GOARCH=amd64 CGO_ENABLED=1 make build-prep main-build-nodeps' \
              2>/tmp/time_output_$i.txt 1>/dev/null
            end_ns=$(date +%s%N)
            elapsed_ms=$(( (end_ns - start_ns) / 1000000 ))

            # Extract I/O stats
            major_faults=$(grep 'Major.*page faults' /tmp/time_output_$i.txt | awk '{print $NF}')
            minor_faults=$(grep 'Minor.*page faults' /tmp/time_output_$i.txt | awk '{print $NF}')
            fs_inputs=$(grep 'File system inputs' /tmp/time_output_$i.txt | awk '{print $NF}')
            fs_outputs=$(grep 'File system outputs' /tmp/time_output_$i.txt | awk '{print $NF}')
            wall=$(grep 'wall clock' /tmp/time_output_$i.txt | awk '{print $NF}')
            user=$(grep 'User time' /tmp/time_output_$i.txt | awk '{print $NF}')
            sys=$(grep 'System time' /tmp/time_output_$i.txt | awk '{print $NF}')
            involuntary=$(grep 'Involuntary' /tmp/time_output_$i.txt | awk '{print $NF}')

            echo "disk #$i: ${elapsed_ms}ms wall=${wall} user=${user} sys=${sys} major=${major_faults} minor=${minor_faults} fsin=${fs_inputs} fsout=${fs_outputs} involctx=${involuntary}"
          done | tee -a "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Precise benchmark — vmtouch-lock (page cache pinned)
        run: |
          echo "### vmtouch-lock (5 iterations)" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

          # Pin all source files in page cache
          vmtouch -tl "$GITHUB_WORKSPACE" &
          VMTOUCH_PID=$!
          sleep 1
          vmtouch "$GITHUB_WORKSPACE" | tail -3

          for i in 1 2 3 4 5; do
            rm -rf bin/
            start_ns=$(date +%s%N)
            /usr/bin/time -v bash -c 'GOOS=linux GOARCH=amd64 CGO_ENABLED=1 make build-prep main-build-nodeps' \
              2>/tmp/time_output_$i.txt 1>/dev/null
            end_ns=$(date +%s%N)
            elapsed_ms=$(( (end_ns - start_ns) / 1000000 ))

            major_faults=$(grep 'Major.*page faults' /tmp/time_output_$i.txt | awk '{print $NF}')
            minor_faults=$(grep 'Minor.*page faults' /tmp/time_output_$i.txt | awk '{print $NF}')
            fs_inputs=$(grep 'File system inputs' /tmp/time_output_$i.txt | awk '{print $NF}')
            fs_outputs=$(grep 'File system outputs' /tmp/time_output_$i.txt | awk '{print $NF}')
            wall=$(grep 'wall clock' /tmp/time_output_$i.txt | awk '{print $NF}')
            user=$(grep 'User time' /tmp/time_output_$i.txt | awk '{print $NF}')
            sys=$(grep 'System time' /tmp/time_output_$i.txt | awk '{print $NF}')
            involuntary=$(grep 'Involuntary' /tmp/time_output_$i.txt | awk '{print $NF}')

            echo "vmtouch #$i: ${elapsed_ms}ms wall=${wall} user=${user} sys=${sys} major=${major_faults} minor=${minor_faults} fsin=${fs_inputs} fsout=${fs_outputs} involctx=${involuntary}"
          done | tee -a "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

          kill $VMTOUCH_PID 2>/dev/null || true

      - name: Precise benchmark — tmpfs copy
        run: |
          echo "### tmpfs copy (5 iterations)" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

          # Mount tmpfs, copy workspace there
          TMPFS_DIR="/tmp/tmpfs-bench"
          mkdir -p "$TMPFS_DIR"
          mount -t tmpfs -o size=4G,exec tmpfs "$TMPFS_DIR"
          cp -a "$GITHUB_WORKSPACE/." "$TMPFS_DIR/"
          cd "$TMPFS_DIR"
          git config --global --add safe.directory "$TMPFS_DIR"

          echo "Filesystem: $(df -Th . | tail -1 | awk '{print $1, $2}')"

          for i in 1 2 3 4 5; do
            rm -rf bin/
            start_ns=$(date +%s%N)
            /usr/bin/time -v bash -c 'GOOS=linux GOARCH=amd64 CGO_ENABLED=1 make build-prep main-build-nodeps' \
              2>/tmp/time_output_$i.txt 1>/dev/null
            end_ns=$(date +%s%N)
            elapsed_ms=$(( (end_ns - start_ns) / 1000000 ))

            major_faults=$(grep 'Major.*page faults' /tmp/time_output_$i.txt | awk '{print $NF}')
            minor_faults=$(grep 'Minor.*page faults' /tmp/time_output_$i.txt | awk '{print $NF}')
            fs_inputs=$(grep 'File system inputs' /tmp/time_output_$i.txt | awk '{print $NF}')
            fs_outputs=$(grep 'File system outputs' /tmp/time_output_$i.txt | awk '{print $NF}')
            wall=$(grep 'wall clock' /tmp/time_output_$i.txt | awk '{print $NF}')
            user=$(grep 'User time' /tmp/time_output_$i.txt | awk '{print $NF}')
            sys=$(grep 'System time' /tmp/time_output_$i.txt | awk '{print $NF}')
            involuntary=$(grep 'Involuntary' /tmp/time_output_$i.txt | awk '{print $NF}')

            echo "tmpfs #$i: ${elapsed_ms}ms wall=${wall} user=${user} sys=${sys} major=${major_faults} minor=${minor_faults} fsin=${fs_inputs} fsout=${fs_outputs} involctx=${involuntary}"
          done | tee -a "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

          cd "$GITHUB_WORKSPACE"
          umount "$TMPFS_DIR" 2>/dev/null || true

      - name: SHA256 hash micro-benchmark (sub-second)
        run: |
          echo "### SHA256 hash micro-benchmark (3x each)" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

          # Build the file list once
          find "$GITHUB_WORKSPACE" -type f \( -name '*.go' -o -name '*.s' -o -name '*.c' -o -name '*.h' \) > /tmp/filelist.txt
          file_count=$(wc -l < /tmp/filelist.txt)
          echo "Files: $file_count"

          # Disk baseline (after drop_caches)
          sync && echo 3 > /proc/sys/vm/drop_caches 2>/dev/null || true
          for i in 1 2 3; do
            start_ns=$(date +%s%N)
            cat $(cat /tmp/filelist.txt) | sha256sum > /dev/null 2>&1
            end_ns=$(date +%s%N)
            echo "hash-disk-cold #$i: $(( (end_ns - start_ns) / 1000000 ))ms ($file_count files)"
          done

          # Disk with warm page cache
          cat $(cat /tmp/filelist.txt) > /dev/null 2>&1  # warm
          for i in 1 2 3; do
            start_ns=$(date +%s%N)
            cat $(cat /tmp/filelist.txt) | sha256sum > /dev/null 2>&1
            end_ns=$(date +%s%N)
            echo "hash-disk-warm #$i: $(( (end_ns - start_ns) / 1000000 ))ms ($file_count files)"
          done

          # vmtouch locked
          vmtouch -t "$GITHUB_WORKSPACE" > /dev/null 2>&1
          for i in 1 2 3; do
            start_ns=$(date +%s%N)
            cat $(cat /tmp/filelist.txt) | sha256sum > /dev/null 2>&1
            end_ns=$(date +%s%N)
            echo "hash-vmtouch #$i: $(( (end_ns - start_ns) / 1000000 ))ms ($file_count files)"
          done

          # tmpfs
          TMPFS_DIR="/tmp/tmpfs-hash"
          mkdir -p "$TMPFS_DIR"
          mount -t tmpfs -o size=4G tmpfs "$TMPFS_DIR"
          cp -a "$GITHUB_WORKSPACE/." "$TMPFS_DIR/"
          find "$TMPFS_DIR" -type f \( -name '*.go' -o -name '*.s' -o -name '*.c' -o -name '*.h' \) > /tmp/filelist_tmpfs.txt
          for i in 1 2 3; do
            start_ns=$(date +%s%N)
            cat $(cat /tmp/filelist_tmpfs.txt) | sha256sum > /dev/null 2>&1
            end_ns=$(date +%s%N)
            echo "hash-tmpfs #$i: $(( (end_ns - start_ns) / 1000000 ))ms ($file_count files)"
          done
          umount "$TMPFS_DIR" 2>/dev/null || true

          echo '```' >> "$GITHUB_STEP_SUMMARY"
        # Use tee to capture output in summary
        # Note: the above echo lines go to stdout, need to capture

      - name: SHA256 per-file benchmark (measure per-file overhead)
        run: |
          echo "### Per-file SHA256 benchmark" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

          # Measure per-file SHA256 with Go's actual pattern (individual open/read/hash/close)
          # Use a representative set of 1000 .go files
          find "$GITHUB_WORKSPACE" -type f -name '*.go' | head -1000 > /tmp/sample_files.txt
          sample_count=$(wc -l < /tmp/sample_files.txt)

          # Disk warm
          cat $(cat /tmp/sample_files.txt) > /dev/null 2>&1
          start_ns=$(date +%s%N)
          while IFS= read -r f; do
            sha256sum "$f" > /dev/null 2>&1
          done < /tmp/sample_files.txt
          end_ns=$(date +%s%N)
          elapsed_ms=$(( (end_ns - start_ns) / 1000000 ))
          per_file_us=$(( (end_ns - start_ns) / sample_count / 1000 ))
          echo "disk-warm: ${elapsed_ms}ms total, ${per_file_us}us/file ($sample_count files)"

          # tmpfs
          TMPFS_DIR="/tmp/tmpfs-perfile"
          mkdir -p "$TMPFS_DIR"
          mount -t tmpfs -o size=4G tmpfs "$TMPFS_DIR"
          cp -a "$GITHUB_WORKSPACE/." "$TMPFS_DIR/"
          find "$TMPFS_DIR" -type f -name '*.go' | head -1000 > /tmp/sample_files_tmpfs.txt
          start_ns=$(date +%s%N)
          while IFS= read -r f; do
            sha256sum "$f" > /dev/null 2>&1
          done < /tmp/sample_files_tmpfs.txt
          end_ns=$(date +%s%N)
          elapsed_ms=$(( (end_ns - start_ns) / 1000000 ))
          per_file_us=$(( (end_ns - start_ns) / sample_count / 1000 ))
          echo "tmpfs: ${elapsed_ms}ms total, ${per_file_us}us/file ($sample_count files)"

          umount "$TMPFS_DIR" 2>/dev/null || true
          echo '```' >> "$GITHUB_STEP_SUMMARY"

  # ---------------------------------------------------------------------------
  # Precise test benchmark: sequential on one runner
  # Runs go-unit-tests from disk vs tmpfs on same runner
  # ---------------------------------------------------------------------------
  precise-test:
    runs-on: ubuntu-latest
    name: "precise-test"
    container:
      image: quay.io/stackrox-io/apollo-ci:stackrox-test-0.5.3
      volumes:
        - /usr:/mnt/usr
        - /opt:/mnt/opt
      options: --cap-add IPC_LOCK --ulimit memlock=-1:-1 --privileged
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: ./.github/actions/job-preamble
        with:
          gcp-account: ${{ secrets.GCP_SERVICE_ACCOUNT_STACKROX_CI }}

      - uses: ./.github/actions/handle-tagged-build

      - name: Cache Go dependencies
        uses: ./.github/actions/cache-go-dependencies

      - name: Test from disk (baseline)
        run: |
          echo "### Test from disk" >> "$GITHUB_STEP_SUMMARY"
          start_ns=$(date +%s%N)
          /usr/bin/time -v make go-unit-tests 2>/tmp/time_test_disk.txt
          end_ns=$(date +%s%N)
          elapsed_ms=$(( (end_ns - start_ns) / 1000000 ))

          wall=$(grep 'wall clock' /tmp/time_test_disk.txt | awk '{print $NF}')
          user=$(grep 'User time' /tmp/time_test_disk.txt | awk '{print $NF}')
          sys=$(grep 'System time' /tmp/time_test_disk.txt | awk '{print $NF}')
          major_faults=$(grep 'Major.*page faults' /tmp/time_test_disk.txt | awk '{print $NF}')
          fs_inputs=$(grep 'File system inputs' /tmp/time_test_disk.txt | awk '{print $NF}')

          cached=$(grep -c '(cached)' test-output/test.log 2>/dev/null || true)
          total=$(grep -c '^ok ' test-output/test.log 2>/dev/null || true)

          {
            echo "| Metric | Value |"
            echo "|--------|-------|"
            echo "| Mode | \`disk\` |"
            echo "| Total | \`${elapsed_ms}ms\` |"
            echo "| Wall | \`${wall}\` |"
            echo "| User | \`${user}\` |"
            echo "| Sys | \`${sys}\` |"
            echo "| Major faults | \`${major_faults}\` |"
            echo "| FS inputs | \`${fs_inputs}\` |"
            echo "| Test cache | \`${cached}/${total}\` |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Test from tmpfs
        run: |
          echo "### Test from tmpfs" >> "$GITHUB_STEP_SUMMARY"

          # Mount tmpfs and copy workspace
          TMPFS_DIR="/tmp/tmpfs-test"
          mkdir -p "$TMPFS_DIR"
          mount -t tmpfs -o size=4G,exec tmpfs "$TMPFS_DIR"
          cp -a "$GITHUB_WORKSPACE/." "$TMPFS_DIR/"
          cd "$TMPFS_DIR"
          git config --global --add safe.directory "$TMPFS_DIR"

          # Clear previous test output
          rm -rf test-output/

          start_ns=$(date +%s%N)
          /usr/bin/time -v make go-unit-tests 2>/tmp/time_test_tmpfs.txt
          end_ns=$(date +%s%N)
          elapsed_ms=$(( (end_ns - start_ns) / 1000000 ))

          wall=$(grep 'wall clock' /tmp/time_test_tmpfs.txt | awk '{print $NF}')
          user=$(grep 'User time' /tmp/time_test_tmpfs.txt | awk '{print $NF}')
          sys=$(grep 'System time' /tmp/time_test_tmpfs.txt | awk '{print $NF}')
          major_faults=$(grep 'Major.*page faults' /tmp/time_test_tmpfs.txt | awk '{print $NF}')
          fs_inputs=$(grep 'File system inputs' /tmp/time_test_tmpfs.txt | awk '{print $NF}')

          cached=$(grep -c '(cached)' test-output/test.log 2>/dev/null || true)
          total=$(grep -c '^ok ' test-output/test.log 2>/dev/null || true)

          {
            echo "| Metric | Value |"
            echo "|--------|-------|"
            echo "| Mode | \`tmpfs\` |"
            echo "| Total | \`${elapsed_ms}ms\` |"
            echo "| Wall | \`${wall}\` |"
            echo "| User | \`${user}\` |"
            echo "| Sys | \`${sys}\` |"
            echo "| Major faults | \`${major_faults}\` |"
            echo "| FS inputs | \`${fs_inputs}\` |"
            echo "| Test cache | \`${cached}/${total}\` |"
          } >> "$GITHUB_STEP_SUMMARY"
