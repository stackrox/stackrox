
name: emailsender-central-compatibility

on:
  push:
    branches:
      - master
    paths:
      - 'central/notifiers/email/**'
      - 'central/notifiers/acscsemail/**'
      - 'central/auth/m2m/**'
      - '.github/workflows/emailsender-central-compatibility.yaml'

  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - 'central/notifiers/email/**'
      - 'central/notifiers/acscsemail/**'
      - 'central/auth/m2m/**'
      - '.github/workflows/emailsender-central-compatibility.yaml'

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  e2e-test-on-kind:
    timeout-minutes: 60
    name: "Test on kind cluster"
    runs-on: ubuntu-latest
    if: ${{ !github.event.pull_request.head.repo.fork }} # do not run for PRs from forks
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Login to Quay.io
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # ratchet:docker/login-action@v4
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_RHACS_ENG_RO_USERNAME }}
          password: ${{ secrets.QUAY_RHACS_ENG_RO_PASSWORD }}
      - name: Checkout stackrox/acs-fleet-manager repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # ratchet:actions/checkout@v7.0.0
        with:
          repository: stackrox/acs-fleet-manager
          path: acs-fleet-manager
          ref: main
          fetch-depth: 0
      - name: Checkout stackrox/stackrox repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # ratchet:actions/checkout@v7.0.0
        with:
          repository: stackrox/stackrox
          ref: ${{ github.event.pull_request.head.sha }}
          path: stackrox
          fetch-depth: 0
      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # ratchet:actions/setup-go@v6
        with:
          # Version needs to be compatible with both repos. acs-fleet-manager's Go version usually gets bumped first
          go-version-file: acs-fleet-manager/go.mod
          cache: false  # rarely runs, and repo checkout is in stackrox/ subdir
      - uses: ./stackrox/.github/actions/job-preamble
        with:
          free-disk-space: 40
      - name: Create Kind cluster
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # ratchet:helm/kind-action@v1
        with:
          cluster_name: kind
          version: v0.32.0
      - name: Run Test
        env:
          IMG_WAIT_TIMEOUT_SECONDS: 2100
        run: acs-fleet-manager/scripts/ci/central_compatibility/entrypoint.sh
      - name: Upload logs
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # ratchet:actions/upload-artifact@v7
        if: failure()
        with:
          name: logs-directory-${{ github.sha }}
          path: logs/
          retention-days: 3
