
name: emailsender-central-compatibility

on:
  push:
    branches:
      - master
    paths:
      - 'central/notifiers/email/**'
      - 'central/notifiers/acscsemail/**'
      - 'central/auth/m2m/**'
      - '.github/workflows/emailsender-central-compatibility.yaml'

  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - 'central/notifiers/email/**'
      - 'central/notifiers/acscsemail/**'
      - 'central/auth/m2m/**'
      - '.github/workflows/emailsender-central-compatibility.yaml'

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  e2e-test-on-kind:
    timeout-minutes: 60
    name: "Test on kind cluster"
    runs-on: ubuntu-latest
    if: ${{ !github.event.pull_request.head.repo.fork }} # do not run for PRs from forks
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Login to Quay.io
        uses: docker/login-action@v3
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_RHACS_ENG_RO_USERNAME }}
          password: ${{ secrets.QUAY_RHACS_ENG_RO_PASSWORD }}
      - name: Checkout stackrox/acs-fleet-manager repository
        uses: actions/checkout@v6
        with:
          repository: stackrox/acs-fleet-manager
          path: acs-fleet-manager
          ref: main
          fetch-depth: 0
      - name: Checkout stackrox/stackrox repository
        uses: actions/checkout@v6
        with:
          repository: stackrox/stackrox
          ref: ${{ github.event.pull_request.head.sha }}
          path: stackrox
          fetch-depth: 0
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: stackrox/go.mod
          cache: false  # repo checkout is in stackrox/ subdir, setup-go can't find go.sum
      - uses: ./stackrox/.github/actions/job-preamble
        with:
          free-disk-space: 40
      - name: Create Kind cluster
        uses: helm/kind-action@v1
        with:
          cluster_name: kind
      - name: Pre-load multi-arch images into Kind
        run: |
          # kind load docker-image uses docker save | ctr import --all-platforms,
          # which fails on multi-arch OCI images (only one platform's blobs exist).
          # Pre-load images directly into the Kind node via ctr pull --platform,
          # then wrap kind to tolerate load failures for pre-loaded images.
          # See https://github.com/kubernetes-sigs/kind/issues/3795
          # Same approach as #19016 for sensor integration tests.
          TAG=$(make --no-print-directory -C stackrox tag)
          for img in quay.io/rhacs-eng/main:$TAG quay.io/rhacs-eng/central-db:$TAG; do
            echo "Waiting for $img ..."
            until docker exec kind-control-plane ctr -n k8s.io images pull \
              --user "${{ secrets.QUAY_RHACS_ENG_RO_USERNAME }}:${{ secrets.QUAY_RHACS_ENG_RO_PASSWORD }}" \
              --platform linux/amd64 \
              "$img" 2>/dev/null; do
              sleep 30
            done
          done
          # Make kind load non-fatal since multi-arch images are pre-loaded.
          # Locally-built single-arch images (emailsender) still load normally.
          REAL_KIND=$(which kind)
          sudo mv "$REAL_KIND" "${REAL_KIND}.real"
          printf '%s\n' \
            '#!/bin/bash' \
            'if [[ "$1" == "load" ]]; then' \
            '  "${0}.real" "$@" || echo "::warning::kind load failed (image may be pre-loaded)"' \
            '  exit 0' \
            'fi' \
            'exec "${0}.real" "$@"' \
            | sudo tee "$REAL_KIND" > /dev/null
          sudo chmod +x "$REAL_KIND"
      - name: Run Test
        env:
          IMG_WAIT_TIMEOUT_SECONDS: 2100
        run: acs-fleet-manager/scripts/ci/central_compatibility/entrypoint.sh
      - name: Upload logs
        uses: actions/upload-artifact@v6
        if: failure()
        with:
          name: logs-directory-${{ github.sha }}
          path: logs/
          retention-days: 3
