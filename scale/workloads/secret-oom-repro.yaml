# Secret OOM Reproduction Workload
#
# Reproduces the ResolveAllDeployments() amplification that caused sensor
# OOMKill at 64 GB. The customer cluster had:
#   - ~3,398 docker config secrets (image pull secrets)
#   - ~3,955 deployments
#   - Each docker config secret SYNC/CREATE/UPDATE triggers
#     ResolveAllDeployments() in the resolver, which individually resolves
#     every deployment: O(secrets × deployments).
#
# The secret manager sends waves of updates to ALL 3,000 docker config
# secrets every 60 seconds. Each wave triggers:
#   3,000 secrets × 1,000 deployments = 3,000,000 resolves.
#
# The resolver processes ~1,275 resolves/sec, so one wave takes ~2,350s
# (~39 min) to drain — but the next wave arrives after 60s. The resolver
# falls irreversibly behind. Memory grows until OOM.
#
# To reproduce (with PubSub disabled to match customer environment):
#   ROX_SENSOR_PUBSUB=false go run ./tools/local-sensor \
#       -with-fakeworkload scale/workloads/secret-oom-repro.yaml \
#       -with-metrics \
#       -with-pprof-server \
#       -duration 30m \
#       -skip-central-output
#
# Then monitor:
#   ./scale/workloads/secret-oom-repro-monitor.sh
#
# Expected behavior:
#   1. Deployments and secrets sync, resolver is calm
#   2. First wave of 3,000 secret updates hits
#   3. resolver_channel_size jumps and never fully drains
#   4. Memory grows continuously as RingGrowing buffer accumulates objects

numNamespaces: 700

nodeWorkload:
  numNodes: 50

rbacWorkload:
  numRoles: 200
  numServiceAccounts: 200
  numBindings: 200

# 3,000 docker config secrets. ALL are updated every 60s (simulating
# informer re-list). Each update triggers ResolveAllDeployments(1000).
# One wave = 3M resolves.
secretWorkload:
  numDockerCfgSecrets: 3000
  numOpaqueSecrets: 200
  updateInterval: 60s

deploymentWorkload:
- deploymentType: Deployment
  numDeployments: 1000
  numLabels: 5
  lifecycleDuration: 60m
  numLifecycles: 0
  updateInterval: 60s
  podWorkload:
    numPods: 3
    numContainers: 2
    containerWorkload:
      numImages: 20
    lifecycleDuration: 60s
    processWorkload:
      processInterval: 30s
      alertRate: 0.001

networkWorkload:
  batchSize: 50
  flowInterval: 10s
  generateUnclosedEndpoints: true
  openPortReuseProbability: 0.05
