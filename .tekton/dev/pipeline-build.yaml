apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: stackrox-build
  namespace: stackrox-dev
spec:
  description: |
    Build StackRox main image with custom code changes.
    Outputs image to dev-registry for manual deployment.

  params:
    - name: git-url
      type: string
      default: "https://github.com/stackrox/stackrox.git"
    - name: git-revision
      type: string
      default: "master"
    - name: image-tag
      type: string
      default: "dev"
    - name: base-image-tag
      type: string
      default: "latest"
      description: "Base image tag from quay.io/stackrox-io/main"

  workspaces:
    - name: source

  tasks:
    - name: fetch-source
      taskRef:
        resolver: cluster
        params:
          - name: kind
            value: task
          - name: name
            value: git-clone
          - name: namespace
            value: openshift-pipelines
      params:
        - name: URL
          value: $(params.git-url)
        - name: REVISION
          value: $(params.git-revision)
        - name: DELETE_EXISTING
          value: "true"
        - name: SUBMODULES
          value: "false"
      workspaces:
        - name: output
          workspace: source

    - name: build-central
      runAfter: [fetch-source]
      taskSpec:
        workspaces:
          - name: source
        steps:
          - name: build
            image: golang:1.25
            workingDir: $(workspaces.source.path)
            script: |
              #!/usr/bin/env bash
              set -euo pipefail

              # Get version info from status.sh
              echo "=== Getting version info ==="
              eval "$(./status.sh | sed 's/ /=/')"
              echo "MainVersion: ${STABLE_MAIN_VERSION}"

              # Build ldflags with version info
              VERSION_PKG="github.com/stackrox/rox/pkg/version/internal"
              LDFLAGS="-s -w"
              LDFLAGS="${LDFLAGS} -X '${VERSION_PKG}.MainVersion=${STABLE_MAIN_VERSION}'"
              LDFLAGS="${LDFLAGS} -X '${VERSION_PKG}.CollectorVersion=${STABLE_COLLECTOR_VERSION}'"
              LDFLAGS="${LDFLAGS} -X '${VERSION_PKG}.ScannerVersion=${STABLE_SCANNER_VERSION}'"
              LDFLAGS="${LDFLAGS} -X '${VERSION_PKG}.GitShortSha=${STABLE_GIT_SHORT_SHA}'"

              echo "=== Building central binary ==="
              CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build \
                -ldflags="${LDFLAGS}" \
                -o bin/central \
                ./central/main.go
              echo "Built: $(ls -lh bin/central)"

              echo "Building roxctl..."
              CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build \
                -ldflags="${LDFLAGS}" \
                -o bin/roxctl-linux-amd64 \
                ./roxctl/main.go
              echo "Built: $(ls -lh bin/roxctl-linux-amd64)"
      workspaces:
        - name: source
          workspace: source

    - name: build-image
      runAfter: [build-central]
      taskSpec:
        workspaces:
          - name: source
        params:
          - name: base-tag
            type: string
          - name: image-tag
            type: string
        results:
          - name: image-url
            description: Full image URL
        steps:
          - name: build
            image: quay.io/buildah/stable:latest
            workingDir: $(workspaces.source.path)
            securityContext:
              privileged: true
            script: |
              #!/usr/bin/env bash
              set -euo pipefail

              BASE_TAG="$(params.base-tag)"
              IMAGE_TAG="$(params.image-tag)"
              IMAGE_URL="registry.dev-registry.svc:5000/stackrox/main:${IMAGE_TAG}"

              echo "=== Building dev main image ==="
              echo "Base: quay.io/stackrox-io/main:${BASE_TAG}"
              echo "Output: ${IMAGE_URL}"

              # Copy binaries to temp dir (avoid .containerignore)
              mkdir -p /tmp/ctx
              cp bin/central /tmp/ctx/
              cp bin/roxctl-linux-amd64 /tmp/ctx/

              cat > /tmp/ctx/Dockerfile <<EOF
              FROM quay.io/stackrox-io/main:${BASE_TAG}
              COPY central /stackrox/central
              COPY roxctl-linux-amd64 /assets/downloads/cli/roxctl-linux-amd64
              EOF

              buildah bud -f /tmp/ctx/Dockerfile -t "${IMAGE_URL}" /tmp/ctx
              buildah push --tls-verify=false "${IMAGE_URL}"

              echo -n "${IMAGE_URL}" > $(results.image-url.path)
              echo ""
              echo "=== Image pushed ==="
              echo "Image: ${IMAGE_URL}"
      workspaces:
        - name: source
          workspace: source
      params:
        - name: base-tag
          value: $(params.base-image-tag)
        - name: image-tag
          value: $(params.image-tag)

    - name: print-instructions
      runAfter: [build-image]
      taskSpec:
        params:
          - name: image-url
            type: string
          - name: base-tag
            type: string
        steps:
          - name: print
            image: busybox
            script: |
              #!/bin/sh
              cat <<EOF

              ========================================
              BUILD COMPLETE
              ========================================

              Image: $(params.image-url)
              Base:  quay.io/stackrox-io/main:$(params.base-tag)

              To deploy manually:

              1. Create a KinD VM:
                 kubectl apply -f .tekton/dev/kind-vm.yaml

              2. Wait for VM and get kubeconfig:
                 VMI_IP=\$(kubectl get vmi -n stackrox-dev -o jsonpath='{.items[0].status.interfaces[0].ipAddress}')
                 curl http://\${VMI_IP}:8080/kubeconfig > /tmp/kubeconfig

              3. Deploy StackRox:
                 roxctl central generate k8s pvc \\
                   --main-image $(params.image-url) \\
                   --central-db-image quay.io/stackrox-io/central-db:$(params.base-tag)

              ========================================
              EOF
      params:
        - name: image-url
          value: $(tasks.build-image.results.image-url)
        - name: base-tag
          value: $(params.base-image-tag)
