apiVersion: v1
kind: ServiceAccount
metadata:
  name: stackrox-dev-sa
  namespace: stackrox-dev
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: stackrox-dev
rules:
  # KubeVirt VM lifecycle
  - apiGroups: ["kubevirt.io"]
    resources: ["virtualmachines", "virtualmachineinstances"]
    verbs: ["get", "list", "create", "delete", "watch", "patch"]
  # CDI DataVolumes
  - apiGroups: ["cdi.kubevirt.io"]
    resources: ["datavolumes"]
    verbs: ["get", "list", "create", "delete", "watch"]
  # Core resources
  - apiGroups: [""]
    resources: ["services", "pods", "namespaces", "persistentvolumeclaims"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: stackrox-dev
subjects:
  - kind: ServiceAccount
    name: stackrox-dev-sa
    namespace: stackrox-dev
roleRef:
  kind: ClusterRole
  name: stackrox-dev
  apiGroup: rbac.authorization.k8s.io
---
# Grant pipelines SCC to allow PVC write access
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: stackrox-dev-scc
  namespace: stackrox-dev
subjects:
  - kind: ServiceAccount
    name: stackrox-dev-sa
    namespace: stackrox-dev
roleRef:
  kind: ClusterRole
  name: pipelines-scc-clusterrole
  apiGroup: rbac.authorization.k8s.io
