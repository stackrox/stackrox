apiVersion: tekton.dev/v1
kind: PipelineRun

metadata:
  annotations:
    build.appstudio.openshift.io/repo: https://github.com/stackrox/stackrox?rev={{revision}}
    build.appstudio.redhat.com/commit_sha: '{{revision}}'
    build.appstudio.redhat.com/pull_request_number: '{{pull_request_number}}'
    build.appstudio.redhat.com/target_branch: '{{target_branch}}'
    pipelinesascode.tekton.dev/max-keep-runs: "500"
    pipelinesascode.tekton.dev/on-comment: "/konflux-retest operator-index-on-push"
    # TODO(ROX-21073): re-enable for all PR branches
    pipelinesascode.tekton.dev/on-cel-expression: |
      (
        event == "push" && target_branch.matches("^(master|release-.*|refs/tags/.*)$")
      ) || (
        event == "pull_request" && (
          target_branch.startsWith("release-") ||
          source_branch.matches("(konflux|renovate|appstudio|rhtap)") ||
          (has(body.pull_request) && has(body.pull_request.labels) && body.pull_request.labels.exists(l, l.name == "konflux-build"))
        ) && body.action != "ready_for_review"
      )
    # The empty `on-label` annotation is a workaround to make sure the pipeline gets triggered when the label gets first
    # added to the PR. See the Slack tread linked from ROX-30580.
    pipelinesascode.tekton.dev/on-label: "[]"
  labels:
    appstudio.openshift.io/application: acs-4-11
    pipelines.appstudio.openshift.io/type: build
  name: operator-index-on-push
  namespace: rh-acs-tenant

spec:

  params:
  - name: git-url
    value: '{{source_url}}'
  - name: image-expires-after
    value: '13w'
  - name: output-image-repo
    value: quay.io/rhacs-eng/stackrox-operator-index
  - name: revision
    value: '{{revision}}'
  - name: clone-depth
    value: '0'
  - name: clone-fetch-tags
    value: 'true'
  - name: bundle-image-repo
    value: quay.io/rhacs-eng/release-operator-bundle

  taskRunTemplate:
    serviceAccountName: build-pipeline-operator-bundle-4-11

  # The operator-index build waits for the operator-bundle to be built and pushed.
  # The timeout must account for:
  # 1. Bundle build timeout (3h20m from operator-bundle-build.yaml)
  # 2. Index build itself (~10-30 minutes)
  # Total: 3h20m + 30m = 3h50m
  timeouts:
    tasks: 3h50m
    finally: 10m
    pipeline: 4h

  workspaces:
  - name: git-auth
    secret:
      secretName: '{{ git_auth_secret }}'

  pipelineSpec:

    finally:
    - name: slack-notification
      params:
      - name: message
        value: ':x: `{{event_type}}` pipeline for <https://console.redhat.com/application-pipeline/workspaces/rh-acs/applications/acs/pipelineruns/$(context.pipelineRun.name)|$(context.pipelineRun.name)> (`$(params.output-image-repo)`, revision <$(params.git-url)/commit/$(params.revision)|$(params.revision)>) has failed.'
      - name: key-name
        value: 'acs-konflux-notifications'
      when:
      # Run when any task has Failed
      - input: $(tasks.status)
        operator: in
        values: [ "Failed" ]
      taskRef:
        params:
        - name: name
          value: slack-webhook-notification
        - name: bundle
          value: quay.io/konflux-ci/tekton-catalog/task-slack-webhook-notification:0.1@sha256:14766aebbf6f4739e1b7dde0406dcba2d1e300170d3b084f23df9fb074d87dc3
        - name: kind
          value: task
        resolver: bundles

    - name: show-summary
      params:
      - name: pipelinerun-name
        value: $(context.pipelineRun.name)
      - name: git-url
        value: $(tasks.clone-repository.results.url)?rev=$(tasks.clone-repository.results.commit)
      - name: image-url
        value: $(params.output-image-repo):$(tasks.determine-index-tag.results.INDEX_TAG)
      - name: build-task-status
        value: $(tasks.build-image-index.status)
      taskRef:
        params:
        - name: name
          value: summary
        - name: bundle
          value: quay.io/konflux-ci/tekton-catalog/task-summary:0.2@sha256:a009e5892e0ef23f8c45fe98a96d6c56aff3bdc0343d994f30661e56ff901253
        - name: kind
          value: task
        resolver: bundles

    - name: post-metric-end
      params:
      - name: AGGREGATE_TASKS_STATUS
        value: $(tasks.status)
      taskRef: &post-bigquery-metrics-ref
        params:
        - name: name
          value: post-bigquery-metrics
        - name: bundle
          value: quay.io/rhacs-eng/konflux-tasks:latest@sha256:69dccf80691e60c85b7650a8a5f0382d66a5fff98b46b4986fbf7e2bc47e5b1b
        - name: kind
          value: task
        resolver: bundles

    params:
    - description: Source Repository URL
      name: git-url
      type: string
    - default: ""
      description: Revision of the Source Repository
      name: revision
      type: string
    - description: Output Image Repository
      name: output-image-repo
      type: string
    - description: Image tag expiration time, time values could be something like
        1h, 2d, 3w for hours, days, and weeks, respectively.
      name: image-expires-after
      type: string
    - default: "0"
      description: Depth of the git clone in number of commits. Use "1" for shallow clone. Use "0" for deep clone, i.e. to fetch all commits.
      name: clone-depth
      type: string
    - default: "true"
      description: Fetch tags with git clone
      name: clone-fetch-tags
      type: string
    - default: "1d"
      description: This sets the expiration time for intermediate OCI artifacts produced and used during builds after which they can be garbage collected.
      name: oci-artifact-expires-after
      type: string
    - name: extra-labels
      type: array
      description: Additional labels to put on the built containers.
      default: []
    - default:
      - linux/amd64
      - linux/arm64
      - linux/ppc64le
      - linux/s390x
      description: >
        List of platforms to build the container images for. The available
        set of values is determined by the configuration of the multi-platform-controller
        on the cluster: https://konflux.pages.redhat.com/docs/users/getting-started/multi-platform-builds.html
      name: build-platforms
      type: array
    - name: bundle-image-repo
      description: Repository where the operator bundle image is pushed by operator-bundle-build.yaml.
      type: string
      default: "quay.io/rhacs-eng/release-operator-bundle"
    - name: buildah-format
      default: docker
      type: string
      description: The format for the resulting image's mediaType. Valid values are oci or docker.

    results:
    - description: ""
      name: IMAGE_URL
      value: $(tasks.build-image-index.results.IMAGE_URL)
    - description: ""
      name: IMAGE_DIGEST
      value: $(tasks.build-image-index.results.IMAGE_DIGEST)
    - description: ""
      name: CHAINS-GIT_URL
      value: $(tasks.clone-repository.results.url)
    - description: ""
      name: CHAINS-GIT_COMMIT
      value: $(tasks.clone-repository.results.commit)

    workspaces:
    - name: git-auth

    tasks:

    - name: post-metric-start
      taskRef: *post-bigquery-metrics-ref

    - name: clone-repository
      params:
      - name: url
        value: $(params.git-url)
      - name: revision
        value: $(params.revision)
      - name: depth
        value: $(params.clone-depth)
      - name: fetchTags
        value: $(params.clone-fetch-tags)
      - name: ociStorage
        value: $(params.output-image-repo):konflux-$(params.revision).git
      - name: ociArtifactExpiresAfter
        value: $(params.oci-artifact-expires-after)
      taskRef:
        params:
        - name: name
          value: git-clone-oci-ta
        - name: bundle
          value: quay.io/konflux-ci/tekton-catalog/task-git-clone-oci-ta:0.1@sha256:d30f13dd15daf89dd6dc645243b3444d35570d13f7840c3fd65e366022515205
        - name: kind
          value: task
        resolver: bundles
      workspaces:
      - name: basic-auth
        workspace: git-auth

    - name: determine-image-expiration
      params:
      - name: DEFAULT_IMAGE_EXPIRES_AFTER
        value: $(params.image-expires-after)
      - name: SOURCE_ARTIFACT
        value: $(tasks.clone-repository.results.SOURCE_ARTIFACT)
      taskRef:
        params:
        - name: name
          value: determine-image-expiration
        - name: bundle
          value: quay.io/rhacs-eng/konflux-tasks:latest@sha256:69dccf80691e60c85b7650a8a5f0382d66a5fff98b46b4986fbf7e2bc47e5b1b
        - name: kind
          value: task
        resolver: bundles

    - name: determine-image-tag
      params:
      - name: TAG_SUFFIX
        value: "-fast"
      - name: SOURCE_ARTIFACT
        value: $(tasks.clone-repository.results.SOURCE_ARTIFACT)
      taskRef:
        params:
        - name: name
          value: determine-image-tag
        - name: bundle
          value: quay.io/rhacs-eng/konflux-tasks:latest@sha256:69dccf80691e60c85b7650a8a5f0382d66a5fff98b46b4986fbf7e2bc47e5b1b
        - name: kind
          value: task
        resolver: bundles

    - name: determine-index-tag
      params:
      - name: BASE_TAG
        value: $(tasks.determine-image-tag.results.IMAGE_TAG)
      taskSpec:
        params:
        - name: BASE_TAG
          description: Base image tag from determine-image-tag task
          type: string
        results:
        - name: INDEX_TAG
          description: Full operator-index image tag with v prefix and -fast suffix to avoid collision with GHA builds
        steps:
        - name: compute-index-tag
          image: registry.access.redhat.com/ubi9-minimal:latest@sha256:ae09ecc3d754bc1726cbda3e2599cc7839e09fe1cc547ce173cf669b645be3cc
          script: |
            #!/bin/bash
            set -euo pipefail
            base_tag="$(params.BASE_TAG)"

            # Add "v" prefix and ensure "-fast" suffix
            # This ensures Konflux operator-index images never collide with GHA operator-index builds
            if [[ "${base_tag}" == *-fast ]]; then
              index_tag="v${base_tag}"
            else
              # No -fast suffix (e.g., from tagged builds where suffix was suppressed)
              index_tag="v${base_tag}-fast"
            fi

            echo -n "${index_tag}" | tee $(results.INDEX_TAG.path)

    - name: wait-for-bundle-image
      params:
      - name: IMAGE
        value: "$(params.bundle-image-repo):v$(tasks.determine-image-tag.results.IMAGE_TAG)"
      taskRef:
        params:
        - name: name
          value: wait-for-image
        - name: bundle
          value: quay.io/rhacs-eng/konflux-tasks:latest@sha256:69dccf80691e60c85b7650a8a5f0382d66a5fff98b46b4986fbf7e2bc47e5b1b
        - name: kind
          value: task
        resolver: bundles
      # This timeout must be the same as the pipeline timeout in `operator-bundle-build.yaml`.
      timeout: 3h20m

    - name: generate-index-content
      runAfter:
      - wait-for-bundle-image
      params:
      - name: BUNDLE_IMAGE
        value: "$(params.bundle-image-repo):v$(tasks.determine-image-tag.results.IMAGE_TAG)"
      - name: INDEX_IMAGE
        value: $(params.output-image-repo):$(tasks.determine-index-tag.results.INDEX_TAG)
      - name: SOURCE_ARTIFACT
        value: $(tasks.clone-repository.results.SOURCE_ARTIFACT)
      - name: ociStorage
        value: $(params.output-image-repo):konflux-$(params.revision).index-build
      - name: ociArtifactExpiresAfter
        value: $(params.oci-artifact-expires-after)
      taskSpec:
        description: >-
          Builds operator index (catalog) using opm tool. This task generates the index YAML
          and Dockerfile which are then used by buildah to create multi-platform images.
        params:
        - name: BUNDLE_IMAGE
          description: The operator bundle image to include in the index
          type: string
        - name: INDEX_IMAGE
          description: The target index image name
          type: string
        - name: SOURCE_ARTIFACT
          description: The Trusted Artifact URI pointing to the application source code.
          type: string
        - name: ociStorage
          description: The OCI repository where the index build artifacts will be stored temporarily.
          type: string
        - name: ociArtifactExpiresAfter
          description: Expiration time for the OCI artifacts.
          type: string
          default: "1d"
        results:
        - name: SOURCE_ARTIFACT
          description: The Trusted Artifact URI pointing to the index build directory with Dockerfile and YAML.
          type: string
        stepTemplate:
          volumeMounts:
          - mountPath: /var/workdir
            name: workdir
        steps:
        - name: use-trusted-artifact
          image: quay.io/redhat-appstudio/build-trusted-artifacts:latest@sha256:9b180776a41d9a22a1c51539f1647c60defbbd55b44bbebdd4130e33512d8b0d
          args:
          - use
          - $(params.SOURCE_ARTIFACT)=/var/workdir/source
        - name: build-index-content
          image: brew.registry.redhat.io/rh-osbs/openshift-golang-builder:rhel_9_golang_1.25@sha256:977bd041377a1367c8b102a460ae8e63f89905f7cf9d8235484ae658c9b47646
          workingDir: /var/workdir/source/operator
          securityContext:
            runAsUser: 0
          env:
          - name: BUNDLE_IMAGE
            value: $(params.BUNDLE_IMAGE)
          - name: INDEX_IMAGE
            value: $(params.INDEX_IMAGE)
          script: |
            #!/bin/bash
            set -euo pipefail

            echo "Building operator index for bundle: ${BUNDLE_IMAGE}"
            echo "Target index image: ${INDEX_IMAGE}"

            echo "Building yq..."
            GOFLAGS="-mod=mod" make yq
            export YQ="${PWD}/.gotools/bin/yq"

            # Use the existing build script to generate index content
            ./hack/build-index-image.sh \
              --index-tag "${INDEX_IMAGE}" \
              --bundle-tag "${BUNDLE_IMAGE}" \
              --single-bundle \
              --skip-build \
              --base-dir "."

            echo "Index content generated successfully"
        - name: create-trusted-artifact
          image: quay.io/redhat-appstudio/build-trusted-artifacts:latest@sha256:9b180776a41d9a22a1c51539f1647c60defbbd55b44bbebdd4130e33512d8b0d
          args:
          - create
          - --store
          - $(params.ociStorage)
          - $(results.SOURCE_ARTIFACT.path)=/var/workdir/source/operator/build/index
          env:
          - name: IMAGE_EXPIRES_AFTER
            value: $(params.ociArtifactExpiresAfter)
        volumes:
        - name: workdir
          emptyDir: {}

    - name: build-images
      runAfter:
      - generate-index-content
      matrix:
        params:
        - name: PLATFORM
          value:
          - $(params.build-platforms)
      params:
      - name: IMAGE
        value: $(params.output-image-repo):$(tasks.determine-index-tag.results.INDEX_TAG)
      - name: DOCKERFILE
        # The Dockerfile is generated in the build-index-image.sh script (via OPM generate dockerfile)
        value: rhacs-operator-index.Dockerfile
      - name: CONTEXT
        value: .
      - name: IMAGE_EXPIRES_AFTER
        value: $(tasks.determine-image-expiration.results.IMAGE_EXPIRES_AFTER)
      - name: COMMIT_SHA
        value: $(tasks.clone-repository.results.commit)
      - name: SOURCE_ARTIFACT
        value: $(tasks.generate-index-content.results.SOURCE_ARTIFACT)
      - name: BUILD_TIMESTAMP
        value: "$(tasks.clone-repository.results.commit-timestamp)"
      - name: LABELS
        value: ["$(params.extra-labels[*])"]
      - name: BUILDAH_FORMAT
        value: $(params.buildah-format)
      taskRef:
        params:
        - name: name
          value: buildah-oci-ta
        - name: bundle
          value: quay.io/konflux-ci/tekton-catalog/task-buildah-oci-ta:0.10@sha256:85102e448619f65a1fb7d4512660f8ec05677f99b724f1f838e1964545d7c857
        - name: kind
          value: task
        resolver: bundles

    - name: build-image-index
      params:
      - name: IMAGE
        value: $(params.output-image-repo):$(tasks.determine-index-tag.results.INDEX_TAG)
      - name: IMAGES
        value:
        - $(tasks.build-images.results.IMAGE_REF[*])
      - name: BUILDAH_FORMAT
        value: $(params.buildah-format)
      taskRef:
        params:
        - name: name
          value: build-image-index
        - name: bundle
          value: quay.io/konflux-ci/tekton-catalog/task-build-image-index:0.3@sha256:b33bfa8dc27dbf459f0779598ba45dcaa490bcc9f8efe1652bcf360ec8cb5582
        - name: kind
          value: task
        resolver: bundles
