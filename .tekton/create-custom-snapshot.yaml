apiVersion: tekton.dev/v1
kind: PipelineRun

metadata:
  annotations:
    build.appstudio.openshift.io/repo: https://github.com/stackrox/stackrox?rev={{revision}}
    build.appstudio.redhat.com/commit_sha: '{{revision}}'
    build.appstudio.redhat.com/pull_request_number: '{{pull_request_number}}'
    build.appstudio.redhat.com/target_branch: '{{target_branch}}'
    pipelinesascode.tekton.dev/max-keep-runs: "500"
    pipelinesascode.tekton.dev/on-comment: "/konflux-retest create-custom-snapshot"
    # Unlike other pipelines, this one is enabled for all PRs. See the description of determine-actual-build task.
    # The condition for a label is to make sure the konflux-build label addition activates this pipeline, same as others.
    # TODO(ROX-21073): re-enable for all PR branches
    pipelinesascode.tekton.dev/on-cel-expression: |
      (event == "push" && target_branch.matches("^(master|release-.*|refs/tags/.*)$")) ||
      (event == "pull_request" && body.action != "ready_for_review") ||
      (has(body.pull_request) && has(body.pull_request.labels) && body.pull_request.labels.exists(l, l.name == "konflux-build"))
    # The empty `on-label` annotation is a workaround to make sure the pipeline gets triggered when the label gets first
    # added to the PR. See the Slack tread linked from ROX-30580.
    pipelinesascode.tekton.dev/on-label: "[]"
  labels:
    appstudio.openshift.io/application: acs
  name: create-custom-snapshot
  namespace: rh-acs-tenant

spec:

  params:

  taskRunTemplate:
    serviceAccountName: build-pipeline-operator-bundle

  timeouts:
    tasks: 3h30m
    # Reserve time for final tasks to run.
    finally: 10m
    pipeline: 3h40m

  workspaces:
  - name: git-auth
    secret:
      secretName: '{{ git_auth_secret }}'

  pipelineSpec:

    finally:
    - name: slack-notification
      params:
      - name: message
        value: ':x: `{{event_type}}` pipeline for <https://konflux-ui.apps.stone-prd-rh01.pg1f.p1.openshiftapps.com/ns/$(context.pipelineRun.namespace)/pipelinerun/$(context.pipelineRun.name)|$(context.pipelineRun.name)> (revision <$(params.git-url)/commit/$(params.revision)|$(params.revision)>) has failed.'
      - name: key-name
        value: 'acs-konflux-notifications'
      when:
      # Run when any task has Failed
      - input: $(tasks.status)
        operator: in
        values: [ "Failed" ]
      taskRef:
        params:
        - name: name
          value: slack-webhook-notification
        - name: bundle
          value: quay.io/konflux-ci/tekton-catalog/task-slack-webhook-notification:0.1@sha256:14766aebbf6f4739e1b7dde0406dcba2d1e300170d3b084f23df9fb074d87dc3
        - name: kind
          value: task
        resolver: bundles

    - name: post-metric-end
      params:
      - name: AGGREGATE_TASKS_STATUS
        value: $(tasks.status)
      taskRef: &post-bigquery-metrics-ref
        params:
        - name: name
          value: post-bigquery-metrics
        - name: bundle
          value: quay.io/rhacs-eng/konflux-tasks:latest@sha256:d81002767dc80ff7560f371ff6a6ebe3c46b465690624e2e4519e971ae64a7d3
        - name: kind
          value: task
        resolver: bundles

    params:
    - name: integration-test-scenario
      default: "acs-conforma-prod-like"
      description: Name of the IntegrationTestScenario to trigger for the created Snapshot.
      type: string
    - name: git-url
      default: "{{source_url}}"
      description: Source Repository URL.
      type: string
    - name: revision
      default: "{{revision}}"
      description: Revision of the Source Repository.
      type: string
    - name: bundle-image-repo
      default: quay.io/rhacs-eng/release-operator-bundle
      description: Repo of the operator bundle image, used to store OCI artifact with source code.
      type: string
    - name: oci-artifact-expires-after
      default: "1d"
      description: This sets the expiration time for intermediate OCI artifacts produced and used during builds after
        which they can be garbage collected.
      type: string
    - name: output-tag-suffix
      default: "-fast"
      description: Suffix that's appended to the operator-bundle's image tag.
      type: string

    results:
    - description: Name of the custom Snapshot created.
      name: SNAPSHOT_NAME
      value: $(tasks.create-acs-style-snapshot.results.SNAPSHOT_NAME)

    workspaces:
    - name: git-auth

    tasks:

    - name: post-metric-start
      taskRef: *post-bigquery-metrics-ref

    - name: determine-actual-build
      taskSpec:
        description: |
          Determines whether the actual tasks in the pipeline should be skipped or executed.
          Tasks will be skipped on PRs where Konflux builds aren't enabled (TODO: ROX-21073), see
          `pipelinesascode.tekton.dev/on-cel-expression` annotation in `*-build.yaml` files.
          This all is needed because we want to always run this `create-custom-snapshot` pipeline and make it part of
          required GitHub checks in branch protection rules.
        results:
        - name: SHOULD_REALLY_WORK
        steps:
        - name: determine
          image: registry.redhat.io/ubi9-minimal:latest@sha256:12db9874bd753eb98b1ab3d840e75de5d6842ac0604fbd68c012adefe97140be
          # The script expresses the same condition as pipelinesascode.tekton.dev/on-cel-expression in other pipelines
          # but in a more verbose way because, as it turns out, both syntax and fields of CEL expressions are slightly
          # different.
          script: |
            set -euo pipefail

            function assert_boolean() {
              if [[ "${2:-}" != "" ]]; then
                echo "${2}"
              fi
              echo "${1}: ${!1}"
              if [[ "${!1}" != "true" && "${!1}" != "false" ]]; then
                >&2 echo "Error: not a boolean value: ${!1}"
                exit 2
              fi
            }

            is_pull_request="true"
            if [[ '{{ cel: target_branch }}' == '{{ cel: source_branch }}' ]]; then
              is_pull_request="false"
            fi
            assert_boolean is_pull_request

            is_matching_target_branch='{{ cel: target_branch.startsWith("release-") }}'
            assert_boolean is_matching_target_branch "target_branch: {{ target_branch }}"

            is_matching_source_branch='{{ cel: source_branch.matches("(konflux|renovate|appstudio|rhtap)") }}'
            assert_boolean is_matching_source_branch "source_branch: {{ source_branch }}"

            # The label will be findable this way for pull request events.
            has_konflux_build_label_as_pr='{{ cel: has(body.pull_request) && has(body.pull_request.labels) && body.pull_request.labels.exists(l, l.name == "konflux-build") }}'
            assert_boolean has_konflux_build_label_as_pr

            # The label will be findable this way on PRs for /test comments and alike.
            has_konflux_build_label_as_issue='{{ cel: has(body.issue) && has(body.issue.labels) && body.issue.labels.exists(l, l.name == "konflux-build") }}'
            assert_boolean has_konflux_build_label_as_issue

            result="false"
            if [[ "${is_pull_request}" != "true" || \
                "${is_matching_target_branch}" == "true" || \
                "${is_matching_source_branch}" == "true" || \
                "${has_konflux_build_label_as_pr}" == "true" || \
                "${has_konflux_build_label_as_issue}" == "true" ]]; then
              result="true"
            fi
            echo -n "The result is: "
            echo -n "${result}" | tee "$(results.SHOULD_REALLY_WORK.path)"

    - name: clone-repository
      retries: 3
      params:
      - name: url
        value: $(params.git-url)
      - name: revision
        value: $(params.revision)
      - name: depth
        value: "0"
      - name: fetchTags
        value: "true"
      - name: ociStorage
        value: $(params.bundle-image-repo):konflux-custom-snapshot-$(params.revision).git
      - name: ociArtifactExpiresAfter
        value: $(params.oci-artifact-expires-after)
      taskRef:
        params:
        - name: name
          value: git-clone-oci-ta
        - name: bundle
          value: quay.io/konflux-ci/tekton-catalog/task-git-clone-oci-ta:0.1@sha256:13d49df7dc9ae301627e45f95a236011422996152f1bea46cd60217b0f057407
        - name: kind
          value: task
        resolver: bundles
      workspaces:
      - name: basic-auth
        workspace: git-auth
      when:
      - input: $(tasks.determine-actual-build.results.SHOULD_REALLY_WORK)
        operator: in
        values: [ "true" ]

    - name: determine-image-tag
      params:
      - name: TAG_SUFFIX
        value: $(params.output-tag-suffix)
      - name: SOURCE_ARTIFACT
        value: $(tasks.clone-repository.results.SOURCE_ARTIFACT)
      taskRef:
        params:
        - name: name
          value: determine-image-tag
        - name: bundle
          value: quay.io/rhacs-eng/konflux-tasks:latest@sha256:d81002767dc80ff7560f371ff6a6ebe3c46b465690624e2e4519e971ae64a7d3
        - name: kind
          value: task
        resolver: bundles
      when:
      - input: $(tasks.determine-actual-build.results.SHOULD_REALLY_WORK)
        operator: in
        values: [ "true" ]

    - name: wait-for-bundle-image
      params:
      - name: IMAGE
        value: "$(params.bundle-image-repo):v$(tasks.determine-image-tag.results.IMAGE_TAG)"
      taskSpec:
        params:
        - name: IMAGE
          description: Image reference.
          type: string
        results:
        - name: IMAGE_DIGEST
          description: Image digest in the format `sha256:abcdef0123`.
        - name: GIT_REF
          description: Git commit from `vcs-ref` image label.
        - name: GIT_REPO
          description: Git repository URL from `source-location` image label.
        steps:
        - name: wait-for-image
          image: quay.io/konflux-ci/release-service-utils:latest@sha256:52b4ab39bcbce444712afd0c2700dcda36be6c4a36e0c8a8db87a45e615326a7
          computeResources:
            requests:
              memory: 8Mi
              cpu: 10m
            limits:
              memory: 64Mi
          env:
          - name: DESIRED_GIT_REF
            valueFrom:
              fieldRef:
                fieldPath: metadata.labels['pipelinesascode.tekton.dev/sha']
          - name: REPOSITORY_URL
            valueFrom:
              fieldRef:
                fieldPath: metadata.annotations['pipelinesascode.tekton.dev/repo-url']
          script: |
            #!/usr/bin/env bash
            set -euo pipefail
            IMAGE="$(params.IMAGE)"
            _registry="${IMAGE%%/*}"; _rest="${IMAGE#*/}"; _repo="${_rest%%:*}"; _tag="${_rest##*:}"
            _auth_file=""; for f in /tekton/creds/.docker/config.json "${HOME}/.docker/config.json"; do [ -f "$f" ] && _auth_file="$f" && break; done
            _get_bearer_token() {
              local challenge; challenge="$(curl -sI "https://${_registry}/v2/${_repo}/manifests/${_tag}" | tr -d '\r' | grep -i www-authenticate)" || true
              local realm; realm="$(echo "$challenge" | sed -n 's/.*realm="\([^"]*\)".*/\1/p')"
              local service; service="$(echo "$challenge" | sed -n 's/.*service="\([^"]*\)".*/\1/p')"
              local scope; scope="$(echo "$challenge" | sed -n 's/.*scope="\([^"]*\)".*/\1/p')"
              [ -z "$realm" ] && echo "" && return
              local basic_auth=""; [ -n "$_auth_file" ] && basic_auth="$(jq -r ".auths[\"${_registry}\"].auth // empty" "$_auth_file" 2>/dev/null)" || true
              if [ -n "$basic_auth" ]; then curl -sf -H "Authorization: Basic ${basic_auth}" "${realm}?service=${service}&scope=${scope}" | jq -r '.token'
              else curl -sf "${realm}?service=${service}&scope=${scope}" | jq -r '.token'; fi
            }
            echo "Waiting for image ${IMAGE} (lightweight curl polling)..."
            _token=""; _token_time=0
            while true; do
              _now="$(date +%s)"
              [ -z "$_token" ] || [ $((_now - _token_time)) -gt 300 ] && { _token="$(_get_bearer_token)" || true; _token_time="$_now"; }
              _http="$(curl -sf -o /dev/null -w '%{http_code}' -H "Authorization: Bearer ${_token}" -H 'Accept: application/vnd.oci.image.index.v1+json,application/vnd.docker.distribution.manifest.v2+json,application/vnd.docker.distribution.manifest.list.v2+json' "https://${_registry}/v2/${_repo}/manifests/${_tag}" 2>/dev/null)" || _http="000"
              [ "$_http" = "200" ] && { >&2 echo "INFO: Image tag found, verifying with skopeo..."; break; }
              >&2 echo "INFO: Image not found yet (HTTP ${_http}): ${IMAGE}."; sleep 1m
            done
            while true; do
              raw_info="$(skopeo inspect --retry-times 10 --format '{{.Digest}} {{ index .Labels "vcs-ref" }} {{ index .Labels "source-location" }}' --no-tags "docker://${IMAGE}" 2>/dev/null)" && break
              >&2 echo "INFO: skopeo inspect failed, retrying..."; sleep 1m
            done
            infos=( $raw_info ); [ "${#infos[@]}" -ne 3 ] && { >&2 echo "ERROR: Missing image labels."; exit 1; }
            digest="${infos[0]}"; git_ref_from_label="${infos[1]}"; repository_from_label="${infos[2]}"
            IMAGE_WITH_DIGEST="${IMAGE}@${digest}"
            if [[ "${repository_from_label}" == "${REPOSITORY_URL}" && "${git_ref_from_label}" != "${DESIRED_GIT_REF}" ]]; then
              while true; do
                raw_info="$(skopeo inspect --retry-times 10 --format '{{.Digest}} {{ index .Labels "vcs-ref" }} {{ index .Labels "source-location" }}' --no-tags "docker://${IMAGE}")"; infos=( $raw_info )
                digest="${infos[0]}"; git_ref_from_label="${infos[1]}"; repository_from_label="${infos[2]}"; IMAGE_WITH_DIGEST="${IMAGE}@${digest}"
                [[ "${git_ref_from_label}" == "${DESIRED_GIT_REF}" ]] && break; sleep 1m
              done
            fi
            echo -n "${digest}" | tee "$(results.IMAGE_DIGEST.path)"; echo
            echo -n "${git_ref_from_label}" | tee "$(results.GIT_REF.path)"; echo
            echo -n "${repository_from_label}" | tee "$(results.GIT_REPO.path)"; echo
            echo "Waiting for attestation for ${IMAGE_WITH_DIGEST}..."
            while true; do cosign tree "${IMAGE_WITH_DIGEST}" | grep -qE "quay.io/.*:sha256-.*\.att$" && break; sleep 1m; done
            no_success="$(cosign download attestation "${IMAGE_WITH_DIGEST}" | jq -r '.payload' | base64 -d | jq '.predicate.buildConfig.tasks | [ .[] | select(.status != "Succeeded") ] | length')"
            [ "${no_success}" -gt 0 ] && { >&2 echo "ERROR: Task(s) failed during build of ${IMAGE_WITH_DIGEST}."; exit 1; }
            echo "Pipeline for ${IMAGE_WITH_DIGEST} finished successfully."
      # The timemout should be kept in sync with the pipeline timeout in the operator-bundle-build.yaml
      timeout: 3h25m
      when:
      - input: $(tasks.determine-actual-build.results.SHOULD_REALLY_WORK)
        operator: in
        values: [ "true" ]

    - name: create-acs-style-snapshot
      params:
      - name: OPERATOR_BUNDLE_IMAGE
        value: $(params.bundle-image-repo)@$(tasks.wait-for-bundle-image.results.IMAGE_DIGEST)
      - name: PRODUCT_VERSION
        value: $(tasks.determine-image-tag.results.IMAGE_TAG)
      - name: INTEGRATION_TEST_SCENARIO
        value: $(params.integration-test-scenario)
      - name: COMPONENT_MAPPINGS
        value: |
          [
            {
              "externalRepo": "registry.redhat.io/advanced-cluster-security/rhacs-central-db-rhel9",
              "internalRepo": "quay.io/rhacs-eng/release-central-db",
              "component": "central-db"
            },
            {
              "externalRepo": "registry.redhat.io/advanced-cluster-security/rhacs-collector-rhel9",
              "internalRepo": "quay.io/rhacs-eng/release-collector",
              "component": "collector"
            },
            {
              "externalRepo": "registry.redhat.io/advanced-cluster-security/rhacs-fact-rhel9",
              "internalRepo": "quay.io/rhacs-eng/release-fact",
              "component": "fact"
            },
            {
              "externalRepo": "registry.redhat.io/advanced-cluster-security/rhacs-main-rhel9",
              "internalRepo": "quay.io/rhacs-eng/release-main",
              "component": "main"
            },
            {
              "externalRepo": "registry.redhat.io/advanced-cluster-security/rhacs-operator-bundle",
              "internalRepo": "quay.io/rhacs-eng/release-operator-bundle",
              "component": "operator-bundle"
            },
            {
              "externalRepo": "registry.redhat.io/advanced-cluster-security/rhacs-rhel9-operator",
              "internalRepo": "quay.io/rhacs-eng/release-operator",
              "component": "operator"
            },
            {
              "externalRepo": "registry.redhat.io/advanced-cluster-security/rhacs-roxctl-rhel9",
              "internalRepo": "quay.io/rhacs-eng/release-roxctl",
              "component": "roxctl"
            },
            {
              "externalRepo": "registry.redhat.io/advanced-cluster-security/rhacs-scanner-db-rhel9",
              "internalRepo": "quay.io/rhacs-eng/release-scanner-db",
              "component": "scanner-db"
            },
            {
              "externalRepo": "registry.redhat.io/advanced-cluster-security/rhacs-scanner-db-slim-rhel9",
              "internalRepo": "quay.io/rhacs-eng/release-scanner-db-slim",
              "component": "scanner-db-slim"
            },
            {
              "externalRepo": "registry.redhat.io/advanced-cluster-security/rhacs-scanner-rhel9",
              "internalRepo": "quay.io/rhacs-eng/release-scanner",
              "component": "scanner"
            },
            {
              "externalRepo": "registry.redhat.io/advanced-cluster-security/rhacs-scanner-slim-rhel9",
              "internalRepo": "quay.io/rhacs-eng/release-scanner-slim",
              "component": "scanner-slim"
            },
            {
              "externalRepo": "registry.redhat.io/advanced-cluster-security/rhacs-scanner-v4-db-rhel9",
              "internalRepo": "quay.io/rhacs-eng/release-scanner-v4-db",
              "component": "scanner-v4-db"
            },
            {
              "externalRepo": "registry.redhat.io/advanced-cluster-security/rhacs-scanner-v4-rhel9",
              "internalRepo": "quay.io/rhacs-eng/release-scanner-v4",
              "component": "scanner-v4"
            }
          ]
      taskRef:
        params:
        - name: name
          value: create-snapshot-from-bundle
        - name: bundle
          value: quay.io/rhacs-eng/konflux-tasks:latest@sha256:d81002767dc80ff7560f371ff6a6ebe3c46b465690624e2e4519e971ae64a7d3
        - name: kind
          value: task
        resolver: bundles
      when:
      - input: $(tasks.determine-actual-build.results.SHOULD_REALLY_WORK)
        operator: in
        values: [ "true" ]
