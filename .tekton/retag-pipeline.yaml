apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: retag-pipeline
spec:

  finally:
  - name: slack-notification
    params:
    - name: message
      value: ':x: `{{event_type}}` pipeline for <https://konflux-ui.apps.stone-prd-rh01.pg1f.p1.openshiftapps.com/ns/$(context.pipelineRun.namespace)/pipelinerun/$(context.pipelineRun.name)|$(context.pipelineRun.name)> (`$(params.output-image-repo)`, revision <$(params.git-url)/commit/$(params.revision)|$(params.revision)>) has failed.'
    - name: key-name
      value: 'acs-konflux-notifications'
    when:
    # Run when any task has Failed
    - input: $(tasks.status)
      operator: in
      values: [ "Failed" ]
    taskRef:
      params:
      - name: name
        value: slack-webhook-notification
      - name: bundle
        value: quay.io/konflux-ci/tekton-catalog/task-slack-webhook-notification:0.1@sha256:14766aebbf6f4739e1b7dde0406dcba2d1e300170d3b084f23df9fb074d87dc3
      - name: kind
        value: task
      resolver: bundles

  - name: post-metric-end
    params:
    - name: AGGREGATE_TASKS_STATUS
      value: $(tasks.status)
    taskRef: &post-bigquery-metrics-ref
      params:
      - name: name
        value: post-bigquery-metrics
      - name: bundle
        value: quay.io/rhacs-eng/konflux-tasks:latest@sha256:d81002767dc80ff7560f371ff6a6ebe3c46b465690624e2e4519e971ae64a7d3
      - name: kind
        value: task
      resolver: bundles

  params:
  - description: Source Repository URL.
    name: git-url
    type: string
  - description: Revision of the Source Repository.
    name: revision
    type: string
  - description: Output Image Repository.
    name: output-image-repo
    type: string
  - default: "-fast"
    description: Suffix that's appended to generated image tags (both input and output).
    name: image-tag-suffix
    type: string
  - description: Input Image Repository.
    name: input-image-repo
    type: string
  - description: Makefile target to execute in order to determine the input image's tag.
    name: input-image-tag-makefile-target
    type: string

  # Common params for all retagging pipelines.
  - default: "0"
    description: Depth of the git clone in number of commits. Use "1" for shallow clone. Use "0" for deep clone, i.e. to fetch all commits.
    name: clone-depth
    type: string
  - default: "true"
    description: Fetch tags with git clone
    name: clone-fetch-tags
    type: string
  - default: "1d"
    description: This sets the expiration time for intermediate OCI artifacts produced and used during builds after which they can be garbage collected.
    name: oci-artifact-expires-after
    type: string

  results:
  # *IMAGE_URL and *IMAGE_DIGEST must not be declared here because Tekton Chains will overwrite the original pipeline
  # information linked to the image with this pipeline's info, and it will most certainly fail EC checks.

  # These result parameters are to make retagged image's info conveniently displayed in Konflux UI.
  - name: RESULTING_DIGEST
    description: Digest of the output image (will be the same as of the input one).
    value: $(tasks.retag-image.results.RESULTING_DIGEST)
  - name: RESULTING_URL
    description: Image repository and tag of the output image.
    value: $(tasks.retag-image.results.RESULTING_URL)
  - name: RESULTING_REF
    description: Image reference of the output image containing both the repository, the tag and the digest.
    value: $(tasks.retag-image.results.RESULTING_REF)

  workspaces:
  - name: git-auth

  tasks:

  - name: post-metric-start
    taskRef: *post-bigquery-metrics-ref

  - name: clone-repository
    retries: 3
    params:
    - name: url
      value: $(params.git-url)
    - name: revision
      value: $(params.revision)
    - name: depth
      value: $(params.clone-depth)
    - name: fetchTags
      value: $(params.clone-fetch-tags)
    - name: ociStorage
      value: $(params.output-image-repo):konflux-$(params.revision).git
    - name: ociArtifactExpiresAfter
      value: $(params.oci-artifact-expires-after)
    taskRef:
      params:
      - name: name
        value: git-clone-oci-ta
      - name: bundle
        value: quay.io/konflux-ci/tekton-catalog/task-git-clone-oci-ta:0.1@sha256:13d49df7dc9ae301627e45f95a236011422996152f1bea46cd60217b0f057407
      - name: kind
        value: task
      resolver: bundles
    workspaces:
    - name: basic-auth
      workspace: git-auth

  - name: determine-output-image-tag
    params:
    - name: TAG_SUFFIX
      value: $(params.image-tag-suffix)
    - name: SOURCE_ARTIFACT
      value: $(tasks.clone-repository.results.SOURCE_ARTIFACT)
    taskRef:
      params:
      - name: name
        value: determine-image-tag
      - name: bundle
        value: quay.io/rhacs-eng/konflux-tasks:latest@sha256:d81002767dc80ff7560f371ff6a6ebe3c46b465690624e2e4519e971ae64a7d3
      - name: kind
        value: task
      resolver: bundles

  - name: determine-input-image-tag
    params:
    - name: MAKEFILE_TARGET
      value: $(params.input-image-tag-makefile-target)
    - name: TAG_SUFFIX
      value: $(params.image-tag-suffix)
    - name: SOURCE_ARTIFACT
      value: $(tasks.clone-repository.results.SOURCE_ARTIFACT)
    taskRef:
      params:
      - name: name
        value: determine-dependency-image-tag
      - name: bundle
        value: quay.io/rhacs-eng/konflux-tasks:latest@sha256:d81002767dc80ff7560f371ff6a6ebe3c46b465690624e2e4519e971ae64a7d3
      - name: kind
        value: task
      resolver: bundles

    # We only check the input image is ready and otherwise fail the retag pipeline early and with a meaningful error.
    # This confirms that the image is present and that it has successfully passed its build pipeline.
  - name: wait-for-image
    params:
    - name: IMAGE
      value: "$(params.input-image-repo):$(tasks.determine-input-image-tag.results.IMAGE_TAG)"
    taskSpec:
      params:
      - name: IMAGE
        description: Image reference.
        type: string
      results:
      - name: IMAGE_DIGEST
        description: Image digest in the format `sha256:abcdef0123`.
      - name: GIT_REF
        description: Git commit from `vcs-ref` image label.
      - name: GIT_REPO
        description: Git repository URL from `source-location` image label.
      steps:
      - name: wait-for-image
        image: quay.io/konflux-ci/release-service-utils:latest@sha256:52b4ab39bcbce444712afd0c2700dcda36be6c4a36e0c8a8db87a45e615326a7
        computeResources:
          requests:
            memory: 8Mi
            cpu: 10m
          limits:
            memory: 64Mi
        env:
        - name: DESIRED_GIT_REF
          valueFrom:
            fieldRef:
              fieldPath: metadata.labels['pipelinesascode.tekton.dev/sha']
        - name: REPOSITORY_URL
          valueFrom:
            fieldRef:
              fieldPath: metadata.annotations['pipelinesascode.tekton.dev/repo-url']
        script: |
          #!/usr/bin/env bash
          set -euo pipefail
          IMAGE="$(params.IMAGE)"
          _registry="${IMAGE%%/*}"; _rest="${IMAGE#*/}"; _repo="${_rest%%:*}"; _tag="${_rest##*:}"
          _auth_file=""; for f in /tekton/creds/.docker/config.json "${HOME}/.docker/config.json"; do [ -f "$f" ] && _auth_file="$f" && break; done
          _get_bearer_token() {
            local challenge; challenge="$(curl -sI "https://${_registry}/v2/${_repo}/manifests/${_tag}" | tr -d '\r' | grep -i www-authenticate)" || true
            local realm; realm="$(echo "$challenge" | sed -n 's/.*realm="\([^"]*\)".*/\1/p')"
            local service; service="$(echo "$challenge" | sed -n 's/.*service="\([^"]*\)".*/\1/p')"
            local scope; scope="$(echo "$challenge" | sed -n 's/.*scope="\([^"]*\)".*/\1/p')"
            [ -z "$realm" ] && echo "" && return
            local basic_auth=""; [ -n "$_auth_file" ] && basic_auth="$(jq -r ".auths[\"${_registry}\"].auth // empty" "$_auth_file" 2>/dev/null)" || true
            if [ -n "$basic_auth" ]; then curl -sf -H "Authorization: Basic ${basic_auth}" "${realm}?service=${service}&scope=${scope}" | jq -r '.token'
            else curl -sf "${realm}?service=${service}&scope=${scope}" | jq -r '.token'; fi
          }
          echo "Waiting for image ${IMAGE} (lightweight curl polling)..."
          _token=""; _token_time=0
          while true; do
            _now="$(date +%s)"
            [ -z "$_token" ] || [ $((_now - _token_time)) -gt 300 ] && { _token="$(_get_bearer_token)" || true; _token_time="$_now"; }
            _http="$(curl -sf -o /dev/null -w '%{http_code}' -H "Authorization: Bearer ${_token}" -H 'Accept: application/vnd.oci.image.index.v1+json,application/vnd.docker.distribution.manifest.v2+json,application/vnd.docker.distribution.manifest.list.v2+json' "https://${_registry}/v2/${_repo}/manifests/${_tag}" 2>/dev/null)" || _http="000"
            [ "$_http" = "200" ] && { >&2 echo "INFO: Image tag found, verifying with skopeo..."; break; }
            >&2 echo "INFO: Image not found yet (HTTP ${_http}): ${IMAGE}."; sleep 1m
          done
          while true; do
            raw_info="$(skopeo inspect --retry-times 10 --format '{{.Digest}} {{ index .Labels "vcs-ref" }} {{ index .Labels "source-location" }}' --no-tags "docker://${IMAGE}" 2>/dev/null)" && break
            >&2 echo "INFO: skopeo inspect failed, retrying..."; sleep 1m
          done
          infos=( $raw_info ); [ "${#infos[@]}" -ne 3 ] && { >&2 echo "ERROR: Missing image labels."; exit 1; }
          digest="${infos[0]}"; git_ref_from_label="${infos[1]}"; repository_from_label="${infos[2]}"
          IMAGE_WITH_DIGEST="${IMAGE}@${digest}"
          if [[ "${repository_from_label}" == "${REPOSITORY_URL}" && "${git_ref_from_label}" != "${DESIRED_GIT_REF}" ]]; then
            while true; do
              raw_info="$(skopeo inspect --retry-times 10 --format '{{.Digest}} {{ index .Labels "vcs-ref" }} {{ index .Labels "source-location" }}' --no-tags "docker://${IMAGE}")"; infos=( $raw_info )
              digest="${infos[0]}"; git_ref_from_label="${infos[1]}"; repository_from_label="${infos[2]}"; IMAGE_WITH_DIGEST="${IMAGE}@${digest}"
              [[ "${git_ref_from_label}" == "${DESIRED_GIT_REF}" ]] && break; sleep 1m
            done
          fi
          echo -n "${digest}" | tee "$(results.IMAGE_DIGEST.path)"; echo
          echo -n "${git_ref_from_label}" | tee "$(results.GIT_REF.path)"; echo
          echo -n "${repository_from_label}" | tee "$(results.GIT_REPO.path)"; echo
          echo "Waiting for attestation for ${IMAGE_WITH_DIGEST}..."
          while true; do cosign tree "${IMAGE_WITH_DIGEST}" | grep -qE "quay.io/.*:sha256-.*\.att$" && break; sleep 1m; done
          no_success="$(cosign download attestation "${IMAGE_WITH_DIGEST}" | jq -r '.payload' | base64 -d | jq '.predicate.buildConfig.tasks | [ .[] | select(.status != "Succeeded") ] | length')"
          [ "${no_success}" -gt 0 ] && { >&2 echo "ERROR: Task(s) failed during build of ${IMAGE_WITH_DIGEST}."; exit 1; }
          echo "Pipeline for ${IMAGE_WITH_DIGEST} finished successfully."
    timeout: 5m

  - name: retag-image
    retries: 3
    # runAfter needs to be specified, because there is no implicit dependency on wait-for-image's
    # results, but we still need it to run before.
    runAfter:
    - wait-for-image
    params:
    - name: INPUT_IMAGE_REPO
      value: $(params.input-image-repo)
    - name: INPUT_IMAGE_TAG
      value: $(tasks.determine-input-image-tag.results.IMAGE_TAG)
    - name: OUTPUT_IMAGE_REPO
      value: $(params.output-image-repo)
    - name: OUTPUT_IMAGE_TAG
      value: $(tasks.determine-output-image-tag.results.IMAGE_TAG)
    taskRef:
      params:
      - name: name
        value: retag-image
      - name: bundle
        value: quay.io/rhacs-eng/konflux-tasks:latest@sha256:d81002767dc80ff7560f371ff6a6ebe3c46b465690624e2e4519e971ae64a7d3
      - name: kind
        value: task
      resolver: bundles
