apiVersion: tekton.dev/v1
kind: PipelineRun

metadata:
  annotations:
    build.appstudio.openshift.io/repo: https://github.com/stackrox/stackrox?rev={{revision}}
    build.appstudio.redhat.com/commit_sha: '{{revision}}'
    build.appstudio.redhat.com/pull_request_number: '{{pull_request_number}}'
    build.appstudio.redhat.com/target_branch: '{{target_branch}}'
    pipelinesascode.tekton.dev/max-keep-runs: "500"
    pipelinesascode.tekton.dev/on-comment: "/konflux-retest operator-bundle-on-push"
    # TODO(ROX-21073): re-enable for all PR branches
    pipelinesascode.tekton.dev/on-cel-expression: |
      (
        event == "push" && target_branch.matches("^(master|release-.*|refs/tags/.*)$")
      ) || (
        event == "pull_request" && (
          target_branch.startsWith("release-") ||
          source_branch.matches("(konflux|renovate|appstudio|rhtap)") ||
          (has(body.pull_request) && has(body.pull_request.labels) && body.pull_request.labels.exists(l, l.name == "konflux-build"))
        ) && body.action != "ready_for_review"
      )
    # The empty `on-label` annotation is a workaround to make sure the pipeline gets triggered when the label gets first
    # added to the PR. See the Slack tread linked from ROX-30580.
    pipelinesascode.tekton.dev/on-label: "[]"
  labels:
    appstudio.openshift.io/application: acs
    appstudio.openshift.io/component: operator-bundle
    pipelines.appstudio.openshift.io/type: build
  name: operator-bundle-on-push
  namespace: rh-acs-tenant

spec:

  params:
  - name: dockerfile
    value: operator/konflux.bundle.Dockerfile
  - name: git-url
    value: '{{source_url}}'
  - name: image-expires-after
    value: '13w'
  - name: output-image-repo
    value: quay.io/rhacs-eng/release-operator-bundle
  - name: revision
    value: '{{revision}}'
  - name: rebuild
    value: 'true'
  - name: hermetic
    value: 'true'
  - name: prefetch-input
    value: |
      [
        { "type": "rpm", "path": "." },
        { "type": "gomod", "path": "." }
      ]
  - name: build-source-image
    value: 'true'
  - name: clone-depth
    value: '0'
  - name: clone-fetch-tags
    value: 'true'
  - name: extra-labels
    value:
    # X.Y in the cpe label must be adjusted for every version stream.
    - "cpe=cpe:/a:redhat:advanced_cluster_security:X.Y::el9"

  pipelineRef:
    name: operator-bundle-pipeline

  taskRunSpecs:
  - pipelineTaskName: build-source-image
    stepSpecs:
    # Bump memory for source image build because the one with defaults tends to get sometimes OOM-killed.
    - name: build
      computeResources:
        limits:
          memory: 3Gi
        requests:
          memory: 3Gi
    - name: use-trusted-artifact
      computeResources:
        limits:
          # Default request=256Mi limit=2Gi (namespace default, not set by task). 139 OOMKilled at 2Gi limit in 10,381 runs (1.3%), Apr 15 - May 15, 2026.
          # https://github.com/konflux-ci/build-trusted-artifacts
          memory: 3Gi

  - pipelineTaskName: rpms-signature-scan
    stepSpecs:
    - name: rpms-signature-scan
      computeResources:
        limits:
          # Default request=256Mi limit=256Mi. 180 OOMKilled at 256Mi limit in 10,492 runs (1.7%), Apr 15 - May 15, 2026.
          # https://github.com/konflux-ci/build-definitions/tree/main/external-task/rpms-signature-scan
          memory: 512Mi

  - pipelineTaskName: sast-snyk-check
    stepSpecs:
    - name: use-trusted-artifact
      computeResources:
        limits:
          # Default request=4Gi limit=4Gi. 114 OOMKilled at 4Gi limit in 10,491 runs (1.1%), Apr 15 - May 15, 2026.
          # https://github.com/konflux-ci/build-definitions/tree/main/external-task/sast-snyk-check-oci-ta
          memory: 6Gi
  - pipelineTaskName: sast-shell-check
    stepSpecs:
    - name: use-trusted-artifact
      computeResources:
        limits:
          # Default request=4Gi limit=4Gi. 125 OOMKilled at 4Gi limit in 10,490 runs (1.2%), Apr 15 - May 15, 2026.
          # https://github.com/konflux-ci/build-definitions/tree/main/external-task/sast-shell-check-oci-ta
          memory: 6Gi
  - pipelineTaskName: sast-unicode-check
    stepSpecs:
    - name: use-trusted-artifact
      computeResources:
        limits:
          # Default request=4Gi limit=4Gi. 105 OOMKilled at 4Gi limit in 10,489 runs (1.0%), Apr 15 - May 15, 2026.
          # https://github.com/konflux-ci/build-definitions/tree/main/external-task/sast-unicode-check-oci-ta
          memory: 6Gi

  - pipelineTaskName: prefetch-dependencies
    stepSpecs:
    - name: prefetch-dependencies
      computeResources:
        limits:
          # Default request=3Gi limit=3Gi. 584 OOMKilled at 3Gi limit in 13,559 runs (4.3%), Apr 15 - May 15, 2026.
          # https://github.com/konflux-ci/build-definitions/tree/main/task/prefetch-dependencies-oci-ta
          memory: 4Gi
  taskRunTemplate:
    serviceAccountName: build-pipeline-operator-bundle

  # When building the operator-bundle, we must resolve image digests for all other ACS product images in order to inject
  # these digests in the bundle's ClusterServiceVersion file. For this, the bundle pipeline waits for each image to be
  # built, i.e. its pipeline to complete.
  #
  # You must make sure:
  #
  # 1. For every `wait-for-image` task in `operator-bundle-pipeline.yaml` the `timeout` is equal to the timeout of the
  #    corresponding pipeline.
  #    E.g. if `main-build.yaml` has `spec.timeouts.pipeline` set to `2h40m`, make `wait-for-main-image`'s `timeout`
  #    (in `operator-bundle-pipeline.yaml`) also `2h40m`.
  # 2. The timeout for the operator-bundle build itself must be the maximum timeout of `wait-for-image` tasks plus
  #    30 minutes. Set this value in `spec.timeouts.tasks` (here in `operator-bundle-build.yaml`). Set
  #    `spec.timeouts.pipeline` to be `spec.timeouts.tasks` plus 10 minutes.
  #    E.g. if `wait-for-main-image` is the longest and has timeout `2h40m`, operator-bundle's `spec.timeouts.tasks`
  #    becomes `3h10m` and `spec.timeouts.pipeline` should be `3h20m`.
  timeouts:
    tasks: 3h10m
    finally: 10m
    pipeline: 3h20m

  workspaces:
  - name: git-auth
    secret:
      secretName: '{{ git_auth_secret }}'
