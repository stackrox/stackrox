apiVersion: tekton.dev/v1
kind: PipelineRun

metadata:
  annotations:
    build.appstudio.openshift.io/repo: https://github.com/stackrox/stackrox?rev={{revision}}
    build.appstudio.redhat.com/commit_sha: '{{revision}}'
    build.appstudio.redhat.com/pull_request_number: '{{pull_request_number}}'
    build.appstudio.redhat.com/target_branch: '{{target_branch}}'
    pipelinesascode.tekton.dev/max-keep-runs: "500"
    pipelinesascode.tekton.dev/on-comment: "/konflux-retest operator-on-push"
    # TODO(ROX-21073): re-enable for all PR branches
    pipelinesascode.tekton.dev/on-cel-expression: |
      (
        event == "push" && target_branch.matches("^(master|release-.*|refs/tags/.*)$")
      ) || (
        event == "pull_request" && (
          target_branch.startsWith("release-") ||
          source_branch.matches("(konflux|renovate|appstudio|rhtap)") ||
          (has(body.pull_request) && has(body.pull_request.labels) && body.pull_request.labels.exists(l, l.name == "konflux-build"))
        ) && body.action != "ready_for_review"
      )
    # The empty `on-label` annotation is a workaround to make sure the pipeline gets triggered when the label gets first
    # added to the PR. See the Slack tread linked from ROX-30580.
    pipelinesascode.tekton.dev/on-label: "[]"
  labels:
    appstudio.openshift.io/application: acs
    appstudio.openshift.io/component: operator
    pipelines.appstudio.openshift.io/type: build
  name: operator-on-push
  namespace: rh-acs-tenant

spec:

  params:
  - name: dockerfile
    value: operator/konflux.Dockerfile
  - name: git-url
    value: '{{source_url}}'
  - name: image-expires-after
    value: '13w'
  - name: output-image-repo
    value: quay.io/rhacs-eng/release-operator
  - name: path-context
    value: .
  - name: revision
    value: '{{revision}}'
  - name: rebuild
    value: 'true'
  - name: hermetic
    value: "true"
  - name: prefetch-input
    value: |
      [
        { "type": "gomod", "path": "." },
        { "type": "rpm", "path": "." }
      ]
  - name: build-source-image
    value: 'true'
  - name: clone-depth
    value: '0'
  - name: clone-fetch-tags
    value: 'true'
  - name: extra-labels
    value:
    # X.Y in the cpe label must be adjusted for every version stream.
    - "cpe=cpe:/a:redhat:advanced_cluster_security:X.Y::el9"

  pipelineRef:
    name: basic-component-pipeline

  taskRunSpecs:
  - pipelineTaskName: prefetch-dependencies
    # Default request=3Gi limit=3Gi. 584 OOMKilled in 13,559 runs (4.3%), p90=2311Mi. Apr 15 - May 15, 2026.
    # https://github.com/konflux-ci/build-definitions/tree/main/task/prefetch-dependencies-oci-ta
    # Go GC at default request (3Gi). Limit 5Gi (+2Gi buffer); observed spikes over 4Gi if not limited cpu.
    podTemplate:
      env:
      - name: GOMEMLIMIT
        value: "3GiB"
    stepSpecs:
    # Limit CPU for Go dependencies prefetch, as it tends to be OOM-killed when it gets lots of it without OOTB limit.
    - name: prefetch-dependencies
      computeResources:
        limits:
          cpu: 2
          memory: 5Gi
        requests:
          cpu: 2

  - pipelineTaskName: build-source-image
    # Default request=256Mi limit=2Gi (LimitRange). 139 OOMKilled in 10,381 runs (1.3%), p90=765Mi. Apr 15 - May 15, 2026.
    # https://github.com/konflux-ci/build-trusted-artifacts
    # Go GC at default limit (2Gi). Limit is set higher to allow for spikes GC does not catch.
    podTemplate:
      env:
      - name: GOMEMLIMIT
        value: "2GiB"
    stepSpecs:
    - name: use-trusted-artifact
      computeResources:
        limits:
          memory: 3Gi
    - name: build
      # build step is not Go (bash), so GOMEMLIMIT does not help. p90=2202Mi, needs 3Gi request.
      computeResources:
        limits:
          memory: 3Gi
        requests:
          memory: 3Gi

  - pipelineTaskName: rpms-signature-scan
    # Default request=256Mi limit=256Mi. 180 OOMKilled in 10,492 runs (1.7%), p90=215Mi. Apr 15 - May 15, 2026.
    # https://github.com/konflux-ci/tekton-tools/tree/main/tasks/rpms-signature-scan
    stepSpecs:
    - name: rpms-signature-scan
      computeResources:
        limits:
          memory: 512Mi

  - pipelineTaskName: sast-snyk-check
    # Default request=4Gi limit=4Gi. 114 OOMKilled in 10,491 runs (1.1%), p90=68Mi. Apr 15 - May 15, 2026.
    # https://github.com/konflux-ci/konflux-sast-tasks/tree/main/task/sast-snyk-check-oci-ta
    # Go GC at default request (4Gi). Limit is set higher to allow for spikes GC does not catch.
    podTemplate:
      env:
      - name: GOMEMLIMIT
        value: "4GiB"
    stepSpecs:
    - name: use-trusted-artifact
      computeResources:
        limits:
          memory: 5Gi

  - pipelineTaskName: sast-shell-check
    # Default request=4Gi limit=4Gi. 125 OOMKilled in 10,490 runs (1.2%), p90=68Mi. Apr 15 - May 15, 2026.
    # https://github.com/konflux-ci/konflux-sast-tasks/tree/main/task/sast-shell-check-oci-ta
    # Go GC at default request (4Gi). Limit is set higher to allow for spikes GC does not catch.
    podTemplate:
      env:
      - name: GOMEMLIMIT
        value: "4GiB"
    stepSpecs:
    - name: use-trusted-artifact
      computeResources:
        limits:
          memory: 5Gi

  - pipelineTaskName: sast-unicode-check
    # Default request=4Gi limit=4Gi. 105 OOMKilled in 10,489 runs (1.0%), p90=68Mi. Apr 15 - May 15, 2026.
    # https://github.com/konflux-ci/konflux-sast-tasks/tree/main/task/sast-unicode-check-oci-ta
    # Go GC at default request (4Gi). Limit is set higher to allow for spikes GC does not catch.
    podTemplate:
      env:
      - name: GOMEMLIMIT
        value: "4GiB"
    stepSpecs:
    - name: use-trusted-artifact
      computeResources:
        limits:
          memory: 5Gi

  taskRunTemplate:
    serviceAccountName: build-pipeline-operator

  # IMPORTANT: when changing timeouts here, read and follow timeout instructions in operator-bundle-build.yaml.
  timeouts:
    # The tasks regularly takes 1h to finish.
    tasks: 1h
    # Reserve time for final tasks to run.
    finally: 10m
    pipeline: 1h10m

  workspaces:
  - name: git-auth
    secret:
      secretName: '{{ git_auth_secret }}'
