






apiVersion: apps/v1
kind: Deployment
metadata:
  name: sensor
  namespace: stackrox
  labels:
    app.kubernetes.io/component: sensor
    app.kubernetes.io/instance: stackrox-secured-cluster-services
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: stackrox
    app.kubernetes.io/part-of: stackrox-secured-cluster-services
    app.kubernetes.io/version: 4.11.x-642-g9ef4d6250d
    helm.sh/chart: sensor-400.11.0-642-g9ef4d6250d
    app: sensor
    auto-upgrade.stackrox.io/component: "sensor"
  annotations:
    email: support@stackrox.com
    meta.helm.sh/release-name: stackrox-secured-cluster-services
    meta.helm.sh/release-namespace: stackrox
    owner: stackrox
spec:
  replicas: 1
  minReadySeconds: 15
  selector:
    matchLabels:
      app: sensor
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: sensor
        app.kubernetes.io/component: sensor
        app.kubernetes.io/instance: stackrox-secured-cluster-services
        app.kubernetes.io/managed-by: Helm
        app.kubernetes.io/name: stackrox
        app.kubernetes.io/part-of: stackrox-secured-cluster-services
        app.kubernetes.io/version: 4.11.x-642-g9ef4d6250d
        helm.sh/chart: sensor-400.11.0-642-g9ef4d6250d
      annotations:
        traffic.sidecar.istio.io/excludeInboundPorts: "8443,9443"
        email: support@stackrox.com
        meta.helm.sh/release-name: stackrox-secured-cluster-services
        meta.helm.sh/release-namespace: stackrox
        owner: stackrox
    spec:
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - preference:
              matchExpressions:
              - key: cloud.google.com/gke-preemptible
                operator: NotIn
                values:
                - "true"
            weight: 100
          - preference:
              matchExpressions:
              - key: node-role.kubernetes.io/infra
                operator: Exists
            weight: 50
          - preference:
              matchExpressions:
              - key: node-role.kubernetes.io/compute
                operator: Exists
            weight: 25
          - preference:
              matchExpressions:
              - key: node-role.kubernetes.io/control-plane
                operator: DoesNotExist
            weight: 100
      securityContext:
        runAsUser: 4000
        fsGroup: 4000
      serviceAccountName: sensor
      initContainers:
      containers:
      - image: "quay.io/rhacs-eng/main:4.11.x-642-g9ef4d6250d"
        imagePullPolicy: IfNotPresent
        name: sensor
        readinessProbe:
          httpGet:
            scheme: HTTPS
            path: /ready
            port: 9443
        ports:
          - containerPort: 8443
            name: api
          - containerPort: 9443
            name: webhook
        command:
          - kubernetes-sensor
        resources:
          limits:
            cpu: "4"
            memory: 8Gi
          requests:
            cpu: "2"
            memory: 4Gi
        securityContext:
          allowPrivilegeEscalation: false
          runAsNonRoot: true
          readOnlyRootFilesystem: true
        env:
        - name: ROX_MEMLIMIT
          valueFrom:
            resourceFieldRef:
              resource: limits.memory
        - name: GOMAXPROCS
          valueFrom:
            resourceFieldRef:
              resource: limits.cpu
        - name: K8S_NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: ROX_CENTRAL_ENDPOINT
          value: central.stackrox:443
        - name: ROX_ADVERTISED_ENDPOINT
          value: sensor.stackrox.svc:443
        - name: GRPC_ENFORCE_ALPN_ENABLED
          value: "false"
        
        - name: "ROX_ADMISSION_CONTROLLER_CONFIG"
          value: "true"
        
        - name: "ROX_AGGREGATE_DEPLOYMENT_REFERENCE_OPTIMIZATION"
          value: "false"
        
        - name: "ROX_ATTEMPT_MANIFEST_DIGEST"
          value: "true"
        
        - name: "ROX_AUTO_LOCK_PROCESS_BASELINES"
          value: "true"
        
        - name: "ROX_BASE_IMAGE_DETECTION"
          value: "true"
        
        - name: "ROX_CISA_KEV"
          value: "false"
        
        - name: "ROX_CLUSTERS_PAGE_MIGRATION_UI"
          value: "true"
        
        - name: "ROX_CLUSTER_AWARE_DEPLOYMENT_CHECK"
          value: "true"
        
        - name: "ROX_CLUSTER_REGISTRATION_SECRETS"
          value: "true"
        
        - name: "ROX_COMPLIANCE_ENHANCEMENTS"
          value: "true"
        
        - name: "ROX_COMPLIANCE_REMEDIATION"
          value: "true"
        
        - name: "ROX_COMPLIANCE_REPORTING"
          value: "true"
        
        - name: "ROX_CUSTOMIZABLE_PLATFORM_COMPONENTS"
          value: "true"
        
        - name: "ROX_CVE_FIX_TIMESTAMP"
          value: "true"
        
        - name: "ROX_DELEGATED_BASE_IMAGE_SCANNING"
          value: "false"
        
        - name: "ROX_DELEGATE_WATCHED_IMAGE_REPROCESSING"
          value: "true"
        
        - name: "ROX_DEPLOYMENT_BUILD_OPTIMIZATION"
          value: "true"
        
        - name: "ROX_EXTERNAL_IPS"
          value: "true"
        
        - name: "ROX_FLATTEN_IMAGE_DATA"
          value: "false"
        
        - name: "ROX_LABEL_BASED_POLICY_SCOPING"
          value: "false"
        
        - name: "ROX_NETWORK_GRAPH_AGGREGATE_EXT_IPS"
          value: "false"
        
        - name: "ROX_NETWORK_GRAPH_EXTERNAL_IPS"
          value: "true"
        
        - name: "ROX_NODE_INDEX_ENABLED"
          value: "true"
        
        - name: "ROX_NODE_VULNERABILITY_REPORTS"
          value: "false"
        
        - name: "ROX_OCP_CONSOLE_INTEGRATION"
          value: "true"
        
        - name: "ROX_OPTIMIZED_BASELINE_MEMORY"
          value: "false"
        
        - name: "ROX_PLATFORM_COMPONENTS"
          value: "true"
        
        - name: "ROX_POLICY_CRITERIA_MODAL"
          value: "false"
        
        - name: "ROX_SBOM_SCANNING"
          value: "false"
        
        - name: "ROX_SCANNER_V4_MAVEN_SEARCH"
          value: "false"
        
        - name: "ROX_SCANNER_V4_PARTIAL_NODE_JS_SUPPORT"
          value: "false"
        
        - name: "ROX_SCANNER_V4_RED_HAT_CSAF"
          value: "true"
        
        - name: "ROX_SCANNER_V4_RED_HAT_CVES"
          value: "true"
        
        - name: "ROX_SCANNER_V4_RED_HAT_LAYERS_RED_HAT_VULNS_ONLY"
          value: "false"
        
        - name: "ROX_SCANNER_V4_REINDEX"
          value: "true"
        
        - name: "ROX_SCANNER_V4_STORE_EXTERNAL_INDEX_REPORTS"
          value: "true"
        
        - name: "ROX_SCAN_SCHEDULE_REPORT_JOBS"
          value: "true"
        
        - name: "ROX_SENSITIVE_FILE_ACTIVITY"
          value: "true"
        
        - name: "ROX_SENSOR_INFORMER_WATCHDOG"
          value: "true"
        
        - name: "ROX_SENSOR_PUBSUB"
          value: "true"
        
        - name: "ROX_SENSOR_PULL_SECRETS_BY_NAME"
          value: "true"
        
        - name: "ROX_SENSOR_SINGLE_SCAN"
          value: "true"
        
        - name: "ROX_SOURCED_AUTOGENERATED_INTEGRATIONS"
          value: "false"
        
        - name: "ROX_STORE_EVENT_HASHES"
          value: "true"
        
        - name: "ROX_TAILORED_PROFILES"
          value: "false"
        
        - name: "ROX_UNQUALIFIED_SEARCH_REGISTRIES"
          value: "false"
        
        - name: "ROX_VIRTUAL_MACHINES"
          value: "false"
        
        - name: "ROX_VIRTUAL_MACHINES_ENHANCED_DATA_MODEL"
          value: "false"
        
        - name: "ROX_VULNERABILITY_REPORTS_ENHANCED_FILTERING"
          value: "false"
        
        - name: "ROX_VULNERABILITY_VIEW_BASED_REPORTS"
          value: "true"
        
        - name: "ROX_VULN_MGMT_LEGACY_SNOOZE"
          value: "false"
        
        volumeMounts:
        - name: varlog
          mountPath: /var/log/stackrox/
        - name: sensor-etc-ssl-volume
          mountPath: /etc/ssl/
        - name: sensor-etc-pki-volume
          mountPath: /etc/pki/ca-trust/
        - name: certs
          mountPath: /run/secrets/stackrox.io/certs/
          readOnly: true
        - name: additional-ca-volume
          mountPath: /usr/local/share/ca-certificates/
          readOnly: true
        - name: cache
          mountPath: /var/cache/stackrox
        
        
      volumes:
      - name: certs
        secret:
          secretName: sensor-tls
          optional: true
          items:
          - key: sensor-cert.pem
            path: cert.pem
          - key: sensor-key.pem
            path: key.pem
          - key: ca.pem
            path: ca.pem
      - name: sensor-etc-ssl-volume
        emptyDir: {}
      - name: sensor-etc-pki-volume
        emptyDir: {}
      - name: additional-ca-volume
        secret:
          secretName: additional-ca-sensor
          optional: true
      - name: varlog
        emptyDir: {}
      - name: cache
        emptyDir: {}
      
      
---
apiVersion: v1
kind: Service
metadata:
  name: sensor
  namespace: stackrox
  labels:
    app.kubernetes.io/component: sensor
    app.kubernetes.io/instance: stackrox-secured-cluster-services
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: stackrox
    app.kubernetes.io/part-of: stackrox-secured-cluster-services
    app.kubernetes.io/version: 4.11.x-642-g9ef4d6250d
    helm.sh/chart: sensor-400.11.0-642-g9ef4d6250d
    auto-upgrade.stackrox.io/component: "sensor"
  annotations:
    email: support@stackrox.com
    meta.helm.sh/release-name: stackrox-secured-cluster-services
    meta.helm.sh/release-namespace: stackrox
    owner: stackrox
spec:
  ports:
  - name: https
    port: 443
    targetPort: api
    protocol: TCP
  selector:
    app: sensor
  type: ClusterIP
  sessionAffinity: None
---
apiVersion: networking.istio.io/v1alpha3
kind: DestinationRule
metadata:
  name: sensor-internal-no-istio-mtls
  namespace: stackrox
  labels:
    app.kubernetes.io/component: sensor
    app.kubernetes.io/instance: stackrox-secured-cluster-services
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: stackrox
    app.kubernetes.io/part-of: stackrox-secured-cluster-services
    app.kubernetes.io/version: 4.11.x-642-g9ef4d6250d
    helm.sh/chart: sensor-400.11.0-642-g9ef4d6250d
  annotations:
    email: support@stackrox.com
    meta.helm.sh/release-name: stackrox-secured-cluster-services
    meta.helm.sh/release-namespace: stackrox
    owner: stackrox
    stackrox.io/description: "Disable Istio mTLS for port 443, since StackRox services use built-in mTLS."
spec:
  host: sensor.stackrox.svc.cluster.local
  trafficPolicy:
    portLevelSettings:
    - port:
        number: 443
      tls:
        mode: DISABLE
---

apiVersion: v1
kind: Service
metadata:
  name: sensor-webhook
  namespace: stackrox
  labels:
    app.kubernetes.io/component: sensor
    app.kubernetes.io/instance: stackrox-secured-cluster-services
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: stackrox
    app.kubernetes.io/part-of: stackrox-secured-cluster-services
    app.kubernetes.io/version: 4.11.x-642-g9ef4d6250d
    helm.sh/chart: sensor-400.11.0-642-g9ef4d6250d
    auto-upgrade.stackrox.io/component: "sensor"
  annotations:
    email: support@stackrox.com
    meta.helm.sh/release-name: stackrox-secured-cluster-services
    meta.helm.sh/release-namespace: stackrox
    owner: stackrox
spec:
  ports:
  - name: https
    port: 443
    targetPort: webhook
    protocol: TCP
  selector:
    app: sensor
  type: ClusterIP
  sessionAffinity: None
---
apiVersion: v1
kind: Secret
metadata:
  name: helm-effective-cluster-name
  namespace: stackrox
  labels:
    app.kubernetes.io/component: sensor
    app.kubernetes.io/instance: stackrox-secured-cluster-services
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: stackrox
    app.kubernetes.io/part-of: stackrox-secured-cluster-services
    app.kubernetes.io/version: 4.11.x-642-g9ef4d6250d
    helm.sh/chart: sensor-400.11.0-642-g9ef4d6250d
    auto-upgrade.stackrox.io/component: sensor
  annotations:
    email: support@stackrox.com
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/resource-policy: keep
    meta.helm.sh/release-name: stackrox-secured-cluster-services
    meta.helm.sh/release-namespace: stackrox
    owner: stackrox
stringData:
  cluster-name: |
    REDACTED_CLUSTER_NAME
