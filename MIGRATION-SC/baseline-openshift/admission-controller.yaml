






apiVersion: apps/v1
kind: Deployment
metadata:
  name: admission-control
  namespace: stackrox
  labels:
    app.kubernetes.io/component: admission-control
    app.kubernetes.io/instance: stackrox-secured-cluster-services
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: stackrox
    app.kubernetes.io/part-of: stackrox-secured-cluster-services
    app.kubernetes.io/version: 4.11.x-642-g9ef4d6250d
    helm.sh/chart: sensor-400.11.0-642-g9ef4d6250d
    app: admission-control
    auto-upgrade.stackrox.io/component: "sensor"
  annotations:
    email: support@stackrox.com
    meta.helm.sh/release-name: stackrox-secured-cluster-services
    meta.helm.sh/release-namespace: stackrox
    owner: stackrox
spec:
  replicas: 3
  minReadySeconds: 0
  selector:
    matchLabels:
      app: admission-control
  template:
    metadata:
      namespace: stackrox
      labels:
        app: admission-control
        app.kubernetes.io/component: admission-control
        app.kubernetes.io/instance: stackrox-secured-cluster-services
        app.kubernetes.io/managed-by: Helm
        app.kubernetes.io/name: stackrox
        app.kubernetes.io/part-of: stackrox-secured-cluster-services
        app.kubernetes.io/version: 4.11.x-642-g9ef4d6250d
        helm.sh/chart: sensor-400.11.0-642-g9ef4d6250d
      annotations:
        email: support@stackrox.com
        meta.helm.sh/release-name: stackrox-secured-cluster-services
        meta.helm.sh/release-namespace: stackrox
        openshift.io/required-scc: restricted-v2
        owner: stackrox
        traffic.sidecar.istio.io/excludeInboundPorts: "8443"
    spec:
      # Attempt to schedule these on master nodes
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - preference:
              matchExpressions:
              - key: node-role.kubernetes.io/control-plane
                operator: Exists
            weight: 50
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - podAffinityTerm:
              labelSelector:
                matchLabels:
                  app: admission-control
              topologyKey: kubernetes.io/hostname
            weight: 60
      serviceAccountName: admission-control
      containers:
        - image: "quay.io/rhacs-eng/main:4.11.x-642-g9ef4d6250d"
          imagePullPolicy: IfNotPresent
          name: admission-control
          readinessProbe:
            httpGet:
              scheme: HTTPS
              path: /ready
              port: 8443
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 1
          ports:
            - containerPort: 8443
              name: webhook
            - containerPort: 9091
              name: monitoring-tls
          command:
            - admission-control
          resources:
            limits:
              cpu: 500m
              memory: 500Mi
            requests:
              cpu: 50m
              memory: 100Mi
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            readOnlyRootFilesystem: true
          env:
          - name: ROX_MEMLIMIT
            valueFrom:
              resourceFieldRef:
                resource: limits.memory
          - name: GOMAXPROCS
            valueFrom:
              resourceFieldRef:
                resource: limits.cpu
          - name: POD_NAMESPACE
            valueFrom:
              fieldRef:
                fieldPath: metadata.namespace
          - name: POD_NAME
            valueFrom:
              fieldRef:
                fieldPath: metadata.name
          - name: ROX_SENSOR_ENDPOINT
            value: sensor.stackrox.svc:443
          - name: ROX_ENABLE_SECURE_METRICS
            value: "true"
          - name: ROX_ADMISSION_CONTROL_IMAGE_CACHE_MAX_SIZE
            value: "200"
          
          - name: "ROX_ADMISSION_CONTROLLER_CONFIG"
            value: "true"
          
          - name: "ROX_AGGREGATE_DEPLOYMENT_REFERENCE_OPTIMIZATION"
            value: "false"
          
          - name: "ROX_ATTEMPT_MANIFEST_DIGEST"
            value: "true"
          
          - name: "ROX_AUTO_LOCK_PROCESS_BASELINES"
            value: "true"
          
          - name: "ROX_BASE_IMAGE_DETECTION"
            value: "true"
          
          - name: "ROX_CISA_KEV"
            value: "false"
          
          - name: "ROX_CLUSTERS_PAGE_MIGRATION_UI"
            value: "true"
          
          - name: "ROX_CLUSTER_AWARE_DEPLOYMENT_CHECK"
            value: "true"
          
          - name: "ROX_CLUSTER_REGISTRATION_SECRETS"
            value: "true"
          
          - name: "ROX_COMPLIANCE_ENHANCEMENTS"
            value: "true"
          
          - name: "ROX_COMPLIANCE_REMEDIATION"
            value: "true"
          
          - name: "ROX_COMPLIANCE_REPORTING"
            value: "true"
          
          - name: "ROX_CUSTOMIZABLE_PLATFORM_COMPONENTS"
            value: "true"
          
          - name: "ROX_CVE_FIX_TIMESTAMP"
            value: "true"
          
          - name: "ROX_DELEGATED_BASE_IMAGE_SCANNING"
            value: "false"
          
          - name: "ROX_DELEGATE_WATCHED_IMAGE_REPROCESSING"
            value: "true"
          
          - name: "ROX_DEPLOYMENT_BUILD_OPTIMIZATION"
            value: "true"
          
          - name: "ROX_EXTERNAL_IPS"
            value: "true"
          
          - name: "ROX_FLATTEN_IMAGE_DATA"
            value: "false"
          
          - name: "ROX_LABEL_BASED_POLICY_SCOPING"
            value: "false"
          
          - name: "ROX_NETWORK_GRAPH_AGGREGATE_EXT_IPS"
            value: "false"
          
          - name: "ROX_NETWORK_GRAPH_EXTERNAL_IPS"
            value: "true"
          
          - name: "ROX_NODE_INDEX_ENABLED"
            value: "true"
          
          - name: "ROX_NODE_VULNERABILITY_REPORTS"
            value: "false"
          
          - name: "ROX_OCP_CONSOLE_INTEGRATION"
            value: "true"
          
          - name: "ROX_OPTIMIZED_BASELINE_MEMORY"
            value: "false"
          
          - name: "ROX_PLATFORM_COMPONENTS"
            value: "true"
          
          - name: "ROX_POLICY_CRITERIA_MODAL"
            value: "false"
          
          - name: "ROX_SBOM_SCANNING"
            value: "false"
          
          - name: "ROX_SCANNER_V4_MAVEN_SEARCH"
            value: "false"
          
          - name: "ROX_SCANNER_V4_PARTIAL_NODE_JS_SUPPORT"
            value: "false"
          
          - name: "ROX_SCANNER_V4_RED_HAT_CSAF"
            value: "true"
          
          - name: "ROX_SCANNER_V4_RED_HAT_CVES"
            value: "true"
          
          - name: "ROX_SCANNER_V4_RED_HAT_LAYERS_RED_HAT_VULNS_ONLY"
            value: "false"
          
          - name: "ROX_SCANNER_V4_REINDEX"
            value: "true"
          
          - name: "ROX_SCANNER_V4_STORE_EXTERNAL_INDEX_REPORTS"
            value: "true"
          
          - name: "ROX_SCAN_SCHEDULE_REPORT_JOBS"
            value: "true"
          
          - name: "ROX_SENSITIVE_FILE_ACTIVITY"
            value: "true"
          
          - name: "ROX_SENSOR_INFORMER_WATCHDOG"
            value: "true"
          
          - name: "ROX_SENSOR_PUBSUB"
            value: "true"
          
          - name: "ROX_SENSOR_PULL_SECRETS_BY_NAME"
            value: "true"
          
          - name: "ROX_SENSOR_SINGLE_SCAN"
            value: "true"
          
          - name: "ROX_SOURCED_AUTOGENERATED_INTEGRATIONS"
            value: "false"
          
          - name: "ROX_STORE_EVENT_HASHES"
            value: "true"
          
          - name: "ROX_TAILORED_PROFILES"
            value: "false"
          
          - name: "ROX_UNQUALIFIED_SEARCH_REGISTRIES"
            value: "false"
          
          - name: "ROX_VIRTUAL_MACHINES"
            value: "false"
          
          - name: "ROX_VIRTUAL_MACHINES_ENHANCED_DATA_MODEL"
            value: "false"
          
          - name: "ROX_VULNERABILITY_REPORTS_ENHANCED_FILTERING"
            value: "false"
          
          - name: "ROX_VULNERABILITY_VIEW_BASED_REPORTS"
            value: "true"
          
          - name: "ROX_VULN_MGMT_LEGACY_SNOOZE"
            value: "false"
          
          volumeMounts:
            - name: config
              mountPath: /run/config/stackrox.io/admission-control/config/
              readOnly: true
            - name: config-store
              mountPath: /var/lib/stackrox/admission-control/
            - name: ca
              mountPath: /run/secrets/stackrox.io/ca/
              readOnly: true
            - name: certs
              mountPath: /run/secrets/stackrox.io/certs/
              readOnly: true
            - name: ssl
              mountPath: /etc/ssl
            - name: pki
              mountPath: /etc/pki/ca-trust/
            - name: additional-cas
              mountPath: /usr/local/share/ca-certificates/
              readOnly: true
            
            - name: trusted-ca-volume
              mountPath: /etc/pki/injected-ca-trust/
              readOnly: true
            
            
            - name: monitoring-tls
              mountPath: /run/secrets/stackrox.io/monitoring-tls
              readOnly: true
      volumes:
        - name: certs
          secret:
            secretName: admission-control-tls
            optional: true
            items:
            - key: admission-control-cert.pem
              path: cert.pem
            - key: admission-control-key.pem
              path: key.pem
            - key: ca.pem
              path: ca.pem
        - name: ca
          secret:
            secretName: service-ca
            optional: true
        - name: config
          configMap:
            name: admission-control
            optional: true
        - name: config-store
          emptyDir: {}
        - name: ssl
          emptyDir: {}
        - name: pki
          emptyDir: {}
        - name: additional-cas
          secret:
            secretName: additional-ca-sensor
            optional: true
        
        - name: trusted-ca-volume
          configMap:
            name: injected-cabundle-stackrox-secured-cluster-services
            items:
              - key: ca-bundle.crt
                path: tls-ca-bundle.pem
            optional: true
        
        
        - name: monitoring-tls
          secret:
            secretName: admission-control-monitoring-tls
---

apiVersion: v1
kind: Service
metadata:
  name: admission-control
  namespace: stackrox
  labels:
    app.kubernetes.io/component: admission-control
    app.kubernetes.io/instance: stackrox-secured-cluster-services
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: stackrox
    app.kubernetes.io/part-of: stackrox-secured-cluster-services
    app.kubernetes.io/version: 4.11.x-642-g9ef4d6250d
    helm.sh/chart: sensor-400.11.0-642-g9ef4d6250d
    auto-upgrade.stackrox.io/component: "sensor"
  annotations:
    email: support@stackrox.com
    meta.helm.sh/release-name: stackrox-secured-cluster-services
    meta.helm.sh/release-namespace: stackrox
    owner: stackrox
    service.beta.openshift.io/serving-cert-secret-name: admission-control-monitoring-tls
spec:
  ports:
    - name: https
      port: 443
      targetPort: webhook
      protocol: TCP
    - name: monitoring-tls
      port: 9091
      targetPort: monitoring-tls
      protocol: TCP
  selector:
    app: admission-control
  type: ClusterIP
  sessionAffinity: None
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: stackrox
  labels:
    app.kubernetes.io/component: admission-control
    app.kubernetes.io/instance: stackrox-secured-cluster-services
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: stackrox
    app.kubernetes.io/part-of: stackrox-secured-cluster-services
    app.kubernetes.io/version: 4.11.x-642-g9ef4d6250d
    helm.sh/chart: sensor-400.11.0-642-g9ef4d6250d
    auto-upgrade.stackrox.io/component: "sensor"
  annotations:
    email: support@stackrox.com
    meta.helm.sh/release-name: stackrox-secured-cluster-services
    meta.helm.sh/release-namespace: stackrox
    owner: stackrox
webhooks:
  - name: policyeval.stackrox.io
    sideEffects: NoneOnDryRun
    admissionReviewVersions: [ "v1", "v1beta1" ]
    timeoutSeconds: 12
    rules:
      - apiGroups:
        - '*'
        apiVersions:
        - '*'
        operations:
        - CREATE
        - UPDATE
        resources:
          - pods
          - deployments
          - deployments/scale
          - replicasets
          - replicationcontrollers
          - statefulsets
          - daemonsets
          - cronjobs
          - jobs
          - deploymentconfigs
    namespaceSelector:
      matchExpressions:
      - key: namespace.metadata.stackrox.io/name
        operator: NotIn
        values:
          - stackrox
          - kube-system
          - kube-public
          - istio-system
    failurePolicy: "Ignore"
    clientConfig:
      caBundle: 
      service:
        namespace: stackrox
        name: admission-control
        path: /validate
  - name: k8sevents.stackrox.io
    sideEffects: NoneOnDryRun
    admissionReviewVersions: [ "v1", "v1beta1" ]
    timeoutSeconds: 12
    rules:
      - apiGroups:
        - '*'
        apiVersions:
        - '*'
        operations:
        - CONNECT
        resources:
          - pods
          - pods/exec
          - pods/portforward
          - pods/attach
    failurePolicy: "Ignore"
    clientConfig:
      caBundle: 
      service:
        namespace: stackrox
        name: admission-control
        path: /events
