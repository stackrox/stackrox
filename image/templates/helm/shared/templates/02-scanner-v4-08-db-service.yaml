{{- include "srox.init" . -}}
{{- if ._rox.scannerV4._dbEnabled }}
apiVersion: v1
kind: Service
metadata:
  name: scanner-v4-db
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "srox.labels" (list . "service" "scanner-v4-db") | nindent 4 }}
  annotations:
    {{- include "srox.annotations" (list . "service" "scanner-v4-db") | nindent 4 }}
spec:
  type: ClusterIP
  ports:
  - name: tcp-db
    port: 5432
    targetPort: 5432
  selector:
    app: scanner-v4-db

{{- end }}
