{{- include "srox.init" . -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: stackrox-helm
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "srox.labels" (list . "configmap" "stackrox-helm") | nindent 4 }}
  annotations:
    {{- $annotations := dict "helm.sh/hook" "pre-install" -}}
    {{- include "srox.annotations" (list . "configmap" "stackrox-helm" $annotations) | nindent 4 }}
    "helm.sh/hook": "pre-install,pre-upgrade"
data:
  installVersion: {{ .Chart.appVersion | quote }}
